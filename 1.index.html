<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ボートレース精密逃げ判定ツール</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #f0f2f5; padding: 20px; color: #333; }
        .card { background: white; max-width: 500px; margin: auto; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h1 { font-size: 1.4rem; text-align: center; color: #004085; margin-bottom: 25px; }
        
        .input-section { margin-bottom: 22px; border-bottom: 1px solid #eee; padding-bottom: 15px; }
        .input-section:last-of-type { border-bottom: none; }
        label { display: block; font-weight: bold; font-size: 0.9rem; color: #555; margin-bottom: 10px; }
        
        .input-group { display: flex; align-items: center; gap: 15px; }
        input[type="range"] { flex: 1; height: 8px; border-radius: 5px; background: #ddd; accent-color: #007bff; cursor: pointer; }
        .val-display { font-size: 1.1rem; font-weight: bold; color: #007bff; min-width: 80px; text-align: right; }
        .sub-label { font-size: 0.75rem; color: #888; display: flex; justify-content: space-between; margin-top: 5px; }

        select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd; font-size: 1rem; background: #fff; }
        button { width: 100%; padding: 18px; margin-top: 10px; background: #e63946; color: white; border: none; border-radius: 12px; font-weight: bold; font-size: 1.2rem; cursor: pointer; transition: 0.3s; }
        button:hover { background: #c1121f; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(230,57,70,0.3); }

        #result { margin-top: 30px; padding: 25px; border-radius: 15px; text-align: center; display: none; }
        .high { background: #e6fcf5; color: #087f5b; border: 2px solid #b2f2bb; }
        .mid { background: #fff9db; color: #f08c00; border: 2px solid #ffec99; }
        .low { background: #fff5f5; color: #e03131; border: 2px solid #ffc9c9; }
        .score { font-size: 4rem; font-weight: bold; display: block; line-height: 1; margin: 15px 0; }
        #advice { text-align: left; font-size: 0.95rem; line-height: 1.6; margin-top: 15px; border-top: 1px solid rgba(0,0,0,0.1); padding-top: 15px; }
    </style>
</head>
<body>

<div class="card">
    <h1>🚀 精密逃げ判定シミュレーター</h1>
    
    <div class="input-section">
        <label>① 開催場を選択</label>
        <select id="stadium">
            <option value="24">大村 (イン最強)</option>
            <option value="18">徳山</option>
            <option value="21">芦屋</option>
            <option value="19">下関</option>
            <option value="12">住之江</option>
            <option value="02">戸田 (イン最弱)</option>
            <option value="04">平和島</option>
            <option value="22">福岡</option>
        </select>
    </div>

    <div class="input-section">
        <label>② 1号艇の2連対率</label>
        <div class="input-group">
            <input type="range" id="rank1" min="0" max="100" value="70" oninput="updateVal('rank1Val', this.value + '%')">
            <span class="val-display" id="rank1Val">70%</span>
        </div>
    </div>

    <div class="input-section">
        <label>③ 1号艇の展示気配</label>
        <div class="input-group">
            <input type="range" id="tenji1" min="-2" max="2" value="0" oninput="updateTenjiDisplay(this.value)">
            <span class="val-display" id="tenjiVal">普通</span>
        </div>
        <div class="sub-label"><span>悪い(展示順位下位)</span><span>良い(展示1位級)</span></div>
    </div>

    <div class="input-section">
        <label>④ 外枠(2-6)に超抜タイムはいるか？</label>
        <select id="tenji_others">
            <option value="0">いない（1号艇が最速、または差が小さい）</option>
            <option value="-15">いる（1号艇より0.1s以上速い艇がいる）</option>
            <option value="-25">複数いる（外枠が伸び特化している）</option>
        </select>
    </div>

    <div class="input-section">
        <label>⑤ 風向きと風速 (m)</label>
        <div class="input-group">
            <input type="range" id="wind" min="-10" max="10" value="0" oninput="updateWindDisplay(this.value)">
            <span class="val-display" id="windVal">無風</span>
        </div>
    </div>

    <button onclick="calculate()">逃げ率を最終判定</button>

    <div id="result">
        <span style="font-size: 0.9rem;">推定イン逃げ確率</span>
        <span class="score" id="score">0%</span>
        <div id="advice"></div>
    </div>
</div>

<script>
function updateVal(id, val) {
    document.getElementById(id).innerText = val;
}

function updateTenjiDisplay(val) {
    const texts = { "-2": "最悪", "-1": "やや劣勢", "0": "普通", "1": "良好", "2": "超抜(1位)" };
    document.getElementById('tenjiVal').innerText = texts[val];
}

function updateWindDisplay(val) {
    let text = (val > 0) ? "追い " + val + "m" : (val < 0) ? "向かい " + Math.abs(val) + "m" : "無風";
    document.getElementById('windVal').innerText = text;
}

const stadiumData = {
    "24": { name: "大村", base: 66, windFactor: 0.7, desc: "イン絶対。展示が悪くても逃げる事が多い。" },
    "02": { name: "戸田", base: 44, windFactor: 1.8, desc: "外枠に速いタイムがいると、カド受けが速攻で沈む。" },
    "18": { name: "徳山", base: 63, windFactor: 0.8, desc: "1号艇の展示が良ければほぼ鉄板。" },
    "04": { name: "平和島", base: 45, windFactor: 1.6, desc: "展示タイムが良い艇が、バックで一気に突き抜ける。" },
    // 他のデータは以前の24場リストをここに統合
};

function calculate() {
    const stadiumId = document.getElementById('stadium').value;
    const stadium = stadiumData[stadiumId] || {name:"その他", base:50, windFactor:1.0, desc:""};
    
    let r1 = parseInt(document.getElementById('rank1').value);
    let tenji1 = parseInt(document.getElementById('tenji1').value);
    let tenjiOthers = parseInt(document.getElementById('tenji_others').value);
    let wind = parseInt(document.getElementById('wind').value);

    // ロジック計算
    let r1Fix = (r1 - 50) * 0.6; 
    let tenjiFix = tenji1 * 7; // 展示1位なら+14%、最悪なら-14%
    
    let windFix = (wind > 0) ? wind * -2.5 : Math.abs(wind) * -3.0;
    let totalWindEffect = windFix * stadium.windFactor;

    // 最終合算
    let total = stadium.base + r1Fix + tenjiFix + tenjiOthers + totalWindEffect + 5;
    total = Math.min(98, Math.max(5, total));

    const resDiv = document.getElementById('result');
    resDiv.style.display = "block";
    const score = Math.round(total);
    document.getElementById('score').innerText = score + "%";
    
    resDiv.className = (score >= 75) ? "high" : (score <= 40) ? "low" : "mid";
    document.getElementById('advice').innerHTML = `<strong>${stadium.name}:</strong> ${stadium.desc}<br><br>${getComment(score)}`;
}

function getComment(s) {
    if(s >= 85) return "【究極の鉄板】1号艇の機力が抜けています。厚く勝負。";
    if(s >= 70) return "【本命】逃げ濃厚。外枠に0.1s以上の差をつけられていなければ安全。";
    if(s >= 50) return "【五分】展開次第。展示で1号艇が負けているなら逆転を考慮。";
    return "【危険】インが機力負けしています。高配当を狙うチャンス。";
}
</script>

</body>
</html>
