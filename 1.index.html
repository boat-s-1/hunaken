<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>精密判定 & ダブル分析ツール</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #f0f2f5; padding: 20px; color: #333; }
        .card { background: white; max-width: 550px; margin: auto; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h1, h2 { text-align: center; color: #004085; }
        h1 { font-size: 1.2rem; margin-bottom: 25px; }
        h2 { font-size: 1.1rem; margin-top: 0; }
        
        .input-section { margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 12px; }
        label { display: block; font-weight: bold; font-size: 0.85rem; color: #555; margin-bottom: 8px; }
        
        .input-group { display: flex; align-items: center; gap: 12px; }
        input[type="range"] { flex: 1; accent-color: #007bff; cursor: pointer; }
        .val-display { font-size: 1rem; font-weight: bold; color: #007bff; min-width: 70px; text-align: right; }

        select { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ddd; background: #fff; }
        .calc-btn { width: 100%; padding: 15px; background: #007bff; color: white; border: none; border-radius: 12px; font-weight: bold; font-size: 1.1rem; cursor: pointer; }

        #result { margin-top: 20px; padding: 20px; border-radius: 15px; text-align: center; display: none; }
        .score { font-size: 3.5rem; font-weight: bold; display: block; margin: 5px 0; }
        
        /* 記録セクション */
        .record-box { margin-top: 15px; padding: 15px; background: rgba(255,255,255,0.5); border-radius: 10px; border: 1px dashed #ccc; }
        .record-title { font-size: 0.8rem; font-weight: bold; margin-bottom: 10px; display: block; }
        .record-row { display: flex; gap: 8px; justify-content: center; margin-bottom: 15px; }
        
        /* ボタン色分け */
        .btn-nige { background: #228be6; color: white; border: none; padding: 10px; border-radius: 8px; flex: 1; font-weight: bold; font-size: 0.8rem; cursor: pointer; }
        .btn-nogashi { background: #fa5252; color: white; border: none; padding: 10px; border-radius: 8px; flex: 1; font-weight: bold; font-size: 0.8rem; cursor: pointer; }
        .btn-win { background: #40c057; color: white; border: none; padding: 10px; border-radius: 8px; flex: 1; font-weight: bold; font-size: 0.8rem; cursor: pointer; }
        .btn-lose { background: #868e96; color: white; border: none; padding: 10px; border-radius: 8px; flex: 1; font-weight: bold; font-size: 0.8rem; cursor: pointer; }

        /* 集計表示 */
        .stats-summary { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .stat-card { background: #f8f9fa; padding: 10px; border-radius: 12px; text-align: center; border: 1px solid #e9ecef; }
        .stat-val { display: block; font-size: 1.2rem; font-weight: bold; color: #333; }
        .stat-label { font-size: 0.65rem; color: #777; }

        .table-container { overflow-x: auto; max-height: 300px; }
        .field-table { width: 100%; border-collapse: collapse; font-size: 0.75rem; }
        .field-table th { background: #004085; color: white; padding: 8px; position: sticky; top: 0; }
        .field-table td { padding: 6px; border-bottom: 1px solid #eee; text-align: center; }
        
        .reset-btn { font-size: 0.7rem; color: #adb5bd; background: none; border: none; cursor: pointer; text-decoration: underline; margin-top: 15px; width: 100%; }
    </style>
</head>
<body>

<div class="card">
    <h1>🚀 精密逃げ判定 & ダブル分析</h1>
    
    <div class="input-section">
        <label>① 開催場を選択</label>
        <select id="stadium">
            <option value="桐生">01 桐生</option><option value="戸田">02 戸田</option><option value="江戸川">03 江戸川</option><option value="平和島">04 平和島</option><option value="多摩川">05 多摩川</option><option value="浜名湖">06 浜名湖</option><option value="蒲郡">07 蒲郡</option><option value="常滑">08 常滑</option><option value="津">09 津</option><option value="三国">10 三国</option><option value="びわこ">11 びわこ</option><option value="住之江">12 住之江</option><option value="尼崎">13 尼崎</option><option value="鳴門">14 鳴門</option><option value="丸亀">15 丸亀</option><option value="児島">16 児島</option><option value="宮島">17 宮島</option><option value="徳山">18 徳山</option><option value="下関">19 下関</option><option value="若松">20 若松</option><option value="芦屋">21 芦屋</option><option value="福岡">22 福岡</option><option value="唐津">23 唐津</option><option value="大村">24 大村</option>
        </select>
    </div>

    <div class="input-section">
        <label>② 1号艇 2連率 / ST</label>
        <div class="input-group">
            <input type="range" id="rank1" min="0" max="100" value="70" oninput="updateVal('r1v', this.value+'%')">
            <span class="val-display" id="r1v">70%</span>
            <input type="range" id="st1" min="10" max="25" value="15" oninput="updateVal('s1v', '0.'+this.value+'s')">
            <span class="val-display" id="s1v">0.15s</span>
        </div>
    </div>

    <div class="input-section">
        <label>③ 1号艇 展示 / 2号艇 壁率</label>
        <div class="input-group">
            <input type="range" id="tenji1" min="-2" max="2" value="0" oninput="updateVal('tjv', this.value)">
            <span class="val-display" id="tjv">0</span>
            <input type="range" id="rank2" min="0" max="100" value="50" oninput="updateVal('r2v', this.value+'%')">
            <span class="val-display" id="r2v">50%</span>
        </div>
    </div>

    <div class="input-section">
        <label>④ 2号艇 ST (凹み) / その他</label>
        <div class="input-group">
            <input type="range" id="st2" min="10" max="25" value="15" oninput="updateVal('s2v', '0.'+this.value+'s')">
            <span class="val-display" id="s2v">0.15s</span>
            <select id="condition" style="flex:1;">
                <option value="0">条件なし</option><option value="-15">外超抜</option><option value="-10">追い風強</option>
            </select>
        </div>
    </div>

    <button class="calc-btn" onclick="calculate()">逃げ率を算出</button>

    <div id="result">
        <span style="font-size:0.8rem">逃げ確率</span>
        <span class="score" id="score">0%</span>
        
        <div class="record-box">
            <span class="record-title">【1】逃げ判定（ツールの答え合わせ）</span>
            <div class="record-row">
                <button class="btn-nige" onclick="record('tool', true)">逃げた(的中)</button>
                <button class="btn-nogashi" onclick="record('tool', false)">逃げず(ハズレ)</button>
            </div>
            
            <span class="record-title">【2】自分予想（実際の収支）</span>
            <div class="record-row">
                <button class="btn-win" onclick="record('self', true)">的中！</button>
                <button class="btn-lose" onclick="record('self', false)">不的中</button>
            </div>
        </div>
    </div>
</div>

<div class="card">
    <h2>📊 分析パネル</h2>
    <div class="stats-summary">
        <div class="stat-card"><span class="stat-val" id="toolRate">0%</span><span class="stat-label">ツール的中率</span></div>
        <div class="stat-card"><span class="stat-val" id="selfRate">0%</span><span class="stat-label">自分的中率</span></div>
    </div>

    <div class="table-container">
        <table class="field-table">
            <thead>
                <tr><th>競艇場</th><th>ツール(的中)</th><th>自分(的中)</th></tr>
            </thead>
            <tbody id="fieldStatsBody"></tbody>
        </table>
    </div>
    <button class="reset-btn" onclick="resetAll()">全データを消去</button>
</div>

<script>
let lastScore = 0;
let currentField = "";

const stadiumBase = {"桐生":51,"戸田":44,"江戸川":45,"平和島":45,"多摩川":53,"浜名湖":54,"蒲郡":55,"常滑":55,"津":54,"三国":53,"びわこ":49,"住之江":58,"尼崎":54,"鳴門":50,"丸亀":54,"児島":55,"宮島":54,"徳山":63,"下関":60,"若松":56,"芦屋":61,"福岡":45,"唐津":55,"大村":66};

function updateVal(id, val) { document.getElementById(id).innerText = val; }

function calculate() {
    currentField = document.getElementById('stadium').value;
    let b = stadiumBase[currentField] || 52;
    let r1 = parseInt(document.getElementById('rank1').value);
    let s1 = parseInt(document.getElementById('st1').value);
    let tj = parseInt(document.getElementById('tenji1').value);
    let r2 = parseInt(document.getElementById('rank2').value);
    let s2 = parseInt(document.getElementById('st2').value);
    let cd = parseInt(document.getElementById('condition').value);

    let fix = (r1-50)*0.6 + (15-s1)*2.5 + tj*8 + (r2-50)*0.3 + (s2>=18 ? (17-s2)*5.5 : (15-s2)*1.0) + cd + 5;
    lastScore = Math.round(Math.min(98, Math.max(5, b + fix)));

    document.getElementById('score').innerText = lastScore + "%";
    document.getElementById('result').style.display = "block";
    document.getElementById('result').className = (lastScore >= 75) ? "high" : (lastScore <= 40) ? "low" : "mid";
}

function record(type, isSuccess) {
    let data = JSON.parse(localStorage.getItem('doubleStats')) || {};
    if(!data[currentField]) data[currentField] = { toolTotal:0, toolHit:0, selfTotal:0, selfHit:0 };

    if(type === 'tool') {
        data[currentField].toolTotal++;
        if(isSuccess) data[currentField].toolHit++;
    } else {
        data[currentField].selfTotal++;
        if(isSuccess) data[currentField].selfHit++;
    }

    localStorage.setItem('doubleStats', JSON.stringify(data));
    loadStats();
    alert("記録しました！");
}

function loadStats() {
    let data = JSON.parse(localStorage.getItem('doubleStats')) || {};
    let tbody = document.getElementById('fieldStatsBody');
    tbody.innerHTML = "";

    let tT=0, tH=0, sT=0, sH=0;

    Object.keys(stadiumBase).forEach(f => {
        let s = data[f] || { toolTotal:0, toolHit:0, selfTotal:0, selfHit:0 };
        tT+=s.toolTotal; tH+=s.toolHit; sT+=s.selfTotal; sH+=s.selfHit;

        let tr = `<tr>
            <td>${f}</td>
            <td>${s.toolTotal}(${s.toolHit})</td>
            <td>${s.selfTotal}(${s.selfHit})</td>
        </tr>`;
        tbody.innerHTML += tr;
    });

    document.getElementById('toolRate').innerText = (tT>0 ? Math.round(tH/tT*100) : 0) + "%";
    document.getElementById('selfRate').innerText = (sT>0 ? Math.round(sH/sT*100) : 0) + "%";
}

function resetAll() { if(confirm("消去しますか？")){ localStorage.clear(); loadStats(); } }
window.onload = loadStats;
</script>
</body>
</html>
