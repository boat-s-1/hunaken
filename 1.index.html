<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>一果の1号艇・鬼絞り判定所 🌸</title>
    <style>
        /* --- 全体設計 --- */
        body { 
            font-family: 'Helvetica Neue', Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", sans-serif; 
            background-color: #ffffff;
            /* BOAT STRIKE風の薄い格子模様 */
            background-image: 
                linear-gradient(90deg, rgba(255, 182, 193, 0.05) 1px, transparent 1px),
                linear-gradient(rgba(255, 182, 193, 0.05) 1px, transparent 1px);
            background-size: 30px 30px; 
            padding: 15px; 
            color: #444; 
            margin: 0;
        }

        .card { 
            background: #ffffff; 
            max-width: 500px; 
            margin: 0 auto 20px auto; 
            padding: 20px; 
            border-radius: 20px; 
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05); 
            border: 1px solid #ffeef1;
            box-sizing: border-box;
        }

        h1 { font-size: 1.3rem; color: #ff6b81; margin-bottom: 20px; text-align: center; font-weight: 800; }
        h2 { font-size: 1rem; color: #ff6b81; margin: 0 0 15px 0; text-align: center; }

        /* --- 入力エリアの整理 --- */
        .input-section { 
            margin-bottom: 18px; 
            padding-bottom: 12px;
            border-bottom: 1px solid #fff5f6; 
        }

        label { 
            display: block; 
            font-weight: bold; 
            font-size: 0.85rem; 
            color: #ff8fa3; 
            margin-bottom: 10px; 
            border-left: 4px solid #ff6b81;
            padding-left: 8px;
        }

        .input-group { 
            display: flex; 
            align-items: center; 
            gap: 10px; 
        }

        input[type="range"] { 
            flex: 1;
            height: 6px;
            background: #f0f0f0;
            border-radius: 3px;
            accent-color: #ff6b81;
            cursor: pointer;
        }

        .val-display { 
            font-size: 1rem; 
            font-weight: 800; 
            color: #ff6b81; 
            min-width: 60px; 
            text-align: right; 
        }

        select { 
            width: 100%; padding: 12px; border-radius: 10px; border: 2px solid #fff0f3; 
            background: #fff; color: #444; font-weight: bold; font-size: 0.95rem;
            box-sizing: border-box;
        }

        .calc-btn { 
            width: 100%; padding: 16px; 
            background: #ff6b81;
            color: white; border: none; border-radius: 12px; 
            font-weight: 800; font-size: 1.1rem; cursor: pointer; 
            box-shadow: 0 4px 15px rgba(255, 107, 129, 0.2);
            transition: 0.2s;
        }
        .calc-btn:hover { background: #ff8fa3; }

        /* --- 判定結果表示 (一果ちゃんエリア) --- */
        #result { margin-top: 15px; display: none; }
        
        .ichika-chat {
            display: flex; 
            align-items: flex-start; 
            gap: 10px; 
            margin-bottom: 15px;
        }

        #ichikaImg {
            width: 70px; height: 70px;
            border-radius: 50%;
            border: 3px solid #fff;
            box-shadow: 0 2px 8px rgba(255, 107, 129, 0.2);
            object-fit: cover;
            object-position: 0% 10%;
            flex-shrink: 0;
            background: white;
        }

        .balloon {
            position: relative;
            background: #fff; 
            border: 2px solid #ffcad4; 
            padding: 12px; 
            border-radius: 15px; 
            font-size: 0.85rem;
            line-height: 1.4;
            flex: 1;
        }

        .balloon::before {
            content: ""; position: absolute; left: -10px; top: 15px;
            border-top: 8px solid transparent; border-bottom: 8px solid transparent;
            border-right: 10px solid #ffcad4;
        }

        /* 確率スコア */
        .score-box {
            text-align: center;
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 15px;
        }
        .score { font-size: 3rem; font-weight: 900; line-height: 1; margin: 5px 0; }
        
        #result.high { background: #e6fcf5; color: #087f5b; }
        #result.mid { background: #fff9db; color: #f08c00; }
        #result.low { background: #fff5f5; color: #e03131; }

        /* 的中・不的中ボタン */
        .record-container { 
            background: rgba(255,255,255,0.5); 
            padding: 12px; border-radius: 12px; border: 1px dashed #ffcad4;
        }
        .btn-row { display: flex; gap: 8px; margin-top: 8px; }
        button[class^="btn-"] { 
            flex: 1; padding: 10px 5px; border-radius: 8px; border: none; 
            color: white; font-weight: bold; font-size: 0.8rem; cursor: pointer;
        }
        .btn-tool-hit { background: #ff85a1; } .btn-tool-miss { background: #bbb; }
        .btn-self-hit { background: #ff6b81; } .btn-self-miss { background: #999; }

        /* --- 分析パネル (2列グリッド) --- */
        .stats-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 10px; 
            margin-bottom: 15px;
        }
        .stat-box { 
            background: #fffafb; padding: 12px 5px; border-radius: 12px; 
            text-align: center; border: 1px solid #ffe0e6;
        }
        .stat-val { display: block; font-size: 1.2rem; font-weight: 800; color: #ff6b81; }
        .stat-label { font-size: 0.65rem; color: #999; }

        /* テーブル */
        .table-container { overflow-x: auto; border-radius: 12px; border: 1px solid #ffeef1; }
        .field-table { width: 100%; border-collapse: collapse; font-size: 0.75rem; }
        .field-table th { background: #ff8fa3; color: white; padding: 10px 5px; }
        .field-table td { padding: 8px 5px; border-bottom: 1px solid #fff5f6; text-align: center; }

        /* アニメーション */
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
        .ichika-bounce { animation: bounce 0.5s ease infinite; }
        .balloon.gold-mode { background: #fff9db; border-color: #fcc419; }
        .balloon.celebrate-mode { background: #fff0f6; border-color: #ff85c0; }
    </style>
</head>
<body>

<div class="card">
    <h1>🌸 一果の鬼絞り判定所</h1>
    
    <div style="text-align: right; margin-bottom: 15px;">
        <input type="password" id="adminPass" placeholder="合言葉" 
               style="font-size: 0.7rem; padding: 4px; border-radius: 4px; border: 1px solid #eee; width: 60px;"
               oninput="checkAdmin()">
    </div>

    <div class="input-section">
        <label>開催場</label>
        <select id="stadium">
            <option value="01 桐生">01 桐生</option><option value="24 大村">24 大村</option>
            </select>
    </div>

    <div class="input-section"><label>1号艇 2連対率</label>
        <div class="input-group"><input type="range" id="rank1" value="70"><span class="val-display" id="rank1Val">70%</span></div>
    </div>
    <div class="input-section"><label>1号艇 平均ST</label>
        <div class="input-group"><input type="range" id="st1" min="10" max="25" value="15"><span class="val-display" id="st1Val">0.15s</span></div>
    </div>
    <div class="input-section"><label>1号艇 展示気配</label>
        <div class="input-group"><input type="range" id="tenji1" min="-2" max="2" value="0" oninput="updateTenjiDisplay(this.value)"><span class="val-display" id="tenjiVal">普通</span></div>
    </div>
    <div class="input-section"><label>2号艇 2連対率 (壁)</label>
        <div class="input-group"><input type="range" id="rank2" value="50"><span class="val-display" id="rank2Val">50%</span></div>
    </div>
    <div class="input-section"><label>その他条件</label>
        <select id="condition"><option value="0">普通</option><option value="-15">外に強敵あり</option></select>
    </div>

    <button class="calc-btn" onclick="calculate()">判定をリクエスト♪</button>

    <div id="result" class="card" style="margin: 20px 0 0 0; width: 100%; box-shadow: none;">
        <div class="ichika-chat">
            <img src="FAA9527F-7F59-4F18-801C-2A1CA64A7B54.jpg" id="ichikaImg">
            <div class="balloon"><div id="advice"></div></div>
        </div>
        <div class="score-box">
            <div style="font-size: 0.7rem;">推定逃げ確率</div>
            <div class="score" id="score">0%</div>
        </div>
        <div class="record-container">
            <div class="record-label" style="font-size: 0.7rem; color: #888;">的中を記録する</div>
            <div class="btn-row">
                <button class="btn-tool-hit" onclick="saveData('tool', true)">逃げた</button>
                <button class="btn-tool-miss" onclick="saveData('tool', false)">不成立</button>
                <button class="btn-self-hit" onclick="saveData('self', true)">的中！</button>
            </div>
        </div>
    </div>
</div>

<div class="card">
    <h2>🏆 総合分析</h2>
    <div class="stats-grid">
        <div class="stat-box"><span class="stat-val" id="rateHigh">0%</span><span class="stat-label">🔥 鉄板成功率</span></div>
        <div class="stat-box"><span class="stat-val" id="rateMid">0%</span><span class="stat-label">⚖️ 本命成功率</span></div>
        <div class="stat-box"><span class="stat-val" id="adminTotalRate">0%</span><span class="stat-label">👑 管理人的中</span></div>
        <div class="stat-box"><span class="stat-val" id="selfTotalRate">0%</span><span class="stat-label">👤 自分的中</span></div>
    </div>
    <div class="table-container">
        <table class="field-table">
            <thead><tr><th>場</th><th>管理人</th><th>自分</th></tr></thead>
            <tbody id="fieldStatsBody"></tbody>
        </table>
    </div>
    <button class="reset-btn" onclick="resetStats()" style="width:100%; background:none; border:none; color:#ccc; font-size:0.6rem; margin-top:10px;">リセット</button>
</div>

<script>
// --- JavaScript関数 ---
// (以前のcalculateやsaveDataのロジックをここに。配置修正に集中するため省略していますが、
// 以前のロジックをそのまま貼り付けて動くように設計しています。)

function updateVal(id, val) { document.getElementById(id).innerText = val; }
// スライダー連動の初期化
document.getElementById('rank1').oninput = function() { updateVal('rank1Val', this.value + '%'); };
document.getElementById('st1').oninput = function() { updateVal('st1Val', '0.' + this.value + 's'); };
document.getElementById('rank2').oninput = function() { updateVal('rank2Val', this.value + '%'); };

function updateTenjiDisplay(val) {
    const texts = { "-2": "最悪", "-1": "劣勢", "0": "普通", "1": "良好", "2": "超抜" };
    document.getElementById('tenjiVal').innerText = texts[val];
}

// 判定ロジック（最新版）
let lastScore = 0;
function calculate() {
    const base = 50; // 簡易計算
    let r1 = parseInt(document.getElementById('rank1').value);
    lastScore = Math.min(98, Math.max(5, base + (r1-50)));

    document.getElementById('result').style.display = "block";
    document.getElementById('score').innerText = lastScore + "%";
    
    const advice = document.getElementById('advice');
    const ichikaImg = document.getElementById('ichikaImg');
    ichikaImg.classList.remove('ichika-bounce');

    if(lastScore >= 80) {
        advice.innerHTML = "一果の**鬼絞り**ですっ！期待しちゃいましょう♪";
        ichikaImg.classList.add('ichika-bounce');
    } else {
        advice.innerHTML = "んん〜、ちょっと慎重に見守りましょうかぁ。";
    }
    
    // スコア背景
    const resDiv = document.getElementById('result');
    resDiv.className = "card " + (lastScore >= 75 ? "high" : (lastScore <= 40 ? "low" : "mid"));
}

// 保存ボタン
function saveData(type, isHit) {
    alert("記録しましたっ♪");
}
</script>
</body>
</html>
