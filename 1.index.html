<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ボートレース精密判定 & 分析パネル</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #f0f2f5; padding: 20px; color: #333; }
        .card { background: white; max-width: 550px; margin: auto; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h1, h2 { text-align: center; color: #004085; }
        h1 { font-size: 1.4rem; margin-bottom: 25px; }
        h2 { font-size: 1.1rem; margin-top: 0; }
        
        .input-section { margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 15px; }
        label { display: block; font-weight: bold; font-size: 0.85rem; color: #555; margin-bottom: 8px; }
        
        .input-group { display: flex; align-items: center; gap: 12px; }
        input[type="range"] { flex: 1; accent-color: #007bff; cursor: pointer; }
        .val-display { font-size: 1rem; font-weight: bold; color: #007bff; min-width: 70px; text-align: right; }

        select { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ddd; background: #fff; }
        .calc-btn { width: 100%; padding: 15px; background: #007bff; color: white; border: none; border-radius: 12px; font-weight: bold; font-size: 1.1rem; cursor: pointer; transition: 0.2s; }

        #result { margin-top: 20px; padding: 20px; border-radius: 15px; text-align: center; display: none; }
        .high { background: #e6fcf5; color: #087f5b; border: 2px solid #b2f2bb; }
        .mid { background: #fff9db; color: #f08c00; border: 2px solid #ffec99; }
        .low { background: #fff5f5; color: #e03131; border: 2px solid #ffc9c9; }
        .score { font-size: 3.5rem; font-weight: bold; display: block; margin: 10px 0; }

        .record-container { margin-top: 15px; background: rgba(255,255,255,0.6); padding: 15px; border-radius: 12px; border: 1px dashed #999; }
        .record-group { margin-bottom: 15px; }
        .record-label { font-size: 0.75rem; font-weight: bold; color: #444; display: block; margin-bottom: 8px; }
        .btn-row { display: flex; gap: 8px; justify-content: center; }
        
        button[class^="btn-"] { color: white; border: none; padding: 10px; border-radius: 8px; flex: 1; font-weight: bold; cursor: pointer; }
        .btn-tool-hit { background: #228be6; } .btn-tool-miss { background: #fa5252; }
        .btn-self-hit { background: #40c057; } .btn-self-miss { background: #868e96; }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin: 15px 0; }
        .stat-box { background: #f8f9fa; padding: 10px; border-radius: 12px; text-align: center; border: 1px solid #eee; }
        .stat-val { display: block; font-size: 1.2rem; font-weight: bold; color: #333; }
        .stat-label { font-size: 0.6rem; color: #777; line-height: 1.2; }

        .table-container { overflow-x: auto; margin-top: 15px; max-height: 400px; border-radius: 10px; border: 1px solid #eee; }
        .field-table { width: 100%; border-collapse: collapse; font-size: 0.7rem; text-align: center; }
        .field-table th { background: #004085; color: white; padding: 10px; position: sticky; top: 0; }
        .field-table td { padding: 8px; border-bottom: 1px solid #eee; }
        .field-table tr:nth-child(even) { background: #fafafa; }
        .reset-btn { font-size: 0.7rem; color: #999; background: none; border: none; cursor: pointer; text-decoration: underline; margin-top: 15px; display: block; width: 100%; }
    </style>
</head>
<body>

<div class="card">
    <h1>🚀 精密判定 & 分析パネル</h1>
    
    <div style="text-align: right; margin-bottom: 10px;">
        <input type="password" id="adminPass" placeholder="🔑 Mode Pass" 
               style="font-size: 0.7rem; padding: 5px; border-radius: 5px; border: 1px solid #ddd; width: 80px;"
               oninput="checkAdmin()">
    </div>

    <div class="input-section">
        <label>① 開催場を選択</label>
        <select id="stadium">
            <option value="01 桐生">01 桐生</option><option value="02 戸田">02 戸田</option><option value="03 江戸川">03 江戸川</option>
            <option value="04 平和島">04 平和島</option><option value="05 多摩川">05 多摩川</option><option value="06 浜名湖">06 浜名湖</option>
            <option value="07 蒲郡">07 蒲郡</option><option value="08 常滑">08 常滑</option><option value="09 津">09 津</option>
            <option value="10 三国">10 三国</option><option value="11 びわこ">11 びわこ</option><option value="12 住之江">12 住之江</option>
            <option value="13 尼崎">13 尼崎</option><option value="14 鳴門">14 鳴門</option><option value="15 丸亀">15 丸亀</option>
            <option value="16 児島">16 児島</option><option value="17 宮島">17 宮島</option><option value="18 徳山">18 徳山</option>
            <option value="19 下関">19 下関</option><option value="20 若松">20 若松</option><option value="21 芦屋">21 芦屋</option>
            <option value="22 福岡">22 福岡</option><option value="23 唐津">23 唐津</option><option value="24 大村">24 大村</option>
        </select>
    </div>

    <div class="input-section"><label>② 1号艇 2連対率</label><div class="input-group"><input type="range" id="rank1" min="0" max="100" value="70" oninput="updateVal('rank1Val', this.value + '%')"><span class="val-display" id="rank1Val">70%</span></div></div>
    <div class="input-section"><label>③ 1号艇 平均ST</label><div class="input-group"><input type="range" id="st1" min="10" max="25" value="15" step="1" oninput="updateVal('st1Val', '0.' + this.value + 's')"><span class="val-display" id="st1Val">0.15s</span></div></div>
    <div class="input-section"><label>④ 1号艇 展示気配</label><div class="input-group"><input type="range" id="tenji1" min="-2" max="2" value="0" oninput="updateTenjiDisplay(this.value)"><span class="val-display" id="tenjiVal">普通</span></div></div>
    <div class="input-section"><label>⑤ 2号艇 2連対率 (壁)</label><div class="input-group"><input type="range" id="rank2" min="0" max="100" value="50" oninput="updateVal('rank2Val', this.value + '%')"><span class="val-display" id="rank2Val">50%</span></div></div>
    <div class="input-section"><label>⑥ 2号艇 ST (凹み)</label><div class="input-group"><input type="range" id="st2" min="10" max="25" value="15" step="1" oninput="updateVal('st2Val', '0.' + this.value + 's')"><span class="val-display" id="st2Val">0.15s</span></div></div>
    <div class="input-section"><label>⑦ その他条件</label><select id="condition"><option value="0">普通</option><option value="-15">外に超抜あり</option><option value="-25">外に超抜複数</option><option value="-10">追い風強</option><option value="-12">向かい風強</option></select></div>

    <button class="calc-btn" onclick="calculate()">逃げ率を算出</button>

    <div id="result">
        <span style="font-size: 0.8rem;">推定逃げ確率</span>
        <span class="score" id="score">0%</span>
        <div id="advice" style="font-size: 0.9rem; margin-bottom: 10px;"></div>
        
        <div class="record-container">
            <div class="record-group">
                <span class="record-label">【1】逃げ判定（ツールの答え合わせ）</span>
                <div class="btn-row">
                    <button class="btn-tool-hit" onclick="saveData('tool', true)">逃げた</button>
                    <button class="btn-tool-miss" onclick="saveData('tool', false)">逃げず</button>
                </div>
            </div>
            <div class="record-group">
                <span class="record-label">【2】自分予想（実際の収支）</span>
                <div class="btn-row">
                    <button class="btn-self-hit" onclick="saveData('self', true)">的中！</button>
                    <button class="btn-self-miss" onclick="saveData('self', false)">不的中</button>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="card">
    <h2>🏆 総合・場別分析パネル</h2>
    <div class="stats-grid">
        <div class="stat-box">
            <span class="stat-val" id="toolTotalRate">0%</span>
            <span class="stat-label">ツール的中率<br><span id="toolTotalCount">(全0回)</span></span>
        </div>
        <div class="stat-box" style="background: #e9f2ff; border: 1px solid #b3d7ff;">
            <span class="stat-val" id="adminTotalRate" style="color: #004085;">0%</span>
            <span class="stat-label">管理人的中率<br><span id="adminTotalCount">(全0回)</span></span>
        </div>
        <div class="stat-box">
            <span class="stat-val" id="selfTotalRate">0%</span>
            <span class="stat-label">自分的中率<br><span id="selfTotalCount">(全0回)</span></span>
        </div>
    </div>
    
    <div class="table-container">
        <table class="field-table">
            <thead>
                <tr>
                    <th>競艇場</th>
                    <th>管理人(的中/試行)</th>
                    <th>自分(的中/試行)</th>
                </tr>
            </thead>
            <tbody id="fieldStatsBody"></tbody>
        </table>
    </div>
    <button class="reset-btn" onclick="resetStats()">ローカルデータをリセット</button>
</div>

<script>
// --- 変数は最初にまとめて定義（ここが重要！） ---
let lastScore = 0;
let currentStadium = "";
let isAdmin = false; // 管理者フラグを1つに統合
let adminFieldData = {}; 

// あなたのGAS URLをここに1箇所だけ書く
const GAS_URL = "https://script.google.com/macros/s/AKfycbyUkTIb26j8PG4vFKxflHTVnL51kzj0w1_CHPkPeh0Hy-rY5MNSKEL3PtFQTMJCH5K-EA/exec";

const stadiumBaseData = {
    "01 桐生": 51, "02 戸田": 44, "03 江戸川": 45, "04 平和島": 45, "05 多摩川": 53,
    "06 浜名湖": 54, "07 蒲郡": 55, "08 常滑": 55, "09 津": 54, "10 三国": 53,
    "11 びわこ": 49, "12 住之江": 58, "13 尼崎": 54, "14 鳴門": 50, "15 丸亀": 54,
    "16 児島": 55, "17 宮島": 54, "18 徳山": 63, "19 下関": 60, "20 若松": 56,
    "21 芦屋": 61, "22 福岡": 45, "23 唐津": 55, "24 大村": 66
};

// --- 関数群 ---

function updateVal(id, val) { document.getElementById(id).innerText = val; }

function updateTenjiDisplay(val) {
    const texts = { "-2": "最悪", "-1": "やや劣勢", "0": "普通", "1": "良好", "2": "超抜" };
    document.getElementById('tenjiVal').innerText = texts[val];
}

// パスワードチェック
function checkAdmin() {
    const pass = document.getElementById('adminPass').value;
    const secret = "0913"; // あなたのパスワード

    if (pass === secret) {
        isAdmin = true; // ここでフラグを立てる
        document.getElementById('adminPass').style.backgroundColor = "#e6fcf5";
        document.getElementById('adminPass').style.borderColor = "#087f5b";
        console.log("管理者モードON");
    } else {
        isAdmin = false;
        document.getElementById('adminPass').style.backgroundColor = "#fff";
        document.getElementById('adminPass').style.borderColor = "#ddd";
    }
}

function calculate() {
    currentStadium = document.getElementById('stadium').value;
    const base = stadiumBaseData[currentStadium] || 52;
    let r1 = parseInt(document.getElementById('rank1').value), 
        st1 = parseInt(document.getElementById('st1').value), 
        tj1 = parseInt(document.getElementById('tenji1').value),
        r2 = parseInt(document.getElementById('rank2').value), 
        st2 = parseInt(document.getElementById('st2').value), 
        cd = parseInt(document.getElementById('condition').value);

    let fix = (r1-50)*0.6 + (15-st1)*2.5 + tj1*8 + (r2-50)*0.3 + (st2>=18 ? (17-st2)*5.5 : (15-st2)*1.0) + cd + 5;
    lastScore = Math.round(Math.min(98, Math.max(5, base + fix)));

    document.getElementById('result').style.display = "block";
    document.getElementById('score').innerText = lastScore + "%";
    document.getElementById('result').className = (lastScore >= 75) ? "high" : (lastScore <= 40) ? "low" : "mid";
    document.getElementById('advice').innerHTML = `<strong>${lastScore >= 75 ? "逃げ濃厚" : "混戦注意"}</strong>`;
}

// 保存ボタン（ここが今回の修正の肝！）
async function saveData(type, isHit) {
    // ローカル保存は全員共通
    updateLocalStats(type, isHit);

    // 管理者モードがONの場合のみクラウド送信
    if (isAdmin === true) {
        const data = {
            stadium: currentStadium,
            score: lastScore,
            type: type === 'tool' ? 'ツール判定' : '自分予想',
            isHit: isHit
        };

        try {
            await fetch(GAS_URL, { 
                method: "POST", 
                mode: "no-cors", 
                body: JSON.stringify(data) 
            });
            alert("【自分用】クラウド＆ブラウザに保存完了！");
            loadAdminStats(); // 集計を再送
        } catch (error) {
            console.error("Cloud Save Error:", error);
            alert("クラウド保存に失敗しました。URLを確認してください。");
        }
    } else {
        alert("【配布用】ブラウザに保存しました！");
    }
}

function updateLocalStats(type, isHit) {
    let stats = JSON.parse(localStorage.getItem('boatDoubleStats')) || {};
    if (!stats[currentStadium]) stats[currentStadium] = { tT: 0, tH: 0, sT: 0, sH: 0 };
    if (type === 'tool') { 
        stats[currentStadium].tT++; 
        if(isHit) stats[currentStadium].tH++; 
    } else { 
        stats[currentStadium].sT++; 
        if(isHit) stats[currentStadium].sH++; 
    }
    localStorage.setItem('boatDoubleStats', JSON.stringify(stats));
    renderTable();
}

async function loadAdminStats() {
    try {
        const response = await fetch(GAS_URL);
        const data = await response.json();
        document.getElementById('adminTotalRate').innerText = data.rate + "%";
        document.getElementById('adminTotalCount').innerText = "(全" + data.total + "回)";
        adminFieldData = data.fields;
        renderTable();
    } catch (e) { console.error("Cloud Load Error"); }
}

function renderTable() {
    let stats = JSON.parse(localStorage.getItem('boatDoubleStats')) || {};
    let tbody = document.getElementById('fieldStatsBody');
    if (!tbody) return;
    tbody.innerHTML = "";
    let tt = 0, th = 0, st = 0, sh = 0;

    Object.keys(stadiumBaseData).forEach(name => {
        let s = stats[name] || { tT: 0, tH: 0, sT: 0, sH: 0 };
        let a = adminFieldData[name] || { t: 0, h: 0 };
        tt += s.tT; th += s.tH; st += s.sT; sh += s.sH;
        tbody.innerHTML += `<tr><td>${name}</td><td style="background:#f0f7ff;">${a.h}/${a.t} (${a.t>0?Math.round(a.h/a.t*100):0}%)</td><td>${s.sH}/${s.sT} (${s.sT>0?Math.round(s.sH/s.sT*100):0}%)</td></tr>`;
    });
    document.getElementById('toolTotalRate').innerText = (tt > 0 ? Math.round(th/tt*100) : 0) + "%";
    document.getElementById('toolTotalCount').innerText = "(全" + tt + "回)";
    document.getElementById('selfTotalRate').innerText = (st > 0 ? Math.round(sh/st*100) : 0) + "%";
    document.getElementById('selfTotalCount').innerText = "(全" + st + "回)";
}

function resetStats() { if(confirm("リセットしますか？")) { localStorage.clear(); renderTable(); } }

// 初期起動
window.onload = () => { renderTable(); loadAdminStats(); };
</script>
</body>
</html>
