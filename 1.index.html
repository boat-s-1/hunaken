<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ボートレース精密判定 & ダブル成績管理</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #f0f2f5; padding: 20px; color: #333; }
        .card { background: white; max-width: 550px; margin: auto; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h1, h2 { text-align: center; color: #004085; }
        h1 { font-size: 1.4rem; margin-bottom: 25px; }
        h2 { font-size: 1.1rem; margin-top: 0; }
        
        .input-section { margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 15px; }
        label { display: block; font-weight: bold; font-size: 0.85rem; color: #555; margin-bottom: 8px; }
        
        .input-group { display: flex; align-items: center; gap: 12px; }
        input[type="range"] { flex: 1; accent-color: #007bff; cursor: pointer; }
        .val-display { font-size: 1rem; font-weight: bold; color: #007bff; min-width: 70px; text-align: right; }

        select { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ddd; background: #fff; }
        .calc-btn { width: 100%; padding: 15px; background: #007bff; color: white; border: none; border-radius: 12px; font-weight: bold; font-size: 1.1rem; cursor: pointer; transition: 0.2s; }

        #result { margin-top: 20px; padding: 20px; border-radius: 15px; text-align: center; display: none; }
        .high { background: #e6fcf5; color: #087f5b; border: 2px solid #b2f2bb; }
        .mid { background: #fff9db; color: #f08c00; border: 2px solid #ffec99; }
        .low { background: #fff5f5; color: #e03131; border: 2px solid #ffc9c9; }
        .score { font-size: 3.5rem; font-weight: bold; display: block; margin: 10px 0; }

        /* ダブル記録エリア */
        .record-container { margin-top: 15px; background: rgba(255,255,255,0.6); padding: 15px; border-radius: 12px; border: 1px dashed #999; }
        .record-group { margin-bottom: 15px; }
        .record-label { font-size: 0.75rem; font-weight: bold; color: #444; display: block; margin-bottom: 8px; }
        .btn-row { display: flex; gap: 8px; justify-content: center; }
        
        .btn-tool-hit { background: #228be6; color: white; border: none; padding: 10px; border-radius: 8px; flex: 1; font-weight: bold; cursor: pointer; }
        .btn-tool-miss { background: #fa5252; color: white; border: none; padding: 10px; border-radius: 8px; flex: 1; font-weight: bold; cursor: pointer; }
        .btn-self-hit { background: #40c057; color: white; border: none; padding: 10px; border-radius: 8px; flex: 1; font-weight: bold; cursor: pointer; }
        .btn-self-miss { background: #868e96; color: white; border: none; padding: 10px; border-radius: 8px; flex: 1; font-weight: bold; cursor: pointer; }

        /* 集計パネル */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px 0; }
        .stat-box { background: #f8f9fa; padding: 12px; border-radius: 12px; text-align: center; border: 1px solid #eee; }
        .stat-val { display: block; font-size: 1.3rem; font-weight: bold; color: #333; }
        .stat-label { font-size: 0.65rem; color: #777; }

        .table-container { overflow-x: auto; margin-top: 15px; max-height: 400px; }
        .field-table { width: 100%; border-collapse: collapse; font-size: 0.75rem; text-align: center; }
        .field-table th { background: #004085; color: white; padding: 8px; position: sticky; top: 0; }
        .field-table td { padding: 8px; border-bottom: 1px solid #eee; }
        .field-table tr:nth-child(even) { background: #fafafa; }

        .reset-btn { font-size: 0.7rem; color: #999; background: none; border: none; cursor: pointer; text-decoration: underline; margin-top: 15px; display: block; width: 100%; }
    </style>
</head>
<body>

<div class="card">
    <h1>🚀 精密判定 & ダブル成績管理</h1>
    
    <div class="input-section">
        <label>① 開催場を選択</label>
        <select id="stadium">
            <option value="01 桐生">01 桐生</option><option value="02 戸田">02 戸田</option><option value="03 江戸川">03 江戸川</option>
            <option value="04 平和島">04 平和島</option><option value="05 多摩川">05 多摩川</option><option value="06 浜名湖">06 浜名湖</option>
            <option value="07 蒲郡">07 蒲郡</option><option value="08 常滑">08 常滑</option><option value="09 津">09 津</option>
            <option value="10 三国">10 三国</option><option value="11 びわこ">11 びわこ</option><option value="12 住之江">12 住之江</option>
            <option value="13 尼崎">13 尼崎</option><option value="14 鳴門">14 鳴門</option><option value="15 丸亀">15 丸亀</option>
            <option value="16 児島">16 児島</option><option value="17 宮島">17 宮島</option><option value="18 徳山">18 徳山</option>
            <option value="19 下関">19 下関</option><option value="20 若松">20 若松</option><option value="21 芦屋">21 芦屋</option>
            <option value="22 福岡">22 福岡</option><option value="23 唐津">23 唐津</option><option value="24 大村">24 大村</option>
        </select>
    </div>

    <div class="input-section">
        <label>② 1号艇 2連対率</label>
        <div class="input-group">
            <input type="range" id="rank1" min="0" max="100" value="70" oninput="updateVal('rank1Val', this.value + '%')">
            <span class="val-display" id="rank1Val">70%</span>
        </div>
    </div>

    <div class="input-section">
        <label>③ 1号艇 平均ST</label>
        <div class="input-group">
            <input type="range" id="st1" min="10" max="25" value="15" step="1" oninput="updateVal('st1Val', '0.' + this.value + 's')">
            <span class="val-display" id="st1Val">0.15s</span>
        </div>
    </div>

    <div class="input-section">
        <label>④ 1号艇 展示気配</label>
        <div class="input-group">
            <input type="range" id="tenji1" min="-2" max="2" value="0" oninput="updateTenjiDisplay(this.value)">
            <span class="val-display" id="tenjiVal">普通</span>
        </div>
    </div>

    <div class="input-section">
        <label>⑤ 2号艇 2連対率 (壁)</label>
        <div class="input-group">
            <input type="range" id="rank2" min="0" max="100" value="50" oninput="updateVal('rank2Val', this.value + '%')">
            <span class="val-display" id="rank2Val">50%</span>
        </div>
    </div>

    <div class="input-section">
        <label>⑥ 2号艇 ST (凹み)</label>
        <div class="input-group">
            <input type="range" id="st2" min="10" max="25" value="15" step="1" oninput="updateVal('st2Val', '0.' + this.value + 's')">
            <span class="val-display" id="st2Val">0.15s</span>
        </div>
    </div>

    <div class="input-section">
        <label>⑦ その他条件</label>
        <select id="condition">
            <option value="0">普通</option>
            <option value="-15">外に超抜あり</option>
            <option value="-25">外に超抜複数</option>
            <option value="-10">追い風強</option>
            <option value="-12">向かい風強</option>
        </select>
    </div>

    <button class="calc-btn" onclick="calculate()">逃げ率を算出</button>

    <div id="result">
        <span style="font-size: 0.8rem;">推定逃げ確率</span>
        <span class="score" id="score">0%</span>
        <div id="advice" style="font-size: 0.9rem; margin-bottom: 10px;"></div>
        
        <div class="record-container">
            <div class="record-group">
                <span class="record-label">【1】逃げ判定（ツールの答え合わせ）</span>
                <div class="btn-row">
                    <button class="btn-tool-hit" onclick="saveData('tool', true)">逃げた</button>
                    <button class="btn-tool-miss" onclick="saveData('tool', false)">逃げず</button>
                </div>
            </div>
            <div class="record-group">
                <span class="record-label">【2】自分予想（実際の収支）</span>
                <div class="btn-row">
                    <button class="btn-self-hit" onclick="saveData('self', true)">的中！</button>
                    <button class="btn-self-miss" onclick="saveData('self', false)">不的中</button>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="card">
    <h2>🏆 総合・場別分析パネル</h2>
    <div class="stats-grid">
        <div class="stat-box"><span class="stat-val" id="toolTotalRate">0%</span><span class="stat-label">ツール的中率</span></div>
        <div class="stat-box"><span class="stat-val" id="selfTotalRate">0%</span><span class="stat-label">自分的中率</span></div>
    </div>

    <div class="table-container">
        <table class="field-table">
            <thead>
                <tr><th>競艇場</th><th>ツール(的中/試行)</th><th>自分(的中/試行)</th></tr>
            </thead>
            <tbody id="fieldStatsBody"></tbody>
        </table>
    </div>
    
    <button class="reset-btn" onclick="resetStats()">全データをリセット</button>
</div>

<script>
let lastScore = 0;
let currentStadium = "";

const stadiumBaseData = {
    "01 桐生": 51, "02 戸田": 44, "03 江戸川": 45, "04 平和島": 45, "05 多摩川": 53,
    "06 浜名湖": 54, "07 蒲郡": 55, "08 常滑": 55, "09 津": 54, "10 三国": 53,
    "11 びわこ": 49, "12 住之江": 58, "13 尼崎": 54, "14 鳴門": 50, "15 丸亀": 54,
    "16 児島": 55, "17 宮島": 54, "18 徳山": 63, "19 下関": 60, "20 若松": 56,
    "21 芦屋": 61, "22 福岡": 45, "23 唐津": 55, "24 大村": 66
};

function updateVal(id, val) { document.getElementById(id).innerText = val; }
function updateTenjiDisplay(val) {
    const texts = { "-2": "最悪", "-1": "やや劣勢", "0": "普通", "1": "良好", "2": "超抜" };
    document.getElementById('tenjiVal').innerText = texts[val];
}

// --- アドバイス生成ロジック ---
function getDetailedAdvice(score, r1, st1, tj1, r2, st2, cd) {
    let mainMsg = "";
    let subMsgs = [];

    // 1. スコアによる基本評価
    if (score >= 85) { mainMsg = "【激アツ・鉄板級】"; }
    else if (score >= 75) { mainMsg = "【本命・逃げ濃厚】"; }
    else if (score >= 60) { mainMsg = "【中堅・逃げ5分】"; }
    else if (score >= 45) { mainMsg = "【混戦・イン受難】"; }
    else { mainMsg = "【波乱・穴狙い推奨】"; }

    // 2. 個別条件による分析
    if (st1 >= 18) subMsgs.push("1号艇のST不安。先マイできないリスクあり。");
    if (tj1 === -2) subMsgs.push("1号艇の展示が劣勢。道中逆転される懸念。");
    if (st2 >= 18) subMsgs.push("2号艇が凹む予感。外からの捲り強襲に要警戒！");
    else if (r2 >= 60) subMsgs.push("2号艇の壁が強力。インにとっては絶好の援護。");
    
    if (cd <= -15) subMsgs.push("外枠に強力な伸び足。一撃の捲りに注意。");
    if (cd === -10) subMsgs.push("追い風注意。1マークで膨らんで差し場を許すかも。");

    // 3. 簡易買い目ヒント
    let hint = (score >= 75) ? "推奨：1-23-全" : (score >= 50) ? "推奨：1-全-全 (広めに)" : "推奨：外枠の頭から穴狙い";

    return `<strong>${mainMsg}</strong><br>
            <span style="font-size:0.8rem; color:#555;">${subMsgs.length > 0 ? "・" + subMsgs.join("<br>・") : "特に目立った死角はありません。"}</span><br>
            <div style="margin-top:8px; padding:8px; background:#e9f2ff; border-radius:8px; font-weight:bold; font-size:0.85rem; color:#004085; border-left:4px solid #007bff;">💡 ${hint}</div>`;
}

function calculate() {
    currentStadium = document.getElementById('stadium').value;
    const base = stadiumBaseData[currentStadium] || 52;
    let r1 = parseInt(document.getElementById('rank1').value);
    let st1 = parseInt(document.getElementById('st1').value);
    let tj1 = parseInt(document.getElementById('tenji1').value);
    let r2 = parseInt(document.getElementById('rank2').value);
    let st2 = parseInt(document.getElementById('st2').value);
    let cd = parseInt(document.getElementById('condition').value);

    // 精密ロジック計算
    let fix = (r1-50)*0.6 + (15-st1)*2.5 + tj1*8 + (r2-50)*0.3 + (st2>=18 ? (17-st2)*5.5 : (15-st2)*1.0) + cd + 5;
    lastScore = Math.round(Math.min(98, Math.max(5, base + fix)));

    document.getElementById('result').style.display = "block";
    document.getElementById('score').innerText = lastScore + "%";
    document.getElementById('result').className = (lastScore >= 75) ? "high" : (lastScore <= 40) ? "low" : "mid";
    
    // アドバイス部分を詳細版に更新
    document.getElementById('advice').innerHTML = getDetailedAdvice(lastScore, r1, st1, tj1, r2, st2, cd);
}

// --- saveData 関数をクラウド対応版にアップデート ---
async function saveData(type, isHit) {
    // あなたが取得したURLをここにセット
    const GAS_URL = "https://script.google.com/macros/s/AKfycbyUkTIb26j8PG4vFKxflHTVnL51kzj0w1_CHPkPeh0Hy-rY5MNSKEL3PtFQTMJCH5K-EA/exec";

    // 送信するデータの形を整える
    const data = {
        stadium: currentStadium,
        score: lastScore,
        type: type === 'tool' ? 'ツール判定' : '自分予想',
        isHit: isHit
    };

    // 保存中の連打防止（ボタンを一時的に無効化）
    const buttons = document.querySelectorAll('button');
    buttons.forEach(b => b.disabled = true);
    
    // 画面に「保存中...」と出すと親切です
    const originalAdvice = document.getElementById('advice').innerHTML;
    document.getElementById('advice').innerHTML = "⏳ クラウドに保存中...";

    try {
        // Googleスプレッドシート（GAS）へデータを送信
        const response = await fetch(GAS_URL, {
            method: "POST",
            mode: "no-cors", // GASへの送信でよく使われる設定です
            body: JSON.stringify(data)
        });

        // 保存成功時の処理
        alert("クラウド保存完了！");
        
        // ローカル（ブラウザ）の集計表にも反映させる
        updateLocalStats(type, isHit);

    } catch (error) {
        console.error("Error:", error);
        alert("保存に失敗しました。ネット環境を確認してください。");
    } finally {
        // ボタンを元に戻す
        buttons.forEach(b => b.disabled = false);
        document.getElementById('advice').innerHTML = originalAdvice;
    }
}

// ローカル表示更新用の補助関数
function updateLocalStats(type, isHit) {
    let stats = JSON.parse(localStorage.getItem('boatDoubleStats')) || {};
    if (!stats[currentStadium]) {
        stats[currentStadium] = { tT: 0, tH: 0, sT: 0, sH: 0 };
    }
    if (type === 'tool') {
        stats[currentStadium].tT += 1;
        if(isHit) stats[currentStadium].tH += 1;
    } else {
        stats[currentStadium].sT += 1;
        if(isHit) stats[currentStadium].sH += 1;
    }
    localStorage.setItem('boatDoubleStats', JSON.stringify(stats));
    loadStats(); // 下のテーブルを更新
}

function loadStats() {
    let stats = JSON.parse(localStorage.getItem('boatDoubleStats')) || {};
    let tbody = document.getElementById('fieldStatsBody');
    tbody.innerHTML = "";

    let totalTT = 0, totalTH = 0, totalST = 0, totalSH = 0;

    Object.keys(stadiumBaseData).forEach(name => {
        let s = stats[name] || { tT: 0, tH: 0, sT: 0, sH: 0 };
        totalTT += s.tT; totalTH += s.tH; totalST += s.sT; totalSH += s.sH;

        let row = `<tr>
            <td>${name}</td>
            <td>${s.tH} / ${s.tT}</td>
            <td>${s.sH} / ${s.sT}</td>
        </tr>`;
        tbody.innerHTML += row;
    });

    document.getElementById('toolTotalRate').innerText = (totalTT > 0 ? Math.round(totalTH/totalTT*100) : 0) + "%";
    document.getElementById('selfTotalRate').innerText = (totalST > 0 ? Math.round(totalSH/totalST*100) : 0) + "%";
}

function resetStats() {
    if(confirm("全てのデータをリセットしますか？")) {
        localStorage.clear();
        loadStats();
    }
}

window.onload = loadStats;
</script>
</body>
</html>
