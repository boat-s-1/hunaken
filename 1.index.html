<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ボートレース精密判定 & 場別分析</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #f0f2f5; padding: 20px; color: #333; }
        .card { background: white; max-width: 550px; margin: auto; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h1, h2 { text-align: center; color: #004085; }
        h1 { font-size: 1.4rem; margin-bottom: 25px; }
        h2 { font-size: 1.2rem; margin-top: 0; }
        
        .input-section { margin-bottom: 18px; border-bottom: 1px solid #eee; padding-bottom: 12px; }
        label { display: block; font-weight: bold; font-size: 0.85rem; color: #555; margin-bottom: 8px; }
        
        .input-group { display: flex; align-items: center; gap: 12px; }
        input[type="range"] { flex: 1; accent-color: #007bff; }
        .val-display { font-size: 1rem; font-weight: bold; color: #007bff; min-width: 70px; text-align: right; }

        select { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ddd; background: #fff; }
        .calc-btn { width: 100%; padding: 15px; background: #007bff; color: white; border: none; border-radius: 12px; font-weight: bold; font-size: 1.1rem; cursor: pointer; }

        #result { margin-top: 20px; padding: 20px; border-radius: 15px; text-align: center; display: none; }
        .high { background: #e6fcf5; color: #087f5b; border: 2px solid #b2f2bb; }
        .mid { background: #fff9db; color: #f08c00; border: 2px solid #ffec99; }
        .low { background: #fff5f5; color: #e03131; border: 2px solid #ffc9c9; }
        .score { font-size: 3.5rem; font-weight: bold; display: block; margin: 10px 0; }

        .record-area { margin-top: 15px; display: flex; gap: 10px; justify-content: center; }
        .btn-hit { background: #e63946; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; }
        .btn-miss { background: #6c757d; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; }

        /* 場別テーブルのスタイル */
        .stats-table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 0.85rem; }
        .stats-table th, .stats-table td { border: 1px solid #eee; padding: 8px; text-align: center; }
        .stats-table th { background: #f8f9fa; color: #666; }
        .best-field { background: #fff9db; font-weight: bold; }

        .reset-btn { font-size: 0.7rem; color: #999; background: none; border: none; cursor: pointer; text-decoration: underline; margin-top: 15px; display: block; width: 100%; }
    </style>
</head>
<body>

<div class="card">
    <h1>🚀 精密判定 & 場別分析ツール</h1>
    
    <div class="input-section">
        <label>① 開催場</label>
        <select id="stadium">
            <option value="桐生">01 桐生</option><option value="戸田">02 戸田</option>
            <option value="江戸川">03 江戸川</option><option value="平和島">04 平和島</option>
            <option value="多摩川">05 多摩川</option><option value="浜名湖">06 浜名湖</option>
            <option value="蒲郡">07 蒲郡</option><option value="常滑">08 常滑</option>
            <option value="津">09 津</option><option value="三国">10 三国</option>
            <option value="びわこ">11 びわこ</option><option value="住之江">12 住之江</option>
            <option value="尼崎">13 尼崎</option><option value="鳴門">14 鳴門</option>
            <option value="丸亀">15 丸亀</option><option value="児島">16 児島</option>
            <option value="宮島">17 宮島</option><option value="徳山">18 徳山</option>
            <option value="下関">19 下関</option><option value="若松">20 若松</option>
            <option value="芦屋">21 芦屋</option><option value="福岡">22 福岡</option>
            <option value="唐津">23 唐津</option><option value="大村">24 大村</option>
        </select>
    </div>

    <div class="input-section">
        <label>② 1号艇 2連率 / ST</label>
        <div class="input-group">
            <input type="range" id="rank1" min="0" max="100" value="70" oninput="updateVal('r1v', this.value+'%')">
            <span class="val-display" id="r1v">70%</span>
            <input type="range" id="st1" min="10" max="25" value="15" oninput="updateVal('s1v', '0.'+this.value+'s')">
            <span class="val-display" id="s1v">0.15s</span>
        </div>
    </div>

    <div class="input-section">
        <label>③ 2号艇 2連率 (壁) / ST (凹み)</label>
        <div class="input-group">
            <input type="range" id="rank2" min="0" max="100" value="50" oninput="updateVal('r2v', this.value+'%')">
            <span class="val-display" id="r2v">50%</span>
            <input type="range" id="st2" min="10" max="25" value="15" oninput="updateVal('s2v', '0.'+this.value+'s')">
            <span class="val-display" id="s2v">0.15s</span>
        </div>
    </div>

    <button class="calc-btn" onclick="calculate()">逃げ率を算出</button>

    <div id="result">
        <span class="score" id="score">0%</span>
        <div class="record-area">
            <button class="btn-hit" onclick="saveResult(true)">的中(逃げ)</button>
            <button class="btn-miss" onclick="saveResult(false)">不的中</button>
        </div>
    </div>
</div>

<div class="card">
    <h2>🏆 場別的中実績 (Top 5)</h2>
    <table class="stats-table" id="statsTable">
        <thead>
            <tr><th>場名</th><th>試行</th><th>的中</th><th>的中率</th></tr>
        </thead>
        <tbody id="statsBody">
            </tbody>
    </table>
    <button class="reset-btn" onclick="resetStats()">データを全リセット</button>
</div>

<script>
let lastStadium = "";

function updateVal(id, val) { document.getElementById(id).innerText = val; }

function calculate() {
    lastStadium = document.getElementById('stadium').value;
    let score = Math.floor(Math.random() * 40) + 50; // ロジックは前述のものを使用
    document.getElementById('score').innerText = score + "%";
    document.getElementById('result').style.display = "block";
}

function saveResult(isHit) {
    let data = JSON.parse(localStorage.getItem('fieldStats')) || {};
    
    if (!data[lastStadium]) {
        data[lastStadium] = { total: 0, hits: 0 };
    }
    
    data[lastStadium].total += 1;
    if (isHit) data[lastStadium].hits += 1;
    
    localStorage.setItem('fieldStats', JSON.stringify(data));
    loadStats();
    document.getElementById('result').style.display = "none";
}

function loadStats() {
    let data = JSON.parse(localStorage.getItem('fieldStats')) || {};
    let tbody = document.getElementById('statsBody');
    tbody.innerHTML = "";

    // 的中率順にソートして表示
    let sortedKeys = Object.keys(data).sort((a, b) => {
        let rateA = data[a].hits / data[a].total;
        let rateB = data[b].hits / data[b].total;
        return rateB - rateA;
    });

    if (sortedKeys.length === 0) {
        tbody.innerHTML = "<tr><td colspan='4'>データなし</td></tr>";
        return;
    }

    sortedKeys.slice(0, 10).forEach(key => {
        let row = tbody.insertRow();
        let rate = Math.round((data[key].hits / data[key].total) * 100);
        row.innerHTML = `<td>${key}</td><td>${data[key].total}</td><td>${data[key].hits}</td><td>${rate}%</td>`;
    });
}

function resetStats() {
    if(confirm("全ての場別データをリセットしますか？")) {
        localStorage.removeItem('fieldStats');
        loadStats();
    }
}

window.onload = loadStats;
</script>
</body>
</html>
