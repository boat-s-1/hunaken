<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ボートレース予想 2連単・全国版</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --br-blue: #2c559b; --br-orange: #f39800; --sheet-bg: #fffbf0; }
        body { font-family: "Helvetica Neue", Helvetica, Arial, "Hiragino Sans", sans-serif; background-color: #ccc; display: flex; flex-direction: column; align-items: center; margin: 0; padding: 10px; -webkit-user-select: none; }

        /* --- 舟券デザイン --- */
        #capture-target { padding: 5px; background: #ccc; }
        .ticket { width: 380px; height: 235px; background: #fff; border: 1px solid #333; padding: 10px; box-sizing: border-box; display: flex; flex-direction: column; position: relative; overflow: hidden; }
        .ticket::before { content: "P-STAR"; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-15deg); font-size: 60px; color: rgba(0,0,0,0.03); font-weight: bold; z-index: 0; pointer-events: none; }

        .t-header { display: flex; align-items: flex-end; border-bottom: 1.5px solid #000; padding-bottom: 2px; margin-bottom: 5px; z-index: 1; }
        .t-br-logo { font-size: 11px; font-weight: 900; font-style: italic; line-height: 1; margin-right: 15px; }
        .t-main-place { font-size: 34px; font-weight: 900; letter-spacing: -1px; font-family: "Arial Black", sans-serif; line-height: 1; }
        .t-form-box { margin-left: auto; border: 1.5px solid #000; padding: 1px 8px; font-size: 12px; font-weight: bold; }

        .t-body { display: flex; flex: 1; z-index: 1; }
        .t-left { width: 125px; display: flex; flex-direction: column; padding-top: 5px; }
        .t-sub-place { border: 1.5px solid #000; padding: 2px 5px; font-size: 16px; font-weight: bold; text-align: center; width: 110px; margin-bottom: 5px; white-space: nowrap; overflow: hidden; }
        .t-race-num { font-size: 38px; font-weight: bold; line-height: 1; }
        .t-race-label { font-size: 16px; font-weight: bold; }
        .t-date-area { margin-top: auto; font-size: 11px; font-weight: bold; line-height: 1.2; }

        .t-mid { width: 45px; display: flex; align-items: center; justify-content: center; }
        .t-shiki-v { writing-mode: vertical-rl; text-orientation: upright; font-size: 22px; font-weight: bold; border: 1.5px solid #000; padding: 15px 4px; letter-spacing: 10px; background: #fff; }

        .t-right { flex: 1; padding-left: 15px; display: flex; flex-direction: column; justify-content: center; }
        .t-bet-row { display: flex; align-items: center; height: 45px; font-size: 18px; font-weight: bold; }
        .t-nums { font-size: 28px; margin-left: 15px; letter-spacing: 4px; }
        
        .t-summary { text-align: right; font-size: 12px; font-weight: bold; line-height: 1.2; margin-top: auto; }
        .t-barcode { width: 100%; height: 25px; background: repeating-linear-gradient(90deg, #000, #000 2px, #fff 2px, #fff 4px); margin-top: 5px; }

        /* --- 操作エリア --- */
        .ms { background: var(--sheet-bg); width: 100%; max-width: 400px; padding: 12px; border: 2px solid var(--br-orange); border-left: 12px solid var(--br-orange); box-sizing: border-box; margin-top: 10px; }
        
        .input-group { background: #fff; padding: 8px; border: 1px solid var(--br-orange); margin-bottom: 10px; }
        .input-group input { width: 100%; padding: 6px; box-sizing: border-box; border: 1px solid #ccc; font-size: 14px; margin-top: 4px; }
        
        .grid-label { font-size: 11px; font-weight: bold; color: var(--br-orange); margin-bottom: 4px; }
        .ms-race-area { display: grid; grid-template-columns: repeat(6, 1fr); gap: 4px; margin-bottom: 10px; }
        .ms-place-area { display: flex; overflow-x: auto; border: 1.2px solid var(--br-orange); padding: 4px; background: #fff; gap: 4px; height: 80px; margin-bottom: 10px; }
        
        .ms-btn, .p-btn, .amt-btn { border: 1px solid var(--br-orange); background: #fff; color: var(--br-orange); font-weight: bold; display: flex; align-items: center; justify-content: center; font-size: 10px; cursor: pointer; min-height: 25px; }
        .p-btn { min-width: 32px; writing-mode: vertical-rl; padding: 4px 0; font-size: 11px; }
        .active { background: var(--br-orange) !important; color: #fff !important; }

        .row { display: flex; align-items: center; gap: 8px; margin: 8px 0; }
        .label { background: var(--br-blue); color: #fff; font-size: 12px; width: 45px; text-align: center; padding: 6px 0; font-weight: bold; border-radius: 2px; }
        .mark-wrap { display: flex; gap: 6px; }
        .mark { width: 34px; height: 40px; border: 1.5px solid #444; border-radius: 50% / 30%; background: #fff; font-weight: bold; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 20px; }
        .mark.selected { background: #222 !important; color: #fff !important; }

        .save-btn { margin-top: 15px; padding: 14px; background: #e60012; color: #fff; border: none; border-radius: 30px; font-weight: bold; font-size: 16px; width: 90%; cursor: pointer; box-shadow: 0 4px 0 #b3000d; }
    </style>
</head>
<body>

    <div id="capture-target">
        <div class="ticket">
            <div class="t-header">
                <div class="t-br-logo">BOAT<br>RACE</div>
                <div class="t-main-place" id="res-main-place">平和島</div>
                <div class="t-form-box">フォーメーション</div>
            </div>
            <div class="t-body">
                <div class="t-left">
                    <div class="t-sub-place" id="res-sub-text">平和島</div>
                    <div><span class="t-race-num" id="res-race">01</span><span class="t-race-label">レース</span></div>
                    <div class="t-date-area">03年度<br>第04回07日<br><span id="res-full-date">2026年02月28日</span></div>
                </div>
                <div class="t-mid"><div class="t-shiki-v">２連単</div></div>
                <div class="t-right">
                    <div class="t-bet-row">1着 － <span id="ans0" class="t-nums"></span></div>
                    <div class="t-bet-row">2着 － <span id="ans1" class="t-nums"></span></div>
                    <div class="t-summary">組合せ数 ◆◆<span id="res-cnt">0</span><br>各組 ◆◆◆◆<span id="res-unit">100</span>円<br>合計 ◆◆◆◆◆◆<span id="res-total">0</span>円</div>
                </div>
            </div>
            <div class="t-barcode"></div>
        </div>
    </div>

    <div class="ms">
        <div class="input-group">
            <div class="grid-label">自由入力（会場名 / 補足）</div>
            <input type="text" id="in-main-place" value="平和島" oninput="syncText()">
            <input type="text" id="in-sub-text" value="平和島" oninput="syncText()">
        </div>

        <div class="grid-label">レース選択 (1-12R)</div>
        <div class="ms-race-area" id="race-grid">
            </div>

        <div class="grid-label">会場選択 (全24場)</div>
        <div class="ms-place-area" id="place-grid">
            </div>

        <div class="row"><div class="label">1着</div><div class="mark-wrap">
            <div class="mark" onclick="tapMark(this,0,1)">1</div><div class="mark" onclick="tapMark(this,0,2)">2</div><div class="mark" onclick="tapMark(this,0,3)">3</div><div class="mark" onclick="tapMark(this,0,4)">4</div><div class="mark" onclick="tapMark(this,0,5)">5</div><div class="mark" onclick="tapMark(this,0,6)">6</div>
        </div></div>
        <div class="row"><div class="label">2着</div><div class="mark-wrap">
            <div class="mark" onclick="tapMark(this,1,1)">1</div><div class="mark" onclick="tapMark(this,1,2)">2</div><div class="mark" onclick="tapMark(this,1,3)">3</div><div class="mark" onclick="tapMark(this,1,4)">4</div><div class="mark" onclick="tapMark(this,1,5)">5</div><div class="mark" onclick="tapMark(this,1,6)">6</div>
        </div></div>

        <div style="display:flex; justify-content:flex-end; gap:5px; margin-top:10px;">
            <div class="amt-btn active" style="padding:5px 12px;" onclick="setAmt(this,100)">100円</div>
            <div class="amt-btn" style="padding:5px 12px;" onclick="setAmt(this,500)">500円</div>
        </div>
    </div>

    <button class="save-btn" onclick="save()">画像を保存する</button>

    <script>
        const places = ["桐生","戸田","江戸川","平和島","多摩川","浜名湖","蒲郡","常滑","津","三国","びわこ","住之江","尼崎","鳴門","丸亀","児島","宮島","徳山","下関","若松","芦屋","福岡","唐津","大村"];
        let sel = [[], []]; let unit = 100;

        window.onload = () => {
            // レースボタン生成 (12R)
            const rg = document.getElementById('race-grid');
            for(let i=1; i<=12; i++){
                const num = String(i).padStart(2, '0');
                const b = document.createElement('div');
                b.className = 'ms-btn' + (i===1?' active':'');
                b.innerText = i + 'R';
                b.onclick = () => {
                    document.querySelectorAll('.ms-race-area .ms-btn').forEach(x=>x.classList.remove('active'));
                    b.classList.add('active');
                    document.getElementById('res-race').innerText = num;
                };
                rg.appendChild(b);
            }
            // 会場ボタン生成 (24場)
            const pg = document.getElementById('place-grid');
            places.forEach(p => {
                const b = document.createElement('div');
                b.className = 'p-btn' + (p==='平和島'?' active':'');
                b.innerText = p;
                b.onclick = () => {
                    document.querySelectorAll('.p-btn').forEach(x=>x.classList.remove('active'));
                    b.classList.add('active');
                    document.getElementById('in-main-place').value = p;
                    document.getElementById('in-sub-text').value = p;
                    syncText();
                };
                pg.appendChild(b);
            });
            // 日付
            const now = new Date();
            document.getElementById('res-full-date').innerText = `${now.getFullYear()}年${String(now.getMonth()+1).padStart(2,'0')}月${String(now.getDate()).padStart(2,'0')}日`;
        };

        function syncText() {
            document.getElementById('res-main-place').innerText = document.getElementById('in-main-place').value;
            document.getElementById('res-sub-text').innerText = document.getElementById('in-sub-text').value;
        }

        function tapMark(el, row, num) {
            if (sel[row].includes(num)) sel[row] = sel[row].filter(v => v !== num);
            else sel[row].push(num);
            el.classList.toggle('selected');
            updateDisplay();
        }

        function setAmt(el, v) {
            document.querySelectorAll('.amt-btn').forEach(x => x.classList.remove('active'));
            el.classList.add('active');
            unit = v;
            document.getElementById('res-unit').innerText = v;
            updateDisplay();
        }

        function updateDisplay() {
            let cnt = 0;
            for (let a of sel[0]) for (let b of sel[1]) if (a !== b) cnt++;
            document.getElementById('ans0').innerText = sel[0].sort().join(' ');
            document.getElementById('ans1').innerText = sel[1].sort().join(' ');
            document.getElementById('res-cnt').innerText = cnt;
            document.getElementById('res-total').innerText = (cnt * unit).toLocaleString();
        }

        function save() {
            html2canvas(document.getElementById('capture-target'), { scale: 3 }).then(canvas => {
                const a = document.createElement('a');
                a.href = canvas.toDataURL();
                a.download = 'boat_2ren_all.png';
                a.click();
            });
        }
    </script>
</body>
</html>
