<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>一果の1号艇・鬼絞り判定所 🌸</title>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@700;800&display=swap" rel="stylesheet">
    <style>
        /* --- 全体・背景の設定 --- */
        body {
            font-family: 'M PLUS Rounded 1c', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            /* ★いただいた背景画像をリピート表示 */
            background-image: url('bg_pattern.png');
            background-repeat: repeat;
            background-size: auto;
        }

        /* --- メインカード（上部パネル）の設定 --- */
        .main-card {
            background-color: white;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(255, 182, 193, 0.2);
            width: 100%;
            max-width: 600px;
            padding: 30px;
            /* ★子要素（キャラクターや文字）を重ねるための基準点 */
            position: relative; 
            border: 2px solid #fff0f3;
            margin-bottom: 30px;
            overflow: hidden; /* キャラクターがカードからはみ出さないように */
        }

        /* ★いただいた一果ちゃんのキャラクター配置 */
        .ichika-chara {
            position: absolute;
            top: 10px;    /* 上からの位置 */
            right: 10px;  /* 右からの位置 */
            width: 120px; /* キャラクターの幅（画像のサイズに合わせて調整） */
            height: auto;
            z-index: 1;   /* 他の要素より奥に配置 */
        }

        /* タイトルエリア */
        .card-header {
            text-align: center;
            margin-bottom: 20px;
            margin-right: 130px; /* キャラクターと重ならないように余白を空ける */
            position: relative;
            z-index: 2; /* キャラクターより手前に表示 */
        }

        h1 {
            font-size: 1.4rem;
            color: #ff6b81;
            font-weight: 800;
            margin: 0;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }

        /* パスワード（合言葉？） */
        .admin-pass-row {
            text-align: right;
            margin-bottom: 20px;
            margin-right: 130px; /* キャラクターを避ける */
            position: relative;
            z-index: 2;
        }
        .admin-pass-label { font-size: 0.8rem; color: #ff8fa3; margin-right: 5px; }
        .admin-pass-input { font-size: 0.8rem; padding: 5px 10px; border-radius: 15px; border: 1px solid #ddd; width: 80px; }

        /* 開催場選択ラベル */
        .label-row {
            font-size: 1rem;
            color: #ff8fa3;
            font-weight: 700;
            border-left: 5px solid #ff6b81;
            padding-left: 10px;
            margin-bottom: 5px;
            position: relative; z-index: 2;
        }

        /* --- 開催場選択（いただいた画像の上に文字を重ねる） --- */
        .stadium-select-wrapper {
            position: relative;
            margin-bottom: 25px;
            height: 60px; /* ★バー画像（image_13.png）の高さに合わせて調整 */
            background-image: url('stadium_bar.png'); /* いただいたバー画像 */
            background-size: 100% 100%;
            background-repeat: no-repeat;
            z-index: 2; /* キャラクターより手前に */
        }

        /* 実際のセレクトボックス（透明にして画像の上に重ねる） */
        .stadium-select {
            position: absolute;
            inset: 0; width: 100%; height: 100%;
            opacity: 0; /* 透明にする */
            cursor: pointer;
            z-index: 2; /* 文字より上に配置してクリックを有効に */
        }

        /* 画像の上に表示される金色風の文字 */
        .stadium-text-display {
            position: absolute;
            top: 50%;
            left: 55px; /* 左側の装飾を避けて配置 */
            transform: translateY(-50%);
            color: #f1c40f; /* 金色風の色 */
            font-size: 1.3rem;
            font-weight: 800;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
            pointer-events: none; /* クリックを貫通させる */
            z-index: 1; /* セレクトボックスより下に */
        }

        /* --- 競艇場の特徴エリア（いただいた枠画像を使う） --- */
        .stadium-memo-wrapper {
            position: relative;
            margin-top: 20px;
            padding: 25px 35px; /* ゴールド装飾を避けて内側に余白を空ける */
            color: #666;
            line-height: 1.6;
            z-index: 2;
        }

        /* ★いただいた特徴枠（image_8.png）を背景に指定 */
        .stadium-memo-wrapper::before {
            content: "";
            position: absolute;
            inset: 0; /* 親要素いっぱいに広げる */
            background-image: url('memo_frame.png'); /* いただいた枠画像 */
            background-size: 100% 100%;
            background-repeat: no-repeat;
            z-index: -1; /* テキストより奥に配置 */
        }

        .memo-title {
            color: #ff6b81;
            font-weight: 800;
            font-size: 1.1rem;
            margin-bottom: 10px;
            display: flex; align-items: center; justify-content: center; gap: 5px;
        }
        .memo-link {
            color: #ff6b81;
            text-decoration: underline;
            font-weight: 700;
            cursor: pointer;
            display: block; margin-top: 10px; text-align: center;
        }
        .flower-icon { font-size: 1.2rem; }
    </style>
</head>
<body>

<div class="main-card">
    <img src="ichika_chara.png" class="ichika-chara" alt="一果ちゃん">

    <div class="card-header">
        <h1>
            <span class="flower-icon">🌸</span>
            一果の1号艇・鬼絞り判定所
        </h1>
    </div>

    <div class="admin-pass-row">
        <span class="admin-pass-label">🔑 合言葉？</span>
        <input type="password" class="admin-pass-input" placeholder="🔑">
    </div>

    <div class="label-row">① 開催場を選択</div>
    <div class="stadium-select-wrapper">
        <select class="stadium-select" id="stadiumSelect" onchange="updateStadiumName(this)">
            <option value="01 桐生">01 桐生</option>
            <option value="02 戸田">02 戸田</option>
            <option value="03 江戸川">03 江戸川</option>
        </select>
        <div class="stadium-text-display" id="stadiumNameDisplay">01 桐生</div>
    </div>

    <div class="stadium-memo-wrapper">
        <div class="memo-title">
            <span class="flower-icon">🌸</span>
            01 桐生 の特徴
            <span class="flower-icon">🌸</span>
        </div>
        平均イン逃げ率：<strong>51%</strong><br>
        標高が高くて、イン逃げ率は標準的ですぅ。夜はモーターの力が強くなるんですよぉ。<br>
        <span class="memo-link">もっと詳しいデータを見る？ 🌸</span>
    </div>
</div>

<script>
    // セレクトボックスで選んだ場名を金色文字に反映させる関数
    function updateStadiumName(select) {
        const stadiumNameDisplay = document.getElementById('stadiumNameDisplay');
        stadiumNameDisplay.innerText = select.value;
    }
</script>

</body>
</html>
