<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>一果の1号艇・鬼絞り判定所 🌸 BOAT STRIKE</title>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        /* --- 上部固定ステータスバー --- */
        .status-bar {
            position: fixed; top: 0; left: 0; width: 100%;
            background: rgba(255, 250, 251, 0.95); backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid #ffcad4; padding: 8px 15px;
            display: flex; align-items: center; z-index: 2000; box-sizing: border-box;
        }
        .system-clock { font-family: monospace; font-weight: bold; color: #ff8fa3; font-size: 14px; margin-right: 15px; border-right: 1px solid #ffcad4; padding-right: 10px; white-space: nowrap; }
        .ticker-wrap { flex: 1; overflow: hidden; }
        .ticker-content { display: inline-block; white-space: nowrap; font-size: 12px; font-weight: bold; color: #ff6b81; animation: i-ticker 20s linear infinite; }
        @keyframes i-ticker { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        /* 全体ベース */
        body { font-family: 'M PLUS Rounded 1c', sans-serif; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; background-color: #fffafb; background-image: linear-gradient(90deg, rgba(255, 182, 193, 0.05) 1px, transparent 1px), linear-gradient(rgba(255, 182, 193, 0.05) 1px, transparent 1px); background-size: 30px 30px; }
        .header-banner { width: 100%; max-width: 440px; margin: 60px auto 10px; border-radius: 20px; overflow: hidden; box-shadow: 0 4px 15px rgba(255, 107, 129, 0.2); }
        .header-banner img { width: 100%; height: auto; display: block; }

        /* メイン枠 */
        .outer-frame { position: relative; width: 100%; max-width: 440px; padding: 25px 15px 15px; box-sizing: border-box; background-color: white; border: 3px solid #d4b185; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .top-section { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: -15px; position: relative; z-index: 10; }
        .chara-container { flex: 0 0 145px; margin-left: -5px; }
        .ichika-chara { width: 110%; height: auto; display: block; }
        .input-top-right { flex: 1; display: flex; flex-direction: column; align-items: flex-end; gap: 12px; padding-bottom: 15px; }

        /* セレクトボックス装飾 */
        .stadium-select-wrapper { position: relative; width: 100%; max-width: 220px; height: 44px; background-image: url('stadium_bar.png'); background-size: 100% 100%; display: flex; align-items: center; justify-content: center; }
        .stadium-text-display { color: #d4b185; font-size: 1rem; font-weight: 800; text-shadow: 1px 1px 2px black; }
        .stadium-select { position: absolute; inset: 0; opacity: 0; cursor: pointer; z-index: 15; }

        /* 入力UI */
        .control-label { display: block; font-weight: 800; font-size: 0.85rem; color: #ff8fa3; margin-bottom: 5px; border-left: 5px solid #ff6b81; padding-left: 10px; margin-top: 15px; }
        .slider-group { display: flex; align-items: center; gap: 12px; }
        input[type="range"] { flex: 1; accent-color: #ff6b81; }
        .val-disp { font-size: 1.1rem; font-weight: 800; color: #ff6b81; min-width: 65px; text-align: right; }
        .calc-btn { width: 100%; padding: 18px; margin-top: 15px; background: linear-gradient(135deg, #ff9a9e 0%, #ff6b81 100%); color: white; border: none; border-radius: 15px; font-weight: 800; font-size: 1.2rem; cursor: pointer; box-shadow: 0 5px 15px rgba(255, 107, 129, 0.3); }

        /* 結果 */
        #result { display: none; margin-top: 20px; padding: 20px; border-radius: 20px; text-align: center; }
        .score-display { font-size: 3.5rem; font-weight: 800; color: #ff6b81; display: block; line-height: 1; margin: 10px 0; }
        .ichika-bounce { animation: bounce 0.5s ease infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        /* 下部3点固定ナビ（追加） */
        .footer-fixed-nav {
            position: fixed; bottom: 0; left: 0; width: 100%;
            display: grid; grid-template-columns: 1fr 1fr 1fr;
            gap: 10px; padding: 10px 15px 25px;
            background: rgba(255, 250, 251, 0.95); backdrop-filter: blur(15px);
            border-top: 2px solid #ffcad4; z-index: 2000; box-sizing: border-box;
        }
        .nav-item {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-decoration: none; border-radius: 15px; padding: 8px 5px; font-weight: 800;
            background: #fff; border: 1px solid #fff0f3;
        }
        .nav-hatsune { color: #38a169; }
        .nav-kiina { color: #2962ff; }
        .nav-home { color: #ff8fa3; }
        .nav-label { font-size: 10px; font-weight: 900; }

        /* サイトマップ */
        .footer-sitemap { width: 100%; max-width: 440px; margin: 30px auto 140px; padding: 20px; box-sizing: border-box; background: rgba(255, 255, 255, 0.6); border-radius: 25px; border: 1px solid #ffcad4; }
        .sitemap-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .sitemap-item { background: white; padding: 12px; border-radius: 15px; text-decoration: none; color: #666; font-size: 0.75rem; font-weight: 700; text-align: center; border: 1px solid #fff0f3; }
    </style>
</head>
<body>

<div class="status-bar" id="top-status-bar" style="display: none;">
    <div class="system-clock" id="i-clock">00:00:00</div>
    <div class="ticker-wrap">
        <div class="ticker-content" id="i-ticker-msg">🌸 解析システム稼働中ですよぉ♪ 🌸</div>
    </div>
</div>

<div id="lock-screen" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff5f6; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; box-sizing: border-box;">
    <img src="30e480e9-e3b7-475e-97e2-130141b7b1e3.png" style="width: 120px; margin-bottom: 20px;">
    <h2 style="color: #ff8fa3; margin: 0;">一果の鬼絞り判定所</h2>
    <p style="font-size: 14px; color: #ff8fa3;">合言葉を入力してくださいねぇ🌸</p>
    <input type="text" id="pass-input" placeholder="合言葉は？" style="padding: 15px; border-radius: 20px; border: 2px solid #ffcad4; width: 240px; text-align: center; margin-top: 10px;">
    <button onclick="checkPass()" style="margin-top: 20px; padding: 12px 50px; border-radius: 50px; background: linear-gradient(135deg, #ff9a9e 0%, #ff6b81 100%); color: #fff; border: none; font-weight: 800; cursor: pointer;">扉をあける 🌸</button>
    <p id="error-msg" style="color: #ff4444; font-size: 0.75rem; margin-top: 15px; display: none;">合言葉が違いますぅ…。</p>
</div>

<div id="main-content" style="display: none; width: 100%;">
    <header class="header-banner">
        <img src="Gemini_Generated_Image_se1losse1losse1l.png" alt="一果の鬼絞り判定所">
    </header>

    <div class="outer-frame">
        <div class="top-section">
            <div class="chara-container">
                <img src="ichika_chara3.png" class="ichika-chara" id="ichikaImg">
            </div>
            <div class="input-top-right">
                <div class="stadium-select-wrapper">
                    <div class="stadium-text-display" id="stadiumName">場を選択</div>
                    <select class="stadium-select" id="stadium" onchange="showStadiumMemo()">
                        <option value="">選択してください</option>
                        <option value="01 桐生">01 桐生</option><option value="02 戸田">02 戸田</option><option value="24 大村">24 大村</option>
                        </select>
                </div>
            </div>
        </div>

        <div class="param-controls">
            <label class="control-label">① 1号艇 2連対率</label>
            <div class="slider-group"><input type="range" id="rank1" min="0" max="100" value="70" oninput="updateVal('rank1Val', this.value + '%')"><span class="val-disp" id="rank1Val">70%</span></div>
            
            <label class="control-label">② 展示気配</label>
            <div class="slider-group"><input type="range" id="tenji1" min="-2" max="2" value="0" oninput="updateTenjiDisplay(this.value)"><span class="val-disp" id="tenjiVal">普通</span></div>

            <button class="calc-btn" onclick="calculate()">一果に聞いてみる♪</button>
        </div>

        <div id="result">
            <div class="score-display" id="score">0%</div>
            <div id="advice" style="font-weight: 800; color: #8c6a4a; padding: 10px;"></div>
        </div>
    </div>

    <nav class="footer-sitemap">
        <div class="sitemap-grid">
            <a href="date1.html" class="sitemap-item">📚 24場攻略ノート</a>
            <a href="https://note.com/boat_strikers" class="sitemap-item">📝 一果のnote</a>
        </div>
    </nav>
</div>

<div class="footer-fixed-nav" id="footer-nav" style="display: none;">
    <a href="hatsune.html" class="nav-item nav-hatsune"><span style="font-size:1.2rem;">🍀</span><span class="nav-label">初音ツール</span></a>
    <a href="kiina5.html" class="nav-item nav-kiina"><span style="font-size:1.2rem;">⚡</span><span class="nav-label">キイナツール</span></a>
    <a href="index.html" class="nav-item nav-home"><span style="font-size:1.2rem;">🏠</span><span class="nav-label">HOME</span></a>
</div>

<script>
const stadiumBaseData = {"01 桐生": 51, "02 戸田": 44, "24 大村": 66};

function checkPass() {
    const pass = document.getElementById('pass-input').value;
    if (pass === "0913") {
        document.getElementById('lock-screen').style.display = 'none';
        document.getElementById('main-content').style.display = 'block';
        document.getElementById('top-status-bar').style.display = 'flex'; // バー表示
        document.getElementById('footer-nav').style.display = 'grid'; // ナビ表示
    } else {
        document.getElementById('error-msg').style.display = 'block';
    }
}

function updateVal(id, val) { document.getElementById(id).innerText = val; }
function updateTenjiDisplay(val) { const texts = {"-2":"最悪","-1":"劣勢","0":"普通","1":"良好","2":"超抜"}; document.getElementById('tenjiVal').innerText = texts[val]; }

function showStadiumMemo() {
    const val = document.getElementById('stadium').value;
    document.getElementById('stadiumName').innerText = val || "場を選択";
}

function calculate() {
    const std = document.getElementById('stadium').value;
    if(!std) { alert("場を選んでね♪"); return; }
    
    const r1 = parseInt(document.getElementById('rank1').value);
    const tj = parseInt(document.getElementById('tenji1').value);
    
    let res = Math.round(stadiumBaseData[std] + (r1-50)*0.5 + tj*8);
    res = Math.min(98, Math.max(5, res));

    document.getElementById('result').style.display = "block";
    document.getElementById('score').innerText = res + "%";
    document.getElementById('advice').innerText = res >= 70 ? "🌸 逃げの期待大ですよぉ！" : "🌸 ちょっと慎重に見てみましょう。";
    
    if(res >= 75) document.getElementById('ichikaImg').classList.add('ichika-bounce');
    else document.getElementById('ichikaImg').classList.remove('ichika-bounce');
}

function updateStatus() {
    const now = new Date();
    const h = now.getHours();
    document.getElementById('i-clock').innerText = now.toLocaleTimeString('ja-JP', { hour12: false });
    
    let msg = (h >= 8 && h < 11) ? "🌸 モーニング開催中ですっ♪" : 
              (h >= 15 && h < 21) ? "🌸 ナイター開催中ですっ♪" : "🌸 一果の鬼絞り解析システム稼働中っ🌸";
    document.getElementById('i-ticker-msg').innerText = msg;
}
setInterval(updateStatus, 1000);
updateStatus();
</script>

</body>
</html>
