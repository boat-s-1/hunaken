<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>一果の1号艇・鬼絞り判定所 🌸</title>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@700;800&display=swap" rel="stylesheet">
    <style>
        /* --- 背景設定 --- */
        body {
            font-family: 'M PLUS Rounded 1c', sans-serif;
            margin: 0; padding: 10px;
            display: flex; justify-content: center; align-items: flex-start;
            background-image: url('bg_pattern.png');
            background-repeat: repeat; background-size: 200px;
            min-height: 100vh;
        }

        /* --- ゴールド枠の調整 --- */
        .outer-frame {
            position: relative;
            width: 100%;
            max-width: 480px; 
            margin-top: 20px;
            /* 枠の装飾を避けるための内側余白 */
            padding: 55px 35px 45px 35px; 
            box-sizing: border-box;
            background-image: url('598ebf7b-2370-472e-acba-c1507159c995.png');
            background-size: 100% 100%;
            background-repeat: no-repeat;
        }

        /* --- メインレイアウト（横並び） --- */
        .main-card {
            display: flex;
            align-items: center; /* 上下中央 */
            justify-content: space-between;
            flex-wrap: wrap; /* 狭すぎたら縦にする保険 */
        }

        /* --- 左側：一果ちゃん --- */
        .chara-container {
            flex: 0 0 40%; /* 横幅の40%を確保 */
            text-align: left;
        }
        .ichika-chara {
            width: 130px; /* サイズ固定 */
            height: auto;
            filter: drop-shadow(3px 3px 5px rgba(0,0,0,0.1));
            /* 枠からはみ出さないように調整 */
            margin-left: -5px; 
        }

        /* --- 右側：文字ブロック --- */
        .content-block {
            flex: 0 0 58%; /* 横幅の58%を確保 */
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            font-size: 1rem;
            color: #ff6b81;
            text-align: center;
            margin: 0 0 10px 0;
            line-height: 1.3;
        }

        /* 合言葉（カギ） */
        .admin-pass-wrapper {
            position: relative;
            width: 80px; height: 35px;
            margin-bottom: 10px;
        }
        .gold-keyhole-bg {
            position: absolute; inset: 0;
            background-image: url('gold_keyhole.png');
            background-size: contain; background-repeat: no-repeat;
        }
        .admin-pass-input {
            position: absolute; inset: 0; opacity: 0; z-index: 10; cursor: pointer;
        }
        .admin-pass-label {
            position: absolute; left: 105%; top: 50%; transform: translateY(-50%);
            white-space: nowrap; font-size: 0.6rem; color: #ff8fa3; font-weight: 800;
        }

        /* 開催場セレクトバー */
        .label-row {
            font-size: 0.8rem; color: #ff8fa3; font-weight: 800;
            margin: 5px 0 5px 0; align-self: center;
        }

        .stadium-select-wrapper {
            position: relative;
            width: 100%;
            height: 40px;
            background-image: url('stadium_bar.png');
            background-size: 100% 100%;
        }
        .stadium-text-display {
            position: absolute; top: 50%; left: 30px; transform: translateY(-50%);
            color: #f1c40f; font-size: 0.85rem; font-weight: 800;
            text-shadow: 1px 1px 2px #000;
        }
        .stadium-select {
            position: absolute; inset: 0; width: 100%; height: 100%;
            opacity: 0; z-index: 20; cursor: pointer;
        }

        /* --- 最下部：特徴メモ（全幅） --- */
        .stadium-memo-wrapper {
            position: relative;
            width: 100%;
            margin-top: 20px;
            padding: 30px 20px;
            box-sizing: border-box;
        }
        .stadium-memo-wrapper::before {
            content: ""; position: absolute; inset: 0;
            background-image: url('memo_frame.png');
            background-size: 100% 100%; z-index: -1;
        }
        .memo-content {
            font-size: 0.75rem; color: #555; line-height: 1.5;
        }
        .memo-title {
            color: #ff6b81; font-weight: 800; text-align: center;
            margin-bottom: 5px; font-size: 0.85rem;
        }
        .memo-link {
            color: #ff6b81; text-align: center; display: block;
            margin-top: 8px; font-weight: 800; text-decoration: underline; font-size: 0.75rem;
        }

        /* 超小型スマホ向けの微調整 */
        @media (max-width: 360px) {
            .outer-frame { padding: 50px 25px 40px 25px; }
            .ichika-chara { width: 110px; }
            .stadium-text-display { font-size: 0.75rem; left: 25px; }
        }
    </style>
</head>
<body>

<div class="outer-frame">
    <div class="main-card">
        <div class="chara-container">
            <img src="ichika_chara3.png" class="ichika-chara">
        </div>

        <div class="content-block">
            <h1>🌸 一果の1号艇・<br>鬼絞り判定所</h1>
            
            <div class="admin-pass-wrapper">
                <div class="gold-keyhole-bg"></div>
                <div class="admin-pass-label">合言葉？</div>
                <input type="password" class="admin-pass-input">
            </div>

            <div class="label-row">① 開催場を選択</div>
            <div class="stadium-select-wrapper">
                <div class="stadium-text-display" id="stadiumName">01 桐生</div>
                <select class="stadium-select" onchange="document.getElementById('stadiumName').innerText=this.value">
                    <option value="01 桐生">01 桐生</option>
                    <option value="02 戸田">02 戸田</option>
                </select>
            </div>
        </div>

        <div class="stadium-memo-wrapper">
            <div class="memo-title">🌸 01 桐生 の特徴 🌸</div>
            <div class="memo-content">
                平均イン逃げ率：51%<br>
                標高が高くて、イン逃げ率は標準的ですぅ。夜はモーターの力が強くなるんですよぉ。
            </div>
            <a href="data.html" class="memo-link">もっと詳しいデータを見る？ 🌸</a>
        </div>
    </div>
</div>

</body>
</html>
