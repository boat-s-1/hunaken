<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>一果の1号艇・鬼絞り判定所 🌸</title>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@700;800&display=swap" rel="stylesheet">
    
    <style>
        /* CSSは後ほど実装します。
           ここでは、全体の雰囲気だけを感じられるように、
           仮のスタイルを少しだけ当てておきます。
        */
        body {
            font-family: 'M PLUS Rounded 1c', sans-serif;
            background-color: #fffafb; /* 仮の背景色 */
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .main-card {
            background-color: white;
            border: 2px solid #ffcad4; /* 仮の枠線 */
            border-radius: 20px;
            width: 100%;
            max-width: 600px;
            padding: 20px;
            position: relative;
            margin-bottom: 30px;
        }

        /* 画像素材を配置するためのプレースホルダ */
        .chara-placeholder {
            position: absolute;
            top: 20px; left: 20px;
            width: 100px; height: 100px;
            background-color: #f0f0f0;
            display: flex; align-items: center; justify-content: center;
            border-radius: 10px; font-size: 0.8rem; color: #999;
        }

        /* 見出しやセレクトボックス、メモ、スライダーなどの仮スタイル */
        .title { color: #ff6b81; text-align: center; margin-left: 120px; }
        .stadium-memo { background-color: #fff5f6; border-radius: 15px; padding: 15px; margin-top: 15px; }
        .slider-group { width: 100%; max-width: 600px; margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="main-card">
    <div class="chara-placeholder">キャラクター<br>(ここに画像)</div>

    <div class="header-group">
        <h1 class="title">🌸 一果の1号艇・鬼絞り判定所</h1>
        <div style="text-align: right;">🔑 合言葉？</div>
    </div>

    <div class="input-section">
        <div style="color: #ff8fa3;">① 開催場を選択</div>
        <select style="width: 100%; font-size: 1.2rem;">
            <option>01 桐生</option>
            <option>02 戸田</option>
        </select>
    </div>

    <div class="stadium-memo">
        <h3>🌸 01 桐生 の特徴 🌸</h3>
        <p>標高が、等、イン逃げ率は標準的でる。夜はモーターの力が強くなるんですよぉ。<br>
        もっと詳しいデータを見る？ 🌸</p>
    </div>
</div>

<div class="slider-area">
    <div class="slider-group">
        <label>② 1号艇 2連対率</label>
        <input type="range" min="0" max="100" value="70">
    </div>
    <div class="slider-group">
        <label>③ 1号艇 平均ST</label>
        <input type="range" min="10" max="25" value="15">
    </div>
    </div>

<button style="margin-top: 20px;">判定ツールに戻る</button>

</body>
</html>
