<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>一果の1号艇・鬼絞り判定所 🌸</title>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'M PLUS Rounded 1c', sans-serif;
            margin: 0; padding: 40px 10px;
            display: flex; justify-content: center;
            background-color: #fdf2f4;
            background-image: radial-gradient(#f9d9e2 2px, transparent 2px);
            background-size: 20px 20px;
        }

        /* --- 外枠 (598ebf...png を使う場合) --- */
        .outer-frame {
            position: relative;
            width: 95%;
            max-width: 460px;
            min-height: 280px;
            padding: 40px 25px 30px 25px;
            box-sizing: border-box;
            /* 背景画像の設定 */
            background-image: url('598ebf7b-2370-472e-acba-c1507159c995.png'); /* ここを実際の外枠ファイル名に */
            background-size: 100% 100%;
            background-repeat: no-repeat;
            /* 画像がない時用のバックアップ枠線 */
            border: 2px solid #d4b185; 
            border-radius: 20px;
            background-color: white;
        }

        .top-section {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
            position: relative;
        }

        /* キャラクターを少し浮かせる */
        .chara-container {
            flex: 0 0 110px;
            margin-top: -10px;
            z-index: 5;
        }
        .ichika-chara {
            width: 120%; /* 少し大きく */
            height: auto;
            display: block;
        }

        .input-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 10px;
        }

        /* 合言葉 */
        .admin-pass-wrapper {
            background: white;
            border: 1px solid #eee;
            border-radius: 20px;
            padding: 3px 12px;
            font-size: 0.7rem;
            color: #999;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            display: flex; align-items: center;
        }

        /* 開催場セレクトバー */
        .stadium-select-wrapper {
            position: relative;
            width: 220px;
            height: 42px;
            background-image: url('stadium_bar.png');
            background-size: 100% 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .stadium-text-display {
            color: #d4b185;
            font-size: 1rem;
            font-weight: 800;
            text-shadow: 1px 1px 2px black;
        }
        .stadium-select {
            position: absolute; inset: 0; opacity: 0; cursor: pointer;
        }

        /* --- 特徴メモの枠 (memo_frame.png) --- */
        .stadium-memo-wrapper {
            position: relative;
            width: 100%;
            margin-top: 15px;
            padding: 25px 20px; /* 内側の余白をしっかり取る */
            box-sizing: border-box;
            text-align: center;
        }
        .stadium-memo-wrapper::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('memo_frame.png');
            background-size: 100% 100%;
            background-repeat: no-repeat;
            z-index: 0;
        }

        .memo-title, .memo-content, .memo-link {
            position: relative; /* 背景より前に出す */
            z-index: 1;
        }

        .memo-title {
            color: #d86d7e;
            font-size: 0.9rem;
            font-weight: 800;
            margin-bottom: 8px;
        }
        .memo-content {
            font-size: 0.75rem;
            color: #444;
            line-height: 1.5;
            margin-bottom: 8px;
        }
        .memo-link {
            color: #d86d7e;
            font-size: 0.7rem;
            text-decoration: underline;
            font-weight: 800;
        }
    </style>
</head>
<body>

<div class="outer-frame">
    <div class="top-section">
        <div class="chara-container">
            <img src="ichika_chara3.png" class="ichika-chara">
        </div>

        <div class="input-container">
            <div class="admin-pass-wrapper">
                🗝️ 合言葉？
            </div>
            <div class="stadium-select-wrapper">
                <div class="stadium-text-display" id="stadiumName">01 桐生</div>
                <select class="stadium-select" onchange="document.getElementById('stadiumName').innerText=this.value">
                    <option value="01 桐生">01 桐生</option>
                    <option value="02 戸田">02 戸田</option>
                </select>
            </div>
        </div>
    </div>

    <div class="stadium-memo-wrapper">
        <div class="memo-title">🌸 01 桐生 の特徴 🌸</div>
        <div class="memo-content">
            標高が高くて、イン逃げ率は標準的です。夜はモーターの力が強くなるんですよぉ。
        </div>
        <div class="memo-link">もっと詳しいデータを見る？ 🌸</div>
    </div>
</div>

</body>
</html>
