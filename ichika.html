<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>一果の1号艇・鬼絞り判定所 🌸</title>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@700;800&display=swap" rel="stylesheet">
    <style>
        /* --- 既存のスタイルを継承 --- */
        body {
            font-family: 'M PLUS Rounded 1c', sans-serif;
            margin: 0; padding: 10px;
            display: flex; flex-direction: column; align-items: center;
            background-color: #fffafb;
            background-image: 
                linear-gradient(90deg, rgba(255, 182, 193, 0.05) 1px, transparent 1px),
                linear-gradient(rgba(255, 182, 193, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
        }

        .outer-frame {
            position: relative; width: 100%; max-width: 440px; padding: 25px 15px 15px 15px; box-sizing: border-box;
            background-color: white; border: 3px solid #d4b185; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px;
        }

        /* キャラ・入力エリアのレイアウト */
        .top-section { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: -15px; position: relative; z-index: 10; }
        .chara-container { flex: 0 0 145px; margin-left: -5px; }
        .ichika-chara { width: 110%; height: auto; display: block; transition: 0.3s; }
        .input-top-right { flex: 1; display: flex; flex-direction: column; align-items: flex-end; gap: 12px; padding-bottom: 15px; }

        /* セレクトボックス・メモ */
        .stadium-select-wrapper { position: relative; width: 100%; max-width: 220px; height: 44px; background-image: url('stadium_bar.png'); background-size: 100% 100%; display: flex; align-items: center; justify-content: center; }
        .stadium-text-display { color: #d4b185; font-size: 1rem; font-weight: 800; text-shadow: 1px 1px 2px black; }
        .stadium-select { position: absolute; inset: 0; opacity: 0; cursor: pointer; z-index: 15; }
        .stadium-memo-wrapper { position: relative; width: 100%; min-height: 120px; padding: 25px 20px; box-sizing: border-box; z-index: 1; margin-top: 10px; }
        .stadium-memo-wrapper::before { content: ""; position: absolute; inset: 0; background-image: url('memo_frame.png'); background-size: 100% 100%; z-index: -1; }
        .memo-title { color: #8c6a4a; font-weight: 800; font-size: 0.95rem; margin-bottom: 8px; text-align: center; }
        .memo-content { font-size: 0.8rem; color: #444; line-height: 1.6; text-align: center; }

        /* スライダー制御 */
        .param-controls { margin-top: 15px; border-top: 1px dashed #d4b185; padding-top: 15px; }
        .control-row { margin-bottom: 12px; }
        .control-label { display: block; font-weight: 800; font-size: 0.85rem; color: #ff8fa3; margin-bottom: 5px; border-left: 5px solid #ff6b81; padding-left: 10px; }
        .slider-group { display: flex; align-items: center; gap: 12px; }
        input[type="range"] { flex: 1; accent-color: #ff6b81; cursor: pointer; }
        .val-disp { font-size: 1.1rem; font-weight: 800; color: #ff6b81; min-width: 65px; text-align: right; }
        .condition-select { width: 100%; padding: 12px; border-radius: 12px; border: 2px solid #fff0f3; font-family: inherit; font-weight: 700; font-size: 0.9rem; cursor: pointer; }

        /* --- 【新規】詳細条件アコーディオン --- */
        .details-toggle {
            width: 100%; padding: 10px; margin: 10px 0; background: #fff5f6; border: 1px solid #ffcad4;
            border-radius: 10px; color: #ff8fa3; font-weight: 800; font-size: 0.85rem; cursor: pointer;
            text-align: center; transition: 0.3s;
        }
        .details-toggle:hover { background: #ffeef1; }
        .details-content {
            display: none; /* 初期は隠す */
            padding: 10px; background: #fffafb; border-radius: 15px; border: 1px dashed #ffcad4; margin-bottom: 15px;
        }

        .calc-btn { width: 100%; padding: 18px; margin-top: 15px; background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%); color: white; border: none; border-radius: 15px; font-weight: 800; font-size: 1.2rem; cursor: pointer; box-shadow: 0 5px 15px rgba(255, 107, 129, 0.3); font-family: inherit; }

        /* 結果エリア */
        #result { display: none; margin-top: 20px; padding: 20px; border-radius: 20px; text-align: center; }
        .score-display { font-size: 3.5rem; font-weight: 800; color: #ff6b81; display: block; line-height: 1; margin: 10px 0; }
        #result.high { background: #e6fcf5; border: 2px solid #b2f2bb; }
        #result.mid { background: #fff9db; border: 2px solid #ffec99; }
        #result.low { background: #fff5f5; border: 2px solid #ffc9c9; }
        
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .ichika-bounce { animation: bounce 0.5s ease infinite; }
    </style>
</head>
<body>

<div class="outer-frame">
    <div class="top-section">
        <div class="chara-container">
            <img src="ichika_chara3.png" class="ichika-chara" id="ichikaImg">
        </div>
        <div class="input-top-right">
            <div class="stadium-select-wrapper">
                <div class="stadium-text-display" id="stadiumName">競艇場を選択</div>
                <select class="stadium-select" id="stadium" onchange="showStadiumMemo()">
                    <option value="">選択してください</option>
                    <option value="01 桐生">01 桐生</option><option value="02 戸田">02 戸田</option><option value="24 大村">24 大村</option>
                    </select>
            </div>
        </div>
    </div>

    <div class="stadium-memo-wrapper" id="stadiumMemo">
        <div class="memo-title" id="memoTitle">🌸 競艇場の特徴 🌸</div>
        <div class="memo-content" id="memoText">場を選択すると、一果のアドバイスが表示されますぅ。</div>
    </div>

    <div class="param-controls">
        <div class="control-row"><label class="control-label">① 1号艇 逃げ率</label><div class="slider-group"><input type="range" id="rank1" min="0" max="100" value="55" oninput="updateVal('rank1Val', this.value + '%')"><span class="val-disp" id="rank1Val">55%</span></div></div>
        <div class="control-row"><label class="control-label">② 1号艇 展示気配</label><div class="slider-group"><input type="range" id="tenji1" min="-2" max="2" value="0" oninput="updateTenjiDisplay(this.value)"><span class="val-disp" id="tenjiVal">普通</span></div></div>
        <div class="control-row"><label class="control-label">③ 2号艇 2連対率 (壁)</label><div class="slider-group"><input type="range" id="rank2" min="0" max="100" value="50" oninput="updateVal('rank2Val', this.value + '%')"><span class="val-disp" id="rank2Val">50%</span></div></div>
        <div class="control-row"><label class="control-label">④ その他条件</label><select id="condition" class="condition-select"><option value="0">普通</option><option value="-10">追い風強</option><option value="-12">向かい風強</option></select></div>

        <div class="details-toggle" onclick="toggleDetails()">詳細条件（一歩踏み込んだ分析）を開く ＋</div>
        <div class="details-content" id="detailsContent">
            <div class="control-row"><label class="control-label">⑤ 1号艇 被差し率</label><div class="slider-group"><input type="range" id="被差し率" min="0" max="30" value="10" oninput="updateVal('被差し率Val', this.value + '%')"><span class="val-disp" id="被差し率Val">10%</span></div></div>
            <div class="control-row"><label class="control-label">⑥ 1号艇 被捲り率</label><div class="slider-group"><input type="range" id="被捲り率" min="0" max="30" value="5" oninput="updateVal('被捲り率Val', this.value + '%')"><span class="val-disp" id="被捲り率Val">5%</span></div></div>
            <div class="control-row"><label class="control-label">⑦ 2号艇 逃がし率</label><div class="slider-group"><input type="range" id="逃がし率" min="0" max="100" value="50" oninput="updateVal('逃がし率Val', this.value + '%')"><span class="val-disp" id="逃がし率Val">50%</span></div></div>
            <div class="control-row"><label class="control-label">⑧ 2号艇 差し率</label><div class="slider-group"><input type="range" id="2差し率" min="0" max="40" value="15" oninput="updateVal('2差し率Val', this.value + '%')"><span class="val-disp" id="2差し率Val">15%</span></div></div>
            <div class="control-row"><label class="control-label">⑨ 2号艇 捲り率</label><div class="slider-group"><input type="range" id="2捲り率" min="0" max="20" value="5" oninput="updateVal('2捲り率Val', this.value + '%')"><span class="val-disp" id="2捲り率Val">5%</span></div></div>
        </div>

        <button class="calc-btn" onclick="calculate()">一果に判定を聞く🌸</button>
    </div>

    <div id="result">
        <div style="font-size: 0.8rem; color: #ff8fa3; font-weight: 800;">推定逃げ確率</div>
        <span class="score-display" id="score">0%</span>
        <div id="advice" style="font-size: 0.9rem; font-weight: 800; color: #444; margin-top: 10px;"></div>
    </div>
</div>

<script>
    const stadiumBaseData = {"01 桐生": 51, "02 戸田": 44, "24 大村": 66}; // 適宜追加してください
    
    function updateVal(id, val) { document.getElementById(id).innerText = val; }
    function updateTenjiDisplay(val) { const texts = {"-2":"最悪","-1":"劣勢","0":"普通","1":"良好","2":"超抜"}; document.getElementById('tenjiVal').innerText = texts[val]; }

    // アコーディオンの開閉
    function toggleDetails() {
        const content = document.getElementById('detailsContent');
        const toggle = document.querySelector('.details-toggle');
        if (content.style.display === "block") {
            content.style.display = "none";
            toggle.innerText = "詳細条件（一歩踏み込んだ分析）を開く ＋";
        } else {
            content.style.display = "block";
            toggle.innerText = "詳細条件を閉じる −";
        }
    }

    function showStadiumMemo() {
        const select = document.getElementById('stadium');
        const stadium = select.value;
        document.getElementById('stadiumName').innerText = stadium || "競艇場を選択";
    }

    function calculate() {
        const stadium = document.getElementById('stadium').value;
        if (!stadium) { alert("場を選んでくださいね♪"); return; }

        // 基本数値
        const nigeBase = parseInt(document.getElementById('rank1').value);
        const tenji = parseInt(document.getElementById('tenji1').value) * 7;
        const kabe = (parseInt(document.getElementById('rank2').value) - 50) * 0.3;
        const cond = parseInt(document.getElementById('condition').value);

        // 詳細数値による補正
        const 被差し = (10 - parseInt(document.getElementById('被差し率').value)) * 0.8;
        const 被捲り = (5 - parseInt(document.getElementById('被捲り率').value)) * 1.0;
        const 逃がし = (parseInt(document.getElementById('逃がし率').value) - 50) * 0.4;
        const 差し威嚇 = (15 - parseInt(document.getElementById('2差し率').value)) * 0.5;

        // 合計計算
        let score = nigeBase + tenji + kabe + cond + 被差し + 被捲り + 逃がし + 差し威嚇;
        score = Math.round(Math.min(98, Math.max(5, score)));

        document.getElementById('result').style.display = "block";
        document.getElementById('score').innerText = score + "%";
        
        const resDiv = document.getElementById('result');
        const img = document.getElementById('ichikaImg');
        img.classList.remove('ichika-bounce');

        if (score >= 75) {
            resDiv.className = "high";
            document.getElementById('advice').innerText = "🌸 イン逃げ濃厚！鬼絞りのチャンスですぅ！";
            img.classList.add('ichika-bounce');
        } else if (score >= 50) {
            resDiv.className = "mid";
            document.getElementById('advice').innerText = "⚖️ 逃げそうですが、ヒモ荒れに注意ですっ。";
        } else {
            resDiv.className = "low";
            document.getElementById('advice').innerText = "⚠️ イン信頼度低め。波乱の予感がしますぅ…。";
        }
    }
</script>

</body>
</html>
