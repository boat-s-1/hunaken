<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>一果の1号艇・鬼絞り判定所 🌸</title>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        /* --- 開催場選択（黒いデザイン） --- */
.stadium-select {
    width: 100%;
    padding: 12px 20px;
    border-radius: 12px;
    /* 背景を黒のグラデーションに */
    background: linear-gradient(180deg, #333 0%, #000 100%);
    /* 文字を白（または金）に */
    color: #f1c40f; 
    font-size: 1.2rem;
    font-weight: 800;
    /* 金色の枠線 */
    border: 2px solid #b8860b;
    box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
    
    appearance: none;
    cursor: pointer;
    position: relative;
    
    /* 右側の矢印を金色の🌸にするイメージ */
    background-image: url('data:image/svg+xml;charset=utf-8,<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="%23f1c40f"><path d="M7 10l5 5 5-5z"/></svg>');
    background-repeat: no-repeat;
    background-position: right 15px center;
}

/* 選択肢（option）の中身はOS標準になるので、シンプルに */
.stadium-select option {
    background: #222;
    color: #fff;
}

/* マウスを乗せた時の光沢感 */
.stadium-select:hover {
    border-color: #ffd700;
    box-shadow: 0 0 15px rgba(255, 215, 0, 0.2);
}
        /* --- 全体・背景の設定 --- */
        body {
            font-family: 'M PLUS Rounded 1c', sans-serif;
            background-color: #fff9fa; /* 薄いピンクの背景 */
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center; /* 画面中央に配置 */
            min-height: 100vh;
        }

        /* 桜とグリッドの背景レイヤー（オプション） */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            /* 薄いグリッド模様 */
            background-image: 
                linear-gradient(90deg, rgba(255, 182, 193, 0.1) 1px, transparent 1px),
                linear-gradient(rgba(255, 182, 193, 0.1) 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: -1;
        }

        /* --- メインカード（上部パネル）の設定 --- */
        .main-card {
            background-color: white;
            border-radius: 30px; /* 角を丸く */
            box-shadow: 0 10px 30px rgba(255, 182, 193, 0.2); /* 柔らかい影 */
            width: 100%;
            max-width: 600px;
            padding: 30px;
            position: relative;
            border: 2px solid #fff0f3; /* 薄いピンクの枠線 */
        }

        /* 一果ちゃんのキャラクター配置 */
        .ichika-chara {
            position: absolute;
            top: -50px; /* カードの上に少しはみ出させる */
            right: 20px;
            width: 120px;
            height: auto;
            z-index: 10;
        }

        /* タイトルエリア */
        .card-header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 1.6rem;
            color: #ff6b81; /* 桜色 */
            font-weight: 800;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .flower-icon {
            font-size: 1.8rem;
        }

        /* パスワード・開催場選択エリア */
        .input-section {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 30px;
        }

        .admin-pass-row {
            text-align: right;
        }

        .admin-pass-input {
            font-size: 0.8rem;
            padding: 8px 12px;
            border-radius: 20px;
            border: 1px solid #ddd;
            width: 100px;
            background: #fff;
        }

        .label-row {
            font-size: 1rem;
            color: #ff8fa3;
            font-weight: 700;
            border-left: 5px solid #ff6b81;
            padding-left: 10px;
            margin-bottom: 5px;
        }

        /* 開催場セレクトボックス */
        .stadium-select {
            width: 100%;
            padding: 15px;
            border-radius: 15px;
            border: 2px solid #fff0f3;
            background: #fff url('data:image/svg+xml;charset=utf-8,<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="%23ff6b81" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>') no-repeat right 15px center;
            background-size: 20px;
            color: #4a4a4a;
            font-size: 1.1rem;
            font-weight: 700;
            appearance: none; /* デフォルトの矢印を消す */
            cursor: pointer;
        }

        /* --- 競艇場の特徴エリア（点線枠） --- */
        .stadium-memo {
            background-color: #fffafb;
            border: 2px dashed #ffcad4; /* ピンクの点線 */
            border-radius: 20px;
            padding: 20px;
            font-size: 0.9rem;
            color: #666;
            line-height: 1.6;
            position: relative;
        }

        .memo-title {
            color: #ff6b81;
            font-weight: 800;
            font-size: 1.1rem;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .memo-link {
            color: #ff6b81;
            text-decoration: underline;
            font-weight: 700;
            cursor: pointer;
            display: block;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="main-card">
    <img src="ichika_chara.png" class="ichika-chara" alt="一果ちゃん">

    <div class="card-header">
        <h1>
            <span class="flower-icon">🌸</span>
            一果の1号艇・鬼絞り判定所
            <span class="flower-icon">🌸</span>
        </h1>
    </div>

    <div class="input-section">
        <div class="admin-pass-row">
            <input type="password" class="admin-pass-input" placeholder="🔑 合言葉？">
        </div>

       <div style="position: relative;">
    <select class="stadium-select">
        <option value="01 桐生">01 桐生</option>
        <option value="02 戸田">02 戸田</option>
    </select>
    <span style="position: absolute; top: -8px; right: 10px; font-size: 1.2rem; filter: drop-shadow(0 0 5px gold);">🌸</span>
</div>
    </div>

    <div class="stadium-memo">
        <div class="memo-title">
            <span class="flower-icon">🌸</span>
            01 桐生 の特徴
            <span class="flower-icon">🌸</span>
        </div>
        平均イン逃げ率：<strong>51%</strong><br>
        標高が高くて、イン逃げ率は標準的ですぅ。夜はモーターの力が強くなるんですよぉ。<br>
        <span class="memo-link">もっと詳しいデータを見る？ 🌸</span>
    </div>
</div>

</body>
</html>
