<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>一果の1号艇・鬼絞り判定所 🌸</title>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@700;800&display=swap" rel="stylesheet">
    <style>
        /* --- 背景設定 --- */
        body {
            font-family: 'M PLUS Rounded 1c', sans-serif;
            margin: 0; padding: 10px;
            display: flex; justify-content: center;
            background-image: url('Gemini_Generated_Image_vezwz5vezwz5vezw.png'); /* 背景画像 */
            background-repeat: repeat; background-size: 200px;
        }

        /* --- メインカード --- */
        .main-card {
            background-color: rgba(255, 255, 255, 0.98);
            border-radius: 25px;
            box-shadow: 0 10px 25px rgba(255, 182, 193, 0.3);
            width: 100%; max-width: 480px;
            padding: 20px;
            position: relative;
            border: 2px solid #fff0f3;
            margin-top: 30px;
            min-height: 400px;
        }

        /* --- 一果ちゃんの配置（左側） --- */
        .ichika-chara {
            position: absolute;
            top: 20px;
            left: -10px; /* 左端に少しはみ出す */
            width: 150px; /* 画像に合わせたサイズ */
            height: auto;
            z-index: 5;
        }

        /* --- 右側のコンテンツエリア（一果ちゃんを避ける） --- */
        .content-right {
            margin-left: 130px; /* キャラクターの幅分を空ける */
            position: relative;
            z-index: 10;
        }

        /* タイトル */
        h1 {
            font-size: 1.1rem;
            color: #ff6b81;
            line-height: 1.3;
            margin: 0 0 15px 0;
            text-align: center;
        }

        /* 合言葉（カギ） */
        .admin-pass-wrapper {
            position: relative;
            width: 100px;
            height: 35px;
            margin: 0 auto 15px auto;
        }
        .gold-keyhole-bg {
            position: absolute; inset: 0;
            background-image: url('9b2dffbd-c31d-424a-a268-cbabead83f6a.png'); /* 鍵画像 */
            background-size: contain; background-repeat: no-repeat; background-position: center;
        }
        .admin-pass-input {
            position: absolute; inset: 0; opacity: 0; z-index: 15; cursor: pointer;
        }
        .admin-pass-label {
            position: absolute; left: 105%; top: 50%; transform: translateY(-50%);
            white-space: nowrap; font-size: 0.7rem; color: #ff8fa3; font-weight: 800;
        }

        /* 開催場バー */
        .stadium-select-wrapper {
            position: relative;
            width: 100%;
            height: 45px;
            background-image: url('830ab2a1-e175-4f48-ab50-7539524e4fd9.png'); /* バー画像 */
            background-size: 100% 100%;
            margin-bottom: 20px;
        }
        .stadium-select {
            position: absolute; inset: 0; width: 100%; height: 100%;
            opacity: 0; z-index: 20; cursor: pointer;
        }
        .stadium-text-display {
            position: absolute; top: 50%; left: 35px; transform: translateY(-50%);
            color: #f1c40f; font-size: 1rem; font-weight: 800;
            text-shadow: 1px 1px 2px #000;
        }

        /* --- 特徴メモ（下部に広がる） --- */
        .stadium-memo-wrapper {
            position: relative;
            margin-top: 10px;
            padding: 30px 20px 20px 20px;
            clear: both;
        }
        .stadium-memo-wrapper::before {
            content: ""; position: absolute; inset: 0;
            background-image: url('fd1c6064-ec6c-4917-9247-d1e04d2fad3d.png'); /* 枠画像 */
            background-size: 100% 100%; z-index: -1;
        }
        .memo-title {
            color: #ff6b81; font-weight: 800; text-align: center;
            margin-bottom: 8px; font-size: 0.9rem;
        }
        .memo-content {
            font-size: 0.8rem; color: #555; line-height: 1.5;
        }
        .memo-link {
            color: #ff6b81; text-align: center; display: block;
            margin-top: 8px; font-weight: 800; font-size: 0.8rem;
        }
    </style>
</head>
<body>

<div class="main-card">
    <img src="e6fc69e5-6398-4ef7-a6fc-4f0e262879d3.png" class="ichika-chara">

    <div class="content-right">
        <h1>🌸 一果の1号艇・<br>鬼絞り判定所</h1>

        <div class="admin-pass-wrapper">
            <div class="gold-keyhole-bg"></div>
            <div class="admin-pass-label">合言葉？</div>
            <input type="password" class="admin-pass-input">
        </div>

        <div class="stadium-select-wrapper">
            <div class="stadium-text-display" id="stadiumName">01 桐生</div>
            <select class="stadium-select" onchange="document.getElementById('stadiumName').innerText=this.value">
                <option value="01 桐生">01 桐生</option>
                <option value="02 戸田">02 戸田</option>
            </select>
        </div>
    </div>

    <div class="stadium-memo-wrapper">
        <div class="memo-title">🌸 01 桐生 の特徴 🌸</div>
        <div class="memo-content">
            平均イン逃げ率：51%<br>
            標高が高くて、イン逃げ率は標準的ですぅ。夜はモーターの力が強くなるんですよぉ。
        </div>
        <a href="data.html" class="memo-link">もっと詳しいデータを見る？ 🌸</a>
    </div>
</div>

</body>
</html>
