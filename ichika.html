<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>一果の1号艇・鬼絞り判定所 🌸</title>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@700;800&display=swap" rel="stylesheet">
    <style>
        /* --- 背景設定 --- */
        body {
            font-family: 'M PLUS Rounded 1c', sans-serif;
            margin: 0; padding: 5px;
            display: flex; justify-content: center; align-items: flex-start;
            background-image: url('bg_pattern.png');
            background-repeat: repeat; background-size: 180px;
            min-height: 100vh;
        }

        /* --- 外枠（image_23.png）の調整 --- */
        .outer-frame {
            position: relative;
            width: 100%;
            max-width: 500px; /* 少し大きくしてゆとりを出す */
            margin-top: 15px;
            /* 枠の装飾を絶対に避けるためのパディング */
            padding: 65px 45px 55px 45px; 
            box-sizing: border-box;
            background-image: url('598ebf7b-2370-472e-acba-c1507159c995.png');
            background-size: 100% 100%;
            background-repeat: no-repeat;
        }

        /* --- レイアウト構造 --- */
        .main-card {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            flex-wrap: wrap;
        }

        /* --- 左側：一果ちゃん（少し大きく、位置を微調整） --- */
        .chara-container {
            flex: 0 0 42%;
            position: relative;
        }
        .ichika-chara {
            width: 155px; /* サイズアップ */
            height: auto;
            filter: drop-shadow(4px 4px 8px rgba(0,0,0,0.1));
            /* 枠の左角を避けるために少し内側へ */
            margin-left: 2px;
            margin-top: -5px;
        }

        /* --- 右側：コンテンツブロック --- */
        .content-block {
            flex: 0 0 55%;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 10px;
        }

        h1 {
            font-size: 1.05rem; /* スマホで見やすい最適サイズ */
            color: #ff6b81;
            text-align: center;
            margin: 0 0 12px 0;
            line-height: 1.4;
            letter-spacing: -0.5px;
        }

        /* 合言葉（カギ） */
        .admin-pass-wrapper {
            position: relative;
            width: 85px; height: 38px;
            margin-bottom: 12px;
        }
        .gold-keyhole-bg {
            position: absolute; inset: 0;
            background-image: url('gold_keyhole.png');
            background-size: contain; background-repeat: no-repeat;
        }
        .admin-pass-input {
            position: absolute; inset: 0; opacity: 0; z-index: 10; cursor: pointer;
        }
        .admin-pass-label {
            position: absolute; left: 105%; top: 50%; transform: translateY(-50%);
            white-space: nowrap; font-size: 0.65rem; color: #ff8fa3; font-weight: 800;
        }

        /* 開催場セレクトバー */
        .label-row {
            font-size: 0.8rem; color: #ff8fa3; font-weight: 800;
            margin: 5px 0 5px 0;
        }

        .stadium-select-wrapper {
            position: relative;
            width: 100%;
            height: 48px; /* 高さを微増してリッチに */
            background-image: url('stadium_bar.png');
            background-size: 100% 100%;
        }
        .stadium-text-display {
            position: absolute; top: 52%; left: 35px; transform: translateY(-50%);
            color: #f1c40f; font-size: 0.95rem; font-weight: 800;
            text-shadow: 1px 1px 2px #000;
        }
        .stadium-select {
            position: absolute; inset: 0; width: 100%; height: 100%;
            opacity: 0; z-index: 20; cursor: pointer;
        }

        /* --- 下部：特徴メモ（ image_15.png ） --- */
        .stadium-memo-wrapper {
            position: relative;
            width: 100%;
            margin-top: 25px;
            padding: 35px 25px;
            box-sizing: border-box;
            z-index: 1;
        }
        .stadium-memo-wrapper::before {
            content: ""; position: absolute; inset: 0;
            background-image: url('memo_frame.png');
            background-size: 100% 100%; z-index: -1;
        }
        .memo-content {
            font-size: 0.78rem; color: #444; line-height: 1.6;
        }
        .memo-title {
            color: #ff6b81; font-weight: 800; text-align: center;
            margin-bottom: 6px; font-size: 0.9rem;
        }
        .memo-link {
            color: #ff6b81; text-align: center; display: block;
            margin-top: 10px; font-weight: 800; text-decoration: underline; font-size: 0.75rem;
        }
    </style>
</head>
<body>

<div class="outer-frame">
    <div class="main-card">
        <div class="chara-container">
            <img src="ichika_chara3.png" class="ichika-chara">
        </div>

        <div class="content-block">
            <h1>🌸 一果の1号艇・<br>鬼絞り判定所</h1>
            
            <div class="admin-pass-wrapper">
                <div class="gold-keyhole-bg"></div>
                <div class="admin-pass-label">合言葉？</div>
                <input type="password" class="admin-pass-input">
            </div>

            <div class="label-row">① 開催場を選択</div>
            <div class="stadium-select-wrapper">
                <div class="stadium-text-display" id="stadiumName">01 桐生</div>
                <select class="stadium-select" onchange="document.getElementById('stadiumName').innerText=this.value">
                    <option value="01 桐生">01 桐生</option>
                    <option value="02 戸田">02 戸田</option>
                </select>
            </div>
        </div>

        <div class="stadium-memo-wrapper">
            <div class="memo-title">🌸 01 桐生 の特徴 🌸</div>
            <div class="memo-content">
                平均イン逃げ率：51%<br>
                標高が高くて、イン逃げ率は標準的ですぅ。夜はモーターの力が強くなるんですよぉ。
            </div>
            <a href="data.html" class="memo-link">もっと詳しいデータを見る？ 🌸</a>
        </div>
    </div>
</div>

</body>
</html>
