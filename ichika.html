<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>一果の1号艇・鬼絞り判定所 🌸</title>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@700;800&display=swap" rel="stylesheet">
    <style>
        /* --- 全体・背景の設定 --- */
        body {
            font-family: 'M PLUS Rounded 1c', sans-serif;
            margin: 0; padding: 20px;
            display: flex; justify-content: center; min-height: 100vh;
            background-image: url('bg_pattern.png'); /* 背景画像 */
            background-repeat: repeat; background-size: auto;
        }

        /* --- メインカード（上部パネル）の設定 --- */
        .main-card {
            background-color: white;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(255, 182, 193, 0.2);
            width: 100%; max-width: 600px;
            padding: 30px;
            position: relative; /* 子要素の配置基準 */
            border: 2px solid #fff0f3;
            margin-bottom: 30px;
            overflow: hidden; /* キャラクターのはみ出し防止 */
        }

        /* キャラクター配置 */
        .ichika-chara {
            position: absolute;
            top: 10px; right: 10px;
            width: 120px; height: auto;
            z-index: 1; /* タイトルより下に */
        }

        /* タイトルエリア */
        .card-header {
            text-align: center; margin-bottom: 20px;
            margin-right: 130px; /* キャラクターを避ける */
            position: relative; z-index: 2; /* キャラクターより上に */
        }
        h1 {
            font-size: 1.4rem; color: #ff6b81; font-weight: 800;
            margin: 0; display: flex; align-items: center; justify-content: center; gap: 8px;
        }

        /* --- 【今回のメイン】合言葉（鍵画像）エリア --- */
        .admin-pass-wrapper {
            position: relative;
            margin-bottom: 25px;
            height: 50px; /* 鍵画像の高さに合わせて調整 */
            display: flex; justify-content: flex-end; /* 右側に配置 */
            margin-right: 130px; /* キャラクターを避ける */
            z-index: 2;
        }

        /* ★ゴールドの鍵画像を背景に指定 */
        .gold-keyhole-bg {
            position: absolute;
            top: 0; right: 0;
            width: 150px; /* 鍵画像（image_16.png）の幅に合わせて調整 */
            height: 100%;
            background-image: url('gold_keyhole.png'); /* いただいた鍵画像 */
            background-size: 100% 100%;
            background-repeat: no-repeat;
            z-index: 1;
        }

        /* 画像の上に表示される文字「🔑 合言葉？」 */
        .admin-pass-label {
            position: absolute;
            top: 50%; right: 40px; /* 鍵の穴を避けて配置 */
            transform: translateY(-50%);
            font-size: 0.8rem; color: #ff8fa3; font-weight: 800;
            text-shadow: 1px 1px 2px rgba(255, 255, 255, 0.8);
            z-index: 2;
        }

        /* 透明なパスワード入力欄（画像の上に重ねる） */
        .admin-pass-input {
            position: absolute;
            top: 0; right: 0;
            width: 150px; /* 鍵画像の幅と同じに */
            height: 100%;
            opacity: 0; /* 透明にする */
            cursor: text;
            z-index: 3; /* 文字より上に配置して入力を有効に */
        }

        /* 開催場選択ラベル */
        .label-row {
            font-size: 1rem; color: #ff8fa3; font-weight: 700;
            border-left: 5px solid #ff6b81; padding-left: 10px;
            margin-bottom: 5px; position: relative; z-index: 2;
        }

        /* 開催場選択（いただいた画像の上に文字を重ねる） */
        .stadium-select-wrapper {
            position: relative; margin-bottom: 25px; height: 60px;
            background-image: url('stadium_bar.png'); /* いただいたバー画像 */
            background-size: 100% 100%; background-repeat: no-repeat;
            z-index: 2;
        }
        .stadium-select {
            position: absolute; inset: 0; width: 100%; height: 100%;
            opacity: 0; cursor: pointer; z-index: 2;
        }
        .stadium-text-display {
            position: absolute; top: 50%; left: 55px; transform: translateY(-50%);
            color: #f1c40f; font-size: 1.3rem; font-weight: 800;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8); pointer-events: none; z-index: 1;
        }

        /* 競艇場の特徴エリア（いただいた枠画像を使う） */
        .stadium-memo-wrapper {
            position: relative; margin-top: 20px;
            padding: 25px 35px; color: #666; line-height: 1.6; z-index: 2;
        }
        .stadium-memo-wrapper::before {
            content: ""; position: absolute; inset: 0;
            background-image: url('memo_frame.png'); /* いただいた枠画像 */
            background-size: 100% 100%; background-repeat: no-repeat; z-index: -1;
        }
        .memo-title {
            color: #ff6b81; font-weight: 800; font-size: 1.1rem;
            margin-bottom: 10px; display: flex; align-items: center; justify-content: center; gap: 5px;
        }
        .memo-link {
            color: #ff6b81; text-decoration: underline; font-weight: 700;
            cursor: pointer; display: block; margin-top: 10px; text-align: center;
        }
        .flower-icon { font-size: 1.2rem; }
    </style>
</head>
<body>

<div class="main-card">
    <img src="ichika_chara.png" class="ichika-chara" alt="一果ちゃん">

    <div class="card-header">
        <h1>
            <span class="flower-icon">🌸</span>
            一果の1号艇・鬼絞り判定所
        </h1>
    </div>

    <div class="admin-pass-wrapper">
        <div class="gold-keyhole-bg"></div>
        <div class="admin-pass-label">🔑 合言葉？</div>
        <input type="password" class="admin-pass-input" placeholder="🔑">
    </div>

    <div class="label-row">① 開催場を選択</div>
    <div class="stadium-select-wrapper">
        <select class="stadium-select" id="stadiumSelect" onchange="updateStadiumName(this)">
            <option value="01 桐生">01 桐生</option>
            <option value="02 戸田">02 戸田</option>
            <option value="03 江戸川">03 江戸川</option>
        </select>
        <div class="stadium-text-display" id="stadiumNameDisplay">01 桐生</div>
    </div>

    <div class="stadium-memo-wrapper">
        <div class="memo-title">
            <span class="flower-icon">🌸</span>
            01 桐生 の特徴
            <span class="flower-icon">🌸</span>
        </div>
        平均イン逃げ率：<strong>51%</strong><br>
        標高が高くて、イン逃げ率は標準的ですぅ。夜はモーターの力が強くなるんですよぉ。<br>
        <span class="memo-link">もっと詳しいデータを見る？ 🌸</span>
    </div>
</div>

<script>
    // セレクトボックスで選んだ場名を金色文字に反映させる関数
    function updateStadiumName(select) {
        const stadiumNameDisplay = document.getElementById('stadiumNameDisplay');
        stadiumNameDisplay.innerText = select.value;
    }
</script>

</body>
</html>
