<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>一果の1号艇・鬼絞り判定所 🌸</title>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@700;800&display=swap" rel="stylesheet">
    <style>
        /* --- 背景設定 --- */
        body {
            font-family: 'M PLUS Rounded 1c', sans-serif;
            margin: 0; padding: 10px;
            display: flex; justify-content: center; align-items: flex-start;
            background-image: url('bg_pattern.png'); /* 背景画像 */
            background-repeat: repeat; background-size: 200px;
            min-height: 100vh;
        }

        /* --- 一番外側のゴールド枠（image_23.png） --- */
        .outer-frame {
            position: relative;
            width: 100%;
            max-width: 550px;
            margin-top: 20px;
            padding: 40px; /* 枠の装飾に被らないための余白 */
            box-sizing: border-box;
        }
        .outer-frame::before {
            content: "";
            position: absolute;
            inset: 0;
            background-image: url('598ebf7b-2370-472e-acba-c1507159c995.png'); /* 周りの枠画像 */
            background-size: 100% 100%;
            background-repeat: no-repeat;
            z-index: 1;
        }

        /* --- メインカードの内容 --- */
        .main-card {
            position: relative;
            z-index: 2; /* 枠より上に配置 */
            display: flex;
            flex-wrap: wrap; /* スマホで縦並びを許可 */
            justify-content: space-between;
        }

        /* --- 左側：一果ちゃん --- */
        .chara-container {
            flex: 0 0 40%;
            position: relative;
        }
        .ichika-chara {
            width: 100%;
            max-width: 180px;
            height: auto;
            filter: drop-shadow(5px 5px 10px rgba(0,0,0,0.1));
        }

        /* --- 右側：タイトル・カギ・場選択 --- */
        .content-right {
            flex: 0 0 55%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        h1 {
            font-size: 1rem;
            color: #ff6b81;
            text-align: center;
            margin: 0 0 10px 0;
            line-height: 1.4;
        }

        /* 合言葉（カギ） */
        .admin-pass-wrapper {
            position: relative;
            width: 80px; height: 35px;
            margin-bottom: 10px;
        }
        .gold-keyhole-bg {
            position: absolute; inset: 0;
            background-image: url('gold_keyhole.png'); /* 鍵画像 */
            background-size: contain; background-repeat: no-repeat;
        }
        .admin-pass-input {
            position: absolute; inset: 0; opacity: 0; z-index: 10; cursor: pointer;
        }

        /* 開催場バー */
        .stadium-select-wrapper {
            position: relative;
            width: 100%;
            height: 40px;
            background-image: url('stadium_bar.png'); /* バー画像 */
            background-size: 100% 100%;
        }
        .stadium-text-display {
            position: absolute; top: 50%; left: 30px; transform: translateY(-50%);
            color: #f1c40f; font-size: 0.9rem; font-weight: 800;
            text-shadow: 1px 1px 2px #000;
        }
        .stadium-select {
            position: absolute; inset: 0; width: 100%; height: 100%;
            opacity: 0; z-index: 20; cursor: pointer;
        }

        /* --- 下部：特徴メモ --- */
        .stadium-memo-wrapper {
            position: relative;
            width: 100%;
            margin-top: 20px;
            padding: 30px 20px;
            box-sizing: border-box;
        }
        .stadium-memo-wrapper::before {
            content: ""; position: absolute; inset: 0;
            background-image: url('memo_frame.png'); /* 枠画像 */
            background-size: 100% 100%; z-index: -1;
        }
        .memo-content {
            font-size: 0.8rem; color: #555; line-height: 1.5;
        }
        .memo-link {
            color: #ff6b81; text-align: center; display: block;
            margin-top: 10px; font-weight: 800; text-decoration: underline; font-size: 0.8rem;
        }

        /* スマホ向け調整 */
        @media (max-width: 400px) {
            .outer-frame { padding: 30px 20px; }
            .content-right { flex: 0 0 100%; margin-top: 10px; }
            .chara-container { flex: 0 0 100%; text-align: center; }
            .ichika-chara { max-width: 120px; }
        }
    </style>
</head>
<body>

<div class="outer-frame">
    <div class="main-card">
        <div class="chara-container">
            <img src="e6fc69e5-6398-4ef7-a6fc-4f0e262879d3.png" class="ichika-chara">
        </div>

        <div class="content-right">
            <h1>🌸 一果の1号艇・<br>鬼絞り判定所</h1>
            
            <div class="admin-pass-wrapper">
                <div class="gold-keyhole-bg"></div>
                <input type="password" class="admin-pass-input">
            </div>

            <div class="stadium-select-wrapper">
                <div class="stadium-text-display" id="stadiumName">01 桐生</div>
                <select class="stadium-select" onchange="document.getElementById('stadiumName').innerText=this.value">
                    <option value="01 桐生">01 桐生</option>
                    <option value="02 戸田">02 戸田</option>
                </select>
            </div>
        </div>

        <div class="stadium-memo-wrapper">
            <div class="memo-content">
                <strong>🌸 01 桐生 の特徴 🌸</strong><br>
                平均イン逃げ率：51%<br>
                標高が高くて、イン逃げ率は標準的ですぅ。夜はモーターの力が強くなるんですよぉ。
            </div>
            <a href="data.html" class="memo-link">もっと詳しいデータを見る？ 🌸</a>
        </div>
    </div>
</div>

</body>
</html>
