<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>一果の1号艇・鬼絞り判定所 🌸</title>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'M PLUS Rounded 1c', sans-serif;
            margin: 0; padding: 20px 10px;
            display: flex; justify-content: center;
            background-color: #fffafb;
        }

        .outer-frame {
            position: relative;
            width: 100%;
            max-width: 440px;
            padding: 25px 15px 15px 15px;
            box-sizing: border-box;
            background-color: white;
            border: 3px solid #d4b185;
            border-radius: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        /* --- 上部エリア（キャラ・合言葉・場選択） --- */
        .top-section {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: -15px; /* 下の枠との隙間を排除 */
            position: relative;
            z-index: 10;
        }

        /* いちかちゃん：大きくして左端に配置 */
        .chara-container {
            flex: 0 0 135px; /* 横幅をアップ */
            margin-left: -5px; /* 外枠との微調整 */
        }
        .ichika-chara {
            width: 100%; height: auto; display: block;
        }

        .input-top-right {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 12px;
            padding-bottom: 15px;
        }

        /* 合言葉 */
        .admin-pass-wrapper {
            position: relative; display: flex; align-items: center; height: 35px;
        }
        .gold-keyhole-icon {
            width: 40px; position: absolute; left: -15px; z-index: 2;
        }
        .admin-pass-input {
            border: 1px solid #ddd; border-radius: 20px;
            padding: 4px 10px 4px 30px; width: 80px; font-size: 0.7rem; font-family: inherit;
        }

        /* 場選択バー */
        .stadium-select-wrapper {
            position: relative; width: 100%; max-width: 220px; height: 44px;
            background-image: url('stadium_bar.png'); background-size: 100% 100%;
            display: flex; align-items: center; justify-content: center;
        }
        .stadium-text-display {
            color: #d4b185; font-size: 1rem; font-weight: 800; text-shadow: 1px 1px 1px black;
        }
        .stadium-select {
            position: absolute; inset: 0; opacity: 0; cursor: pointer; z-index: 5;
        }

        /* --- 特徴メモ枠（キャラのすぐ下に配置） --- */
        .stadium-memo-wrapper {
            position: relative;
            width: 100%;
            min-height: 120px;
            padding: 25px 20px;
            box-sizing: border-box;
            z-index: 1;
        }
        .stadium-memo-wrapper::before {
            content: ""; position: absolute; inset: 0;
            background-image: url('memo_frame.png');
            background-size: 100% 100%; z-index: -1;
        }
        .memo-title {
            color: #8c6a4a; font-weight: 800; font-size: 0.95rem; margin-bottom: 8px; text-align: center;
        }
        .memo-content {
            font-size: 0.8rem; color: #444; line-height: 1.6; text-align: left;
        }
        .memo-link {
            color: #ff6b81; font-size: 0.75rem; font-weight: 800; text-decoration: underline; display: block; text-align: center; margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="outer-frame">
    <div class="top-section">
        <div class="chara-container">
            <img src="ichika_chara3.png" class="ichika-chara">
        </div>

        <div class="input-top-right">
            <div class="admin-pass-wrapper">
                <img src="gold_keyhole.png" class="gold-keyhole-icon">
                <input type="password" class="admin-pass-input" placeholder="合言葉？">
            </div>

            <div class="stadium-select-wrapper">
                <div class="stadium-text-display">04 平和島</div>
                <select class="stadium-select">
                    <option value="04 平和島">04 平和島</option>
                    <option value="01 桐生">01 桐生</option>
                    </select>
            </div>
        </div>
    </div>

    <div class="stadium-memo-wrapper">
        <div class="memo-title">🌸 04 平和島 の特徴 🌸</div>
        <div class="memo-content">
            平均イン逃げ率：<strong>45%</strong><br>
            バランスの良い場ですねぇ。一果と一緒にじっくり見極めましょう〜。
        </div>
        <a href="data.html" class="memo-link">もっと詳しいデータを見る？ 🌸</a>
    </div>
</div>

</body>
</html>
