<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>一果の1号艇・鬼絞り判定所 🌸</title>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'M PLUS Rounded 1c', sans-serif;
            margin: 0; padding: 10px;
            display: flex; flex-direction: column; align-items: center;
            background-color: #fffafb;
            background-image: 
                linear-gradient(90deg, rgba(255, 182, 193, 0.05) 1px, transparent 1px),
                linear-gradient(rgba(255, 182, 193, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
        }

        /* --- ヘッダーバナー --- */
        .header-banner {
            width: 100%; max-width: 440px; margin: 10px auto; border-radius: 20px; overflow: hidden;
            box-shadow: 0 4px 15px rgba(255, 107, 129, 0.2);
        }
        .header-banner img { width: 100%; height: auto; display: block; }

        .outer-frame {
            position: relative; width: 100%; max-width: 440px; padding: 25px 15px 15px 15px; box-sizing: border-box;
            background-color: white; border: 3px solid #d4b185; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px;
        }

        /* 上部エリア */
        .top-section { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: -15px; position: relative; z-index: 10; }
        .chara-container { flex: 0 0 145px; margin-left: -5px; }
        .ichika-chara { width: 110%; height: auto; display: block; transition: 0.3s; }
        .input-top-right { flex: 1; display: flex; flex-direction: column; align-items: flex-end; gap: 12px; padding-bottom: 15px; }
        .stadium-select-wrapper { position: relative; width: 100%; max-width: 220px; height: 44px; background-image: url('stadium_bar.png'); background-size: 100% 100%; display: flex; align-items: center; justify-content: center; }
        .stadium-text-display { color: #d4b185; font-size: 1rem; font-weight: 800; text-shadow: 1px 1px 2px black; }
        .stadium-select { position: absolute; inset: 0; opacity: 0; cursor: pointer; z-index: 15; }

        /* 特徴メモ枠 */
        .stadium-memo-wrapper { position: relative; width: 100%; min-height: 120px; padding: 25px 20px; box-sizing: border-box; z-index: 1; }
        .stadium-memo-wrapper::before { content: ""; position: absolute; inset: 0; background-image: url('memo_frame.png'); background-size: 100% 100%; z-index: -1; }
        .memo-content { font-size: 0.8rem; color: #444; line-height: 1.6; text-align: center; }

        /* スライダー入力 (大幅カスタマイズ) */
        .param-controls { margin-top: 15px; border-top: 1px dashed #d4b185; padding-top: 15px; }
        .control-row { margin-bottom: 15px; }
        .control-label { display: block; font-weight: 800; font-size: 0.85rem; color: #ff8fa3; margin-bottom: 5px; border-left: 5px solid #ff6b81; padding-left: 10px; }
        
        /* カスタムスライダーのコンテナ */
        .slider-group { position: relative; display: flex; align-items: center; width: 100%; height: 32px; }

        /* デフォルトのスライダー(透明にして機能だけ残す) */
        .slider-group input[type="range"] {
            position: absolute; width: 100%; height: 100%; opacity: 0; cursor: pointer; z-index: 10; margin: 0;
        }

        /* カスタムの「溝(トラック)」 */
        .custom-track {
            position: absolute; left: 0; top: 50%; transform: translateY(-50%);
            width: 100%; height: 12px;
            background: #d1d1d1; /* 画像のようなグレー */
            border-radius: 6px;
            border: 2px solid #8c6a4a; /* 茶色のフチ */
            box-sizing: border-box;
            z-index: 1;
            overflow: hidden; /* ゲージを丸角の中に収める */
        }

        /* カスタムの「ゲージ(進捗)」 */
        .custom-gauge {
            position: absolute; left: 0; top: 0; height: 100%;
            background: linear-gradient(to right, #ff9a9e, #ff6b81); /* ピンクのグラデーション */
            width: 0%; /* JSで制御 */
            z-index: 2;
        }

        /* カスタムの「ツマミ(サム)」としてのいちかちゃん */
        .custom-thumb-ichika {
            position: absolute;
            top: 50%;
            transform: translate(-50%, -50%); /* 中央合わせ */
            width: 32px; height: 32px; /* ツマミのサイズ */
            background-image: url('thumb_ichika.png'); /* いちかちゃんのアイコン画像 */
            background-size: cover;
            border-radius: 50%;
            border: 2px solid white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            z-index: 3;
            left: 0%; /* JSで制御 */
            pointer-events: none; /* デフォルトのスライダーへの操作を邪魔しない */
        }

        .val-disp { font-size: 1.1rem; font-weight: 800; color: #ff6b81; min-width: 65px; text-align: right; margin-left: auto;}
        
        .calc-btn { width: 100%; padding: 18px; margin-top: 15px; background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%); color: white; border: none; border-radius: 15px; font-weight: 800; font-size: 1.2rem; cursor: pointer; box-shadow: 0 5px 15px rgba(255, 107, 129, 0.3); font-family: inherit; }
        #result { display: none; margin-top: 20px; padding: 20px; border-radius: 20px; text-align: center; }
        .balloon { position: relative; background: #fff; border: 2px solid #d4b185; padding: 12px; border-radius: 15px; font-size: 0.85rem; text-align: left; margin-bottom: 15px; }
        .score-display { font-size: 3.5rem; font-weight: 800; color: #ff6b81; display: block; line-height: 1; margin: 10px 0; }
    </style>
</head>
<body>

<header class="header-banner"><img src="Gemini_Generated_Image_se1losse1losse1l.png" alt="一果の鬼絞り判定所"></header>

<div class="outer-frame">
    <div class="top-section">
        <div class="chara-container"><img src="ichika_chara3.png" class="ichika-chara" id="ichikaImg"></div>
        <div class="input-top-right">
            <div class="stadium-select-wrapper">
                <div class="stadium-text-display" id="stadiumName">競艇場を選択</div>
                <select class="stadium-select" id="stadium" onchange="showStadiumMemo()"><option value="">選択してください</option><option value="01 桐生">01 桐生</option><option value="12 住之江">12 住之江</option></select>
            </div>
        </div>
    </div>

    <div class="stadium-memo-wrapper" id="stadiumMemo"><div class="memo-content" id="memoText">場を選択すると、一果が豆知識を教えちゃうんですよぉ。</div></div>

    <div class="param-controls">
        <div class="control-row">
            <label class="control-label">① 1号艇 2連対率</label>
            <div class="slider-group">
                <input type="range" id="rank1" min="0" max="100" value="70">
                <div class="custom-track"><div class="custom-gauge" id="gauge1"></div></div>
                <div class="custom-thumb-ichika" id="thumb1"></div>
                <span class="val-disp" id="rank1Val">70%</span>
            </div>
        </div>
        
        <div class="control-row">
            <label class="control-label">② 1号艇 平均ST</label>
            <div class="slider-group">
                <input type="range" id="st1" min="10" max="25" value="15">
                <div class="custom-track"><div class="custom-gauge" id="gauge2"></div></div>
                <div class="custom-thumb-ichika" id="thumb2"></div>
                <span class="val-disp" id="st1Val">0.15s</span>
            </div>
        </div>

        <button class="calc-btn" onclick="calculate()">一果に聞いてみる♪</button>
    </div>

    <div id="result">
        <div class="balloon" id="adviceBalloon"><div id="advice" style="font-weight: bold;">「ふわぁ…！一果の**“鬼絞り”**発動ですっ♪」</div></div>
        <div style="font-size: 0.75rem; color: #8c6a4a;">推定逃げ確率</div>
        <span class="score-display" id="score">85%</span>
    </div>
</div>

<script>
    const stadiumBaseData = {"01 桐生": 51, "12 住之江": 58};
    let currentStadium = "";

    // スライダーの見た目を更新する関数
    function updateCustomSlider(sliderId, gaugeId, thumbId, valId, unit) {
        const slider = document.getElementById(sliderId);
        const gauge = document.getElementById(gaugeId);
        const thumb = document.getElementById(thumbId);
        const valDisp = document.getElementById(valId);

        const update = () => {
            const val = slider.value;
            const min = slider.min;
            const max = slider.max;
            // 割合(%)を計算
            const percent = ((val - min) / (max - min)) * 100;

            // ゲージの幅とツマミの位置を更新
            gauge.style.width = percent + '%';
            thumb.style.left = percent + '%';

            // 値の表示を更新
            let displayVal = unit === 's' ? '0.' + val + 's' : val + unit;
            valDisp.innerText = displayVal;
        };

        // 初期表示と、スライダー操作時に更新
        update();
        slider.addEventListener('input', update);
    }

    // 各スライダーに適用
    updateCustomSlider('rank1', 'gauge1', 'thumb1', 'rank1Val', '%');
    updateCustomSlider('st1', 'gauge2', 'thumb2', 'st1Val', 's');


    // (以下、以前のロジックを簡略化して配置)
    function showStadiumMemo() {
        const select = document.getElementById('stadium');
        currentStadium = select.value;
        document.getElementById('stadiumName').innerText = currentStadium || "競艇場を選択";
        document.getElementById('memoText').innerText = currentStadium ? `${currentStadium}はイン逃げ率${stadiumBaseData[currentStadium]}%の場ですねぇ。` : "場を選択すると…";
    }

    function calculate() {
        if(!currentStadium) {alert("場を選んでくださいね♪"); return;}
        document.getElementById('result').style.display = "block";
    }
</script>
</body>
</html>
