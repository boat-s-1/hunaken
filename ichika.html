<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>一果の1号艇・鬼絞り判定所 🌸</title>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@700;800&display=swap" rel="stylesheet">
    <style>
        /* --- 全体・背景の設定 --- */
        body {
            font-family: 'M PLUS Rounded 1c', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            
            /* ★いただいた背景画像をここで指定します */
            background-image: url('bg_pattern.png');
            background-repeat: repeat;
            background-size: auto;
        }

        /* --- メインカード（上部パネル）の設定 --- */
        .main-card {
            background-color: white;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(255, 182, 193, 0.2);
            width: 100%;
            max-width: 600px;
            padding: 30px;
            position: relative;
            border: 2px solid #fff0f3;
            margin-bottom: 30px;
        }

        /* タイトルエリア */
        .card-header {
            text-align: center;
            margin-bottom: 25px;
        }

        h1 {
            font-size: 1.4rem;
            color: #ff6b81;
            font-weight: 800;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        /* 開催場選択ラベル */
        .label-row {
            font-size: 1rem;
            color: #ff8fa3;
            font-weight: 700;
            border-left: 5px solid #ff6b81;
            padding-left: 10px;
            margin-bottom: 5px;
        }

        /* --- 開催場選択（いただいた画像を使うデザイン） --- */
        .stadium-select-wrapper {
            position: relative;
            margin-bottom: 25px;
            /* ★バーの高さを画像に合わせます */
            height: 60px; 
            /* ★バーの画像を背景として指定します */
            background-image: url('stadium_bar.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
        }

        /* 実際のセレクトボックスは透明にして、画像の上に重ねます */
        .stadium-select {
            position: absolute;
            inset: 0; /* 画像の範囲いっぱいに広げる */
            width: 100%;
            height: 100%;
            opacity: 0; /* 透明にする */
            cursor: pointer;
        }

        /* 選択されているテキストを表示するためのプレースホルダ */
        .stadium-text-display {
            position: absolute;
            top: 50%;
            left: 25px; /* 左側の装飾を避ける */
            transform: translateY(-50%);
            color: #f1c40f; /* 金色風のテキスト */
            font-size: 1.2rem;
            font-weight: 800;
            pointer-events: none; /* クリックを貫通させる */
        }

        /* --- 競艇場の特徴エリア（点線枠） --- */
        .stadium-memo {
            background-color: #fffafb;
            border: 2px dashed #ffcad4;
            border-radius: 20px;
            padding: 20px;
            font-size: 0.9rem;
            color: #666;
            line-height: 1.6;
        }

        .memo-title {
            color: #ff6b81;
            font-weight: 800;
            font-size: 1.1rem;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        .flower-icon {
            font-size: 1.2rem;
        }
    </style>
</head>
<body>

<div class="main-card">
    <div class="card-header">
        <h1>
            <span class="flower-icon">🌸</span>
            一果の1号艇・鬼絞り判定所
        </h1>
    </div>

  <div class="label-row">① 開催場を選択</div>
<div class="stadium-select-wrapper" style="
    position: relative; 
    width: 100%; 
    max-width: 500px; /* バーのサイズに合わせて調整 */
    height: 60px;     /* バー画像の高さに合わせて調整 */
    margin: 0 auto 25px auto;
    background-image: url('830ab2a1-e175-4f48-ab50-7539524e4fd9.png'); /* いただいたバー画像 */
    background-size: 100% 100%;
    background-repeat: no-repeat;
">
    <select class="stadium-select" id="stadiumSelect" onchange="updateStadiumName(this)" style="
        position: absolute;
        top: 0; left: 0;
        width: 100%;
        height: 100%;
        opacity: 0; /* 透明にする */
        cursor: pointer;
        z-index: 2; /* 文字より上に配置してクリックを有効に */
    ">
        <option value="01 桐生">01 桐生</option>
        <option value="02 戸田">02 戸田</option>
        <option value="03 江戸川">03 江戸川</option>
        </select>

    <div id="stadiumName" style="
        position: absolute;
        top: 50%;
        left: 55px; /* 画像の左側の装飾を避けて配置 */
        transform: translateY(-50%);
        color: #f1c40f; /* 金色風の色 */
        font-size: 1.3rem;
        font-weight: 800;
        text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
        pointer-events: none; /* クリックをセレクトボックスに貫通させる */
        z-index: 1;
    ">
        01 桐生
    </div>
</div>
    <div class="stadium-memo">
        <div class="memo-title">
            <span class="flower-icon">🌸</span>
            01 桐生 の特徴
            <span class="flower-icon">🌸</span>
        </div>
        平均イン逃げ率：<strong>51%</strong><br>
        標高が高くて、イン逃げ率は標準的ですぅ。夜はモーターの力が強くなるんですよぉ。<br>
    </div>
</div>

<script>
    // セレクトボックスで選んだ名前を画面に反映させる関数
    function updateStadiumName(select) {
        const stadiumNameDisplay = document.getElementById('stadiumName');
        stadiumNameDisplay.innerText = select.value;
    }
</script>

</body>
</html>
