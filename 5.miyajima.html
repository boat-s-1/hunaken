<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>宮島5枠突破・精密診断 - MIYAJIMA 5-STATS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0b0f19; color: #f1f5f9; font-family: sans-serif; }
        .data-card { background: linear-gradient(145deg, #1e293b, #0f172a); border: 1px solid #334155; }
        .yellow-accent { color: #facc15; }
        .bg-yellow-accent { background-color: #facc15; }
    </style>
</head>
<body class="min-h-screen">

    <header class="p-8 text-center border-b border-slate-800">
        <h1 class="text-3xl font-black italic tracking-widest yellow-accent">MIYAJIMA <span class="text-white">5</span> MASTER</h1>
        <p class="text-gray-400 text-xs mt-2 font-bold uppercase tracking-tighter">2024年〜 最新統計データ準拠シミュレーター</p>
    </header>

    <main class="max-w-5xl mx-auto p-4 md:p-8 grid grid-cols-1 lg:grid-cols-3 gap-8">
        
        <div class="lg:col-span-1 space-y-6">
            <div class="data-card p-6 rounded-2xl shadow-xl">
                <h2 class="text-lg font-bold mb-6 border-l-4 border-yellow-400 pl-3">レース条件設定</h2>
                
                <div class="space-y-4 text-sm">
                    <div>
                        <label class="text-gray-400 block mb-1">風速条件</label>
                        <select id="wind" class="w-full bg-slate-900 border border-slate-700 p-2 rounded text-white outline-none focus:border-yellow-400">
                            <option value="strong">強風 (3m以上) [7.25%]</option>
                            <option value="light">弱風 (1-2m) [5.64%]</option>
                            <option value="none">無風 (0m) [5.46%]</option>
                        </select>
                    </div>

                    <div>
                        <label class="text-gray-400 block mb-1">5号艇 展示順位</label>
                        <select id="exRank" class="w-full bg-slate-900 border border-slate-700 p-2 rounded text-white outline-none focus:border-yellow-400">
                            <option value="1">展示タイム 1位 [10.00%]</option>
                            <option value="2">展示タイム 2位以下</option>
                        </select>
                    </div>

                    <div>
                        <label class="text-gray-400 block mb-1">vs 4号艇 展示タイム差</label>
                        <select id="vs4" class="w-full bg-slate-900 border border-slate-700 p-2 rounded text-white outline-none focus:border-yellow-400">
                            <option value="fast">0.1秒以上速い [10.42%]</option>
                            <option value="near">わずかに速い/同等</option>
                            <option value="slow">劣勢</option>
                        </select>
                    </div>

                    <div>
                        <label class="text-gray-400 block mb-1">1号艇の2連対率</label>
                        <select id="target1" class="w-full bg-slate-900 border border-slate-700 p-2 rounded text-white outline-none focus:border-yellow-400">
                            <option value="high">70%以上 (イン強) [6.27%]</option>
                            <option value="low">70%未満 (イン弱)</option>
                        </select>
                    </div>

                    <button onclick="calc()" class="w-full bg-yellow-accent hover:bg-yellow-500 text-black font-black py-4 rounded-xl mt-4 transition-transform active:scale-95">
                        データを解析する
                    </button>
                </div>
            </div>
        </div>

        <div class="lg:col-span-2 space-y-6">
            <div id="welcome-msg" class="data-card p-12 rounded-2xl text-center border-dashed border-2 border-slate-700">
                <p class="text-gray-500 font-bold italic">左側のフォームからレース条件を入力してください</p>
            </div>

            <div id="result-area" class="hidden space-y-6">
                <div class="data-card p-8 rounded-2xl relative overflow-hidden">
                    <div class="absolute top-0 right-0 p-4 opacity-10 font-black text-6xl">#5</div>
                    <h3 class="text-gray-400 font-bold text-sm uppercase">算出された1着期待度</h3>
                    <div class="flex items-baseline gap-2 mt-2">
                        <span id="res-percent" class="text-7xl font-black yellow-accent tracking-tighter">0.0</span>
                        <span class="text-2xl font-bold yellow-accent">%</span>
                    </div>
                    <p class="mt-4 text-sm text-gray-300 border-t border-slate-700 pt-4 italic" id="res-comment"></p>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="bg-slate-800/50 p-4 rounded-xl">
                        <h4 class="text-xs font-bold text-gray-500 mb-2 uppercase">風速の影響 (画像データ)</h4>
                        <ul class="text-xs space-y-1">
                            <li class="flex justify-between"><span>強風(3m+)</span><span class="font-mono text-yellow-400">7.25%</span></li>
                            <li class="flex justify-between text-gray-500"><span>無風(0m)</span><span class="font-mono">5.46%</span></li>
                        </ul>
                    </div>
                    <div class="bg-slate-800/50 p-4 rounded-xl">
                        <h4 class="text-xs font-bold text-gray-500 mb-2 uppercase">展示タイムの影響 (画像データ)</h4>
                        <ul class="text-xs space-y-1">
                            <li class="flex justify-between"><span>展示1位</span><span class="font-mono text-yellow-400">10.00%</span></li>
                            <li class="flex justify-between"><span>vs4枠(+0.1s)</span><span class="font-mono text-yellow-400">10.42%</span></li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        function calc() {
            const wind = document.getElementById('wind').value;
            const exRank = document.getElementById('exRank').value;
            const vs4 = document.getElementById('vs4').value;
            const target1 = document.getElementById('target1').value;

            document.getElementById('welcome-msg').classList.add('hidden');
            document.getElementById('result-area').classList.remove('hidden');

            // 統計に基づいた基礎値
            let base = 5.78; // 5号艇 全体平均

            // 風速補正
            if (wind === 'strong') base = 7.25;
            else if (wind === 'light') base = 5.64;
            else base = 5.46;

            // 展示タイム補正 (加算方式でシミュレーション)
            if (exRank === '1') base += 4.22; // 10%への調整
            if (vs4 === 'fast') base += 3.0;
            if (target1 === 'high') base += 0.7; // イン強の方が差し場がある統計

            // 天井設定
            if (base > 18) base = 18.5; 

            document.getElementById('res-percent').innerText = base.toFixed(2);

            // コメント
            let comment = "";
            if (base > 12) {
                comment = "【特注】統計上、極めて高い1着率を示しています。4枠を叩いてのまくり差し、または1枠を壁にした差し切りが濃厚です。";
            } else if (base > 8) {
                comment = "【好気配】5号艇の足が目立っています。宮島特有の強風を味方につければ、バックストレッチでの逆転も十分に狙えます。";
            } else {
                comment = "【通常】統計的には平均的な水準です。展開の助けが必要ですが、ヒモ（2,3着）としては常に警戒が必要です。";
            }
            document.getElementById('res-comment').innerText = comment;
        }
    </script>
</body>
</html>
