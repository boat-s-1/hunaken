<script>
function checkPass() {
    const pass = document.getElementById('pass-input').value;
    const secret = "1130"; // ここに好きな合言葉を設定してください

    if (pass === secret) {
        // 合言葉が合っていたらロックを解除
        document.getElementById('lock-screen').style.display = 'none';
        document.getElementById('main-content').style.display = 'block';
        
        // 解除成功のメッセージ（任意）
        alert("認証成功！キイナの精密解析を許可するよッ⚡");
    } else {
        // 間違っていたらエラー表示
        document.getElementById('error-msg').style.display = 'block';
        document.getElementById('pass-input').value = ""; // 入力をリセット
    }
}

  
function analyze() {
    const base = parseFloat(document.getElementById('stadium').value);
    if(!base) { alert("会場を選んでねッ！"); return; }

    const wind = parseFloat(document.getElementById('wind').value);
    const motor = parseFloat(document.getElementById('motor').value);
    const turn = parseFloat(document.getElementById('turn').value);
    const kado = parseFloat(document.getElementById('kado').value);
    const wall = parseFloat(document.getElementById('wall').value);
    const inRace = parseFloat(document.getElementById('in-race').value);
    
    let prob = (base * wind * motor * turn * kado * wall * inRace * 100).toFixed(1);
    if(prob > 45) prob = 45.0;

    document.getElementById('result-area').style.display = 'block';
    document.getElementById('prob-display').innerText = prob;

    let msg = "";
    if (prob > 25) msg = "キタキタ！アタシの稲妻が突き刺さる最高の展開だよッ⚡ 迷わず狙っちゃいな！";
    else if (prob > 15) msg = "いい条件だね！4カドが連れて行ってくれれば一気に突き抜けるよ！";
    else if (prob > 8) msg = "チャンスはあるけど展開待ち。2号艇が凹めばアタシの出番だねッ。";
    else msg = "今は静観。無理に狙うレースじゃないかも。次を待とう！";

    document.getElementById('kiina-talk').innerText = "💬「" + msg + "」";

    window.scrollTo({ top: document.getElementById('result-area').offsetTop, behavior: 'smooth' });
}
</script>
