<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>キイナの5枠突破解析所 ⚡ BOAT STRIKE</title>

<style>
/* 背景画像の設定 */
body {
  font-family: 'Helvetica Neue', Arial, "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif;
  background-image: url('IMG_4726.png'); /* 保存した画像ファイル名に合わせてください */
  background-size: cover;
  background-position: center;
  background-attachment: fixed;
  margin: 0;
  padding: 15px 10px;
  color: #fff;
}

/* すりガラス状のコンテナ（背景を透かす） */
.container {
  max-width: 480px;
  margin: 40px auto;
  background: rgba(16, 42, 67, 0.85); /* 深いネイビーを透過 */
  backdrop-filter: blur(10px); /* 背景をぼかす */
  -webkit-backdrop-filter: blur(10px);
  padding: 25px;
  border-radius: 30px;
  border: 1px solid rgba(255, 255, 255, 0.2);
  box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
}

h2 {
  text-align: center;
  color: #00d2ff;
  font-size: 24px;
  margin-bottom: 5px;
  text-shadow: 0 0 15px rgba(0, 210, 255, 0.8);
}

.description {
  text-align: center;
  font-size: 13px;
  color: #ccc;
  margin-bottom: 25px;
}

/* 入力エリアのスタイル */
.input-section {
  background: rgba(255, 255, 255, 0.05);
  padding: 18px;
  border-radius: 20px;
  margin-bottom: 15px;
  border: 1px solid rgba(255, 255, 255, 0.1);
}

.section-title {
  font-size: 14px;
  font-weight: bold;
  color: #ffcc00; /* 稲妻に合わせたイエロー */
  margin-bottom: 12px;
  border-left: 4px solid #ffcc00;
  padding-left: 10px;
}

label {
  display: block;
  font-weight: bold;
  margin: 15px 0 5px;
  font-size: 13px;
  color: #eee;
}

select {
  width: 100%;
  padding: 12px;
  border-radius: 12px;
  border: 1px solid rgba(255, 255, 255, 0.3);
  background: rgba(0, 0, 0, 0.5);
  color: #fff;
  font-size: 16px;
  cursor: pointer;
  outline: none;
}

/* 判定ボタン：ネオンエフェクト */
.calc-btn {
  width: 100%;
  padding: 20px;
  background: linear-gradient(45deg, #0052d4, #00d2ff);
  color: white;
  border: none;
  border-radius: 50px;
  font-size: 20px;
  font-weight: bold;
  cursor: pointer;
  box-shadow: 0 0 20px rgba(0, 210, 255, 0.6);
  transition: 0.3s;
  margin: 15px 0;
}

.calc-btn:hover {
  box-shadow: 0 0 30px rgba(0, 210, 255, 0.9);
  transform: translateY(-2px);
}

/* 結果表示エリア */
.result-box {
  margin-top: 25px;
  padding: 25px;
  border-radius: 20px;
  background: rgba(0, 0, 0, 0.4);
  border: 2px solid #00d2ff;
  display: none;
  animation: slideUp 0.5s ease;
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.percent-display {
  font-size: 55px;
  font-weight: bold;
  text-align: center;
  color: #ffcc00; /* 数値は稲妻カラー */
  text-shadow: 0 0 20px rgba(255, 204, 0, 0.5);
  font-family: 'Impact', sans-serif;
}

.talk-bubble {
  background: rgba(255, 255, 255, 0.1);
  border: 1px solid rgba(0, 210, 255, 0.5);
  padding: 15px;
  border-radius: 15px;
  position: relative;
  margin-top: 20px;
  font-size: 14px;
  line-height: 1.6;
}

.eye-box {
  margin-top: 20px;
  padding: 15px;
  background: rgba(214, 51, 132, 0.2);
  border-radius: 12px;
  font-weight: bold;
  color: #ff66b2;
  border: 1px dashed #ff66b2;
  text-align: center;
}

footer {
  text-align: center;
  margin-top: 30px;
  font-size: 11px;
  color: rgba(255,255,255,0.4);
}
</style>
</head>

<body>

<div class="container">
  <h2>⚡ KIINA 5-MASTER ⚡</h2>
  <p class="description">精密統計×展開解析で5枠の「一撃」を暴く</p>

  <div class="input-section">
    <div class="section-title">FIELD & WIND</div>
    <label>🎯 開催場を選択</label>
    <select id="stadium">
      <option value="">会場を選択...</option>
      <optgroup label="関東">
        <option value="0.061">01# 桐生 (6.1%)</option>
        <option value="0.075">02# 戸田 (7.5%) ★</option>
        <option value="0.066">03# 江戸川 (6.6%)</option>
        <option value="0.068">04# 平和島 (6.8%)</option>
        <option value="0.063">05# 多摩川 (6.3%)</option>
      </optgroup>
      <optgroup label="東海/近畿">
        <option value="0.064">06# 浜名湖 (6.4%)</option>
        <option value="0.053">07# 蒲郡 (5.3%)</option>
        <option value="0.056">08# 常滑 (5.6%)</option>
        <option value="0.064">09# 津 (6.4%)</option>
        <option value="0.052">10# 三国 (5.2%)</option>
        <option value="0.066">11# びわこ (6.6%)</option>
        <option value="0.052">12# 住之江 (5.2%)</option>
        <option value="0.054">13# 尼崎 (5.4%)</option>
      </optgroup>
      <optgroup label="中四国/九州">
        <option value="0.069">14# 鳴門 (6.9%)</option>
        <option value="0.054">15# 丸亀 (5.4%)</option>
        <option value="0.054">16# 児島 (5.4%)</option>
        <option value="0.062">17# 宮島 (6.2%)</option>
        <option value="0.034">18# 徳山 (3.4%)</option>
        <option value="0.048">19# 下関 (4.8%)</option>
        <option value="0.058">20# 若松 (5.8%)</option>
        <option value="0.042">21# 芦屋 (4.2%)</option>
        <option value="0.038">22# 福岡 (3.8%)</option>
        <option value="0.050">23# 唐津 (5.0%)</option>
        <option value="0.030">24# 大村 (3.0%)</option>
      </optgroup>
    </select>

    <label>🚩 風のコンディション</label>
    <select id="wind">
      <option value="1.0">無風〜弱風</option>
      <option value="1.3">向かい風 4m↑ (ダッシュ有利)</option>
      <option value="1.1">追い風 3m↑ (もつれ期待)</option>
      <option value="0.9">強風 6m↑ (差し不発リスク)</option>
    </select>
  </div>

  <div class="input-section">
    <div class="section-title">MACHINE & TACTICS</div>
    <label>🏎 5号艇の機力 (直線・伸び)</label>
    <select id="motor">
      <option value="1.0">普通</option>
      <option value="1.5">上位 (展示タイム良好)</option>
      <option value="2.2">超抜 (スリット後伸びる🔥)</option>
    </select>

    <label>💫 周回展示 (回り足・押し)</label>
    <select id="turn">
      <option value="1.0">普通</option>
      <option value="1.4">強力 (出口の押し◎)</option>
    </select>

    <label>💥 4カド(4号艇)の攻め</label>
    <select id="kado">
      <option value="1.0">期待薄</option>
      <option value="1.8">期待大 (まくり展開狙い)</option>
    </select>
  </div>

  <div class="input-section">
    <div class="section-title">INSIDE STATUS</div>
    <label>🛡 2号艇の「壁」信頼度</label>
    <select id="wall">
      <option value="1.0">普通</option>
      <option value="1.3">壁が薄い (凹む可能性)</option>
      <option value="0.8">壁が厚い (A1級など)</option>
    </select>

    <label>🌀 1号艇のイン信頼度</label>
    <select id="in-race">
      <option value="1.0">普通</option>
      <option value="1.2">不安定 (逃げ失敗率高い)</option>
    </select>
  </div>

  <button class="calc-btn" onclick="analyze()">⚡ 精密解析を実行！ ⚡</button>

  <div id="result-area" class="result-box">
    <div style="text-align:center; font-size:13px; color:#aaa;">推定5枠1着確率</div>
    <div class="percent-display"><span id="prob-display">0</span>%</div>
    
    <div class="talk-bubble">
      <span id="kiina-msg"></span>
    </div>

    <div class="eye-box">
      💰 推奨買い目: <span id="recommend-eye">5 - 124 - 1246</span>
    </div>
  </div>

  <footer>
    &copy; 2026 BOAT STRIKE Project / 5-MASTER
  </footer>
</div>

<script>
function analyze() {
    const base = parseFloat(document.getElementById('stadium').value);
    if(!base) { alert("会場を選択してねッ！"); return; }

    const factors = [
        parseFloat(document.getElementById('wind').value),
        parseFloat(document.getElementById('motor').value),
        parseFloat(document.getElementById('turn').value),
        parseFloat(document.getElementById('kado').value),
        parseFloat(document.getElementById('wall').value),
        parseFloat(document.getElementById('in-race').value)
    ];
    
    let prob = base;
    factors.forEach(f => prob *= f);
    prob = (prob * 100).toFixed(1);
    
    if(prob > 45) prob = 45.0;

    document.getElementById('result-area').style.display = 'block';
    document.getElementById('prob-display').innerText = prob;

    let msg = "";
    if (prob > 25) msg = "最高だね！アタシの稲妻が突き刺さる最高の展開だよッ⚡ 迷わず狙っちゃいな！";
    else if (prob > 15) msg = "いい条件が揃ったね！4カドが連れて行ってくれれば突き抜けるよ！";
    else if (prob > 8) msg = "チャンスはあるけど、内枠の動き次第かな。展示を見て再判断してね。";
    else msg = "今は静観。無理に狙うレースじゃないかもね。";

    document.getElementById('kiina-msg').innerText = "💬「" + msg + "」";

    window.scrollTo({ top: document.getElementById('result-area').offsetTop, behavior: 'smooth' });
}
</script>

</body>
</html>
