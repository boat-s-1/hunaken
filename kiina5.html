<style>
/* --- ヘッダー・ステータスバー --- */
.status-bar {
    position: fixed; top: 0; left: 0; width: 100%;
    background: rgba(10, 25, 41, 0.95); backdrop-filter: blur(10px);
    border-bottom: 1px solid rgba(0, 210, 255, 0.4);

}
.system-clock { font-family: 'Courier New', monospace; font-weight: bold; color: #ffcc00; font-size: 14px; margin-right: 15px; border-right: 1px solid rgba(0, 210, 255, 0.3); padding-right: 10px; }
.ticker-wrap { flex: 1; overflow: hidden; }
.ticker-content { display: inline-block; white-space: nowrap; font-size: 12px; font-weight: bold; color: #00d2ff; animation: k-ticker 15s linear infinite; }
@keyframes k-ticker { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

/* ベースデザイン */
body { font-family: sans-serif; background-image: url('IMG_4726.png'); background-size: cover; background-position: center; background-attachment: fixed; margin: 0; padding: 10px; color: #fff; }

.header-img-area img { width: 100%; border-radius: 15px; }

/* キャラセクション */
.chara-section { display: flex; align-items: center; margin-bottom: 25px; background: rgba(255, 255, 255, 0.05); padding: 15px; border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.1); }

.chara-img img { width: 100%; height: auto; }
.advice-bubble { flex: 1; background: rgba(0, 82, 212, 0.2); border: 1px solid #00d2ff; border-radius: 15px; padding: 12px; font-size: 13px; line-height: 1.5; color: #e0f7ff; min-height: 50px; display: flex; align-items: center; }

/* 入力・ボタン */
label { display: block; font-weight: bold; margin: 20px 0 8px; font-size: 14px; border-left: 4px solid #ffcc00; padding-left: 10px; }
select { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid rgba(255, 255, 255, 0.3); background: rgba(0, 0, 0, 0.6); color: #fff; font-size: 16px; appearance: none; }

<script>
// 合言葉チェック
function checkPass() {
    if (document.getElementById('pass-input').value === "1130") {
        document.getElementById('lock-screen').style.display = 'none';
        document.getElementById('main-content').style.display = 'block';
    } else {
        alert("合言葉が違うよッ！");
    }
}

// 【新機能】場を選択したときのアドバイス切り替え
function changeStadiumMsg() {
    const stadiumSelect = document.getElementById('stadium');
    const selectedOption = stadiumSelect.options[stadiumSelect.selectedIndex];
    const msg = selectedOption.getAttribute('data-msg');
    const talkBubble = document.getElementById('kiina-talk');
    
    if (msg) {
        talkBubble.innerHTML = `💬⚡「${msg}」`;
    } else {
        talkBubble.innerHTML = `💬⚡「会場を選んでなッ！アタシがその場の『5枠の攻め方』を教えてやるよ！」`;
    }
}

// 解析実行
function analyze() {
    const base = parseFloat(document.getElementById('stadium').value);
    if(!base) { alert("会場を選んでねッ！"); return; }

    const btn = document.querySelector('.calc-btn');
    const resultArea = document.getElementById('result-area');
    
    // ボタンを「解析中」にして無効化
    btn.disabled = true;
    btn.innerText = "⚡ ANALYZING DATA... ⚡";
    resultArea.style.display = 'none';

    // 1.5秒の「タメ」を作る
    setTimeout(() => {
        const wind = parseFloat(document.getElementById('wind').value);
        const motor = parseFloat(document.getElementById('motor').value);
        const turn = parseFloat(document.getElementById('turn').value);
        const kado = parseFloat(document.getElementById('kado').value);
        const wall = parseFloat(document.getElementById('wall').value);
        const inRace = parseFloat(document.getElementById('in-race').value);
        
        let prob = (base * wind * motor * turn * kado * wall * inRace * 100).toFixed(1);
        if(prob > 45) prob = 45.0;

        document.getElementById('result-area').style.display = 'block';
        document.getElementById('prob-display').innerText = prob;

        let msg = prob > 25 ? "⚡️キタキタ！稲妻が突き刺さる最高の展開だよッ！" : 
                  prob > 15 ? "⚡️いい条件だぜ！4カドが連れて行ってくれればッ！" : 
                  prob > 8 ? "⚡️チャンスはあるけど展開待ちだねッ。" : "⚡️今は静観。次を待とうぜ。";

        document.getElementById('analysis-msg').innerText = msg;
        
        // ボタンを元に戻す
        btn.disabled = false;
        btn.innerText = "⚡ 精密解析を実行！ ⚡";

        window.scrollTo({ top: document.getElementById('result-area').offsetTop - 100, behavior: 'smooth' });
    }, 1500);
}


// 時計とテロップ
function updateStatus() {
    const now = new Date();
    const h = now.getHours();
    document.getElementById('k-clock').innerText = `${String(h).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}:${String(now.getSeconds()).padStart(2, '0')}`;
    let m = (h >= 8 && h < 11) ? "⚡ モーニング開催中ッ！" : (h >= 11 && h < 15) ? "⚡ デイレース真っ最中ッ！" : (h >= 15 && h < 21) ? "⚡ ナイター開催中ッ！" : "⚡ 現在非開催中...軍資金を貯めとこッ！";
    document.getElementById('k-ticker-msg').innerText = m;
}
setInterval(updateStatus, 1000);
updateStatus();
</script>
