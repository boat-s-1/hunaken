<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>5アタマ予想ちゃん</title>

<style>
body {
  font-family: 'Arial', sans-serif;
  background: linear-gradient(135deg, #fff4cc, #ffe0f0);
  margin: 0;
  padding: 10px;
}

.container {
  max-width: 420px;
  margin: auto;
  background: white;
  padding: 15px;
  border-radius: 20px;
  box-shadow: 0 8px 20px rgba(255, 204, 0, 0.3);
}

h2 {
  text-align: center;
  color: #ff9900;
}

h4 {
  margin-top: 15px;
  color: #ff66a3;
}

input {
  width: 100%;
  padding: 12px;
  margin-top: 5px;
  border-radius: 12px;
  border: 1px solid #ffcce6;
  background: #fff5fa;
}

button {
  width: 100%;
  padding: 15px;
  margin-top: 15px;
  background: linear-gradient(45deg, #ffcc00, #ff66a3);
  color: white;
  border: none;
  border-radius: 15px;
  font-size: 18px;
  font-weight: bold;
}

.result {
  margin-top: 15px;
}

.buy {
  margin-top: 15px;
  background: #fff0f8;
  padding: 12px;
  border-radius: 12px;
  border: 2px dashed #ff99cc;
}

.line-btn {
  display: block;
  text-align: center;
  margin-top: 20px;
  padding: 15px;
  background: linear-gradient(45deg, #00c300, #06c755);
  color: white;
  border-radius: 15px;
  text-decoration: none;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="container">

<!-- キャラ -->
<div style="text-align:center;">
  <img src="ここにキャラ画像URL" style="width:120px;">
  <h2>💖 5アタマ予想ちゃん 💖</h2>
  <p style="color:#ff6600; font-weight:bold;">
    この子が当てる👇
  </p>
</div>

<!-- 煽り -->
<p style="text-align:center; color:#ff3399; font-weight:bold;">
当たる人だけ使ってる裏ツール👇
</p>

<!-- 入力 -->
<div id="inputs"></div>

<button onclick="calc()">🔥 分析する 🔥</button>

<!-- キャラセリフ -->
<div id="talk" style="
  background:#fff8e6;
  padding:10px;
  border-radius:10px;
  margin-top:10px;
  font-size:14px;
">
💬「このレース…5きそうだよ！」
</div>

<!-- 結果 -->
<div class="result" id="result"></div>
<div class="buy" id="buy"></div>

<!-- LINE -->
<a class="line-btn" href="https://lin.ee/あなたのリンク">
💖 続きはこっちで教えるね！
</a>

</div>

<script>
// 入力生成
let html = "";
for(let i=1;i<=6;i++){
  html += `<h4>${i}号艇</h4>
  展示タイム<input type="number" step="0.01" id="t${i}">
  1周タイム<input type="number" step="0.01" id="l${i}">
  直線<input type="number" step="0.01" id="s${i}">
  回り足<input type="number" step="0.01" id="m${i}">`;
}
document.getElementById("inputs").innerHTML = html;

// 計算
function calc(){
  let scores = [];

  for(let i=1;i<=6;i++){
    let t = parseFloat(document.getElementById(`t${i}`).value) || 0;
    let l = parseFloat(document.getElementById(`l${i}`).value) || 0;
    let s = parseFloat(document.getElementById(`s${i}`).value) || 0;
    let m = parseFloat(document.getElementById(`m${i}`).value) || 0;

    let score = (10 - t) + (10 - l) + s + m;
    scores.push({num:i, score:score});
  }

  scores.sort((a,b)=>b.score-a.score);

  let rankText = "🏆ランキング<br>";
  scores.forEach((r,i)=>{
    rankText += `${i+1}位：${r.num}号艇<br>`;
  });

  // 5号艇評価
  let fiveRank = scores.findIndex(r=>r.num===5)+1;
  let evalText = "";

  if(fiveRank === 1){
    evalText = "🔥 激アツ！5アタマ期待大！";
  }else if(fiveRank <= 3){
    evalText = "⚡ チャンスあり！";
  }else{
    evalText = "❌ 厳しいかも";
  }

  // 買い目生成
  let first = scores[0].num;
  let second = scores[1].num;
  let third = scores[2].num;

  let buy = `
  ${first}-${second}-${third}<br>
  ${first}-5-${second}<br>
  5-${first}-${second}
  `;

  // キャラセリフ変化
  let talk = "";
  if(fiveRank === 1){
    talk = "💬「きた！5頭あるよこれ🔥」";
  }else if(fiveRank <=3){
    talk = "💬「5絡み狙えるかも✨」";
  }else{
    talk = "💬「今回は見送りがいいかも💦」";
  }

  document.getElementById("talk").innerHTML = talk;

  document.getElementById("result").innerHTML =
    rankText + "<br>💖予想ちゃんの結論💖<br>" + evalText;

  document.getElementById("buy").innerHTML =
    "💰おすすめ買い目<br>" + buy;
}
</script>

</body>
</html>
