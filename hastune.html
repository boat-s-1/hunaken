<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>初音の女子戦精密展開シミュレーター 🔬</title>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'M PLUS Rounded 1c', sans-serif;
            margin: 0; padding: 10px;
            display: flex; flex-direction: column; align-items: center;
            background-color: #0a191e; /* 深海のようなダークブルー */
            background-image: 
                linear-gradient(rgba(0, 184, 148, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 184, 148, 0.05) 1px, transparent 1px);
            background-size: 20px 20px;
            color: #dfe6e9;
        }

        /* --- ヘッダー：ラボのモニター風 --- */
        .header-title {
            width: 100%; max-width: 480px;
            background: #1e272e; color: #55efc4;
            padding: 15px; border-radius: 15px;
            text-align: center; margin-bottom: 20px;
            border: 1px solid #00b894;
            box-shadow: 0 0 15px rgba(0, 184, 148, 0.3);
        }
        h1 { font-size: 1rem; margin: 0; letter-spacing: 3px; text-shadow: 0 0 10px #55efc4; }

        .outer-frame {
            width: 100%; max-width: 480px;
            padding: 20px; box-sizing: border-box;
            background: rgba(30, 39, 46, 0.9);
            border: 1px solid #00b894;
            border-radius: 20px;
        }

        .data-link-btn {
            display: block; width: 100%; text-align: center;
            background: rgba(0, 184, 148, 0.1); color: #55efc4;
            padding: 10px; border-radius: 10px; font-size: 0.8rem;
            text-decoration: none; border: 1px solid #00b894;
            margin-bottom: 20px;
        }

        /* 入力エリアのグリッド化 */
        .input-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }

        .input-block {
            background: #2d3436; border: 1px solid #636e72;
            padding: 10px; border-radius: 12px;
            position: relative;
        }
        .block-title {
            font-size: 0.7rem; font-weight: 800; padding: 2px 8px;
            border-radius: 4px; margin-bottom: 8px; display: inline-block;
        }
        .b1 { background: #ff4757; color: white; }
        .b2 { background: #1e90ff; color: white; }
        .b3 { background: #f1c40f; color: #000; }
        .b4 { background: #34495e; color: white; }
        .b5 { background: #e67e22; color: white; }
        .b6 { background: #8e44ad; color: white; }

        .slider-label { font-size: 0.65rem; color: #b2bec3; display: block; margin-top: 5px; }
        input[type="range"] { width: 100%; accent-color: #55efc4; cursor: pointer; }
        .val-disp { font-size: 0.85rem; font-weight: 800; color: #55efc4; display: block; text-align: right; }

        /* 特殊条件（風・波） */
        .env-block {
            background: #0a3d34; border: 1px solid #00b894;
            padding: 15px; border-radius: 12px; margin-bottom: 20px;
        }

        .analyze-btn {
            width: 100%; padding: 20px;
            background: #00b894; color: #0a191e;
            border: none; border-radius: 12px;
            font-weight: 800; font-size: 1.1rem; cursor: pointer;
            transition: 0.3s;
        }
        .analyze-btn:active { transform: scale(0.98); }

        /* 解析結果のモニター表示 */
        #result-box {
            display: none; margin-top: 25px; padding: 20px;
            background: #000; border: 2px solid #55efc4;
            border-radius: 15px; box-shadow: inset 0 0 20px rgba(85, 239, 196, 0.2);
        }
        .loading-text { color: #55efc4; font-family: monospace; font-size: 0.8rem; }
        
        .result-content { display: none; }
        .deme-row {
            background: #1e272e; padding: 15px; border-radius: 10px;
            margin-top: 15px; border-left: 4px solid #55efc4;
        }
    </style>
</head>
<body>

<div class="header-title">
    <h1>🔬 HATSUNE: PRECISION SIMULATOR v2.0</h1>
</div>

<div class="outer-frame">
    <a href="ladies_data.html" class="data-link-btn">📘 初音の女子戦攻略データベースを開く</a>

    <div class="env-block">
        <span class="label" style="color:#55efc4; font-size:0.7rem; font-weight:800;">STADIUM & ENVIRONMENT</span>
        <div style="display:flex; gap:10px; margin-top:10px;">
            <select id="stadiumSelect" style="flex:1; background:#1e272e; color:white; border:1px solid #00b894; padding:8px; border-radius:5px;">
                <option value="52">24 大村 (イン最強)</option>
                <option value="48">12 住之江 (標準)</option>
                <option value="42">02 戸田 (イン脆弱)</option>
                </select>
            <select id="weatherSelect" style="flex:1; background:#1e272e; color:white; border:1px solid #00b894; padding:8px; border-radius:5px;">
                <option value="0">穏やか (通常)</option>
                <option value="-5">追い風強 (差し有利)</option>
                <option value="-8">向かい風強 (捲り有利)</option>
            </select>
        </div>
    </div>

    <div class="input-grid">
        <div class="input-block">
            <span class="block-title b1">1号艇</span>
            <span class="slider-label">能力値</span>
            <input type="range" id="p1_power" min="30" max="95" value="70" oninput="updateVal('v1', this.value)">
            <span class="val-disp" id="v1">70</span>
        </div>
        <div class="input-block">
            <span class="block-title b2">2号艇</span>
            <span class="slider-label">能力値</span>
            <input type="range" id="p2_power" min="30" max="95" value="60" oninput="updateVal('v2', this.value)">
            <span class="val-disp" id="v2">60</span>
        </div>
        <div class="input-block">
            <span class="block-title b3">3号艇</span>
            <span class="slider-label">能力値</span>
            <input type="range" id="p3_power" min="30" max="95" value="60" oninput="updateVal('v3', this.value)">
            <span class="val-disp" id="v3">60</span>
        </div>
        <div class="input-block">
            <span class="block-title b4">4号艇</span>
            <span class="slider-label">能力値</span>
            <input type="range" id="p4_power" min="30" max="95" value="55" oninput="updateVal('v4', this.value)">
            <span class="val-disp" id="v4">55</span>
        </div>
        <div class="input-block">
            <span class="block-title b5">5号艇</span>
            <span class="slider-label">能力値</span>
            <input type="range" id="p5_power" min="30" max="95" value="50" oninput="updateVal('v5', this.value)">
            <span class="val-disp" id="v5">50</span>
        </div>
        <div class="input-block">
            <span class="block-title b6">6号艇</span>
            <span class="slider-label">能力値</span>
            <input type="range" id="p6_power" min="30" max="95" value="45" oninput="updateVal('v6', this.value)">
            <span class="val-disp" id="v6">45</span>
        </div>
    </div>

    <button class="analyze-btn" onclick="startAnalysis()">EXECUTE SIMULATION</button>

    <div id="result-box">
        <div id="loading" class="loading-text"></div>
        <div id="analysis-result" class="result-content">
            <div style="font-size: 0.7rem; color: #55efc4; margin-bottom: 10px;">PROBABILITY REPORT:</div>
            <div id="main-status" style="font-size: 1.4rem; font-weight: 800; margin-bottom: 15px;"></div>
            <div id="hatsune-comment" style="font-size: 0.85rem; line-height: 1.6; color: #bdc3c7;"></div>
            <div class="deme-row">
                <span style="font-size: 0.7rem; color: #55efc4; display: block; margin-bottom: 5px;">EXPECTED NUMBERS:</span>
                <div id="deme-list" style="font-size: 1.2rem; letter-spacing: 2px;"></div>
            </div>
        </div>
    </div>
</div>

<script>
    function updateVal(id, val) { document.getElementById(id).innerText = val; }

    function startAnalysis() {
        const box = document.getElementById('result-box');
        const loading = document.getElementById('loading');
        const result = document.getElementById('analysis-result');
        
        box.style.display = 'block';
        result.style.display = 'none';
        loading.innerText = "Analyzing race data...";
        
        // 解析中アニメーション（1.5秒）
        let dots = "";
        const timer = setInterval(() => {
            dots += ".";
            loading.innerText = "Calculating trajectories" + dots;
            if (dots.length > 3) dots = "";
        }, 300);

        setTimeout(() => {
            clearInterval(timer);
            loading.style.display = 'none';
            result.style.display = 'block';
            runLogic();
        }, 1500);
    }

    function runLogic() {
        const stadium = parseInt(document.getElementById('stadiumSelect').value);
        const weather = parseInt(document.getElementById('weatherSelect').value);
        
        const powers = [
            parseInt(document.getElementById('p1_power').value) + stadium + weather,
            parseInt(document.getElementById('p2_power').value) + 5,
            parseInt(document.getElementById('p3_power').value) + 3,
            parseInt(document.getElementById('p4_power').value),
            parseInt(document.getElementById('p5_power').value),
            parseInt(document.getElementById('p6_power').value)
        ];

        let status = "";
        let comment = "";
        let demes = "";

        // 展開ロジック
        if (powers[0] > 110) {
            status = "🚨 ESCAPE: ABSOLUTE (イン逃げ鉄板)";
            comment = "初音です。解析の結果、1号艇の逃げ率は極めて高いです。女子戦特有のスタートのバラつきも、機力でカバー可能。1-23-全の構成を推奨。";
            demes = "1-2-345, 1-3-245";
        } else if (powers[2] > powers[0] && powers[2] > powers[1]) {
            status = "🌪️ ATTACK: CENTER (3号艇まくり)";
            comment = "警告。3号艇がスリット後に突出するシミュレーションを確認。内2艇を引き波に沈める展開。3-45の連動に注意してください。";
            demes = "3-4-全, 3-5-全, 3-1-全";
        } else if (powers[1] > powers[0]) {
            status = "🥈 ATTACK: GAP-SASHI (2号艇差し)";
            comment = "解析完了。1号艇がターンで膨らむ確率が高いです。2号艇がその懐を鋭く突く展開。女子戦ではよく見られる逆転パターンです。";
            demes = "2-1-全, 2-3-全, 1-2-全";
        } else if (powers[3] > 70 && weather < 0) {
            status = "⚡ ATTACK: DASH-KADO (4号艇角まくり)";
            comment = "風速の影響により、ダッシュ勢に有利な展開。4号艇が角から仕掛け、5号艇が展開を突く「4-5」のスジを検知しました。";
            demes = "4-5-全, 4-1-全, 5-4-全";
        } else {
            status = "📊 ESCAPE: STANDARD (イン逃げ優勢)";
            comment = "シミュレーションの結果、大きな波乱要素はありません。1号艇の逃げを中心に、機力の良い外枠を3着に加えるのが合理的です。";
            demes = "1-23-全";
        }

        document.getElementById('main-status').innerText = status;
        document.getElementById('hatsune-comment').innerText = comment;
        document.getElementById('deme-list').innerText = demes;
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }
</script>

</body>
</html>
