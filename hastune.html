<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>初音の女子戦・ひらめき鑑定所 🍀</title>
<style>
/* 初音ちゃんカラー：ミントグリーンベース */
body {
  font-family: 'Hiragino Kaku Gothic ProN', sans-serif;
  background: #f0fff4; /* 薄いミント */
  background-image: radial-gradient(#dfffee 1px, transparent 1px);
  background-size: 20px 20px;
  margin: 0; padding: 10px;
}

.container {
  max-width: 450px;
  margin: 20px auto;
  background: white;
  padding: 20px;
  border-radius: 30px;
  border: 3px solid #b2f2bb; /* パステルグリーン */
  box-shadow: 0 8px 20px rgba(47, 158, 68, 0.1);
}

h2 {
  text-align: center;
  color: #2f855a;
  font-size: 20px;
}

/* 初音ちゃんのアドバイス枠 */
.advice-box {
  display: flex;
  align-items: center;
  background: #e6fffa;
  padding: 15px;
  border-radius: 20px;
  margin-bottom: 20px;
}

label {
  display: block;
  font-weight: bold;
  margin: 15px 0 5px;
  color: #38a169;
  border-left: 4px solid #38a169;
  padding-left: 10px;
}

select {
  width: 100%;
  padding: 12px;
  border-radius: 12px;
  border: 2px solid #c6f6d5;
  font-size: 16px;
}

.calc-btn {
  width: 100%;
  padding: 18px;
  background: linear-gradient(135deg, #63e6be 0%, #38a169 100%);
  color: white;
  border: none;
  border-radius: 50px;
  font-size: 18px;
  font-weight: bold;
  margin-top: 20px;
  cursor: pointer;
  box-shadow: 0 4px 12px rgba(56, 161, 105, 0.3);
}

.result-area {
  display: none;
  margin-top: 20px;
  padding: 20px;
  border-radius: 20px;
  background: #f0fff4;
  border: 2px solid #38a169;
  text-align: center;
}
</style>
</head>
<body>

<div class="container">
  <img src="hatsune_header.png" style="width:100%; border-radius:15px;">
  <h2>🍀 初音の女子戦・鑑定所 🍀</h2>

  <div class="advice-box">
    <img src="hatsune_sd.png" style="width:80px; margin-right:10px;">
    <p style="font-size:12px; color:#2d6a4f;">💬「女子戦は甘く見ちゃダメですよぉ？初音が荒れる予感を鑑定しちゃいますっ♪」</p>
  </div>

  <label>① 選手の「格」はどうですか？</label>
  <select id="rank">
    <option value="1.0">A級が揃ってて堅そう</option>
    <option value="1.5">A級とB級が混ざってる</option>
    <option value="2.5">ほとんどB級！大混戦！</option>
  </select>

  <label>② スタートの不安度は？</label>
  <select id="start">
    <option value="1.0">みんな早い（安定）</option>
    <option value="1.8">F持ちがいたり、バラバラ</option>
  </select>

  <label>③ 会場のコンディションは？</label>
  <select id="wind">
    <option value="1.0">穏やか（静水面）</option>
    <option value="2.0">風や波が強いっ（荒れ気配）</option>
  </select>

  <button class="calc-btn" onclick="鑑定()">鑑定するっ🍀</button>

  <div id="result" class="result-area">
    <p style="font-size:14px; font-weight:bold;">鑑定結果：波乱度</p>
    <div id="score" style="font-size:40px; font-weight:bold; color:#2f855a;">0%</div>
    <p id="msg" style="font-size:12px; margin-top:10px;"></p>
  </div>
</div>

<script>
function 鑑定() {
  const r = parseFloat(document.getElementById('rank').value);
  const s = parseFloat(document.getElementById('start').value);
  const w = parseFloat(document.getElementById('wind').value);
  
  let score = Math.round(r * s * w * 10);
  if(score > 100) score = 100;

  document.getElementById('result').style.display = 'block';
  document.getElementById('score').innerText = score + "%";
  
  let m = "";
  if(score > 70) m = "💬「ひゃわわ！これは大波乱の予感ですっ！万舟券が飛び出しちゃうかも…！」";
  else if(score > 40) m = "💬「ちょっと注意が必要ですねぇ。中配当を狙ってみるのがいいかもですっ♪」";
  else m = "💬「ここはガチガチの予感。本命さんを信じて絞って勝負ですよぉ🍀」";
  
  document.getElementById('msg').innerText = m;
}
</script>
</body>
</html>
