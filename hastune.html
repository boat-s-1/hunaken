<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>初音の女子戦・ひらめき鑑定所 🍀 BOAT STRIKE</title>

<style>
/* 初音ちゃんカラー：ミントグリーン ＆ パステルイエロー */
body {
  font-family: 'Helvetica Neue', Arial, "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif;
  background-color: #f0fff4;
  background-image: radial-gradient(#c6f6d5 1px, transparent 1px);
  background-size: 25px 25px;
  margin: 0;
  padding: 10px;
  color: #2d6a4f;
}

.container {
  max-width: 480px;
  margin: 20px auto;
  background: rgba(255, 255, 255, 0.95);
  padding: 20px;
  border-radius: 30px;
  border: 3px solid #b2f2bb;
  box-shadow: 0 10px 30px rgba(47, 158, 68, 0.1);
}

.header-img {
  width: 100%;
  border-radius: 20px;
  margin-bottom: 15px;
}

h2 {
  text-align: center;
  color: #2f855a;
  font-size: 22px;
  margin-bottom: 5px;
}

.description {
  text-align: center;
  font-size: 13px;
  color: #666;
  margin-bottom: 20px;
}

/* 初音ちゃんのSDキャラ＆フキダシ */
.chara-section {
  display: flex;
  align-items: center;
  background: #e6fffa;
  padding: 15px;
  border-radius: 20px;
  margin-bottom: 20px;
  border: 1px solid #b2f2bb;
}

.chara-img {
  width: 90px;
  flex-shrink: 0;
  margin-right: 12px;
}

.advice-bubble {
  font-size: 13px;
  line-height: 1.5;
  color: #2d6a4f;
}

/* 入力エリア */
.input-section {
  background: #fff;
  padding: 15px;
  border-radius: 20px;
  margin-bottom: 15px;
  border: 1px solid #dfffee;
}

label {
  display: block;
  font-weight: bold;
  margin: 15px 0 5px;
  font-size: 13px;
  color: #2f855a;
  border-left: 4px solid #63e6be;
  padding-left: 10px;
}

label span {
  color: #38a169;
  margin-right: 5px;
}

select {
  width: 100%;
  padding: 12px;
  border-radius: 12px;
  border: 2px solid #c6f6d5;
  background: #fff;
  font-size: 16px;
  color: #2d6a4f;
  cursor: pointer;
}

/* 鑑定ボタン */
.calc-btn {
  width: 100%;
  padding: 20px;
  background: linear-gradient(135deg, #63e6be 0%, #38a169 100%);
  color: white;
  border: none;
  border-radius: 50px;
  font-size: 20px;
  font-weight: bold;
  cursor: pointer;
  box-shadow: 0 6px 15px rgba(56, 161, 105, 0.2);
  margin: 10px 0;
}

.calc-btn:active { transform: scale(0.96); }

/* 結果表示 */
.result-box {
  margin-top: 25px;
  padding: 25px;
  border-radius: 20px;
  background: #f0fff4;
  border: 3px solid #38a169;
  display: none;
  text-align: center;
  animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

@keyframes popIn {
  from { opacity: 0; transform: scale(0.9); }
  to { opacity: 1; transform: scale(1); }
}

.score-display {
  font-size: 55px;
  font-weight: bold;
  color: #2f855a;
  margin: 10px 0;
  font-family: 'Arial Black', sans-serif;
}

.eye-box {
  margin-top: 20px;
  padding: 15px;
  background: #fff;
  border-radius: 12px;
  font-weight: bold;
  color: #38a169;
  border: 2px dashed #b2f2bb;
}

footer { text-align: center; margin-top: 30px; font-size: 11px; color: #999; }
</style>
</head>

<body>

<div class="container">
  <img src="hatsune_header.png" alt="初音の鑑定所" class="header-img">
  
  <h2>🍀 初音の女子戦・ひらめき鑑定所 🍀</h2>
  <p class="description">女子戦特有の「荒れる予感」をふわっと鑑定♪</p>

  <div class="chara-section">
    <img src="hatsune_sd.png" alt="初音" class="chara-img">
    <div class="advice-bubble" id="hatsune-talk">
      💬「女子戦は甘く見ちゃダメですよぉ？初音が荒れる予感を鑑定しちゃいますっ♪」
    </div>
  </div>

  <div class="input-section">
    <label><span>①</span> 選手の「格」はどうですか？</label>
    <select id="rank">
      <option value="0.8">A1級が1人だけ（逃げそう）</option>
      <option value="1.0">実力がみんな同じくらい</option>
      <option value="1.8">全員B級！何が起きるかナゾ！</option>
    </select>

    <label><span>②</span> スタートの不安度は？</label>
    <select id="start">
      <option value="1.0">みんな早い（安定）</option>
      <option value="1.5">F持ちがいたり、バラバラ</option>
      <option value="2.0">スタート事故の予感がするっ！</option>
    </select>

    <label><span>③</span> コース取りに動きはありそう？</label>
    <select id="shinnyu">
      <option value="1.0">枠なりでおだやか♪</option>
      <option value="1.4">前付けや進入乱れの気配！</option>
    </select>

    <label><span>④</span> お化けモーター（超抜機）の予感？</label>
    <select id="motor">
      <option value="1.0">みんな普通かな</option>
      <option value="1.7">1人だけ展示タイムがヤバい！</option>
    </select>

    <label><span>⑤</span> 会場のコンディションは？</label>
    <select id="wind">
      <option value="1.0">穏やか（静水面）</option>
      <option value="1.6">風や波が強いっ（荒れ気配）</option>
    </select>

    <label><span>⑥</span> 今日はシリーズの何日目？</label>
    <select id="day">
      <option value="1.2">初日（まだ手探り）</option>
      <option value="1.5">勝負駆け（バチバチ！）</option>
      <option value="1.0">優勝戦（ガチガチ？）</option>
    </select>
  </div>

  <button class="calc-btn" onclick="analyze()">🍀 鑑定を実行するっ！ 🍀</button>

  <div id="result-area" class="result-box">
    <div style="font-size:14px; font-weight:bold; color:#666;">初音のひらめき：推定波乱度</div>
    <div class="score-display"><span id="score-val">0</span>%</div>
    
    <div id="hatsune-res-msg" style="font-size:13px; font-weight:bold; color:#2d6a4f; margin-top:10px;"></div>

    <div class="eye-box">
      💰 初音の狙い目アドバイス:<br>
      <span id="eye-text" style="font-size:14px;">データを入力してください♪</span>
    </div>
  </div>

  <footer>
    &copy; 2026 BOAT STRIKE Project / HATSUNE
  </footer>
</div>

<script>
function analyze() {
    const r = parseFloat(document.getElementById('rank').value);
    const s = parseFloat(document.getElementById('start').value);
    const sn = parseFloat(document.getElementById('shinnyu').value);
    const m = parseFloat(document.getElementById('motor').value);
    const w = parseFloat(document.getElementById('wind').value);
    const d = parseFloat(document.getElementById('day').value);

    // 波乱度の計算式（女子戦特化型）
    // ベース20%から始まり、各要素を掛け合わせる
    let score = Math.round(20 * r * s * sn * m * w * d);
    
    if(score > 100) score = 100;
    if(score < 5) score = 5;

    document.getElementById('result-area').style.display = 'block';
    document.getElementById('score-val').innerText = score;

    let resMsg = "";
    let eye = "";

    if (score >= 80) {
        resMsg = "ひゃわわわっ！大波乱アイドル降臨ですっ！万舟券のサインが見えちゃいましたぁ🍀";
        eye = "インは捨てて、外枠のまくりや差しを広く狙うのがおすすめですよぉ！";
    } else if (score >= 50) {
        resMsg = "ちょっと荒れる予感がしますぅ。中配当を狙うチャンスかもですっ♪";
        eye = "1号艇さんを軸にしつつ、相手に穴っぽい子を混ぜてみてはどうでしょうかっ？";
    } else if (score >= 20) {
        resMsg = "ここはガチガチの予感。本命さんを信じて絞って勝負ですよぉ🍀";
        eye = "1号艇さんから、実力上位の選手に絞って流すのが正解かもです♪";
    } else {
        resMsg = "とっても穏やかなレースになりそうですっ。お昼寝しちゃうくらい堅いかも？";
        eye = "1-2、1-3の超本命サイドだけで十分だと思いますよぉ♪";
    }

    document.getElementById('hatsune-res-msg').innerText = resMsg;
    document.getElementById('eye-text').innerText = eye;
    
    // スムーズスクロール
    window.scrollTo({
        top: document.getElementById('result-area').offsetTop,
        behavior: 'smooth'
    });
}
</script>

</body>
</html>
