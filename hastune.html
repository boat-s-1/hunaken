<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HATSUNE: LADIES DATA BANK 🛡️</title>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@700;800&display=swap" rel="stylesheet">
    <style>
        /* --- 初音ミントカラー & サイバー背景 --- */
        body {
            font-family: 'M PLUS Rounded 1c', sans-serif;
            margin: 0; padding: 10px;
            display: flex; flex-direction: column; align-items: center;
            background-color: #f0f7f7;
            background-image: 
                linear-gradient(90deg, rgba(175, 238, 238, 0.15) 1px, transparent 1px),
                linear-gradient(rgba(175, 238, 238, 0.15) 1px, transparent 1px);
            background-size: 30px 30px;
            color: #2d3436;
        }

        /* --- ヘッダー --- */
        .header-title {
            width: 100%; max-width: 440px;
            background: #2d3436; color: #55efc4;
            padding: 15px; border-radius: 20px;
            text-align: center; margin-bottom: 20px;
            border-bottom: 4px solid #00b894;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
        }
        h1 { font-size: 1rem; margin: 0; letter-spacing: 2px; }

        /* --- メインフレーム --- */
        .outer-frame {
            position: relative; width: 100%; max-width: 440px;
            padding: 20px; box-sizing: border-box;
            background: white; border: 2px solid #00b894;
            border-radius: 25px; box-shadow: 0 10px 30px rgba(0,184,148,0.1);
        }

        .top-section { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; }
        .hatsune-chara { width: 130px; height: auto; filter: drop-shadow(2px 2px 5px rgba(0,0,0,0.1)); }
        
        .analysis-target {
            flex: 1; background: #f9fdfc; border: 1px solid #d1f2eb;
            padding: 12px; border-radius: 15px;
        }

        .label { font-size: 0.7rem; color: #00b894; font-weight: 800; display: block; margin-bottom: 5px; }
        select { width: 100%; padding: 10px; border-radius: 10px; border: 2px solid #d1f2eb; font-family: inherit; font-size: 0.85rem; background: white; cursor: pointer; }

        /* --- スライダーセクション --- */
        .param-section { border-top: 1px dashed #d1f2eb; padding-top: 15px; }
        .control-row { margin-bottom: 18px; }
        .slider-label { font-size: 0.8rem; font-weight: 800; color: #636e72; border-left: 5px solid #00b894; padding-left: 10px; margin-bottom: 8px; display: block; }
        .slider-group { display: flex; align-items: center; gap: 12px; }
        input[type="range"] { flex: 1; accent-color: #00b894; cursor: pointer; }
        .val-disp { font-size: 1.1rem; font-weight: 800; color: #00b894; min-width: 60px; text-align: right; }

        /* --- 分析ボタン --- */
        .analyze-btn {
            width: 100%; padding: 18px; margin-top: 10px;
            background: #2d3436; color: #55efc4;
            border: 2px solid #00b894; border-radius: 15px;
            font-weight: 800; font-size: 1.2rem; cursor: pointer;
            transition: all 0.3s;
        }
        .analyze-btn:hover { background: #00b894; color: white; transform: translateY(-2px); }

        /* --- レポート結果 --- */
        #result-box {
            display: none; margin-top: 25px; padding: 20px;
            background: #2d3436; color: white; border-radius: 20px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }
        .report-header { font-size: 0.75rem; color: #55efc4; border-bottom: 1px solid #55efc4; margin-bottom: 15px; padding-bottom: 5px; letter-spacing: 1px; }
        .score-val { font-size: 3.5rem; font-weight: 800; color: #55efc4; display: block; text-align: center; line-height: 1; }
        .report-text { font-size: 0.85rem; line-height: 1.7; color: #dfe6e9; margin: 15px 0; border-left: 3px solid #00b894; padding-left: 12px; }

        .prediction-area { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 12px; border: 1px solid #55efc4; }
        .pred-row { display: flex; justify-content: space-between; margin-bottom: 5px; }
        .pred-label { font-size: 0.7rem; color: #55efc4; font-weight: 800; }
        .pred-val { font-weight: 800; font-size: 1.1rem; color: #fff; }
    </style>
</head>
<body>

<div class="header-title">
    <h1>🔬 HATSUNE: PRECISION ANALYSIS</h1>
</div>

<div class="outer-frame">
    <div class="top-section">
        <img src="hatsune_chara.png" class="hatsune-chara" alt="初音">
        <div class="analysis-target">
            <span class="label">ANALYSIS TARGET</span>
            <select id="stadiumSelect">
                <option value="55">24 大村（L戦 逃率高）</option>
                <option value="53">18 徳山（L戦 逃率高）</option>
                <option value="50">15 丸亀（ナイター）</option>
                <option value="42">02 戸田（要注意）</option>
            </select>
        </div>
    </div>

    <div class="param-section">
        <div class="control-row">
            <span class="slider-label">① A級・B級 選手レベル差</span>
            <div class="slider-group">
                <input type="range" id="levelDiff" min="-20" max="20" value="0" oninput="updateVal('levelVal', this.value)">
                <span class="val-disp" id="levelVal">0</span>
            </div>
        </div>

        <div class="control-row">
            <span class="slider-label">② 1号艇 当地勝率 (相性)</span>
            <div class="slider-group">
                <input type="range" id="localRate" min="200" max="800" value="550" step="10" oninput="updateVal('localVal', (this.value/100).toFixed(2))">
                <span class="val-disp" id="localVal">5.50</span>
            </div>
        </div>

        <div class="control-row">
            <span class="slider-label">③ モーター2連率 (%)</span>
            <div class="slider-group">
                <input type="range" id="motorRate" min="10" max="60" value="35" oninput="updateVal('motorRateVal', this.value + '%')">
                <span class="val-disp" id="motorRateVal">35%</span>
            </div>
        </div>

        <div class="control-row">
            <span class="slider-label">④ 展示気配 (女子戦補正)</span>
            <div class="slider-group">
                <input type="range" id="motorPower" min="-10" max="10" value="0" oninput="updateVal('motorVal', this.value)">
                <span class="val-disp" id="motorVal">0</span>
            </div>
        </div>
    </div>

    <button class="analyze-btn" onclick="analyze()">ANALYZE DATA</button>

    <div id="result-box">
        <div class="report-header">■ ANALYSIS REPORT</div>
        <span class="score-val" id="score">0%</span>
        <div class="report-text" id="report">分析を開始してください。</div>
        
        <div class="prediction-area">
            <div class="pred-row"><span class="pred-label">推奨本命</span><span class="pred-val" id="predMain">---</span></div>
            <div class="pred-row"><span class="pred-label">抑え候補</span><span class="pred-val" id="predSub">---</span></div>
        </div>
    </div>
</div>

<script>
    function updateVal(id, val) {
        let displayVal = val;
        if (id === 'levelVal' || id === 'motorVal') {
            displayVal = (val > 0 ? "+" : "") + val;
        }
        document.getElementById(id).innerText = displayVal;
    }

    function analyze() {
        const base = parseInt(document.getElementById('stadiumSelect').value);
        const level = parseInt(document.getElementById('levelDiff').value);
        const motorPower = parseInt(document.getElementById('motorPower').value);
        
        // 当地勝率ロジック
        const local = parseInt(document.getElementById('localRate').value) / 100;
        let localBonus = (local >= 7.0) ? 8 : (local < 4.5) ? -10 : 0;

        // モーター2連率ロジック
        const mRate = parseInt(document.getElementById('motorRate').value);
        let motorBonus = (mRate >= 40) ? 7 : (mRate < 30) ? -8 : 0;

        // 最終スコア算出
        let total = base + level + (motorPower * 2.5) + localBonus + motorBonus;
        total = Math.min(98, Math.max(10, Math.round(total)));

        document.getElementById('result-box').style.display = 'block';
        document.getElementById('score').innerText = total + "%";

        let comment = "";
        let pMain = "";
        let pSub = "";

        if (total >= 80) {
            comment = `「解析完了。当地勝率${local.toFixed(2)}という驚異的な相性に加え、${mRate}%の強力なモーターが逃げを強力にバックアップしています。不測の事態がない限り、イン逃げは確定レベルです。」`;
            pMain = "1-2-34";
            pSub = "1-3-24";
        } else if (total >= 60) {
            comment = "「良好な数値です。女子戦特有のスタートのバラツキを考慮しても、このイン選手の技量なら十分逃げ切れると予測します。」";
            pMain = "1-23-234";
            pSub = "1-23-5";
        } else if (total <= 45) {
            comment = "「警告。当地相性の不安要素に加え、モーターのパワー不足が顕著です。捲り差し、あるいはカド捲りによる波乱を検知しました。」";
            pMain = "23-1-全";
            pSub = "4-15-全";
        } else {
            comment = "「中立的なデータです。女子戦は1マークの握り合いが激しいため、ヒモ荒れに注意してください。1-23が中心です。」";
            pMain = "1-23-全";
            pSub = "1-全-5";
        }

        document.getElementById('report').innerText = comment;
        document.getElementById('predMain').innerText = pMain;
        document.getElementById('predSub').innerText = pSub;

        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }
</script>

</body>
</html>
