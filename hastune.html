<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>初音の女子戦精密展開シミュレーター 🔬</title>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'M PLUS Rounded 1c', sans-serif;
            margin: 0; padding: 10px;
            display: flex; flex-direction: column; align-items: center;
            background-color: #f0f7f7;
            background-image: 
                linear-gradient(90deg, rgba(175, 238, 238, 0.15) 1px, transparent 1px),
                linear-gradient(rgba(175, 238, 238, 0.15) 1px, transparent 1px);
            background-size: 30px 30px;
            color: #2d3436;
        }

        /* --- ヘッダー --- */
        .header-title {
            width: 100%; max-width: 460px;
            background: #2d3436; color: #55efc4;
            padding: 15px; border-radius: 20px;
            text-align: center; margin-bottom: 20px;
            border-bottom: 4px solid #00b894;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
        }
        h1 { font-size: 1rem; margin: 0; letter-spacing: 2px; }

        /* --- メインフレーム --- */
        .outer-frame {
            position: relative; width: 100%; max-width: 460px;
            padding: 20px; box-sizing: border-box;
            background: white; border: 2px solid #00b894;
            border-radius: 25px; box-shadow: 0 10px 30px rgba(0,184,148,0.1);
        }

        .top-section { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; }
        .hatsune-chara { width: 130px; height: auto; filter: drop-shadow(2px 2px 5px rgba(0,0,0,0.1)); }
        
        .analysis-target {
            flex: 1; background: #f9fdfc; border: 1px solid #d1f2eb;
            padding: 12px; border-radius: 15px;
        }
        .label { font-size: 0.7rem; color: #00b894; font-weight: 800; display: block; margin-bottom: 5px; }
        select { width: 100%; padding: 10px; border-radius: 10px; border: 2px solid #d1f2eb; font-family: inherit; font-size: 0.85rem; background: white; cursor: pointer; }

        /* --- データページへのリンクボタン --- */
        .data-link-btn {
            display: block; width: 100%; text-align: center;
            background: #e0f2f1; color: #00b894;
            padding: 10px; border-radius: 12px;
            font-size: 0.75rem; font-weight: 800;
            text-decoration: none; margin-bottom: 15px;
            border: 1px solid #b2dfdb;
        }

        /* --- 入力ブロック --- */
        .input-block {
            border: 1px solid #d1f2eb; border-radius: 15px;
            padding: 15px; margin-bottom: 15px;
            background: #f9fdfc;
        }
        .block-title {
            font-size: 0.85rem; font-weight: 800; color: #fff;
            padding: 5px 12px; border-radius: 50px;
            display: inline-block; margin-bottom: 12px;
        }
        .b1 { background: #ff4757; }
        .b2 { background: #1e90ff; }
        .b3 { background: #f1c40f; color: #2d3436; }

        .control-row { margin-bottom: 15px; }
        .slider-label { font-size: 0.75rem; font-weight: 800; color: #636e72; margin-bottom: 5px; display: block; }
        .slider-group { display: flex; align-items: center; gap: 12px; }
        input[type="range"] { flex: 1; cursor: pointer; accent-color: #00b894; }
        .val-disp { font-size: 1rem; font-weight: 800; color: #00b894; min-width: 55px; text-align: right; }

        .analyze-btn {
            width: 100%; padding: 18px; margin-top: 10px;
            background: #2d3436; color: #55efc4;
            border: 2px solid #00b894; border-radius: 15px;
            font-weight: 800; font-size: 1.2rem; cursor: pointer;
        }

        /* --- 結果表示 --- */
        #result-box {
            display: none; margin-top: 25px; padding: 20px;
            background: #2d3436; color: white; border-radius: 20px;
        }
        .report-header { font-size: 0.75rem; color: #55efc4; border-bottom: 1px solid #55efc4; margin-bottom: 15px; padding-bottom: 5px; }
        .report-text { font-size: 0.85rem; line-height: 1.7; color: #dfe6e9; margin: 15px 0; border-left: 3px solid #00b894; padding-left: 12px; }
        .deme-box { font-weight: 800; font-size: 1.2rem; text-align: center; color: #fff; margin-top: 5px; border: 1px solid #55efc4; padding: 10px; border-radius: 10px; }
    </style>
</head>
<body>

<div class="header-title">
    <h1>🔬 HATSUNE: PRECISION SIMULATOR</h1>
</div>

<div class="outer-frame">
    <a href="ladies_data.html" class="data-link-btn">📘 初音の女子戦攻略データを見る 🌸</a>

    <div class="top-section">
        <img src="hatsune_chara.png" class="hatsune-chara" alt="初音">
        <div class="analysis-target">
            <span class="label">SELECT STADIUM (全24場)</span>
            <select id="stadiumSelect">
                <option value="8">24 大村</option><option value="7">18 徳山</option><option value="6">21 芦屋</option>
                <option value="5">19 下関</option><option value="4">12 住之江</option><option value="3">20 若松</option>
                <option value="2">16 児島</option><option value="1">07 蒲郡</option><option value="1">08 常滑</option>
                <option value="0">17 宮島</option><option value="0">23 唐津</option><option value="0">13 尼崎</option>
                <option value="0">15 丸亀</option><option value="-1">09 津</option><option value="-2">06 浜名湖</option>
                <option value="-2">10 三国</option><option value="-3">05 多摩川</option><option value="-4">01 桐生</option>
                <option value="-5">14 鳴門</option><option value="-6">11 びわこ</option><option value="-8">03 江戸川</option>
                <option value="-9">22 福岡</option><option value="-10">04 平和島</option><option value="-12">02 戸田</option>
            </select>
        </div>
    </div>

    <div class="input-block">
        <span class="block-title b1">1号艇</span>
        <div class="control-row">
            <span class="slider-label">当地勝率</span>
            <div class="slider-group">
                <input type="range" id="localRate1" min="100" max="950" value="650" step="10" oninput="updateVal('localVal1', (this.value/100).toFixed(2))">
                <span class="val-disp" id="localVal1">6.50</span>
            </div>
        </div>
        <div class="control-row">
            <span class="slider-label">モーター2連率 / ST</span>
            <div class="slider-group">
                <input type="range" id="motorRate1" min="10" max="60" value="35" oninput="updateVal('motorVal1', this.value + '%')">
                <span class="val-disp" id="motorVal1">35%</span>
            </div>
        </div>
    </div>

    <button class="analyze-btn" onclick="analyzeDevelopment()">SIMULATE DEVELOPMENT</button>

    <div id="result-box">
        <div class="report-header">■ DEVELOPMENT REPORT</div>
        <div id="mainResult" style="font-size: 1.5rem; font-weight: 800; color: #55efc4; text-align: center;">--</div>
        <div class="report-text" id="report">--</div>
        <div class="deme-box" id="deme">---</div>
    </div>
</div>

<script>
    // 数値表示の更新
    function updateVal(id, val) { document.getElementById(id).innerText = val; }

    // シミュレーション実行 (前回のロジックに24場補正を組み込み)
    function analyzeDevelopment() {
        // ... (ここに前回の分析ロジックを入れる)
        document.getElementById('result-box').style.display = 'block';
    }
</script>

</body>
</html>
