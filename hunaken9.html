<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOAT STRIKE | 華やかピンク舟券メーカー</title>
    
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --br-pink-deep: #ff69b4;
            --br-pink-light: #fff0f6;
            --br-accent-pink: #ff1493;
            --p-star-purple: #7a46c2;
            --text-main: #333;
            --text-sub: #666;
        }

        body {
            font-family: 'M PLUS Rounded 1c', sans-serif;
            background-color: #fff5f8;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 0 0 40px 0;
            color: var(--text-main);
        }

        /* 保存用エリア */
        #capture-target { padding: 15px; background: #ffe6f0; border-radius: 10px; }
        
        .ticket {
            width: 480px; /* 少し大きくして見やすく */
            height: 300px;
            background-color: #fff;
            border: 3px solid var(--br-pink-deep);
            border-radius: 15px;
            padding: 15px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(255, 105, 180, 0.1);
        }

        /* 的中スタンプ（画像がない場合でもエラーにならないよう調整） */
        .stamp {
            position: absolute;
            width: 120px;
            z-index: 50;
            pointer-events: auto;
            cursor: move;
            filter: drop-shadow(2px 2px 4px rgba(0,0,0,0.2));
        }

        .t-header { 
            display: flex; 
            align-items: center; 
            border-bottom: 2px solid var(--br-pink-deep); 
            padding-bottom: 8px; 
            margin-bottom: 10px; 
        }

        .t-br-logo { font-size: 11px; font-weight: bold; color: var(--br-accent-pink); line-height: 1.1; margin-right: 20px; }
        .t-main-place { font-size: 38px; font-weight: 800; color: var(--p-star-purple); }

        .t-form-box { 
            position: absolute;
            right: 15px;
            background: var(--br-accent-pink);
            color: #fff; 
            padding: 4px 15px; 
            font-size: 12px; 
            font-weight: bold; 
            border-radius: 20px;
        }

        .t-body { display: flex; flex: 1; min-height: 0; }
        .t-left { width: 120px; display: flex; flex-direction: column; border-right: 1px dashed #ffc0cb; padding-right: 10px; }
        .t-sub-place { background: var(--br-pink-light); color: var(--p-star-purple); padding: 4px; font-size: 13px; font-weight: bold; text-align: center; border-radius: 8px; margin-bottom: 5px; border: 1px solid var(--br-pink-deep); }
        .t-race-num { font-size: 45px; font-weight: 800; color: var(--p-star-purple); line-height: 1; }
        .t-race-label { font-size: 16px; font-weight: bold; }
        .t-date-area { font-size: 11px; color: var(--text-sub); margin-top: auto; }

        .t-mid { width: 50px; display: flex; align-items: center; justify-content: center; }
        .t-shiki-v { writing-mode: vertical-rl; text-orientation: upright; font-size: 22px; font-weight: bold; color: #fff; background: var(--p-star-purple); padding: 12px 6px; letter-spacing: 4px; border-radius: 8px; }
        
        /* 買い目表示エリア */
        .t-right { flex: 1; padding-left: 15px; display: flex; flex-direction: column; background: #fff9fb; border-radius: 10px; margin-left: 5px; }
        #bet-list-container { flex: 1; overflow-y: auto; padding: 5px; font-size: 18px; font-weight: 800; color: var(--p-star-purple); }
        .bet-item { display: flex; justify-content: space-between; border-bottom: 1px solid #ffe4ed; padding: 2px 0; }

        .t-summary { text-align: right; font-size: 11px; padding: 5px 0; border-top: 1px solid var(--br-pink-deep); }
        .t-barcode { width: 100%; height: 12px; background: repeating-linear-gradient(90deg, var(--br-pink-deep), var(--br-pink-deep) 2px, #fff 2px, #fff 4px); opacity: 0.3; margin-top: 5px; }

        /* 操作パネル */
        .controls-container { width: 95%; max-width: 480px; margin-top: 20px; background: #fff; padding: 20px; border-radius: 20px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); }
        .section-title { font-size: 15px; font-weight: bold; color: var(--br-accent-pink); margin-bottom: 10px; display: flex; align-items: center; gap: 5px; }
        
        .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .input-field { width: 100%; padding: 10px; box-sizing: border-box; border: 1px solid #eee; border-radius: 10px; font-size: 14px; font-family: inherit; }
        
        .row { display: flex; align-items: center; gap: 8px; margin: 12px 0; }
        .label { background: var(--br-pink-light); color: var(--br-accent-pink); font-size: 12px; width: 45px; text-align: center; padding: 8px 0; font-weight: bold; border-radius: 8px; }
        .mark-wrap { display: flex; gap: 5px; }
        .mark { width: 38px; height: 38px; border: 1px solid #ddd; border-radius: 50%; background: #fff; font-weight: bold; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; }
        .mark.selected { background: var(--br-accent-pink) !important; color: #fff !important; border-color: var(--br-accent-pink) !important; transform: scale(1.1); }

        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        .save-btn { flex: 2; padding: 16px; background: var(--br-accent-pink); color: #fff; border: none; border-radius: 35px; font-weight: bold; font-size: 18px; cursor: pointer; box-shadow: 0 4px 0 #cc1076; }
        .reset-btn { flex: 1; padding: 10px; background: #fff; color: var(--text-sub); border: 1px solid #ddd; border-radius: 35px; font-size: 12px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div style="margin: 20px 0; color: var(--br-accent-pink); font-weight: bold;">💖 BOAT STRIKE 舟券メーカー 💖</div>

<div id="capture-target">
    <div class="ticket" id="ticket-main" onclick="addStamp(event)">
        <div class="t-header">
            <div class="t-br-logo">BOAT<br>RACE</div>
            <div class="t-main-place" id="res-main-place">蒲郡</div>
            <div class="t-form-box" id="res-mode-label">フォーメーション</div>
        </div>

        <div class="t-body">
            <div class="t-left">
                <div class="t-sub-place" id="res-sub-text">GAMAGORI</div>
                <div><span class="t-race-num" id="res-race">12</span><span class="t-race-label">R</span></div>
                <div style="font-size: 9px; color: #999; margin-top: 5px;" id="res-memo"></div>
                <div class="t-date-area" id="res-full-date">2026.03.15</div>
            </div>
            
            <div class="t-mid">
                <div class="t-shiki-v" id="res-shiki">３連単</div>
            </div>

            <div class="t-right">
                <div id="bet-list-container">
                    </div>
                <div class="t-summary">
                    組合せ: <span id="res-cnt" style="color:var(--br-accent-pink); font-weight:800;">0</span> 点<br>
                    合計: <span id="res-total" style="color:var(--br-accent-pink); font-weight:800;">0</span> 円
                </div>
            </div>
        </div>
        
        <div id="stamp-container"></div>
        <div class="t-barcode"></div>
    </div>
</div>

<div class="controls-container">
    <div class="section-title">📝 レース情報の編集</div>
    <div class="input-grid">
        <input type="text" id="in-main" class="input-field" placeholder="開催場（例：蒲郡）" value="蒲郡" oninput="sync()">
        <input type="text" id="in-sub" class="input-field" placeholder="英名など" value="GAMAGORI" oninput="sync()">
        <input type="number" id="in-race" class="input-field" placeholder="レース" value="12" oninput="sync()">
        <input type="text" id="in-date" class="input-field" placeholder="日付" value="2026.03.15" oninput="sync()">
    </div>

    <div class="section-title">🔢 買い目を選択</div>
    <div id="ms-rows">
        <div class="row" id="row0"><div class="label">1着</div><div class="mark-wrap" id="wrap0"></div></div>
        <div class="row" id="row1"><div class="label">2着</div><div class="mark-wrap" id="wrap1"></div></div>
        <div class="row" id="row2"><div class="label">3着</div><div class="mark-wrap" id="wrap2"></div></div>
    </div>

    <div class="section-title">💰 単価設定</div>
    <input type="number" id="in-unit" class="input-field" value="100" step="100" style="width: 120px;" oninput="update()"> 円

    <div class="btn-group">
        <button class="reset-btn" onclick="location.reload()">♻️ リセット</button>
        <button class="save-btn" onclick="saveImage()">🎀 画像を保存する</button>
    </div>
    <p style="font-size: 11px; color: #999; text-align: center; margin-top: 15px;">※舟券の上をタップすると「的中スタンプ」が押せます！</p>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<script>
    let sel = [[], [], []];

    // 初期化：ボタン生成
    window.onload = () => {
        for(let r=0; r<3; r++) {
            const wrap = document.getElementById(`wrap${r}`);
            for(let n=1; n<=6; n++) {
                const m = document.createElement('div');
                m.className = 'mark';
                m.innerText = n;
                m.onclick = () => tapMark(m, r, n);
                wrap.appendChild(m);
            }
        }
        sync();
        update();
    };

    function tapMark(el, row, num) {
        if (sel[row].includes(num)) {
            sel[row] = sel[row].filter(v => v !== num);
            el.classList.remove('selected');
        } else {
            sel[row].push(num);
            el.classList.add('selected');
        }
        update();
    }

    function sync() {
        document.getElementById('res-main-place').innerText = document.getElementById('in-main').value;
        document.getElementById('res-sub-text').innerText = document.getElementById('in-sub').value;
        document.getElementById('res-race').innerText = document.getElementById('in-race').value;
        document.getElementById('res-full-date').innerText = document.getElementById('in-date').value;
    }

    function update() {
        const container = document.getElementById('bet-list-container');
        container.innerHTML = '';
        let count = 0;
        const unit = parseInt(document.getElementById('in-unit').value) || 0;

        // フォーメーション計算
        if (sel[0].length && sel[1].length && sel[2].length) {
            sel[0].forEach(a => {
                sel[1].forEach(b => {
                    if (a === b) return;
                    sel[2].forEach(c => {
                        if (c === a || c === b) return;
                        count++;
                        const item = document.createElement('div');
                        item.className = 'bet-item';
                        item.innerHTML = `<span>${a} ▶ ${b} ▶ ${c}</span><span>${unit}円</span>`;
                        container.appendChild(item);
                    });
                });
            });
        }

        document.getElementById('res-cnt').innerText = count;
        document.getElementById('res-total').innerText = (count * unit).toLocaleString();
        
        if(count === 0) {
            container.innerHTML = '<div style="font-size:12px; color:#ccc; text-align:center; margin-top:40px;">数字を選んでください</div>';
        }
    }

    // 的中スタンプ機能
    function addStamp(event) {
        if (event.target.classList.contains('mark')) return;
        const ticket = document.getElementById('ticket-main');
        const rect = ticket.getBoundingClientRect();
        const x = event.clientX - rect.left;
        const y = event.clientY - rect.top;

        const stamp = document.createElement('img');
        // 的中スタンプの画像パス（適宜変更してください）
        stamp.src = 'stamp.png'; 
        stamp.className = 'stamp';
        stamp.style.left = (x - 60) + 'px';
        stamp.style.top = (y - 60) + 'px';
        
        // ランダムに少し傾ける
        const rotate = Math.floor(Math.random() * 30) - 15;
        stamp.style.transform = `rotate(${rotate}deg)`;

        // ダブルクリックで削除
        stamp.ondblclick = () => stamp.remove();

        document.getElementById('stamp-container').appendChild(stamp);
    }

    function saveImage() {
        const target = document.getElementById('capture-target');
        html2canvas(target, { scale: 3, backgroundColor: "#ffe6f0" }).then(canvas => {
            const link = document.createElement('a');
            link.href = canvas.toDataURL("image/png");
            link.download = 'boatstrike_pink_ticket.png';
            link.click();
        });
    }
</script>
</body>
</html>
