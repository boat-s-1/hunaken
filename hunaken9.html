<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P-STAR 舟券メーカー | 最終表示改善版</title>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --br-pink: #ff69b4;
            --br-purple: #7a46c2;
        }

        body {
            font-family: 'M PLUS Rounded 1c', sans-serif;
            background-color: #fff5f8;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
            margin: 0;
        }

        /* 舟券本体：サイズと表示を固定 */
        #capture-area {
            padding: 10px;
            background: white;
            border-radius: 20px;
        }

        .ticket {
            width: 520px;
            height: 320px;
            background: #fff;
            border: 4px solid var(--br-pink);
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            padding: 15px;
            box-sizing: border-box;
            color: var(--br-purple);
            position: relative;
        }

        .header { 
            display: flex; 
            justify-content: space-between; 
            border-bottom: 2px solid var(--br-pink);
            margin-bottom: 10px;
        }

        .main-content { 
            display: flex; 
            height: 180px; /* 高さを明示的に指定 */
        }
        
        .info-side { width: 120px; border-right: 2px dashed #ffc0cb; }
        .type-box {
            width: 45px;
            background: var(--br-purple);
            color: white;
            writing-mode: vertical-rl;
            text-orientation: upright;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            margin: 0 10px;
            border-radius: 8px;
        }

        /* 買い目リスト：スクロールと表示を強制 */
        .bet-side {
            flex: 1;
            background: #fff9fb;
            border-radius: 8px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            border: 1px solid #ffe4ed;
        }

        #bet-list {
            flex: 1;
            overflow-y: auto; /* はみ出たらスクロール */
            font-size: 24px;
            font-weight: 800;
            min-height: 120px; /* 最小高さを確保 */
        }

        .bet-row {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid #eee;
            margin-bottom: 4px;
        }

        .summary {
            text-align: right;
            font-size: 14px;
            margin-top: 10px;
            border-top: 1px solid var(--br-pink);
        }

        /* 下部の操作パネル */
        .controls {
            width: 90%;
            max-width: 480px;
            background: white;
            padding: 20px;
            border-radius: 20px;
            margin-top: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .btn-group { display: flex; gap: 8px; margin-bottom: 10px; align-items: center; }
        .num-btn {
            width: 40px; height: 40px; border: 1px solid #ddd; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-weight: bold;
        }
        .num-btn.active { background: var(--br-pink); color: white; border-color: var(--br-pink); }

        .save-btn {
            width: 100%; padding: 15px; background: #ff007f; color: white;
            border: none; border-radius: 50px; font-weight: bold; cursor: pointer;
        }
    </style>
</head>
<body>

<div id="capture-area">
    <div class="ticket">
        <div class="header">
            <div style="font-size: 38px; font-weight: 800;">蒲郡</div>
            <div style="background: var(--br-pink); color: white; padding: 4px 12px; border-radius: 20px; font-size: 14px; height: fit-content;">フォーメーション</div>
        </div>
        <div class="main-content">
            <div class="info-side">
                <div style="font-size: 50px; font-weight: 800;">12<span>R</span></div>
                <div style="font-size: 12px; color: #999; margin-top: 20px;">2026.03.15</div>
            </div>
            <div class="type-box">３連単</div>
            <div class="bet-side">
                <div id="bet-list">
                    </div>
            </div>
        </div>
        <div class="summary">
            計 <span id="res-cnt">0</span>点 / 合計 <span id="res-total">0</span>円
        </div>
    </div>
</div>

<div class="controls">
    <div class="btn-group" id="row-1"><div style="width:40px; color:var(--br-pink); font-weight:bold;">1着</div></div>
    <div class="btn-group" id="row-2"><div style="width:40px; color:var(--br-pink); font-weight:bold;">2着</div></div>
    <div class="btn-group" id="row-3"><div style="width:40px; color:var(--br-pink); font-weight:bold;">3着</div></div>
    <div style="margin: 15px 0;">
        単価: <input type="number" id="price" value="100" style="width:80px; padding:5px;"> 円
    </div>
    <button class="save-btn" onclick="takeScreenshot()">🎀 画像を保存する</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
    const sel = [[], [], []];

    // ボタン生成
    for (let r = 0; r < 3; r++) {
        const container = document.getElementById(`row-${r+1}`);
        for (let n = 1; n <= 6; n++) {
            const b = document.createElement('div');
            b.className = 'num-btn';
            b.innerText = n;
            b.onclick = function() {
                this.classList.toggle('active');
                const i = sel[r].indexOf(n);
                if (i > -1) sel[r].splice(i, 1); else sel[r].push(n);
                updateList();
            };
            container.appendChild(b);
        }
    }

    function updateList() {
        const list = document.getElementById('bet-list');
        list.innerHTML = '';
        let c = 0;
        const p = parseInt(document.getElementById('price').value) || 0;

        // 3つの列すべてに選択がある場合のみ計算
        if (sel[0].length && sel[1].length && sel[2].length) {
            for (let a of sel[0]) {
                for (let b of sel[1]) {
                    if (a === b) continue;
                    for (let c_num of sel[2]) {
                        if (c_num === a || c_num === b) continue;
                        c++;
                        const item = document.createElement('div');
                        item.className = 'bet-row';
                        item.innerHTML = `<span>${a} ▶ ${b} ▶ ${c_num}</span><span style="font-size:12px;">${p}円</span>`;
                        list.appendChild(item);
                    }
                }
            }
        }
        document.getElementById('res-cnt').innerText = c;
        document.getElementById('res-total').innerText = (c * p).toLocaleString();
    }

    function takeScreenshot() {
        html2canvas(document.querySelector("#capture-area")).then(canvas => {
            const a = document.createElement('a');
            a.href = canvas.toDataURL();
            a.download = 'p-star.png';
            a.click();
        });
    }
</script>
</body>
</html>
