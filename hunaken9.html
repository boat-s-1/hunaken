<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P-STAR 舟券メーカー | 縦並びリスト版</title>
    
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --br-pink-deep: #ff69b4;
            --br-pink-light: #fff0f6;
            --br-accent-pink: #ff1493;
            --p-star-purple: #7a46c2;
            --text-main: #333;
        }

        body {
            font-family: 'M PLUS Rounded 1c', sans-serif;
            background-color: #fff5f8;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding-bottom: 30px;
        }

        /* 舟券本体 */
        #capture-target { padding: 15px; background: #ffe6f0; }
        
        .ticket {
            width: 380px;
            height: 260px;
            background-color: #fff;
            border: 2px solid var(--br-pink-deep);
            border-radius: 12px;
            padding: 12px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(255, 105, 180, 0.1);
        }

        /* ヘッダー */
        .t-header { 
            display: flex; border-bottom: 2px solid var(--br-pink-deep); 
            padding-bottom: 5px; margin-bottom: 8px; position: relative;
        }
        .t-br-logo { font-size: 10px; font-weight: bold; color: var(--br-accent-pink); line-height: 1.1; margin-right: 15px; }
        .t-main-place { font-size: 28px; font-weight: 800; color: var(--p-star-purple); }
        .t-form-box { 
            position: absolute; right: 0; top: 0;
            background: var(--br-accent-pink); color: #fff; padding: 3px 12px; font-size: 11px; font-weight: bold; border-radius: 20px;
        }

        .t-body { display: flex; flex: 1; overflow: hidden; }
        
        /* 左側（場・レース情報） */
        .t-left { width: 100px; display: flex; flex-direction: column; }
        .t-sub-place { border: 2px solid var(--br-pink-deep); color: var(--p-star-purple); padding: 2px; font-size: 14px; font-weight: bold; text-align: center; border-radius: 8px; background: var(--br-pink-light); }
        .t-race-num { font-size: 32px; font-weight: bold; color: var(--p-star-purple); line-height: 1; margin-top: 5px; }
        .t-race-label { font-size: 12px; font-weight: bold; color: var(--p-star-purple); }
        .t-date-area { font-size: 9px; color: #888; margin-top: auto; }
        
        /* 中央（式別） */
        .t-mid { width: 35px; display: flex; align-items: center; justify-content: center; margin: 0 8px; }
        .t-shiki-v { writing-mode: vertical-rl; text-orientation: upright; font-size: 16px; font-weight: 800; color: #fff; background: var(--p-star-purple); padding: 12px 4px; letter-spacing: 4px; border-radius: 8px; }
        
        /* 右側（ここが新しい買い目リスト） */
        .t-right { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .bet-list-container {
            flex: 1;
            overflow-y: auto;
            padding-right: 5px;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        /* スクロールバー隠し（保存用） */
        .bet-list-container::-webkit-scrollbar { width: 0; }

        .bet-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 3px 6px;
            background: var(--br-pink-light);
            border-radius: 4px;
            font-size: 18px;
            font-weight: 800;
            color: var(--p-star-purple);
            border-bottom: 1px solid rgba(255, 105, 180, 0.2);
        }
        .unit-price { font-size: 10px; font-weight: normal; color: var(--text-main); }

        .t-summary { text-align: right; font-size: 10px; color: #666; padding-top: 5px; border-top: 1px solid #eee; }
        .t-barcode { width: 100%; height: 10px; background: repeating-linear-gradient(90deg, var(--br-pink-deep), var(--br-pink-deep) 2px, #fff 2px, #fff 4px); margin-top: 5px; border-radius: 5px; opacity: 0.2; }

        /* 操作パネル */
        .controls { width: 95%; max-width: 400px; background: #fff; padding: 15px; border-radius: 15px; border-top: 4px solid var(--br-pink-deep); margin-top: 15px; box-sizing: border-box; }
        .row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
        .label { background: var(--br-pink-light); color: var(--br-accent-pink); font-size: 12px; width: 45px; text-align: center; padding: 6px 0; font-weight: bold; border-radius: 5px; }
        .mark-wrap { display: flex; gap: 4px; flex-wrap: wrap; }
        .mark { width: 34px; height: 34px; border: 1px solid #ddd; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; font-weight: bold; }
        .mark.selected { background: var(--br-accent-pink); color: #fff; border-color: var(--br-accent-pink); }
        
        .save-btn { width: 100%; padding: 16px; background: var(--br-accent-pink); color: #fff; border: none; border-radius: 35px; font-weight: bold; font-size: 16px; cursor: pointer; box-shadow: 0 4px 0 #cc1076; margin-top: 10px; }

        #save-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; display: none; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<div id="capture-target">
    <div class="ticket" id="ticket-main">
        <div class="t-header">
            <div class="t-br-logo">BOAT<br>RACE</div>
            <div class="t-main-place" id="res-main-place">蒲郡</div>
            <div class="t-form-box">フォーメーション</div>
        </div>
        <div class="t-body">
            <div class="t-left">
                <div class="t-sub-place" id="res-sub-text">蒲郡</div>
                <div><span class="t-race-num" id="res-race">12</span><span class="t-race-label">R</span></div>
                <div class="t-date-area" id="res-date">2026.03.15</div>
            </div>
            <div class="t-mid"><div class="t-shiki-v">３連単</div></div>
            <div class="t-right">
                <div class="bet-list-container" id="bet-list">
                    </div>
                <div class="t-summary">
                    計 <span id="res-cnt" style="font-weight:bold;">0</span>点 / 合計 <span id="res-total" style="font-weight:bold;">0</span>円
                </div>
            </div>
        </div>
        <div class="t-barcode"></div>
    </div>
</div>

<div class="controls">
    <div class="row">
        <div class="label">1着</div>
        <div class="mark-wrap" id="wrap0"></div>
    </div>
    <div class="row">
        <div class="label">2着</div>
        <div class="mark-wrap" id="wrap1"></div>
    </div>
    <div class="row">
        <div class="label">3着</div>
        <div class="mark-wrap" id="wrap2"></div>
    </div>
    <div class="row">
        <div class="label">単価</div>
        <input type="number" id="in-unit" value="100" step="100" style="width:100px; padding:8px; border-radius:8px; border:1px solid #ddd;" oninput="update()"> 円
    </div>
    <button class="save-btn" onclick="save()">🎀 画像を保存する</button>
</div>

<div id="save-modal" onclick="this.style.display='none'">
    <p style="color:#fff; font-weight:bold;">長押しで保存してね🌟</p>
    <img id="saved-image" style="width:90%; border-radius:10px;">
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<script>
    let sel = [[], [], []];

    // 初期化：ボタン生成
    window.onload = () => {
        for(let r=0; r<3; r++) {
            const wrap = document.getElementById('wrap' + r);
            for(let i=1; i<=6; i++) {
                const m = document.createElement('div');
                m.className = 'mark';
                m.innerText = i;
                m.onclick = () => {
                    if(sel[r].includes(i)) sel[r] = sel[r].filter(v => v !== i);
                    else sel[r].push(i);
                    m.classList.toggle('selected');
                    update();
                };
                wrap.appendChild(m);
            }
        }
    };

    function update() {
        const list = document.getElementById('bet-list');
        list.innerHTML = '';
        let combos = [];
        const unit = parseInt(document.getElementById('in-unit').value) || 0;

        // 3連単全組み合わせ計算
        if(sel[0].length && sel[1].length && sel[2].length) {
            sel[0].forEach(a => {
                sel[1].forEach(b => {
                    if(a === b) return;
                    sel[2].forEach(c => {
                        if(c === a || c === b) return;
                        combos.push(`${a}-${b}-${c}`);
                    });
                });
            });
        }

        combos.forEach(txt => {
            const div = document.createElement('div');
            div.className = 'bet-item';
            div.innerHTML = `<span>${txt}</span><span class="unit-price">${unit}円</span>`;
            list.appendChild(div);
        });

        document.getElementById('res-cnt').innerText = combos.length;
        document.getElementById('res-total').innerText = (combos.length * unit).toLocaleString();
    }

    function save() {
        const target = document.getElementById('capture-target');
        html2canvas(target, { scale: 3, backgroundColor: "#ffe6f0" }).then(canvas => {
            document.getElementById('saved-image').src = canvas.toDataURL();
            document.getElementById('save-modal').style.display = 'flex';
        });
    }
</script>
</body>
</html>
