<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P-STAR 舟券メーカー | 修正版</title>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --br-pink: #ff69b4;
            --br-purple: #7a46c2;
            --bg-light: #fff5f8;
        }

        body {
            font-family: 'M PLUS Rounded 1c', sans-serif;
            background-color: var(--bg-light);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
            margin: 0;
        }

        /* 舟券の見た目 */
        #capture-area {
            padding: 10px;
            background: white;
            border-radius: 15px;
        }

        .ticket {
            width: 500px;
            height: 300px;
            background: white;
            border: 3px solid var(--br-pink);
            border-radius: 15px;
            position: relative;
            display: flex;
            flex-direction: column;
            padding: 15px;
            box-sizing: border-box;
            color: var(--br-purple);
        }

        .header { display: flex; justify-content: space-between; border-bottom: 2px solid var(--br-pink); padding-bottom: 5px; }
        .place-name { font-size: 36px; font-weight: 800; }
        .formation-tag { background: #ff4da6; color: white; border-radius: 20px; padding: 5px 15px; height: fit-content; font-size: 14px; }

        .main-content { display: flex; flex: 1; margin-top: 10px; }
        
        /* 左側情報 */
        .info-side { width: 140px; display: flex; flex-direction: column; border-right: 1px dashed #ccc; }
        .race-num { font-size: 50px; line-height: 1; }
        .race-num span { font-size: 20px; }
        .date { font-size: 12px; margin-top: auto; color: #999; }

        /* 中央（式別） */
        .type-box {
            width: 45px;
            background: var(--br-purple);
            color: white;
            writing-mode: vertical-rl;
            text-orientation: upright;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: 800;
            margin: 0 10px;
            border-radius: 10px;
            letter-spacing: 5px;
        }

        /* 右側：買い目リストエリア (ここを強化しました) */
        .bet-side {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #fdf2f7;
            border-radius: 8px;
            padding: 5px;
            overflow: hidden;
        }

        #bet-list {
            flex: 1;
            overflow-y: auto;
            font-size: 20px;
            font-weight: 800;
            line-height: 1.4;
        }

        .bet-row {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255,105,180,0.2);
            padding: 2px 5px;
        }

        .summary {
            font-size: 12px;
            text-align: right;
            border-top: 1px solid var(--br-pink);
            padding-top: 3px;
            color: #666;
        }

        /* 操作パネル */
        .controls {
            width: 90%;
            max-width: 450px;
            background: white;
            margin-top: 20px;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        .btn-group { display: flex; gap: 5px; margin-bottom: 15px; align-items: center; }
        .btn-label { width: 40px; font-weight: bold; color: var(--br-pink); }
        .num-btn {
            width: 40px; height: 40px; border: 1px solid #ddd; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-weight: bold; transition: 0.2s;
        }
        .num-btn.active { background: #ff4da6; color: white; border-color: #ff4da6; }

        .save-btn {
            width: 100%; padding: 15px; background: #ff007f; color: white;
            border: none; border-radius: 50px; font-size: 18px; font-weight: bold;
            cursor: pointer; margin-top: 10px; box-shadow: 0 4px 0 #b30059;
        }
    </style>
</head>
<body>

<div id="capture-area">
    <div class="ticket">
        <div class="header">
            <div class="place-name">蒲郡</div>
            <div class="formation-tag">フォーメーション</div>
        </div>
        <div class="main-content">
            <div class="info-side">
                <div class="race-num">12<span>R</span></div>
                <div class="date">2026.03.15</div>
            </div>
            <div class="type-box">３連単</div>
            <div class="bet-side">
                <div id="bet-list">
                    </div>
                <div class="summary">
                    計 <span id="res-cnt">0</span>点 / 合計 <span id="res-total">0</span>円
                </div>
            </div>
        </div>
    </div>
</div>

<div class="controls">
    <div class="btn-group" id="row-1">
        <div class="btn-label">1着</div>
    </div>
    <div class="btn-group" id="row-2">
        <div class="btn-label">2着</div>
    </div>
    <div class="btn-group" id="row-3">
        <div class="btn-label">3着</div>
    </div>
    <div style="margin: 15px 0;">
        単価: <input type="number" id="price" value="100" step="100" style="width:80px; padding:5px;" oninput="render()"> 円
    </div>
    <button class="save-btn" onclick="takeScreenshot()">🎀 画像を保存する</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
    const selections = [[], [], []];

    // ボタン生成
    for (let r = 0; r < 3; r++) {
        const row = document.getElementById(`row-${r+1}`);
        for (let n = 1; n <= 6; n++) {
            const btn = document.createElement('div');
            btn.className = 'num-btn';
            btn.innerText = n;
            btn.onclick = () => {
                const idx = selections[r].indexOf(n);
                if (idx > -1) selections[r].splice(idx, 1);
                else selections[r].push(n);
                btn.classList.toggle('active');
                render();
            };
            row.appendChild(btn);
        }
    }

    function render() {
        const listDiv = document.getElementById('bet-list');
        listDiv.innerHTML = '';
        let count = 0;
        const price = parseInt(document.getElementById('price').value) || 0;

        if (selections[0].length && selections[1].length && selections[2].length) {
            selections[0].forEach(a => {
                selections[1].forEach(b => {
                    if (a === b) return;
                    selections[2].forEach(c => {
                        if (c === a || c === b) return;
                        count++;
                        const row = document.createElement('div');
                        row.className = 'bet-row';
                        row.innerHTML = `<span>${a} ▶ ${b} ▶ ${c}</span><span>${price}円</span>`;
                        listDiv.appendChild(row);
                    });
                });
            });
        }
        document.getElementById('res-cnt').innerText = count;
        document.getElementById('res-total').innerText = (count * price).toLocaleString();
    }

    function takeScreenshot() {
        html2canvas(document.querySelector("#capture-area")).then(canvas => {
            const link = document.createElement('a');
            link.download = 'p-star_hunaken.png';
            link.href = canvas.toDataURL();
            link.click();
        });
    }
</script>
</body>
</html>
