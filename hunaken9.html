<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P-STAR 舟券メーカー | 完成版</title>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --br-pink: #ff69b4;
            --br-purple: #7a46c2;
            --soft-pink: #fff0f6;
        }

        body {
            font-family: 'M PLUS Rounded 1c', sans-serif;
            background-color: #fff5f8;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
            margin: 0;
        }

        /* 舟券デザイン */
        #capture-area {
            padding: 15px;
            background: white;
            border-radius: 20px;
        }

        .ticket {
            width: 520px;
            height: 320px;
            background: white;
            border: 4px solid var(--br-pink);
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            padding: 15px;
            box-sizing: border-box;
            color: var(--br-purple);
            position: relative;
            /* 背景にキャラを薄く入れる場合はここにURLを指定 */
            background-image: linear-gradient(rgba(255,255,255,0.8), rgba(255,255,255,0.8));
            background-size: cover;
        }

        .header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            border-bottom: 2px solid var(--br-pink);
            margin-bottom: 12px;
            padding-bottom: 5px;
        }
        .place-name { font-size: 42px; font-weight: 800; letter-spacing: 2px; }
        .tag { background: var(--br-pink); color: white; padding: 4px 15px; border-radius: 20px; font-size: 14px; font-weight: 800; }

        .main-content { display: flex; flex: 1; height: 180px; }
        
        .info-side { 
            width: 125px; 
            border-right: 2px dashed #ffc0cb; 
            display: flex; 
            flex-direction: column;
        }
        .race-num { font-size: 60px; font-weight: 800; line-height: 1; margin-top: 10px; }
        .race-num span { font-size: 24px; }
        .date { font-size: 13px; color: #999; margin-top: auto; }

        .type-box {
            width: 48px;
            background: var(--br-purple);
            color: white;
            writing-mode: vertical-rl;
            text-orientation: upright;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: 800;
            margin: 0 15px;
            border-radius: 10px;
            letter-spacing: 6px;
        }

        /* 買い目リストエリア */
        .bet-side {
            flex: 1;
            background: #fff9fb;
            border: 1px solid #ffe4ed;
            border-radius: 10px;
            padding: 8px;
            display: flex;
            flex-direction: column;
        }

        #bet-list {
            flex: 1;
            overflow-y: auto;
            font-size: 24px;
            font-weight: 800;
            color: var(--br-purple);
        }

        .bet-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #f0f0f0;
            padding: 3px 0;
        }
        .unit { font-size: 12px; color: #666; font-weight: normal; }

        .summary {
            text-align: right;
            font-size: 14px;
            padding-top: 8px;
            border-top: 2px solid var(--br-pink);
            margin-top: 8px;
        }

        /* 操作パネル */
        .controls {
            width: 95%;
            max-width: 480px;
            background: white;
            padding: 20px;
            border-radius: 25px;
            margin-top: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
        }

        .row { display: flex; gap: 8px; margin-bottom: 12px; align-items: center; }
        .label { width: 45px; color: var(--br-pink); font-weight: 800; font-size: 14px; }
        .num-btn {
            width: 42px; height: 42px; border: 2px solid #eee; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-weight: bold; font-size: 18px; transition: 0.2s;
        }
        .num-btn.active { background: var(--br-pink); color: white; border-color: var(--br-pink); }

        .save-btn {
            width: 100%; padding: 18px; background: #ff007f; color: white;
            border: none; border-radius: 50px; font-size: 18px; font-weight: bold;
            cursor: pointer; margin-top: 15px; box-shadow: 0 5px 0 #b30059;
        }
    </style>
</head>
<body>

<div id="capture-area">
    <div class="ticket">
        <div class="header">
            <div class="place-name">蒲郡</div>
            <div class="tag">フォーメーション</div>
        </div>
        <div class="main-content">
            <div class="info-side">
                <div class="race-num">12<span>R</span></div>
                <div class="date">2026.03.15</div>
            </div>
            <div class="type-box">３連単</div>
            <div class="bet-side">
                <div id="bet-list">
                    </div>
            </div>
        </div>
        <div class="summary">
            計 <span id="res-cnt" style="font-weight:bold; color:var(--br-pink);">0</span>点 / 
            合計 <span id="res-total" style="font-weight:bold; color:var(--br-pink);">0</span>円
        </div>
    </div>
</div>

<div class="controls">
    <div class="row" id="row-1"><div class="label">1着</div></div>
    <div class="row" id="row-2"><div class="label">2着</div></div>
    <div class="row" id="row-3"><div class="label">3着</div></div>
    
    <div style="margin: 20px 0; border-top: 1px solid #eee; padding-top: 15px; display:flex; align-items:center; gap:10px;">
        単価: <input type="number" id="price" value="100" step="100" style="width:100px; padding:8px; border-radius:10px; border:1px solid #ddd; font-size:16px;" oninput="update()"> 円
    </div>
    
    <button class="save-btn" onclick="takeSave()">🎀 画像を保存する</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
    const sel = [[], [], []];

    // 初期化
    window.onload = () => {
        for (let r = 0; r < 3; r++) {
            const container = document.getElementById(`row-${r+1}`);
            for (let n = 1; n <= 6; n++) {
                const btn = document.createElement('div');
                btn.className = 'num-btn';
                btn.innerText = n;
                btn.onclick = function() {
                    const idx = sel[r].indexOf(n);
                    if (idx > -1) {
                        sel[r].splice(idx, 1);
                        this.classList.remove('active');
                    } else {
                        sel[r].push(n);
                        this.classList.add('active');
                    }
                    update();
                };
                container.appendChild(btn);
            }
        }
        update();
    };

    function update() {
        const list = document.getElementById('bet-list');
        list.innerHTML = '';
        let count = 0;
        const price = parseInt(document.getElementById('price').value) || 0;

        if (sel[0].length && sel[1].length && sel[2].length) {
            for (let a of sel[0]) {
                for (let b of sel[1]) {
                    if (a === b) continue;
                    for (let c of sel[2]) {
                        if (c === a || c === b) continue;
                        count++;
                        const item = document.createElement('div');
                        item.className = 'bet-row';
                        item.innerHTML = `<span>${a} ▶ ${b} ▶ ${c}</span><span class="unit">${price}円</span>`;
                        list.appendChild(item);
                    }
                }
            }
        }
        
        document.getElementById('res-cnt').innerText = count;
        document.getElementById('res-total').innerText = (count * price).toLocaleString();
        if(count === 0) list.innerHTML = '<div style="font-size:14px; color:#ccc; text-align:center; margin-top:40px;">数字を選択してください</div>';
    }

    function takeSave() {
        const target = document.querySelector("#capture-area");
        html2canvas(target, { scale: 2 }).then(canvas => {
            const link = document.createElement('a');
            link.href = canvas.toDataURL();
            link.download = 'p-star_hunaken.png';
            link.click();
        });
    }
</script>
</body>
</html>
