<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P-STAR 投稿ライブラリ | 全表示イエロー舟券メーカー</title>
    
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --br-yellow-deep: #ffcc00;
            --br-yellow-light: #fff9e6;
            --br-orange: #ff9500;
            --p-star-purple: #7a46c2;
            --sheet-bg: #fff;
            --text-main: #333;
            --text-sub: #666;
        }

        body {
            font-family: 'M PLUS Rounded 1c', sans-serif;
            background-color: #fcfaf0;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 0 0 20px 0;
            color: var(--text-main);
        }

        .top-menu { 
            width: 100%; 
            background: #fff; 
            display: flex; 
            justify-content: center; 
            padding: 10px 0; 
            border-bottom: 1px solid #eee; 
            margin-bottom: 15px; 
            position: sticky; top: 0; z-index: 100;
        }
        .top-menu a { color: var(--text-main); text-decoration: none; font-size: 11px; font-weight: bold; padding: 5px 10px; border-radius: 20px; }
        .top-menu a.active { background: var(--br-yellow-deep); color: #000; }

        #capture-target { padding: 10px; background: #fff4c2; }
        
        .ticket {
            width: 380px;
            height: auto; /* 高さを可変に */
            min-height: 260px;
            background-color: #fff;
            border: 2px solid var(--br-yellow-deep);
            border-radius: 12px;
            padding: 12px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .t-header { 
            display: flex; 
            align-items: center; 
            border-bottom: 2px solid var(--br-yellow-deep); 
            padding-bottom: 5px; 
            margin-bottom: 8px; 
            position: relative;
            z-index: 5; 
        }

        .t-br-logo { font-size: 10px; font-weight: bold; color: var(--br-orange); line-height: 1.1; margin-right: 15px; }
        .t-main-place { font-size: 30px; font-weight: 700; color: var(--p-star-purple); }

        .t-form-box { 
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            background: var(--br-orange);
            color: #fff; 
            padding: 3px 12px; 
            font-size: 11px; 
            font-weight: bold; 
            border-radius: 20px;
            z-index: 10;
        }

        .t-body { display: flex; flex: 1; z-index: 1; position: relative; }
        .t-left { width: 130px; display: flex; flex-direction: column; padding-top: 5px; }
        .t-sub-place { border: 2px solid var(--br-yellow-deep); color: var(--p-star-purple); padding: 3px 5px; font-size: 14px; font-weight: bold; text-align: center; border-radius: 10px; margin-bottom: 8px; background: var(--br-yellow-light); }
        .t-race-num { font-size: 36px; font-weight: bold; color: var(--p-star-purple); line-height: 1; }
        .t-race-label { font-size: 14px; font-weight: bold; color: var(--p-star-purple); }
        .t-memo-area { margin-top: 10px; margin-bottom: auto; font-size: 9px; color: var(--text-sub); white-space: pre-wrap; }
        
        .t-mid { width: 40px; display: flex; align-items: flex-start; justify-content: center; padding-top: 10px; }
        .t-shiki-v { writing-mode: vertical-rl; text-orientation: upright; font-size: 20px; font-weight: bold; color: #fff; background: var(--p-star-purple); padding: 15px 6px; letter-spacing: 6px; border-radius: 10px; }
        
        .t-right { flex: 1; padding-left: 10px; display: flex; flex-direction: column; color: var(--text-main); }
        
        /* 🚩 ここがポイント：買い目全表示用スタイル */
        .bet-list { 
            font-family: monospace; 
            font-size: 15px; 
            font-weight: bold; 
            color: var(--text-main); 
            line-height: 1.4;
            max-height: 400px;
            overflow-y: hidden;
        }
        .bet-item { display: flex; align-items: center; margin-bottom: 2px; border-bottom: 1px dotted #eee; }
        .bet-num-box { border: 1px solid #333; width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; margin: 0 2px; }
        .bet-arrow { font-size: 10px; color: #333; margin: 0 2px; }
        .bet-amt { margin-left: auto; font-size: 13px; color: #444; }

        .t-summary-row { margin-top: 10px; padding-top: 5px; border-top: 2px solid #333; text-align: right; font-weight: bold; font-size: 14px; }

        .stamp-controls { width: 100%; max-width: 380px; display: flex; flex-direction: column; align-items: center; gap: 8px; margin: 15px 0; }
        .reset-btn { padding: 8px 20px; background: #fff; color: var(--text-sub); border: 1px solid #ddd; border-radius: 20px; font-size: 11px; font-weight: bold; cursor: pointer; }

        /* コントロール周り（変更なし） */
        .controls-container { width: 100%; max-width: 400px; margin-top: 10px; display: flex; flex-direction: column; padding: 0 10px; box-sizing: border-box; }
        .section-title { font-size: 14px; font-weight: bold; color: var(--br-orange); margin: 20px 0 10px 5px; }
        .input-section { background: #fff; padding: 12px; border: 1px solid #ddd; border-bottom: none; border-radius: 12px 12px 0 0; }
        .input-field { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #eee; border-radius: 8px; font-size: 14px; margin-bottom: 6px; }
        .ms { background: var(--sheet-bg); padding: 10px; border: 1px solid #ddd; border-top: 4px solid var(--br-yellow-deep); border-radius: 0 0 12px 12px; }
        .toggle-group { display: flex; gap: 5px; margin-bottom: 8px; }
        .m-btn { flex: 1; text-align: center; padding: 6px; font-size: 11px; font-weight: bold; cursor: pointer; border-radius: 20px; color: #888; background: #fff; border: 1px solid #ddd; }
        .m-btn.active { background: var(--br-yellow-deep); color: #000; border-color: var(--br-yellow-deep); }
        .row { display: flex; align-items: center; gap: 8px; margin: 10px 0; }
        .label { background: var(--br-yellow-light); color: var(--br-orange); font-size: 12px; width: 45px; text-align: center; padding: 6px 0; font-weight: bold; border-radius: 5px; }
        .mark { width: 34px; height: 34px; border: 1px solid #ddd; border-radius: 50%; background: #fff; font-weight: bold; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .mark.selected { background: var(--br-orange) !important; color: #fff !important; }
        .amt-input-field { width: 80px; border: 1px solid #eee; border-radius: 8px; padding: 5px; text-align: right; }

        .btn-container { display: flex; gap: 10px; width: 95%; max-width: 400px; margin-top: 20px; }
        .save-btn { flex: 1; padding: 16px; background: var(--br-orange); color: #fff; border: none; border-radius: 35px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div id="capture-target">
    <div class="ticket" id="ticket-main">
        <div class="t-header">
            <div class="t-br-logo">BOAT<br>RACE</div>
            <div class="t-main-place" id="res-main-place">平和島</div>
            <div class="t-form-box" id="res-mode-label">フォーメーション</div>
        </div>
        <div class="t-body">
            <div class="t-left">
                <div class="t-sub-place" id="res-sub-text">平和島</div>
                <div><span class="t-race-num" id="res-race">01</span><span class="t-race-label">レース</span></div>
                <div class="t-memo-area" id="res-memo">03年度<br>第04回07日</div>
                <div style="font-size:9px; color:#666;" id="res-full-date">2026年3月15日</div>
            </div>
            <div class="t-mid">
                <div class="t-shiki-v" id="res-shiki">３連単</div>
            </div>
            <div class="t-right">
                <div id="bet-list" class="bet-list"></div>
                
                <div class="t-summary-row">
                    合計 ★<span id="res-cnt">0</span>枚券 ★<span id="res-total">0</span>円
                </div>
            </div>
        </div>
        <div class="t-barcode" style="margin-top: 15px;"></div>
    </div>
</div>

<div class="controls-container">
    <div class="section-title">🛍️ 舟券情報の編集</div>
    <div class="input-section">
        <input type="text" id="in-main" class="input-field" value="平和島" oninput="sync()">
        <textarea id="in-memo" class="input-field" rows="2" oninput="sync()">03年度&#13;&#10;第04回07日</textarea>
    </div>

    <div class="ms">
        <div class="toggle-group">
            <div class="m-btn active" onclick="setShiki(3, this)">３連単</div>
            <div class="m-btn" onclick="setShiki(2, this)">２連単</div>
        </div>
        
        <div id="ms-rows">
            <div class="row"><div class="label">1着</div><div class="mark-wrap" style="display:flex; gap:4px;">
                <div class="mark" onclick="tapMark(this,0,1)">1</div><div class="mark" onclick="tapMark(this,0,2)">2</div><div class="mark" onclick="tapMark(this,0,3)">3</div><div class="mark" onclick="tapMark(this,0,4)">4</div><div class="mark" onclick="tapMark(this,0,5)">5</div><div class="mark" onclick="tapMark(this,0,6)">6</div>
            </div></div>
            <div class="row"><div class="label">2着</div><div class="mark-wrap" style="display:flex; gap:4px;">
                <div class="mark" onclick="tapMark(this,1,1)">1</div><div class="mark" onclick="tapMark(this,1,2)">2</div><div class="mark" onclick="tapMark(this,1,3)">3</div><div class="mark" onclick="tapMark(this,1,4)">4</div><div class="mark" onclick="tapMark(this,1,5)">5</div><div class="mark" onclick="tapMark(this,1,6)">6</div>
            </div></div>
            <div id="row-3rd" class="row"><div class="label">3着</div><div class="mark-wrap" style="display:flex; gap:4px;">
                <div class="mark" onclick="tapMark(this,2,1)">1</div><div class="mark" onclick="tapMark(this,2,2)">2</div><div class="mark" onclick="tapMark(this,2,3)">3</div><div class="mark" onclick="tapMark(this,2,4)">4</div><div class="mark" onclick="tapMark(this,2,5)">5</div><div class="mark" onclick="tapMark(this,2,6)">6</div>
            </div></div>
        </div>
        <div class="row">
            <div class="label">単価</div>
            <input type="number" id="in-unit" class="amt-input-field" value="100" step="100" oninput="update()"> 円
        </div>
    </div>
</div>

<div class="btn-container">
    <button class="save-btn" onclick="save()">🎀 画像を保存</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
    let shiki = 3;
    let sel = [[], [], []];

    function tapMark(el, row, num) {
        if (sel[row].includes(num)) sel[row] = sel[row].filter(v => v !== num);
        else sel[row].push(num);
        el.classList.toggle('selected');
        update();
    }

    function setShiki(s, el) {
        shiki = s;
        document.querySelectorAll('.toggle-group .m-btn').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
        document.getElementById('row-3rd').style.display = (s === 3) ? 'flex' : 'none';
        document.getElementById('res-shiki').innerText = (s === 3) ? '３連単' : '２連単';
        update();
    }

    function sync() {
        document.getElementById('res-main-place').innerText = document.getElementById('in-main').value;
        document.getElementById('res-sub-text').innerText = document.getElementById('in-main').value;
        document.getElementById('res-memo').innerText = document.getElementById('in-memo').value;
    }

    function update() {
        const listDiv = document.getElementById('bet-list');
        listDiv.innerHTML = '';
        let combinations = [];
        let unit = parseInt(document.getElementById('in-unit').value) || 0;

        // 組み合わせ計算
        for (let a of sel[0]) {
            for (let b of sel[1]) {
                if (a === b) continue;
                if (shiki === 3) {
                    for (let c of sel[2]) {
                        if (c === a || c === b) continue;
                        combinations.push([a, b, c]);
                    }
                } else {
                    combinations.push([a, b]);
                }
            }
        }

        // 🚩 実際の舟券のように全表示
        combinations.forEach(combo => {
            const item = document.createElement('div');
            item.className = 'bet-item';
            let html = `<div class="bet-num-box">${combo[0]}</div><div class="bet-arrow">▶</div><div class="bet-num-box">${combo[1]}</div>`;
            if (shiki === 3) html += `<div class="bet-arrow">▶</div><div class="bet-num-box">${combo[2]}</div>`;
            html += `<div class="bet-amt">★★${unit.toLocaleString()}円</div>`;
            item.innerHTML = html;
            listDiv.appendChild(item);
        });

        document.getElementById('res-cnt').innerText = combinations.length;
        document.getElementById('res-total').innerText = (combinations.length * unit).toLocaleString();
    }

    function save() {
        html2canvas(document.getElementById('capture-target'), { scale: 3 }).then(canvas => {
            const link = document.createElement('a');
            link.href = canvas.toDataURL();
            link.download = 'p-star-ticket.png';
            link.click();
        });
    }
</script>
</body>
</html>
