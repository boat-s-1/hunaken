<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>漫画ビューアー</title>
  
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />

  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #111; /* 漫画が映えるように背景を黒に設定 */
      color: #fff;
      font-family: sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    /* ビューアー全体のサイズ設定 */
    .swiper {
      width: 100%;
      max-width: 650px; /* PCでの最大の幅 */
      height: 85vh;      /* 画面の高さに合わせる */
      background-color: #000;
    }

    /* 各スライド（漫画のページ） */
    .swiper-slide {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* 画像の表示サイズを調整 */
    .swiper-slide img {
      width: 100%;
      height: 100%;
      object-fit: contain; /* アスペクト比を維持し、画像全体を表示 */
    }

    /* ナビゲーション矢印の色 */
    .swiper-button-next,
    .swiper-button-prev {
      color: #ffffff;
    }

    /* ページ番号（ページネーション）の文字色 */
    .swiper-pagination {
      color: #ffffff;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <div class="swiper">
    <div class="swiper-wrapper">
      
      <div class="swiper-slide"><img src="6cb4c4c3-d563-493c-805a-f21378fa7ff0.png" alt="1ページ目"></div>
      <div class="swiper-slide"><img src="f91e01e3-239a-4479-952d-d6d4fc4a31c7.png" alt="2ページ目"></div>
      <div class="swiper-slide"><img src="6e77ea7b-f117-4126-a593-5e07ab9038da.png" alt="3ページ目"></div>
      <div class="swiper-slide"><img src="5187fa5b-5704-4434-ba90-9203f005f849.png" alt="4ページ目"></div>
      <div class="swiper-slide"><img src="4ebb1476-b362-45e9-8e29-366ec6f932af.png" alt="5ページ目"></div>
      <div class="swiper-slide"><img src="44b9489a-1d01-497c-acea-4a59014a8245.png" alt="6ページ目"></div>
      <div class="swiper-slide"><img src="c90bc37c-ec72-452b-a870-05fa4cfd15af.png" alt="7ページ目"></div>
      <div class="swiper-slide"><img src="37eca5b8-387d-4fb4-b6a3-94e242bb98b4.png" alt="8ページ目"></div>
      <div class="swiper-slide"><img src="10921ae3-f826-475f-a2b8-fa167be7d3b9.png" alt="9ページ目"></div>
      <div class="swiper-slide"><img src="1e0965f5-00b5-41a3-9432-86051a6d94b2.png" alt="10ページ目"></div>
     <div class="swiper-slide"><img src="eb8e0642-39e7-480d-9e23-ef96f5dea549.png" alt="11ページ目"></div
    </div>

    <div class="swiper-pagination"></div>

    <div class="swiper-button-prev"></div>
    <div class="swiper-button-next"></div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
  
  <script>
    const swiper = new Swiper('.swiper', {
      direction: 'horizontal', // 左右の動き
      loop: false,             // 最後のページで止める

      // ※ 日本の漫画のように右から左へめくりたい場合は、
      // 以下の「 // rtl: true, 」の「//」を消して「rtl: true,」にしてください。
      // rtl: true,

      pagination: {
        el: '.swiper-pagination',
        type: 'fraction', // 表示形式を「1 / 10」にする
      },

      navigation: {
        nextEl: '.swiper-button-next',
        prevEl: '.swiper-button-prev',
      },
    });
  </script>
</body>
</html>
