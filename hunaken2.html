<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ボートレース予想 3連単</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --br-blue: #2c559b; --br-orange: #f39800; --sheet-bg: #fffbf0; }
        body { font-family: sans-serif; background-color: #ccc; display: flex; flex-direction: column; align-items: center; margin: 0; padding: 10px; -webkit-user-select: none; }

        /* --- 舟券デザイン --- */
        #capture-target { padding: 5px; background: #ccc; }
        .ticket { width: 360px; height: 220px; background: #fff; border: 1px solid #333; padding: 8px; box-sizing: border-box; display: flex; flex-direction: column; position: relative; }
        .t-top-row { display: flex; flex: 1; }
        .t-left { width: 110px; border-right: 1.5px solid #000; display: flex; flex-direction: column; padding-right: 5px; }
        .t-mid { width: 45px; display: flex; align-items: center; justify-content: center; }
        .t-right { flex: 1; padding-left: 10px; display: flex; flex-direction: column; }
        .t-place-label { border: 1.5px solid #000; padding: 2px; text-align: center; margin: 5px 0; font-size: 20px; font-weight: bold; }
        .t-shiki-v { writing-mode: vertical-rl; text-orientation: upright; font-size: 18px; font-weight: bold; border: 1.5px solid #000; padding: 12px 4px; letter-spacing: 4px; }
        .t-bet-line { display: flex; align-items: center; font-weight: bold; height: 32px; font-size: 14px; }
        .t-nums { font-size: 20px; margin-left: 10px; letter-spacing: 2px; }
        .t-summary { text-align: right; font-size: 11px; font-weight: bold; line-height: 1.2; margin-top: auto; }
        .t-barcode { width: 100%; height: 20px; background: repeating-linear-gradient(90deg, #000, #000 2px, #fff 2px, #fff 4px); margin-top: 5px; }

        /* --- マークシートデザイン（最初からHTMLで記述） --- */
        .ms { background: var(--sheet-bg); width: 100%; max-width: 380px; padding: 12px; border: 2px solid var(--br-orange); border-left: 12px solid var(--br-orange); box-sizing: border-box; margin-top: 10px; }
        .ms-top-grid { display: grid; grid-template-columns: 130px 1fr; gap: 8px; margin-bottom: 10px; }
        .ms-race-area { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; border: 1.2px solid var(--br-orange); padding: 4px; background: #fff; }
        .ms-place-area { display: flex; overflow-x: auto; border: 1.2px solid var(--br-orange); padding: 4px; background: #fff; gap: 4px; height: 100px; }
        
        .ms-btn, .p-btn, .amt-btn { border: 1px solid var(--br-orange); background: #fff; color: var(--br-orange); font-weight: bold; display: flex; align-items: center; justify-content: center; font-size: 10px; cursor: pointer; }
        .p-btn { min-width: 28px; writing-mode: vertical-rl; padding: 4px 0; }
        .active { background: var(--br-orange) !important; color: #fff !important; }

        .row { display: flex; align-items: center; gap: 8px; margin: 10px 0; }
        .label { background: var(--br-blue); color: #fff; font-size: 11px; width: 45px; text-align: center; padding: 6px 0; font-weight: bold; border-radius: 2px; }
        .mark-wrap { display: flex; gap: 6px; }
        .mark { width: 32px; height: 38px; border: 1.5px solid #444; border-radius: 50% / 30%; background: #fff; font-weight: bold; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 18px; }
        .mark.selected { background: #222 !important; color: #fff !important; }

        .amt-row { display: flex; justify-content: flex-end; gap: 5px; margin-top: 10px; padding-top: 8px; border-top: 1px dashed var(--br-orange); }
        .save-btn { margin-top: 20px; padding: 14px 40px; background: #e60012; color: #fff; border: none; border-radius: 30px; font-weight: bold; font-size: 16px; cursor: pointer; width: 100%; }
    </style>
</head>
<body>

    <div id="capture-target">
        <div class="ticket">
            <div class="t-top-row">
                <div class="t-left">
                    <div style="font-size:9px; font-weight:bold;">BOAT RACE</div>
                    <div class="t-place-label" id="res-place">平和島</div>
                    <div style="margin-bottom:auto;">
                        <span style="font-size:24px; font-weight:bold;" id="res-race">01</span><span style="font-size:14px; font-weight:bold;">レース</span>
                    </div>
                    <div style="font-size:10px; font-weight:bold; line-height:1.3;">
                        <span id="res-year">2026年</span><br><span id="res-date">2月28日</span>
                    </div>
                </div>
                <div class="t-mid"><div class="t-shiki-v">３連単</div></div>
                <div class="t-right">
                    <div style="border:1.5px solid #000; padding:1px 6px; align-self:flex-start; margin-bottom:8px; font-size:11px; font-weight:bold;">フォーメーション</div>
                    <div style="flex:1; display:flex; flex-direction:column; justify-content:center;">
                        <div class="t-bet-line">1着 － <span id="ans0" class="t-nums"></span></div>
                        <div class="t-bet-line">2着 － <span id="ans1" class="t-nums"></span></div>
                        <div class="t-bet-line">3着 － <span id="ans2" class="t-nums"></span></div>
                    </div>
                    <div class="t-summary">
                        組合せ数 ◆◆<span id="res-cnt">0</span><br>
                        各組 ◆◆◆◆<span id="res-unit">100</span>円<br>
                        合計 ◆◆◆◆◆◆<span id="res-total">0</span>円
                    </div>
                </div>
            </div>
            <div class="t-barcode"></div>
        </div>
    </div>

    <div class="ms">
        <div class="ms-top-grid">
            <div class="ms-race-area">
                <div class="ms-btn active" onclick="setRace(this,'01')">1R</div><div class="ms-btn" onclick="setRace(this,'02')">2R</div><div class="ms-btn" onclick="setRace(this,'03')">3R</div><div class="ms-btn" onclick="setRace(this,'04')">4R</div>
                <div class="ms-btn" onclick="setRace(this,'05')">5R</div><div class="ms-btn" onclick="setRace(this,'06')">6R</div><div class="ms-btn" onclick="setRace(this,'07')">7R</div><div class="ms-btn" onclick="setRace(this,'08')">8R</div>
                <div class="ms-btn" onclick="setRace(this,'09')">9R</div><div class="ms-btn" onclick="setRace(this,'10')">10R</div><div class="ms-btn" onclick="setRace(this,'11')">11R</div><div class="ms-btn" onclick="setRace(this,'12')">12R</div>
            </div>
            <div class="ms-place-area">
                <div class="p-btn active" onclick="setPlace(this,'平和島')">平和島</div>
                <div class="p-btn" onclick="setPlace(this,'桐生')">桐生</div>
                <div class="p-btn" onclick="setPlace(this,'戸田')">戸田</div>
                <div class="p-btn" onclick="setPlace(this,'江戸川')">江戸川</div>
                <div class="p-btn" onclick="setPlace(this,'多摩川')">多摩川</div>
                <div class="p-btn" onclick="setPlace(this,'浜名湖')">浜名湖</div>
            </div>
        </div>

        <div class="row"><div class="label">1着</div><div class="mark-wrap">
            <div class="mark" onclick="tapMark(this,0,1)">1</div><div class="mark" onclick="tapMark(this,0,2)">2</div><div class="mark" onclick="tapMark(this,0,3)">3</div><div class="mark" onclick="tapMark(this,0,4)">4</div><div class="mark" onclick="tapMark(this,0,5)">5</div><div class="mark" onclick="tapMark(this,0,6)">6</div>
        </div></div>
        <div class="row"><div class="label">2着</div><div class="mark-wrap">
            <div class="mark" onclick="tapMark(this,1,1)">1</div><div class="mark" onclick="tapMark(this,1,2)">2</div><div class="mark" onclick="tapMark(this,1,3)">3</div><div class="mark" onclick="tapMark(this,1,4)">4</div><div class="mark" onclick="tapMark(this,1,5)">5</div><div class="mark" onclick="tapMark(this,1,6)">6</div>
        </div></div>
        <div class="row"><div class="label">3着</div><div class="mark-wrap">
            <div class="mark" onclick="tapMark(this,2,1)">1</div><div class="mark" onclick="tapMark(this,2,2)">2</div><div class="mark" onclick="tapMark(this,2,3)">3</div><div class="mark" onclick="tapMark(this,2,4)">4</div><div class="mark" onclick="tapMark(this,2,5)">5</div><div class="mark" onclick="tapMark(this,2,6)">6</div>
        </div></div>

        <div class="amt-row">
            <div class="amt-btn active" style="padding:5px 10px;" onclick="setAmt(this,100)">100円</div>
            <div class="amt-btn" style="padding:5px 10px;" onclick="setAmt(this,500)">500円</div>
            <div class="amt-btn" style="padding:5px 10px;" onclick="setAmt(this,1000)">1000円</div>
        </div>
    </div>

    <button class="save-btn" onclick="save()">画像を保存する</button>

    <script>
        let sel = [[], [], []]; let unit = 100;
        function setRace(el,v){ document.querySelectorAll('.ms-race-area .ms-btn').forEach(x=>x.classList.remove('active')); el.classList.add('active'); document.getElementById('res-race').innerText=v; }
        function setPlace(el,v){ document.querySelectorAll('.p-btn').forEach(x=>x.classList.remove('active')); el.classList.add('active'); document.getElementById('res-place').innerText=v; }
        function tapMark(el,r,n){ if(sel[r].includes(n)) sel[r]=sel[r].filter(v=>v!==n); else sel[r].push(n); el.classList.toggle('selected'); update(); }
        function setAmt(el,v){ document.querySelectorAll('.amt-btn').forEach(x=>x.classList.remove('active')); el.classList.add('active'); unit=v; document.getElementById('res-unit').innerText=v; update(); }
        function update(){
            let cnt=0; for(let a of sel[0]) for(let b of sel[1]) for(let d of sel[2]) if(a!==b && b!==d && a!==d) cnt++;
            [0,1,2].forEach(i=>document.getElementById('ans'+i)
