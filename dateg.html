<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
/* 初音ちゃんカラー：ミントグリーン ＆ ホワイト */
body {
  font-family: 'Helvetica Neue', Arial, "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif;
  background-color: #f0fff4;
  background-image: radial-gradient(#c6f6d5 1px, transparent 1px);
  background-size: 25px 25px;
  color: #2d6a4f;
  margin: 0; padding: 10px;
}

.container {
  max-width: 650px;
  margin: auto;
  background: rgba(255, 255, 255, 0.95);
  backdrop-filter: blur(10px);
  padding: 20px;
  border-radius: 30px;
  border: 3px solid #b2f2bb;
  box-shadow: 0 10px 30px rgba(47, 158, 68, 0.1);
}

h1 {
  text-align: center;
  font-size: 22px;
  color: #2f855a;
  text-shadow: 0 0 10px rgba(178, 242, 187, 0.5);
  margin-bottom: 25px;
}

/* 24場ナビゲーション */
.stadium-nav {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 5px;
  margin-bottom: 35px;
}
.stadium-nav a {
  background: #fff;
  color: #38a169;
  text-decoration: none;
  font-size: 11px;
  padding: 10px 0;
  text-align: center;
  border-radius: 8px;
  border: 1px solid #c6f6d5;
  font-weight: bold;
}

/* 解析カード */
.venue-detail-card {
  background: white;
  border-radius: 20px;
  padding: 20px;
  margin-bottom: 40px;
  border: 2px solid #dfffee;
  box-shadow: 0 5px 15px rgba(0,0,0,0.03);
  position: relative;
  overflow: hidden;
}
.venue-detail-card::after {
  content: "🍀"; position: absolute; top: -10px; right: -10px; 
  font-size: 50px; opacity: 0.05; transform: rotate(15deg);
}

.card-header {
  border-bottom: 2px solid #b2f2bb;
  padding-bottom: 8px;
  margin-bottom: 15px;
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
}
.venue-title { font-size: 20px; font-weight: bold; color: #2f855a; }
.venue-sub { font-size: 11px; color: #888; }

/* 女子戦統計セクション */
.stats-box {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 20px;
}
.stat-item {
  background: #f7fffb;
  padding: 12px;
  border-radius: 12px;
  text-align: center;
  border: 1px solid #e6fffa;
}
.stat-label { font-size: 10px; color: #38a169; display: block; margin-bottom: 4px; }
.stat-val { font-size: 18px; font-weight: bold; color: #2d6a4f; }

/* 攻略テキスト */
.analysis-content { margin-top: 15px; }
.analysis-item { margin-bottom: 15px; }
.analysis-label {
  display: inline-block;
  background: #c6f6d5;
  color: #2f855a;
  font-size: 10px;
  font-weight: bold;
  padding: 3px 10px;
  border-radius: 20px;
  margin-bottom: 6px;
}
.analysis-text { font-size: 13px; line-height: 1.7; color: #444; }

/* 初音のひらめきアドバイス */
.hatsune-comment {
  background: #f0fff4;
  border: 1px dashed #38a169;
  padding: 12px;
  border-radius: 15px;
  font-size: 13px;
  margin-top: 15px;
  color: #2d6a4f;
  line-height: 1.5;
}
.hatsune-comment::before { content: "💬🍀 "; font-weight: bold; }

/* 鑑定所へのボタン */
.tool-btn {
  display: block;
  text-align: center;
  background: linear-gradient(135deg, #63e6be 0%, #38a169 100%);
  color: #fff;
  text-decoration: none;
  padding: 12px;
  border-radius: 30px;
  margin-top: 20px;
  font-weight: bold;
  font-size: 14px;
  box-shadow: 0 4px 12px rgba(56, 161, 105, 0.2);
}

.back-to-top { text-align: right; margin-top: 15px; }
.back-to-top a { color: #aaa; font-size: 11px; text-decoration: none; }

footer { text-align: center; margin-top: 50px; font-size: 12px; color: #999; padding-bottom: 30px; }
</style>
</head>
<body>

<div class="container">
  <h1>🍀 女子戦・24場精密解析ノート 🍀</h1>

  <div class="stadium-nav" id="nav"></div>

  <div id="content"></div>

  <footer>&copy; 2026 BOAT STRIKE Project / HATSUNE</footer>
</div>

const contentArea = document.getElementById('content');

  card.id = `v${v.id}`;
  card.innerHTML = `
    <div class="card-header">
      <div class="venue-title">${v.id}# ${v.name}</div>
