<!DOCTYPE html>
<html lang="ja">
<head>
    <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>舟券メーカー | boat-strike.com</title>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9145518658275668" crossorigin="anonymous"></script>
    <meta name="google-site-verification" content="gjZSAf-F1sn_m4mb6Yjjv4CrGE83tJfvrFHbAy7P00s" />
    <style>
        :root { --br-blue: #2c559b; --br-orange: #f39800; --sheet-bg: #fffbf0; }
        body { font-family: "Helvetica Neue", Helvetica, Arial, "Hiragino Sans", sans-serif; background-color: #ccc; display: flex; flex-direction: column; align-items: center; margin: 0; padding: 0 0 20px 0; -webkit-user-select: none; }

        /* --- 共通ヘッダーメニュー --- */
        .top-menu { width: 100%; background: #333; display: flex; justify-content: center; padding: 10px 0; position: sticky; top: 0; z-index: 100; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .menu-inner { display: flex; overflow-x: auto; width: 100%; max-width: 400px; padding: 0 10px; scrollbar-width: none; }
        .menu-inner::-webkit-scrollbar { display: none; }
        .top-menu a { color: #fff; text-decoration: none; font-size: 12px; font-weight: bold; padding: 5px 12px; margin: 0 5px; border: 1px solid #555; border-radius: 4px; background: #444; white-space: nowrap; }
        .top-menu a:hover { background: var(--br-orange); border-color: var(--br-orange); }

        /* --- 舟券デザイン --- */
        #capture-target { padding: 5px; background: #ccc; }
        .ticket { width: 380px; height: 260px; background: #fff; border: 1px solid #333; padding: 10px; box-sizing: border-box; display: flex; flex-direction: column; position: relative; overflow: hidden; }
        .ticket::before { content: "P-STAR"; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-15deg); font-size: 60px; color: rgba(0,0,0,0.03); font-weight: bold; z-index: 0; pointer-events: none; }
        
        .t-header { display: flex; align-items: flex-end; border-bottom: 1.5px solid #000; padding-bottom: 2px; margin-bottom: 5px; z-index: 1; }
        .t-br-logo { font-size: 11px; font-weight: 900; font-style: italic; line-height: 1; margin-right: 15px; }
        .t-main-place { font-size: 34px; font-weight: 900; letter-spacing: -1px; font-family: "Arial Black", sans-serif; line-height: 1; }
        .t-form-box { margin-left: auto; border: 1.5px solid #000; padding: 1px 8px; font-size: 12px; font-weight: bold; }
        
        .t-body { display: flex; flex: 1; z-index: 1; }
        .t-left { width: 135px; display: flex; flex-direction: column; padding-top: 5px; }
        .t-sub-place { border: 1.5px solid #000; padding: 2px 5px; font-size: 16px; font-weight: bold; text-align: center; width: 110px; margin-bottom: 5px; white-space: nowrap; }
        .t-race-num { font-size: 38px; font-weight: bold; line-height: 1; }
        .t-race-label { font-size: 16px; font-weight: bold; }
        .t-memo-area { margin-top: 15px; margin-bottom: auto; font-size: 9px; font-weight: bold; line-height: 1.1; white-space: pre-wrap; }
        .t-date-area { font-size: 10.5px; font-weight: bold; line-height: 1.2; margin-top: 5px; white-space: nowrap; letter-spacing: -0.5px; }
        
        .t-mid { width: 45px; display: flex; align-items: center; justify-content: center; }
        .t-shiki-v { writing-mode: vertical-rl; text-orientation: upright; font-size: 22px; font-weight: bold; border: 1.5px solid #000; padding: 15px 4px; letter-spacing: 10px; background: #fff; }
        
        .t-right { flex: 1; padding-left: 10px; display: flex; flex-direction: column; justify-content: center; }
        .t-bet-row { display: flex; align-items: center; height: 35px; font-size: 16px; font-weight: bold; }
        .t-nums { font-size: 24px; margin-left: 10px; letter-spacing: 3px; }
        
        .t-summary { text-align: right; font-size: 11px; font-weight: bold; line-height: 1.2; margin-top: auto; }
        .t-barcode { width: 100%; height: 20px; background: repeating-linear-gradient(90deg, #000, #000 2px, #fff 2px, #fff 4px); margin-top: 5px; }

        /* 操作パネル */
        .controls-container { width: 100%; max-width: 400px; margin-top: 10px; display: flex; flex-direction: column; padding: 0 10px; box-sizing: border-box; }
        .input-section { background: #fff; padding: 12px; border: 1px solid #bbb; border-bottom: none; border-radius: 8px 8px 0 0; }
        .input-field { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; margin-bottom: 6px; }

        .ms { background: var(--sheet-bg); padding: 10px; border: 4px solid var(--br-orange); border-left: 12px solid var(--br-orange); border-radius: 0 0 8px 8px; box-sizing: border-box; }
        
        .toggle-group { display: flex; gap: 5px; margin-bottom: 8px; }
        .m-btn { flex: 1; text-align: center; padding: 6px; font-size: 11px; font-weight: bold; cursor: pointer; border-radius: 18px; color: #666; background: #ddd; }
        .m-btn.active { background: #333; color: #fff; }

        .ms-top-flex { display: flex; gap: 8px; margin-bottom: 12px; }
        .ms-race-grid { flex: 1; display: grid; grid-template-columns: repeat(4, 1fr); gap: 3px; border: 1px solid var(--br-orange); padding: 4px; background: #fff; }
        .ms-place-scroll { flex: 1.2; display: flex; overflow-x: auto; border: 1px solid var(--br-orange); padding: 4px; background: #fff; gap: 4px; height: 115px; }
        .ms-btn { border: 1px solid var(--br-orange); background: #fff; color: var(--br-orange); font-weight: bold; display: flex; align-items: center; justify-content: center; font-size: 11px; cursor: pointer; height: 34px; }
        .p-btn { min-width: 32px; writing-mode: vertical-rl; padding: 5px 0; border: 1px solid var(--br-orange); background: #fff; color: var(--br-orange); font-weight: bold; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 12px; }
        .active { background: var(--br-orange) !important; color: #fff !important; }
        
        .row { display: flex; align-items: center; gap: 8px; margin: 8px 0; }
        .label { background: var(--br-blue); color: #fff; font-size: 12px; width: 45px; text-align: center; padding: 7px 0; font-weight: bold; border-radius: 2px; }
        .mark-wrap { display: flex; gap: 4px; }
        .mark { width: 34px; height: 34px; border: 1.5px solid #444; border-radius: 50%; background: #fff; font-weight: bold; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 16px; }
        .mark.selected { background: #222 !important; color: #fff !important; }

        .amt-row { display: flex; align-items: center; justify-content: space-between; gap: 5px; margin-top: 5px; border-top: 1px dashed var(--br-orange); padding-top: 10px; }
        .amt-btns-left { display: flex; gap: 5px; }
        .amt-btn { border: 1px solid var(--br-orange); color: var(--br-orange); background: #fff; padding: 6px 8px; font-size: 11px; font-weight: bold; cursor: pointer; border-radius: 4px; min-width: 45px; }
        .amt-input-field { width: 60px; border: 1px solid #999; border-radius:4px; padding: 4px; font-size: 14px; font-weight: bold; text-align: right; }

        .btn-container { display: flex; gap: 10px; width: 95%; max-width: 400px; margin-top: 20px; padding: 0 10px; box-sizing: border-box; }
        .save-btn { flex: 2; padding: 16px; background: #e60012; color: #fff; border: none; border-radius: 35px; font-weight: bold; font-size: 18px; cursor: pointer; box-shadow: 0 4px 0 #b3000d; }
        .share-btn { flex: 1; padding: 16px; background: #000; color: #fff; border: none; border-radius: 35px; font-weight: bold; font-size: 18px; cursor: pointer; box-shadow: 0 4px 0 #333; display: flex; align-items: center; justify-content: center; }
        .save-btn:active, .share-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #333; }

        /* 保存用モーダル */
        #save-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; }
        #save-modal p { color: #fff; font-weight: bold; margin-bottom: 15px; text-align: center; font-size: 14px; line-height: 1.5; }
        #save-modal img { width: 100%; max-width: 380px; border: 2px solid #fff; margin-bottom: 20px; }
        #save-modal .close-modal { padding: 12px 30px; background: #fff; border: none; border-radius: 25px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="top-menu">
    <div class="menu-inner">
        <a href="index.html">🏠 TOP</a>

        <a href="hunaken3.html">3連単(F)</a>
        <a href="2rentan3.html">2連単(F)</a>
        <a href="hunaken1.html">簡易①</a>
        <a href="hunaken2.html">簡易②</a>
    </div>
</div>

<div id="capture-target">
    <div class="ticket">
        <div class="t-header">
            <div class="t-br-logo">BOAT<br>RACE</div>
            <div class="t-main-place" id="res-main-place">平和島</div>
            <div class="t-form-box" id="res-mode-label">フォーメーション</div>
        </div>
        <div class="t-body">
            <div class="t-left">
                <div class="t-sub-place" id="res-sub-text">平和島</div>
                <div><span class="t-race-num" id="res-race">01</span><span class="t-race-label">レース</span></div>
                <div class="t-memo-area" id="res-memo">03年度<br>第04回07日</div>
                <div class="t-date-area" id="res-full-date">2026年2月28日</div>
            </div>
            <div class="t-mid"><div class="t-shiki-v" id="res-shiki">３連単</div></div>
            <div class="t-right">
                <div id="view-normal">
                    <div class="t-bet-row">1着 － <span id="ans0" class="t-nums"></span></div>
                    <div class="t-bet-row">2着 － <span id="ans1" class="t-nums"></span></div>
                    <div class="t-bet-row" id="res-row-3rd">3着 － <span id="ans2" class="t-nums"></span></div>
                </div>
                <div id="view-box" style="display:none;">
                    <div class="t-bet-row">BOX － <span id="ans-box" class="t-nums"></span></div>
                    <div style="height:70px"></div>
                </div>
                <div class="t-summary">
                    組合せ数 ◆◆<span id="res-cnt">0</span><br>
                    各組 ◆◆◆◆<span id="res-unit">100</span>円<br>
                    合計 ◆◆◆◆◆◆<span id="res-total">0</span>円
                </div>
            </div>
        </div>
        <div class="t-barcode"></div>
    </div>
</div>

<div class="controls-container">
    <div class="input-section">
        <input type="text" id="in-main" class="input-field" value="平和島" oninput="sync()">
        <input type="text" id="in-sub" class="input-field" value="平和島" oninput="sync()">
        <textarea id="in-memo" class="input-field" rows="2" oninput="sync()">03年度&#13;&#10;第04回07日</textarea>
    </div>

    <div class="ms">
        <div class="toggle-group">
            <div class="m-btn active" id="btn-3ren" onclick="setShiki(3)">３連単</div>
            <div class="m-btn" id="btn-2ren" onclick="setShiki(2)">２連単</div>
        </div>
        <div class="toggle-group">
            <div class="m-btn active" id="btn-form" onclick="setMethod('form')">フォーメーション</div>
            <div class="m-btn" id="btn-box" onclick="setMethod('box')">ボックス</div>
        </div>

        <div class="ms-top-flex">
            <div class="ms-race-grid" id="race-grid"></div>
            <div class="ms-place-scroll" id="place-grid"></div>
        </div>

        <div id="ms-rows">
            <div class="row" id="row0"><div class="label" id="label0">1着</div><div class="mark-wrap">
                <div class="mark" onclick="tapMark(this,0,1)">1</div><div class="mark" onclick="tapMark(this,0,2)">2</div><div class="mark" onclick="tapMark(this,0,3)">3</div><div class="mark" onclick="tapMark(this,0,4)">4</div><div class="mark" onclick="tapMark(this,0,5)">5</div><div class="mark" onclick="tapMark(this,0,6)">6</div>
            </div></div>
            <div class="row" id="row1"><div class="label">2着</div><div class="mark-wrap">
                <div class="mark" onclick="tapMark(this,1,1)">1</div><div class="mark" onclick="tapMark(this,1,2)">2</div><div class="mark" onclick="tapMark(this,1,3)">3</div><div class="mark" onclick="tapMark(this,1,4)">4</div><div class="mark" onclick="tapMark(this,1,5)">5</div><div class="mark" onclick="tapMark(this,1,6)">6</div>
            </div></div>
            <div class="row" id="row2"><div class="label">3着</div><div class="mark-wrap">
                <div class="mark" onclick="tapMark(this,2,1)">1</div><div class="mark" onclick="tapMark(this,2,2)">2</div><div class="mark" onclick="tapMark(this,2,3)">3</div><div class="mark" onclick="tapMark(this,2,4)">4</div><div class="mark" onclick="tapMark(this,2,5)">5</div><div class="mark" onclick="tapMark(this,2,6)">6</div>
            </div></div>
        </div>

        <div class="amt-row">
            <div class="amt-btns-left">
                <div class="amt-btn active" onclick="quickAmt(this,100)">100</div>
                <div class="amt-btn" onclick="quickAmt(this,500)">500</div>
            </div>
            <div class="amt-input-wrap">
                <input type="number" id="in-unit" class="amt-input-field" value="100" step="100" oninput="manualAmt()">円
            </div>
        </div>
    </div>
</div>

<div class="btn-container">
    <button class="save-btn" onclick="save()">画像を保存する</button>
    <button class="share-btn" onclick="shareX()">𝕏 投稿</button>
</div>

<div id="save-modal">
    <p>【画像が生成されました】<br>画像を長押しして「保存」してください</p>
    <img id="saved-image" src="" alt="舟券画像">
    <button class="close-modal" onclick="closeModal()">閉じる</button>
</div>

<script>
    let shiki = 3; 
    let method = 'form'; 
    let sel = [[], [], []];
    let unit = 100;
    const places = ["桐生","戸田","江戸川","平和島","多摩川","浜名湖","蒲郡","常滑","津","三国","びわこ","住之江","尼崎","鳴門","丸亀","児島","宮島","徳山","下関","若松","芦屋","福岡","唐津","大村"];

    window.onload = () => {
        const rg = document.getElementById('race-grid');
        for(let i=1; i<=12; i++){
            const b = document.createElement('div');
            b.className = 'ms-btn' + (i===1?' active':'');
            b.innerText = i + 'R';
            b.onclick = () => {
                document.querySelectorAll('.ms-race-grid .ms-btn').forEach(x=>x.classList.remove('active'));
                b.classList.add('active');
                document.getElementById('res-race').innerText = String(i).padStart(2,'0');
            };
            rg.appendChild(b);
        }
        const pg = document.getElementById('place-grid');
        places.forEach(p => {
            const b = document.createElement('div');
            b.className = 'p-btn' + (p==='平和島'?' active':'');
            b.innerText = p;
            b.onclick = () => {
                document.querySelectorAll('.p-btn').forEach(x=>x.classList.remove('active'));
                b.classList.add('active');
                document.getElementById('in-main').value = p;
                document.getElementById('in-sub').value = p;
                sync();
            };
            pg.appendChild(b);
        });
        const now = new Date();
        document.getElementById('res-full-date').innerText = now.getFullYear() + "年" + (now.getMonth() + 1) + "月" + now.getDate() + "日";
    };

    function setShiki(s) {
        shiki = s;
        document.getElementById('btn-3ren').classList.toggle('active', s===3);
        document.getElementById('btn-2ren').classList.toggle('active', s===2);
        document.getElementById('res-shiki').innerText = (s===3) ? '３連単' : '２連単';
        document.getElementById('res-row-3rd').style.display = (s===3) ? 'flex' : 'none';
        document.getElementById('row2').style.display = (s===3 && method==='form') ? 'flex' : 'none';
        update();
    }

    function setMethod(m) {
        method = m;
        document.getElementById('btn-form').classList.toggle('active', m==='form');
        document.getElementById('btn-box').classList.toggle('active', m==='box');
        document.getElementById('row1').style.display = (m==='box') ? 'none' : 'flex';
        document.getElementById('row2').style.display = (m==='box' || shiki===2) ? 'none' : 'flex';
        document.getElementById('label0').innerText = (m==='box') ? '選択' : '1着';
        document.getElementById('view-normal').style.display = (m==='box') ? 'none' : 'block';
        document.getElementById('view-box').style.display = (m==='box') ? 'block' : 'none';
        document.getElementById('res-mode-label').innerText = (m==='box') ? 'ボックス' : 'フォーメーション';
        update();
    }

    function tapMark(el, row, num) {
        if (sel[row].includes(num)) sel[row] = sel[row].filter(v => v !== num);
        else sel[row].push(num);
        el.classList.toggle('selected');
        update();
    }

    function quickAmt(el, v) {
        document.querySelectorAll('.amt-btn').forEach(x => x.classList.remove('active'));
        el.classList.add('active');
        document.getElementById('in-unit').value = v;
        unit = v;
        update();
    }

    function manualAmt() {
        unit = parseInt(document.getElementById('in-unit').value) || 0;
        update();
    }

    function sync() {
        document.getElementById('res-main-place').innerText = document.getElementById('in-main').value;
        document.getElementById('res-sub-text').innerText = document.getElementById('in-sub').value;
        document.getElementById('res-memo').innerText = document.getElementById('in-memo').value;
    }

    function update() {
        let cnt = 0;
        if (method === 'form') {
            for (let a of sel[0]) {
                for (let b of sel[1]) {
                    if (a === b) continue;
                    if (shiki === 3) {
                        for (let c of sel[2]) {
                            if (c === a || c === b) continue;
                            cnt++;
                        }
                    } else {
                        cnt++;
                    }
                }
            }
            document.getElementById('ans0').innerText = sel[0].sort().join(' ');
            document.getElementById('ans1').innerText = sel[1].sort().join(' ');
            if(shiki === 3) document.getElementById('ans2').innerText = sel[2].sort().join(' ');
        } else {
            let n = sel[0].length;
            if (shiki === 3) {
                if (n >= 3) cnt = n * (n - 1) * (n - 2);
            } else {
                if (n >= 2) cnt = n * (n - 1);
            }
            document.getElementById('ans-box').innerText = sel[0].sort().join(' ');
        }
        document.getElementById('res-cnt').innerText = cnt;
        document.getElementById('res-unit').innerText = unit.toLocaleString();
        document.getElementById('res-total').innerText = (cnt * unit).toLocaleString();
    }

    // スマホ対応保存機能
    function save() {
        const target = document.getElementById('capture-target');
        html2canvas(target, { scale: 3 }).then(canvas => {
            const imgData = canvas.toDataURL("image/png");
            
            // スマホか判定
            const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

            if (isMobile) {
                // スマホならモーダル表示
                document.getElementById('saved-image').src = imgData;
                document.getElementById('save-modal').style.display = 'flex';
            } else {
                // PCなら直接ダウンロード
                const a = document.createElement('a');
                a.href = imgData;
                a.download = `boat_${shiki}rentan_${method}.png`;
                a.click();
            }
        });
    }

    function closeModal() {
        document.getElementById('save-modal').style.display = 'none';
    }

    function shareX() {
        const place = document.getElementById('res-main-place').innerText;
        const race = document.getElementById('res-race').innerText;
        const shikiStr = document.getElementById('res-shiki').innerText;
        const methodStr = document.getElementById('res-mode-label').innerText;
        const count = document.getElementById('res-cnt').innerText;
        const total = document.getElementById('res-total').innerText;
        const url = "https://boat-s-1.github.io/hunaken/";

        const text = encodeURIComponent(
            `【ボートレース予想】\n` +
            `${place} ${race}R\n` +
            `${shikiStr} ${methodStr}\n` +
            `点数：${count}点（合計 ${total}円）\n\n` +
            `#ボートレース #競艇予想 #舟券メーカー\n`
        );

        window.open(`https://twitter.com/intent/tweet?text=${text}&url=${encodeURIComponent(url)}`, '_blank');
    }
</script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
