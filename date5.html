<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>5 Master 24場攻略ノート ⚡ BOAT STRIKE</title>
<style>
/* date1.htmlをリスペクトしたキイナ・スタイル */
body {
  font-family: 'Helvetica Neue', Arial, sans-serif;
  background: #0a1929; /* 紺色背景 */
  color: #fff;
  margin: 0; padding: 10px;
}

.container {
  max-width: 600px;
  margin: auto;
}

h1 {
  text-align: center;
  font-size: 20px;
  color: #ffcc00;
  text-shadow: 0 0 10px rgba(255, 204, 0, 0.5);
  margin: 20px 0;
}

/* 24場クイックリンク（date1風） */
.stadium-nav {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 5px;
  margin-bottom: 30px;
}

.stadium-nav a {
  background: rgba(255, 255, 255, 0.1);
  color: #fff;
  text-decoration: none;
  font-size: 11px;
  padding: 8px 0;
  text-align: center;
  border-radius: 5px;
  border: 1px solid #00d2ff;
}

/* 各場のデータカード */
.venue-card {
  background: rgba(255, 255, 255, 0.05);
  border: 1px solid rgba(0, 210, 255, 0.3);
  border-radius: 15px;
  padding: 15px;
  margin-bottom: 25px;
}

.venue-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 2px solid #00d2ff;
  padding-bottom: 5px;
  margin-bottom: 10px;
}

.venue-name {
  font-size: 18px;
  font-weight: bold;
  color: #00d2ff;
}

.rank-badge {
  background: #ffcc00;
  color: #000;
  font-size: 10px;
  font-weight: bold;
  padding: 2px 6px;
  border-radius: 3px;
}

.data-row {
  display: flex;
  justify-content: space-around;
  margin: 15px 0;
  background: rgba(0, 0, 0, 0.3);
  padding: 10px;
  border-radius: 10px;
}

.data-item { text-align: center; }
.data-label { font-size: 10px; color: #aaa; }
.data-value { font-size: 18px; font-weight: bold; color: #ffcc00; }

.advice-text {
  font-size: 13px;
  line-height: 1.6;
  background: rgba(255, 255, 255, 0.05);
  padding: 10px;
  border-radius: 8px;
  border-left: 3px solid #ffcc00;
}

.tool-link {
  display: block;
  text-align: center;
  background: linear-gradient(45deg, #0052d4, #00d2ff);
  color: white;
  text-decoration: none;
  padding: 10px;
  border-radius: 20px;
  margin-top: 15px;
  font-weight: bold;
  font-size: 14px;
}
</style>
</head>
<body>

<div class="container">
  <h1>⚡ 24場 5 Master 徹底解析ノート ⚡</h1>

  <div class="stadium-nav">
    <a href="#st02">戸田</a><a href="#st14">鳴門</a><a href="#st04">平和島</a><a href="#st11">びわこ</a>
    <a href="#st03">江戸川</a><a href="#st06">浜名湖</a><a href="#st09">津</a><a href="#st05">多摩川</a>
    </div>

  <div class="venue-card" id="st02">
    <div class="venue-header">
      <span class="venue-name">02# 戸田</span>
      <span class="rank-badge">5枠1着率 全国1位</span>
    </div>
    <div class="data-row">
      <div class="data-item"><div class="data-label">1着率</div><div class="data-value">7.51%</div></div>
      <div class="data-item"><div class="data-label">平均配当</div><div class="data-value">¥3,964</div></div>
      <div class="data-item"><div class="data-label">ブースト</div><div class="data-value">1.9倍</div></div>
    </div>
    <div class="advice-text">
      💬⚡「戸田は1Mが極端に狭いから、4カドが攻めた時に最内の差し場がポッカリ空きやすいんだッ！展示タイムが良い時は一撃のチャンスだよ！」
    </div>
    <a href="kiina_tool.html" class="tool-link">この場で判定する！⚡</a>
  </div>

  </div>
</body>
</html>
