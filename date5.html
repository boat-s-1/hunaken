<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>5 Master 24場精密解析ノート ⚡ BOAT STRIKE</title>
<style>
/* 稲妻背景とデザイン */
body {
  font-family: 'Helvetica Neue', Arial, sans-serif;
  background-image: url('IMG_4726.png'); /* あなたの稲妻背景画像 */
  background-size: cover;
  background-position: center;
  background-attachment: fixed;
  color: #fff;
  margin: 0; padding: 10px;
}

.container {
  max-width: 650px;
  margin: auto;
  background: rgba(7, 18, 33, 0.95);
  backdrop-filter: blur(15px);
  -webkit-backdrop-filter: blur(15px);
  padding: 20px;
  border-radius: 30px;
  border: 1px solid rgba(0, 210, 255, 0.3);
}

h1 {
  text-align: center;
  font-size: 24px;
  color: #ffcc00;
  text-shadow: 0 0 15px rgba(255, 204, 0, 0.6);
  margin-bottom: 30px;
}

/* 24場ナビゲーション */
.stadium-nav {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 5px;
  margin-bottom: 40px;
}
.stadium-nav a {
  background: rgba(255, 255, 255, 0.05);
  color: #00d2ff;
  text-decoration: none;
  font-size: 11px;
  padding: 10px 0;
  text-align: center;
  border-radius: 6px;
  border: 1px solid rgba(0, 210, 255, 0.2);
}

/* 詳細解析カード */
.venue-detail-card {
  background: linear-gradient(145deg, rgba(255,255,255,0.05), rgba(0,210,255,0.02));
  border-radius: 20px;
  padding: 20px;
  margin-bottom: 40px;
  border: 1px solid rgba(255, 255, 255, 0.1);
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

.card-header {
  border-bottom: 2px solid #ffcc00;
  padding-bottom: 10px;
  margin-bottom: 15px;
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
}
.venue-title { font-size: 22px; font-weight: bold; color: #ffcc00; }
.venue-sub { font-size: 11px; color: #aaa; }

.stats-box {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 20px;
}
.stat-item {
  background: rgba(0, 0, 0, 0.4);
  padding: 10px;
  border-radius: 12px;
  text-align: center;
}
.stat-label { font-size: 10px; color: #00d2ff; display: block; }
.stat-val { font-size: 18px; font-weight: bold; font-family: 'Impact', sans-serif; }

.analysis-content { margin-top: 15px; }
.analysis-item { margin-bottom: 15px; }
.analysis-label {
  display: inline-block;
  background: #00d2ff;
  color: #000;
  font-size: 10px;
  font-weight: bold;
  padding: 2px 8px; border-radius: 4px; margin-bottom: 5px;
}
.analysis-text { font-size: 13px; line-height: 1.7; color: #e0f7ff; }

.kiina-comment {
  background: rgba(255, 204, 0, 0.1);
  border: 1px solid #ffcc00;
  padding: 12px; border-radius: 12px;
  font-size: 13px; margin-top: 15px; position: relative;
}
.kiina-comment::before { content: "💬⚡ "; font-weight: bold; }

/* 判定ボタン */
.tool-btn {
  display: block;
  text-align: center;
  background: linear-gradient(45deg, #0052d4, #00d2ff);
  color: #fff;
  text-decoration: none;
  padding: 12px;
  border-radius: 30px;
  margin-top: 20px;
  font-weight: bold;
  font-size: 14px;
  box-shadow: 0 4px 15px rgba(0, 210, 255, 0.3);
}

.back-to-top { text-align: right; margin-top: 15px; }
.back-to-top a { color: #555; font-size: 11px; text-decoration: none; }

footer { text-align: center; margin-top: 50px; font-size: 12px; color: #444; }
</style>
</head>
<body>

<div class="container">
  <h1>⚡ 5 Master 24場・超精密解析ノート ⚡</h1>
  <div class="stadium-nav" id="nav"></div>
  <div id="content"></div>
  <footer>&copy; 2026 BOAT STRIKE Project</footer>
</div>

<script>
const venueDetails = [
  {id:"01", name:"桐生", sub:"KIRYU / 冬の荒れ水面", rate:"6.10%", boost:"1.6倍", water:"標高が高く冬は赤城おろしが吹く。気圧が低いためモーター調整が鍵。", strategy:"気温急降下時の『出足』が肝。展示でサイドの掛かりが良い5号艇はチャンス大ッ！", kiina:"赤城おろしでインが流れたらアタシの出番だよ！"},
  {id:"02", name:"戸田", sub:"TODA / 5枠の聖地", rate:"7.51%", boost:"1.9倍", water:"全国屈指の狭さ。1マークの振り幅が大きく、カドが攻めると展開激変。", strategy:"4カドが絞った際、空いた最内を突き抜ける5号艇。1着固定で狙うのが美味しいッ！", kiina:"戸田の5枠はアタシの指定席。迷わず頭で狙いなッ！"},
  {id:"03", name:"江戸川", rate:"6.66%", sub:"EDOGAWA / 波乗り勝負", boost:"1.4倍", water:"日本唯一の河川水面。潮の流れと風向きで波が立ちボートが暴れる。", strategy:"波乗り巧者が5枠なら激アツ。向かい風5m以上ならダッシュ勢の波乱にフルスイングッ！", kiina:"波があればあるほど、アタシのボルテージも上がるねッ！"},
  {id:"04", name:"平和島", rate:"6.81%", sub:"HEIWAJIMA / イン受難の地", boost:"2.1倍", water:"マンション群で風が回る。1Mの幅が広く、逃げが決まりにくい。", strategy:"バックの伸びで勝負。展示タイム差0.1秒以上なら1M後に抜き去る展開が基本！", kiina:"平和島のバックは広いね。どこからでも差し抜けられるよッ！"},
  {id:"05", name:"多摩川", rate:"6.33%", sub:"TAMAGAWA / 静水面の女王", boost:"1.3倍", water:"日本一の静水面。うねりも潮もなく、純粋なスピード勝負が楽しめる。", strategy:"全速で回れるからまくり差しが決まりやすい。展示の旋回速度が速い5号艇は要注目！", kiina:"日本一静かな水面を、アタシの稲妻で揺らしてあげるッ！"},
  {id:"06", name:"浜名湖", rate:"6.43%", sub:"HAMANAKO / 広大な水面", boost:"1.2倍", water:"有数の広い水面。1Mの旋回半径が大きく、思い切ったターンが可能。", strategy:"広さを活かして加速をつけやすい。長い直線での追い比べに強いモーターなら1着も！", kiina:"広い浜名湖なら、アタシのスピードが一番輝くねッ！"},
  {id:"07", name:"蒲郡", rate:"5.35%", sub:"GAMAGORI / 夜の機力戦", boost:"0.8倍", water:"広いナイター場。淡水でモーターのパワー差が顕著に出る。", strategy:"夜間に気温が下がると調整が合ったモーターが爆伸びする。展示タイムが抜けてる時が攻めどき！", kiina:"夜の蒲郡は魔物が住んでるよ。機力を見極めてね！"},
  {id:"08", name:"常滑", rate:"5.67%", sub:"TOKONAME / 安定の招き猫", boost:"1.6倍", water:"1Mが広く取られている。風の影響は受けるが、基本は機力勝負になりやすい。", strategy:"追い風3m以上の時、4号艇が連動してインを叩けば、5号艇に絶好の展開が巡るッ！", kiina:"4コースが攻めてくれるなら、アタシが美味しいところを貰うよッ！"},
  {id:"09", name:"津", rate:"6.40%", sub:"TSU / 強風の伊勢湾", boost:"1.4倍", water:"鈴鹿おろしが吹く強風場。1M付近が荒れやすく、インが踏ん張れない場面が多い。", strategy:"強風で1Mがもつれた瞬間を冷静に差すのが勝ち筋。風速チェックは必須だよッ！", kiina:"風が吹いたらアタシのターン。三重の風を感じなッ！"},
  {id:"10", name:"三国", rate:"5.23%", sub:"MIKUNI / 北陸の直線", boost:"1.5倍", water:"1Mの幅が広く直線が長い。ボートが沈みやすくパワーが必要。", strategy:"向かい風4m以上ならダッシュ有利。展示タイムが良くスリット先制できるなら5頭アリ！", kiina:"直線の長さはチャンスの長さ。北陸で一撃決めるよッ！"},
  {id:"11", name:"びわこ", rate:"6.67%", sub:"BIWAKO / 琵琶湖のうねり", boost:"1.6倍", water:"淡水で標高が高く、独自の『うねり』が発生。イン受難の場として有名。", strategy:"うねりに乗って流れるインを尻目に全速で内を突く。特殊水面に強い選手が5枠なら激アツ！", kiina:"うねりはアタシの味方。湖の底まで突き落としてあげるよッ！"},
  {id:"12", name:"住之江", rate:"5.28%", sub:"SUMINOE / 聖地ナイター", boost:"1.8倍", water:"日本一のナイター場。コンクリート護岸に囲まれ引き波が残りやすい難水面。", strategy:"2Mの引き波に負けない『回り足』が超重要。1M差し抜け2Mで突き放す展開をイメージして！", kiina:"聖地の夜は格別だね。アタシの電撃、目に焼き付けなッ！"},
  {id:"13", name:"尼崎", rate:"5.44%", sub:"AMAGASAKI / センターの場", boost:"1.1倍", water:"広い静水面。センター（3・4枠）が強く、その影響で5枠にも展開が向きやすい。", strategy:"センター勢が競り合った瞬間、一番空いている内をサラッと差すのが尼崎5枠の極意！", kiina:"センターが騒がしいときは、アタシが静かに仕留めるよッ！"},
  {id:"14", name:"鳴門", rate:"6.93%", sub:"NARUTO / 小鳴門の激流", boost:"1.2倍", water:"潮流が激しく、狭い水面。風と潮の条件でインが簡単に崩れる。江戸川に次ぐ難所。", strategy:"潮流が『追い』なら差し、『向かい』ならまくり。潮見表を見て攻め方を選んでね！", kiina:"潮を読み切った奴が勝つ。それが鳴門の掟だよッ！"},
  {id:"15", name:"丸亀", rate:"5.45%", sub:"MARUGAME / 潮位のナイター", boost:"1.5倍", water:"海水で潮位変化アリ。満潮時はイン強く、干潮時はダッシュまくりが届きやすい。", strategy:"干潮に向かう時間帯、展示で足色が抜けているなら一撃まくり差しが決まるチャンス！", kiina:"潮が引いたらアタシの出番。ナイターで輝くよッ！"},
  {id:"16", name:"児島", rate:"5.40%", sub:"KOJIMA / 瀬戸内の波止場", boost:"1.3倍", water:"潮の干満差が大きく『うねり』が発生。海水で浮力が強くパワー差が出やすい。", strategy:"干潮時のまくり差し展開が狙い目。展示タイム差0.08秒以上ならアタマまで想定！", kiina:"児島の潮風に乗って、最短距離でゴールを駆け抜けるよッ！"},
  {id:"17", name:"宮島", rate:"6.22%", sub:"MIYAJIMA / 厳島の潮", boost:"2.0倍", water:"日本一の干満差がある。満潮と干潮で全く別のレースになるのが特徴。", strategy:"干潮時は全力まくり差しが決まる絶好機。展示ブースト2.0倍は伊達じゃないよッ！", kiina:"潮の変化についてこれないインは、ここでサヨナラだねッ！"},
  {id:"18", name:"徳山", rate:"3.44%", sub:"TOKUYAMA / インの牙城", boost:"1.1倍", water:"イン逃げ率が非常に高い。風の影響も少なく堅い決着が多い。", strategy:"インが強いからこそ崩れた時はエグい。4カドが叩く展開なら5頭の万舟だよ！", kiina:"インが強い徳山で5頭が決まれば、お財布がパンパンになるねッ！"},
  {id:"19", name:"下関", rate:"4.87%", sub:"SHIMONOSEKI / 海峡ナイター", boost:"1.2倍", water:"潮流の影響を受けるが基本はイン強。夜間の風向きが重要。", strategy:"スリットからの行き足が必須条件。2号艇の壁が薄いなら、まくり差しの出番！", kiina:"関門海峡の波乱をアタシが呼び込んであげるよッ！"},
  {id:"20", name:"若松", rate:"5.83%", sub:"WAKAMATSU / 夜の洞海湾", boost:"1.2倍", water:"海水で潮の干満アリ。夜は満潮に向かうことが多くインが流されやすい面も。", strategy:"満潮に向かう時間、4コースにスタ巧がいるなら続く5号艇の差し抜けを狙って！", kiina:"洞海湾の夜景より、アタシの突き抜けの方が綺麗だよッ！"},
  {id:"21", name:"芦屋", rate:"4.27%", sub:"ASHIYA / モーニングの罠", boost:"1.2倍", water:"イン有利な番組が多いモーニング場。静水面で淡水に近い。", strategy:"一般戦で内枠に不安がある番組や、5号艇が超抜な時が逆転のサインだよッ！", kiina:"朝から万舟、狙ってみない？アタシが案内するよッ！"},
  {id:"22", name:"福岡", rate:"3.81%", sub:"FUKUOKA / 難攻不落のうねり", boost:"1.1倍", water:"那珂川の河口で1Mが川に突き出す。日本一複雑なうねりが発生。", strategy:"まくりより差し、または『抜き』が強い。うねりを回避するテク重視で選んで！", kiina:"福岡のうねりはクセ強だね。アタシなら乗りこなせるけどねッ！"},
  {id:"23", name:"唐津", rate:"5.05%", sub:"KARATSU / 広いピット離れ", boost:"1.6倍", water:"ピットから2Mまでが遠く進入争いが起きやすい。水面は広く淡水。", strategy:"展示タイム差が直結。5号艇が伸びるなら広い水面をフルスピードでまくり差せる！", kiina:"広い唐津なら、アタシのまくり差しが綺麗に決まるねッ！"},
  {id:"24", name:"大村", rate:"3.01%", sub:"OMURA / イン最強の聖地", boost:"1.1倍", water:"イン逃げ率日本一。目標物がない広大な海面。インが圧倒的に有利。", strategy:"ここで5頭狙うなら向かい風5m以上が必須。インが流れた隙を突く最内差し一択！", kiina:"聖地でもアタシの稲妻は止まらないよ。隙があれば刺すッ！"}
];

const navArea = document.getElementById('nav');
const contentArea = document.getElementById('content');

venueDetails.forEach(v => {
  // ナビ生成
  const n = document.createElement('a');
  n.href = `#v${v.id}`;
  n.innerText = v.name;
  navArea.appendChild(n);

  // カード生成
  const card = document.createElement('div');
  card.className = 'venue-detail-card';
  card.id = `v${v.id}`;
  card.innerHTML = `
    <div class="card-header">
      <div class="venue-title">${v.id}# ${v.name}</div>
      <div class="venue-sub">${v.sub}</div>
    </div>
    <div class="stats-box">
      <div class="stat-item"><span class="stat-label">5枠1着率</span><span class="stat-val">${v.rate}</span></div>
      <div class="stat-item"><span class="stat-label">展示ブースト</span><span class="stat-val">${v.boost}</span></div>
    </div>
    <div class="analysis-content">
      <div class="analysis-item">
        <span class="analysis-label">5 Master 攻略の極意</span>
        <div class="analysis-text">${v.strategy}</div>
      </div>
      <div class="analysis-item">
        <span class="analysis-label">水面・環境特性</span>
        <div class="analysis-text">${v.water}</div>
      </div>
    </div>
    <div class="kiina-comment">${v.kiina}</div>
    <a href="kiina5.html" class="tool-btn">この場で精密判定を実行ッ！⚡</a>
    <div class="back-to-top"><a href="#nav">▲ クイックナビに戻る</a></div>
  `;
  contentArea.appendChild(card);
});
</script>
</body>
</html>
