<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>5 Master 24場精密解析ノート ⚡ BOAT STRIKE</title>
<style>
/* 稲妻背景とデザイン */
body {
  font-family: 'Helvetica Neue', Arial, sans-serif;
  background-image: url('image_1.png'); /* あなたの稲妻背景画像 */
  background-size: cover;
  background-position: center;
  background-attachment: fixed;
  color: #fff;
  margin: 0; padding: 10px;
}

.container {
  max-width: 650px;
  margin: auto;
  background: rgba(7, 18, 33, 0.95);
  backdrop-filter: blur(15px);
  -webkit-backdrop-filter: blur(15px);
  padding: 20px;
  border-radius: 30px;
  border: 1px solid rgba(0, 210, 255, 0.3);
}

h1 {
  text-align: center;
  font-size: 24px;
  color: #ffcc00;
  text-shadow: 0 0 15px rgba(255, 204, 0, 0.6);
  margin-bottom: 30px;
}

/* 24場ナビゲーション（4列配置でスマホ最適化） */
.stadium-nav {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 5px;
  margin-bottom: 40px;
}
.stadium-nav a {
  background: rgba(255, 255, 255, 0.05);
  color: #00d2ff;
  text-decoration: none;
  font-size: 11px;
  padding: 10px 0;
  text-align: center;
  border-radius: 6px;
  border: 1px solid rgba(0, 210, 255, 0.2);
}

/* 詳細解析カード */
.venue-detail-card {
  background: linear-gradient(145deg, rgba(255,255,255,0.05), rgba(0,210,255,0.02));
  border-radius: 20px;
  padding: 20px;
  margin-bottom: 40px;
  border: 1px solid rgba(255, 255, 255, 0.1);
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

.card-header {
  border-bottom: 2px solid #ffcc00;
  padding-bottom: 10px;
  margin-bottom: 15px;
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
}
.venue-title { font-size: 22px; font-weight: bold; color: #ffcc00; }
.venue-sub { font-size: 11px; color: #aaa; }

/* 統計セクション */
.stats-box {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 20px;
}
.stat-item {
  background: rgba(0, 0, 0, 0.4);
  padding: 10px;
  border-radius: 12px;
  text-align: center;
}
.stat-label { font-size: 10px; color: #00d2ff; display: block; }
.stat-val { font-size: 18px; font-weight: bold; font-family: 'Impact', sans-serif; }

/* 攻略テキスト */
.analysis-content { margin-top: 15px; }
.analysis-item { margin-bottom: 15px; }
.analysis-label {
  display: inline-block;
  background: #00d2ff;
  color: #000;
  font-size: 10px;
  font-weight: bold;
  padding: 2px 8px;
  border-radius: 4px;
  margin-bottom: 5px;
}
.analysis-text { font-size: 13px; line-height: 1.7; color: #e0f7ff; }

/* キイナの直感フキダシ */
.kiina-comment {
  background: rgba(255, 204, 0, 0.1);
  border: 1px solid #ffcc00;
  padding: 12px;
  border-radius: 12px;
  font-size: 13px;
  margin-top: 15px;
  position: relative;
}
.kiina-comment::before {
  content: "💬⚡ ";
  font-weight: bold;
}

.back-to-top {
  text-align: right;
  margin-top: 10px;
}
.back-to-top a { color: #555; font-size: 11px; text-decoration: none; }

footer { text-align: center; margin-top: 50px; font-size: 12px; color: #444; }
</style>
</head>
<body>

<div class="container">
  <h1>⚡ 5 Master 24場・超精密解析ノート ⚡</h1>

  <div class="stadium-nav" id="nav"></div>

  <div id="content"></div>

  <footer>&copy; 2026 BOAT STRIKE Project</footer>
</div>

<script>
const venueDetails = [
  {id:"01", name:"桐生", sub:"KIRYU / 冬の荒れ水面", rate:"6.10%", boost:"1.6倍", winType:"まくり差し中心", water:"標高が高く、冬は赤城おろしが吹き荒れる。気圧が低いため、モーター調整が勝敗を分ける場。", strategy:"気温が急降下した際の『出足』が肝。展示でサイドの掛かりが良い5号艇はまくり差しのチャンス大ッ！", kiina:"赤城おろしでインが流れたらアタシの出番だよ！"},
  {id:"02", name:"戸田", sub:"TODA / 5枠の聖地", rate:"7.51%", boost:"1.9倍", winType:"まくり差し(圧倒的)", water:"全国屈指の狭さ。1マークの振り幅が大きく、カドが攻めると展開が激変する。", strategy:"4カドが1マークを絞った際、空いた最内を突き抜ける5号艇。戸田の5枠は1着固定で狙うのが一番美味しいんだッ！", kiina:"戸田の5枠はアタシの指定席。迷わず頭で狙いなッ！"},
  {id:"03", name:"江戸川", rate:"6.66%", sub:"EDOGAWA / 波乗り勝負", boost:"1.4倍", winType:"まくり / まくり差し", water:"日本で唯一の河川水面。潮の流れと風向きで波が立ち、ボートが激しく暴れる。", strategy:"波乗り巧者が5枠に入ったら激アツ。向かい風5m以上なら、ダッシュ勢の波乱展開にフルスイングだよッ！", kiina:"波があればあるほど、アタシのボルテージも上がるねッ！"},
  {id:"04", name:"平和島", rate:"6.81%", sub:"HEIWAJIMA / イン受難の地", boost:"2.1倍", winType:"差し抜け / まくり差し", water:"マンション群に囲まれ風が回る。1マークの幅が広く、逃げが決まりにくい。", strategy:"バックストレッチの伸びで勝負が決まる。展示タイム差が0.1秒以上あるなら、1マーク後に抜き去る展開が基本だよ！", kiina:"平和島のバックは広いね。どこからでも差し抜けられるよッ！"},
  {id:"05", name:"多摩川", rate:"6.33%", sub:"TAMAGAWA / 静水面の女王", boost:"1.3倍", winType:"スピードまくり差し", water:"日本一の静水面。うねりも潮もなく、純粋なスピード勝負が繰り広げられる。", strategy:"全速で回れるからこそ、まくり差しが決まりやすい。展示の旋回スピードが速い5号艇は要チェックだよ！", kiina:"日本一静かな水面を、アタシの稲妻で揺らしてあげるッ！"},
  {id:"06", name:"浜名湖", rate:"6.43%", sub:"HAMANAKO / 広大な水面", boost:"1.2倍", winType:"まくり差し / 抜き", water:"全国でも有数の広い水面。1マークの旋回半径が大きく、思い切ったターンが可能。", strategy:"広さを活かして、外からでも加速をつけやすい。長い直線での追い比べに強いモーターなら1着も十分！", kiina:"広い浜名湖なら、アタシのスピードが一番輝くねッ！"},
  {id:"07", name:"蒲郡", rate:"5.35%", sub:"GAMAGORI / 夜の機力戦", boost:"0.8倍", winType:"差し / まくり差し", water:"広いナイター専用場。塩分を含まない淡水で、モーターのパワー差が顕著に出る。", strategy:"夜間に気温が下がると、調整を合わせたモーターが爆伸びする。展示タイムが抜けている時が攻めどきだよ！", kiina:"夜の蒲郡は魔物が住んでるよ。一撃狙いなら機力を見極めてね！"},
  {id:"08", name:"常滑", rate:"5.67%", sub:"TOKONAME / 安定の招き猫", boost:"1.6倍", winType:"まくり差し / まくり", water:"1マークが広く取られている。風の影響は受けやすいが、基本的には機力勝負になりやすい。", strategy:"追い風3m以上の時、カドの4号艇が連動してインを叩けば、5号艇に絶好の展開が巡ってくるよッ！", kiina:"4コースが攻めてくれるなら、アタシが美味しいところを貰うよッ！"},
  {id:"09", name:"津", rate:"6.40%", sub:"TSU / 強風の伊勢湾", boost:"1.4倍", winType:"まくり差し", water:"鈴鹿おろしが吹きつける強風場。1マーク付近が荒れやすく、インが踏ん張れない場面が多い。", strategy:"強風で1マークがもつれた瞬間を、冷静に差すのが5号艇の勝ち筋。風速計のチェックは必須だよッ！", kiina:"風が吹いたらアタシのターン。三重の風を感じなッ！"},
  {id:"10", name:"三国", rate:"5.23%", sub:"MIKUNI / 北陸の直線", boost:"1.5倍", winType:"まくり差し / まくり", water:"1マークの幅が広く、直線が長い。淡水のためボートが沈みやすく、パワーが必要。", strategy:"向かい風4m以上ならダッシュ勢に有利。展示タイムが良く、スリットで先制できるなら5頭まであるよッ！", kiina:"直線の長さはチャンスの長さ。北陸で一撃決めるよッ！"},
  {id:"11", name:"びわこ", rate:"6.67%", sub:"BIWAKO / 琵琶湖のうねり", boost:"1.6倍", winType:"まくり差し / まくり", water:"淡水で標高が高く、独自の『うねり』が発生する。イン受難の場として有名。", strategy:"1マークでうねりに乗って流れるインを尻目に、全速で内を突く。特殊水面に強い選手が5枠なら激アツだね！", kiina:"うねりはアタシの味方。湖の底まで突き落としてあげるよッ！"},
  {id:"12", name:"住之江", rate:"5.28%", sub:"SUMINOE / 聖地ナイター", boost:"1.8倍", winType:"差し / 抜き", water:"日本一のナイター場。コンクリート護岸に囲まれ、引き波が残りやすい難水面。", strategy:"2マークの引き波に負けない『回り足』が超重要。1マークで差し抜け、2マークで突き放す展開をイメージしてッ！", kiina:"聖地の夜は格別だね。アタシの電撃、目に焼き付けなッ！"},
  {id:"13", name:"尼崎", rate:"5.44%", sub:"AMAGASAKI / センターの場", boost:"1.1倍", winType:"まくり差し", water:"広い水面で静水面。センター（3・4枠）が強く、その影響で5枠にも展開が向きやすい。", strategy:"センター勢が競り合った瞬間、一番空いている内をサラッと差す。展開を読み切るのが尼崎5枠の極意だよッ！", kiina:"センターが騒がしいときは、アタシが静かに仕留めるよッ！"},
  {id:"14", name:"鳴門", rate:"6.93%", sub:"NARUTO / 小鳴門の激流", boost:"1.2倍", winType:"まくり / まくり差し", water:"潮流が激しく、狭い水面。風と潮の条件でインが簡単に崩れる。江戸川に次ぐ難所。", strategy:"潮流が『追い』のときは差し、『向かい』のときはまくりが届く。潮見表を見て攻め方を選んでねッ！", kiina:"潮を読み切った奴が勝つ。それが鳴門の掟だよッ！"},
  {id:"15", name:"丸亀", rate:"5.45%", sub:"MARUGAME / 潮位のナイター", boost:"1.5倍", winType:"まくり差し", water:"海水で潮位変化がある。満潮時はインが強く、干潮時はダッシュまくりが届きやすい。", strategy:"干潮に向かう時間帯、展示で足色が抜けているなら、一撃まくり差しが決まるチャンスだよッ！", kiina:"潮が引いたらアタシの出番。ナイターで輝くよッ！"},
  {id:"16", name:"児島", rate:"5.40%", sub:"KOJIMA / 瀬戸内の波止場", boost:"1.3倍", winType:"まくり差し / 差し", water:"潮の干満差が大きく、独特のうねりが発生する。海水のため浮力が強く、パワー差が出やすい。", strategy:"干潮時のまくり差し展開が狙い目。展示タイム差が0.08秒以上あるならアタマまで想定してッ！", kiina:"児島の潮風に乗って、最短距離でゴールを駆け抜けるよッ！"},
  {id:"17", name:"宮島", rate:"6.22%", sub:"MIYAJIMA / 厳島の潮", boost:"2.0倍", winType:"まくり差し", water:"日本一の干満差がある。満潮と干潮で全く別のレースになるのが特徴。", strategy:"干潮時は全力まくり差しが決まる絶好のタイミング。展示ブースト2.0倍の数字は伊達じゃないよッ！", kiina:"潮の変化についてこれないインは、ここでサヨナラだねッ！"},
  {id:"18", name:"徳山", rate:"3.44%", sub:"TOKUYAMA / インの牙城", boost:"1.1倍", winType:"まくり差し / 差し", water:"イン逃げ率が非常に高いモーニング場。風の影響も少なく、堅い決着が多い。", strategy:"インが強いからこそ、崩れた時の配当はエグい。4カドのスタートが抜けて、インを叩く展開なら5頭の万舟だよ！", kiina:"インが強い徳山で5頭が決まれば、お財布がパンパンになるねッ！"},
  {id:"19", name:"下関", rate:"4.87%", sub:"SHIMONOSEKI / 海峡ナイター", boost:"1.2倍", winType:"差し / まくり差し", water:"潮流の影響を受けるが、基本的にはインが強い傾向。夜間の風向きが重要。", strategy:"スリットからの行き足が抜けていることが必須条件。2号艇の壁が薄いレースなら、まくり差しの出番だよッ！", kiina:"関門海峡の波乱をアタシが呼び込んであげるよッ！"},
  {id:"20", name:"若松", rate:"5.83%", sub:"WAKAMATSU / 夜の洞海湾", boost:"1.2倍", winType:"まくり差し / 差し", water:"海水で潮の干満がある。夜は満潮に向かうことが多く、インが流されやすい面もある。", strategy:"満潮に向かう時間帯、4コースにスタート巧者がいるなら、それに続く5号艇の差し抜けを狙ってみて！", kiina:"洞海湾の夜景より、アタシの突き抜けの方が綺麗だよッ！"},
  {id:"21", name:"芦屋", rate:"4.27%", sub:"ASHIYA / モーニングの罠", boost:"1.2倍", winType:"まくり差し / 抜き", water:"インが圧倒的に有利な番組構成が多いモーニング場。静水面で淡水に近い。", strategy:"一般戦で内枠に不安がある番組、または5号艇に超抜モーターがいる時が逆転のサインだよッ！", kiina:"朝から万舟、狙ってみない？アタシが案内するよッ！"},
  {id:"22", name:"福岡", rate:"3.81%", sub:"FUKUOKA / 難攻不落のうねり", boost:"1.1倍", winType:"差し / 抜き / まくり差し", water:"那珂川の河口で1マークが川に突き出している。日本一複雑なうねりが発生する。", strategy:"まくりよりも差し、または道中の『抜き』が強い。うねりを回避するテクニック重視で選手を選んでねッ！", kiina:"福岡のうねりはクセ強だね。アタシなら乗りこなせるけどねッ！"},
  {id:"23", name:"唐津", rate:"5.05%", sub:"KARATSU / 広いピット離れ", boost:"1.6倍", winType:"まくり差し / まくり", water:"ピットから2マークまでが非常に遠く、進入争いが起きやすい。水面は広く淡水。", strategy:"展示タイム差が結果に直結する。5号艇が伸びるモーターなら、広い水面をフルスピードでまくり差せるよッ！", kiina:"広い唐津なら、アタシのまくり差しが綺麗に決まるねッ！"},
  {id:"24", name:"大村", rate:"3.01%", sub:"OMURA / イン最強の聖地", boost:"1.1倍", winType:"最内差し", water:"イン逃げ率日本一。目標物がない広大な海面だが、インが圧倒的に有利。", strategy:"ここで5頭を狙うなら、風速5m以上の向かい風が必須。インが流れた隙を突く最内差し、これ一択だよッ！", kiina:"聖地でも、アタシの稲妻は止まらないよ。隙があれば刺すッ！"}

const navArea = document.getElementById('nav');
const contentArea = document.getElementById('content');

venueDetails.forEach(v => {
  // ナビ生成
  const n = document.createElement('a');
  n.href = `#v${v.id}`;
  n.innerText = v.name;
  navArea.appendChild(n);

  // 詳細カード生成
  const card = document.createElement('div');
  card.className = 'venue-detail-card';
  card.id = `v${v.id}`;
  card.innerHTML = `
    <div class="card-header">
      <div class="venue-title">${v.id}# ${v.name}</div>
      <div class="venue-sub">${v.sub}</div>
    </div>

    <div class="stats-box">
      <div class="stat-item"><span class="stat-label">5枠1着率</span><span class="stat-val">${v.rate}</span></div>
      <div class="stat-item"><span class="stat-label">展示ブースト</span><span class="stat-val">${v.boost}</span></div>
    </div>

    <div class="analysis-content">
      <div class="analysis-item">
        <span class="analysis-label">5 Master 攻略の極意</span>
        <div class="analysis-text">${v.strategy}</div>
      </div>
      <div class="analysis-item">
        <span class="analysis-label">水面・環境特性</span>
        <div class="analysis-text">${v.water}</div>
      </div>
    </div>

    <div class="kiina-comment">${v.kiina}</div>

    <div class="back-to-top"><a href="#nav">▲ クイックナビに戻る</a></div>
  `;
  contentArea.appendChild(card);
});
</script>
</body>
</html>
