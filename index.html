<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ボートレース予想メーカー</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --br-blue: #0054a6; --br-orange: #f39800; --sheet-bg: #fffbf0; }
        body { font-family: "MS Gothic", sans-serif; background-color: #ccc; display: flex; flex-direction: column; align-items: center; padding: 10px; margin: 0; }

        /* --- 舟券デザイン（見切れ防止版） --- */
        #capture-target { padding: 10px; background: #ccc; }
        .ticket-container {
            width: 380px; height: 225px; /* 高さを固定 */
            background: #fff; border: 1px solid #333;
            padding: 8px 12px; box-sizing: border-box; color: #000;
            background-image: radial-gradient(rgba(255, 192, 203, 0.2) 20%, transparent 20%);
            background-size: 50px 50px;
            display: flex; flex-direction: column; position: relative;
        }
        
        .ticket-header { display: flex; justify-content: space-between; align-items: center; }
        /* 会場名を少し小さく */
        .ticket-place { font-size: 22px; font-weight: 950; letter-spacing: 1px; }
        
        /* レース・3連単エリアをスリム化 */
        .ticket-info-row { 
            display: flex; border-top: 2.5px solid #000; border-bottom: 2.5px solid #000; 
            margin: 2px 0; padding: 0; height: 30px; align-items: center;
        }
        .race-num { font-size: 18px; font-weight: 900; width: 110px; border-right: 2px solid #000; white-space: nowrap; padding-left: 5px; }
        .shikibetsu-box { flex: 1; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 900; letter-spacing: 8px; }

        /* 買い目エリア（見切れない工夫） */
        .bet-area { flex: 1; display: flex; flex-direction: column; justify-content: space-evenly; }
        .rank-line { display: flex; align-items: center; height: 32px; border-bottom: 1px solid transparent; }
        .rank-title { width: 50px; font-size: 14px; font-weight: bold; }
        /* 買い目のフォントを小さくし、間隔を調整可能に */
        .rank-numbers { 
            font-size: 24px; font-weight: 950; letter-spacing: 2px; 
            font-family: serif; text-shadow: 0.5px 0.5px 0px #000;
            white-space: nowrap; overflow: hidden;
        }

        .summary-area { font-size: 13px; font-weight: 900; text-align: right; line-height: 1.1; margin-top: 2px; }
        .barcode { height: 20px; background: repeating-linear-gradient(90deg, #000, #000 2px, #fff 2px, #fff 5px); margin-top: 3px; }

        /* --- マークシートはそのまま維持 --- */
        .marksheet { background-color: var(--sheet-bg); width: 100%; max-width: 420px; padding: 10px; border: 2px solid var(--br-orange); border-left: 15px solid var(--br-orange); box-sizing: border-box; display: flex; flex-direction: column; gap: 8px; }
        .ms-top-row { display: flex; gap: 8px; height: 110px; }
        .race-section { width: 135px; border: 1.5px solid var(--br-orange); background: #fff; padding: 4px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 3px; }
        .race-btn { font-size: 11px; height: 28px; border: 1px solid var(--br-orange); display: flex; align-items: center; justify-content: center; font-weight: bold; color: var(--br-orange); cursor: pointer; }
        .race-btn.selected { background: var(--br-orange); color: #fff; }
        .place-section { flex: 1; border: 1.5px solid var(--br-orange); background: #fff; display: flex; overflow-x: auto; padding: 4px; gap: 2px; }
        .place-btn { display: flex; flex-direction: column; align-items: center; min-width: 20px; cursor: pointer; }
        .place-btn.selected { background: var(--br-orange); color: #fff; }
        .place-name-v { writing-mode: vertical-rl; font-size: 10px; font-weight: bold; }
        .mark-row { display: flex; align-items: center; gap: 8px; }
        .rank-label-ms { background: var(--br-blue); color: #fff; font-size: 11px; width: 38px; text-align: center; font-weight: bold; padding: 3px 0;}
        .mark { width: 18px; height: 34px; border: 2px solid #444; border-radius: 50% / 35%; display: flex; justify-content: center; align-items: center; font-size: 14px; font-weight: bold; background: #fff; cursor: pointer; }
        .mark.selected { background: #222 !important; color: #fff !important; }
        .btn-save { margin-top: 15px; padding: 12px 40px; background: #e60012; color: #fff; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; font-size: 15px; }
    </style>
</head>
<body>

    <div id="capture-target">
        <div class="ticket-container">
            <div class="ticket-header">
                <div style="font-size:9px; font-weight:bold; line-height:1;">BOAT<br>RACE</div>
                <div class="ticket-place" id="disp-place">平和島</div>
                <div style="font-size:10px; font-weight:bold;">フォーメーション</div>
            </div>
            <div class="ticket-info-row">
                <div class="race-num"><span id="disp-race">01</span> レース</div>
                <div class="shikibetsu-box">３連単</div>
            </div>
            <div class="bet-area">
                <div class="rank-line"><div class="rank-title">1着 －</div><div class="rank-numbers" id="ans-0"></div></div>
                <div class="rank-line"><div class="rank-title">2着 －</div><div class="rank-numbers" id="ans-1"></div></div>
                <div class="rank-line"><div class="rank-title">3着 －</div><div class="rank-numbers" id="ans-2"></div></div>
            </div>
            <div class="summary-area">
                組合せ数 <span id="cnt">0</span>　各組 100円<br>
                合計 <span id="total">0</span>円
            </div>
            <div class="barcode"></div>
        </div>
    </div>

    <div class="marksheet">
        <div class="ms-top-row">
            <div class="race-section" id="race-container"></div>
            <div class="place-section" id="place-container"></div>
        </div>
        <div class="marks-area">
            <div class="mark-row"><div class="rank-label-ms">1着</div><div id="group-0" style="display:flex; gap:8px;"></div></div>
            <div class="mark-row" style="margin-top:4px;"><div class="rank-label-ms">2着</div><div id="group-1" style="display:flex; gap:8px;"></div></div>
            <div class="mark-row" style="margin-top:4px;"><div class="rank-label-ms">3着</div><div id="group-2" style="display:flex; gap:8px;"></div></div>
        </div>
    </div>

    <button class="btn-save" onclick="saveImage()">画像を保存</button>

    <script>
        const places = ["桐生","戸田","江戸川","平和島","多摩川","浜名湖","蒲郡","常滑","津","三国","びわこ","住之江","尼崎","鳴門","丸亀","児島","宮島","徳山","下関","若松","芦屋","福岡","唐津","大村"];
        let sel = [[], [], []];

        const pCont = document.getElementById('place-container');
        places.forEach((p, i) => {
            const d = document.createElement('div');
            d.className = 'place-btn' + (p==='平和島'?' selected':'');
            d.innerHTML = `<span style="font-size:6px; color:#666;">${i+1}</span><span class="place-name-v">${p}</span>`;
            d.onclick = function(){
                document.querySelectorAll('.place-btn').forEach(b=>b.classList.remove('selected'));
                this.classList.add('selected');
                document.getElementById('disp-place').innerText = p;
            };
            pCont.appendChild(d);
        });

        const rCont = document.getElementById('race-container');
        for(let i=1; i<=12; i++){
            const d = document.createElement('div');
            d.className = 'race-btn' + (i===1?' selected':'');
            d.innerText = i + 'R';
            d.onclick = function(){
                document.querySelectorAll('.race-btn').forEach(b=>b.classList.remove('selected'));
                this.classList.add('selected');
                document.getElementById('disp-race').innerText = i.toString().padStart(2, '0');
            };
            rCont.appendChild(d);
        }

        for(let r=0; r<3; r++){
            const g = document.getElementById('group-' + r);
            for(let n=1; n<=6; n++){
                const m = document.createElement('div');
                m.className = 'mark';
                m.innerText = n;
                m.onclick = function(){
                    if(this.classList.contains('selected')){
                        this.classList.remove('selected');
                        sel[r] = sel[r].filter(v=>v!==n);
                    } else {
                        this.classList.add('selected');
                        sel[r].push(n);
                    }
                    update();
                };
                g.appendChild(m);
            }
        }

        function update(){
            let c = 0;
            for(let a of sel[0]) for(let b of sel[1]) for(let d of sel[2]) {
                if(a!==b && b!==d && a!==d) c++;
            }
            sel.forEach((a, i) => {
                const target = document.getElementById('ans-' + i);
                const nums = a.sort().join(' ');
                target.innerText = nums;
                // 数字が多い時に間隔を詰める
                target.style.letterSpacing = a.length > 4 ? "0px" : "2px";
                target.style.fontSize = a.length > 5 ? "20px" : "24px";
            });
            document.getElementById('cnt').innerText = c;
            document.getElementById('total').innerText = (c*100).toLocaleString();
        }

        function saveImage(){
            html2canvas(document.getElementById('capture-target'), {scale: 3}).then(canvas => {
                const a = document.createElement('a');
                a.href = canvas.toDataURL();
                a.download = 'boat_ticket.png';
                a.click();
            });
        }
    </script>
</body>
</html>
