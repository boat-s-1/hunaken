<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOAT STRIKE ｜ MISSION CONTROL</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=M+PLUS+Rounded+1c:wght@800&display=swap" rel="stylesheet">
    <style>
        :root {
            --ichika: #ff4d6d; --hatsune: #00c853; --kiina: #2962ff;
        }
        body {
            margin: 0; background: #000; color: white;
            font-family: 'M PLUS Rounded 1c', sans-serif;
            overflow: hidden; height: 100vh; display: flex; flex-direction: column;
        }

        /* --- 背景のグリッドアニメーション --- */
        .grid-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(41, 98, 255, 0.1) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(41, 98, 255, 0.1) 1px, transparent 1px);
            background-size: 30px 30px;
            perspective: 500px; z-index: -1;
        }

        /* --- ヘッダー --- */
        header {
            padding: 20px; text-align: center;
            font-family: 'Orbitron', sans-serif;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .logo { font-size: 1.5rem; letter-spacing: 4px; background: linear-gradient(to right, #fff, #666); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* --- キャラ表示エリア --- */
        .main-display {
            flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
            position: relative; transition: 0.5s;
        }
        .chara-big {
            height: 50vh; max-height: 400px; filter: drop-shadow(0 0 20px rgba(255,255,255,0.2));
            transition: 0.5s transform cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: floating 3s infinite ease-in-out;
        }
        @keyframes floating { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        /* --- ステータス情報 --- */
        .status-window {
            width: 80%; background: rgba(255,255,255,0.05); padding: 15px;
            border-left: 4px solid var(--ichika); border-radius: 0 15px 15px 0;
            margin-top: -20px; backdrop-filter: blur(10px);
        }
        .tool-title { font-size: 1.2rem; font-weight: 900; margin: 0; }
        .tool-desc { font-size: 0.75rem; opacity: 0.8; margin: 5px 0 15px; }

        .start-btn {
            display: inline-block; background: white; color: black;
            padding: 12px 40px; border-radius: 50px; text-decoration: none;
            font-weight: 900; font-size: 1rem; box-shadow: 0 0 20px rgba(255,255,255,0.4);
        }

        /* --- 下部セレクトボタン --- */
        .chara-selector {
            display: flex; justify-content: center; gap: 20px; padding: 30px;
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
        }
        .sel-btn {
            width: 60px; height: 60px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.2);
            padding: 5px; cursor: pointer; transition: 0.3s;
        }
        .sel-btn.active { border-color: white; transform: scale(1.2); box-shadow: 0 0 15px white; }
        .sel-btn img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }

        /* --- フッターメニュー --- */
        .bottom-nav {
            display: flex; justify-content: space-around; padding: 10px;
            border-top: 1px solid rgba(255,255,255,0.1); font-size: 0.7rem; font-weight: bold;
        }
        .bottom-nav a { color: #888; text-decoration: none; }
    </style>
</head>
<body>

<div class="grid-bg"></div>

<header>
    <div class="logo">BOAT STRIKE</div>
</header>

<div class="main-display" id="display">
    <img src="ichika_sd.png" class="chara-big" id="main-img">
    <div class="status-window" id="status-win">
        <p id="chara-role" style="font-size: 0.6rem; margin: 0; color: #ff8fa3;">Target: IN-SIDE ANALYZE</p>
        <h2 class="tool-title" id="tool-name">1号艇 鬼絞り判定</h2>
        <p class="tool-desc" id="tool-desc">「ここ、逃げますぉ！」<br>イン逃げ鉄板レースを統計で絞り込みます。</p>
        <a href="ichika.html" class="start-btn" id="start-link">ANALYSIS START</a>
    </div>
</div>

<div class="chara-selector">
    <div class="sel-btn active" onclick="selectChara(0)"><img src="ichika_sd.png"></div>
    <div class="sel-btn" onclick="selectChara(1)"><img src="hatsune_sd.png"></div>
    <div class="sel-btn" onclick="selectChara(2)"><img src="kiina_sd.png"></div>
</div>

<nav class="bottom-nav">
    <a href="poikatsu.html">💰 軍資金を稼ぐ</a>
    <a href="dateg.html">📗 解析ノート</a>
    <a href="https://line.me/R/ti/p/あなたのLINE">💬 公式LINE</a>
</nav>

<script>
    const data = [
        { name: "1号艇 鬼絞り判定", role: "Target: IN-SIDE ANALYZE", desc: "「ここ、逃げますぉ！」<br>イン逃げ鉄板レースを統計で絞り込みます。", img: "ichika_sd.png", link: "ichika.html", color: "#ff4d6d" },
        { name: "女子戦 ひらめき鑑定", role: "Target: GIRLS RACE ANALYZE", desc: "「波乱の予感ですっ♪」<br>荒れる女子戦の期待値を鋭く鑑定します。", img: "hatsune_sd.png", link: "hatsune.html", color: "#00c853" },
        { name: "5 Master 精密解析", role: "Target: OUT-SIDE ATTACK", desc: "「万舟、獲らせてやるよ。」<br>5号艇の突き抜け展開をAI級の精度で検出。", img: "kiina_sd.png", link: "kiina5.html", color: "#2962ff" }
    ];

    function selectChara(idx) {
        const d = data[idx];
        const img = document.getElementById('main-img');
        const win = document.getElementById('status-win');
        
        // 切り替えアニメーション
        img.style.transform = "scale(0.8) rotateY(90deg)";
        img.style.opacity = "0";
        
        setTimeout(() => {
            img.src = d.img;
            document.getElementById('tool-name').innerText = d.name;
            document.getElementById('chara-role').innerText = d.role;
            document.getElementById('chara-role').style.color = d.color;
            document.getElementById('tool-desc').innerHTML = d.desc;
            document.getElementById('start-link').href = d.link;
            win.style.borderLeftColor = d.color;
            
            img.style.transform = "scale(1) rotateY(0deg)";
            img.style.opacity = "1";
        }, 300);

        // ボタンのactive切り替え
        const btns = document.querySelectorAll('.sel-btn');
        btns.forEach((b, i) => {
            if(i === idx) b.classList.add('active');
            else b.classList.remove('active');
        });
    }
</script>

</body>
</html>
