<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ボートレース予想メーカー</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --br-blue: #0054a6;
            --br-orange: #f39800;
            --sheet-bg: #fffbf0;
        }
        body { font-family: sans-serif; background-color: #eee; display: flex; flex-direction: column; align-items: center; padding: 20px; }

        /* 舟券デザイン */
        .ticket-container {
            width: 350px; height: 180px; background: #fffef0; border: 1px solid #ccc;
            position: relative; padding: 15px; box-sizing: border-box;
            font-family: 'Courier New', monospace; color: #111; margin-bottom: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .ticket-header { display: flex; justify-content: space-between; border-bottom: 2px solid #333; font-weight: bold; }
        .numbers { font-size: 2rem; font-weight: bold; text-align: center; margin: 15px 0; letter-spacing: 5px; }

        /* 改良版マークシート */
        .marksheet {
            background-color: var(--sheet-bg); width: 100%; max-width: 420px;
            padding: 15px; border: 3px solid var(--br-orange) !important;
            border-left: 15px solid var(--br-orange) !important;
        }
        .place-container {
            display: grid; grid-template-columns: repeat(12, 1fr); gap: 3px;
            background: white; padding: 5px; border: 2px solid var(--br-orange); margin-bottom: 15px;
        }
        .place-btn {
            display: flex; flex-direction: column; align-items: center; font-size: 10px;
            font-weight: bold; color: var(--br-orange); cursor: pointer; border: 1px solid #eee; padding: 2px 0;
        }
        .place-btn.selected { background-color: var(--br-orange); color: white; }
        .place-no { font-size: 8px; }

        .shikibetsu-container {
            display: flex; flex-direction: column; gap: 5px; width: 60px;
            border: 2px solid var(--br-orange); padding: 5px; float: left; margin-right: 10px;
        }
        .shiki-btn { font-size: 10px; border: 1px solid var(--br-orange); text-align: center; padding: 2px; cursor: pointer; color: var(--br-orange); }
        .shiki-btn.selected { background-color: var(--br-orange); color: white; }

        .section-title { background: var(--br-blue); color: white; padding: 2px 8px; font-size: 0.8rem; margin: 5px 0; display: inline-block; }
        .mark-group { display: flex; gap: 4px; }
        .mark { width: 30px; height: 18px; border: 2px solid #333; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 0.8rem; cursor: pointer; }
        .mark.selected { background-color: #333; color: white; }

        .btn-area { margin-top: 20px; width: 100%; max-width: 420px; display: flex; gap: 10px; }
        .btn-save { background: #d32f2f; color: white; flex: 1; padding: 12px; border: none; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="capture-target">
        <div class="ticket-container">
            <div class="ticket-header">
                <div id="display-place">平和島</div>
                <div>勝舟投票券</div>
            </div>
            <div><span id="display-race">1</span>R</div>
            <div id="display-numbers" class="numbers">_ － _ － _</div>
        </div>
    </div>

    <div class="marksheet">
        <div style="color: var(--br-orange); font-weight: bold; margin-bottom: 5px;">開催場</div>
        <div class="place-container" id="place-grid"></div>

        <div style="overflow: hidden;">
            <div class="shikibetsu-container">
                <div class="shiki-btn selected">3連単</div>
                <div class="shiki-btn">2連単</div>
                <div class="shiki-btn">3連複</div>
                <div class="shiki-btn">2連複</div>
            </div>
            <div style="float: left;">
                <div class="section-title">1着</div>
                <div class="row"><div class="mark-group" id="rank-0"></div></div>
                <div class="section-title">2着</div>
                <div class="row"><div class="mark-group" id="rank-1"></div></div>
                <div class="section-title">3着</div>
                <div class="row"><div class="mark-group" id="rank-2"></div></div>
            </div>
        </div>
    </div>

    <div class="btn-area">
        <button class="btn-save" onclick="saveImage()">画像を生成</button>
    </div>

    <script>
        const places = ["桐生","戸田","江戸川","平和島","多摩川","浜名湖","蒲郡","常滑","津","三国","びわこ","住之江","尼崎","鳴門","丸亀","児島","宮島","徳山","下関","若松","芦屋","福岡","唐津","大村"];
        const grid = document.getElementById('place-grid');
        places.forEach((name, index) => {
            const btn = document.createElement('div');
            btn.className = 'place-btn';
            btn.innerHTML = `<span class="place-no">${index + 1}</span><span>${name}</span>`;
            btn.onclick = function() {
                document.querySelectorAll('.place-btn').forEach(b => b.classList.remove('selected'));
                this.classList.add('selected');
                document.getElementById('display-place').innerText = name;
            };
            grid.appendChild(btn);
        });

        let selected = [null, null, null];
        for (let r = 0; r < 3; r++) {
            const container = document.getElementById(`rank-${r}`);
            for (let n = 1; n <= 6; n++) {
                const div = document.createElement('div');
                div.className = 'mark';
                div.innerText = n;
                div.onclick = function() {
                    container.querySelectorAll('.mark').forEach(m => m.classList.remove('selected'));
                    this.classList.add('selected');
                    selected[r] = n;
                    document.getElementById('display-numbers').innerText = selected.map(num => num || "_").join(" － ");
                };
                container.appendChild(div);
            }
        }

        function saveImage() {
            html2canvas(document.getElementById('capture-target')).then(canvas => {
                const link = document.createElement('a');
                link.download = 'funaken.png';
                link.href = canvas.toDataURL();
                link.click();
            });
        }
    </script>
</body>
</html>
