<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ボートレース予想メーカー（完全復旧版）</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --br-blue: #0054a6; --br-orange: #f39800; --sheet-bg: #fffbf0; }
        body { font-family: "Hiragino Sans", "Meiryo", sans-serif; background-color: #ccc; display: flex; flex-direction: column; align-items: center; padding: 20px; }

        /* --- 舟券デザイン --- */
        .ticket-container {
            width: 400px; min-height: 250px; background: #fff; border: 1px solid #999;
            position: relative; padding: 10px 15px; box-sizing: border-box; color: #000;
            margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            background-image: radial-gradient(rgba(255, 192, 203, 0.15) 20%, transparent 20%);
            background-size: 50px 50px;
        }
        .ticket-header { display: flex; justify-content: space-between; align-items: flex-end; }
        .ticket-logo { font-size: 10px; font-weight: bold; border-bottom: 1px solid #000; }
        .ticket-place { font-size: 26px; font-weight: 900; font-family: "MS Gothic", sans-serif; letter-spacing: 2px; }
        
        .ticket-info-row { display: flex; border-top: 2px solid #000; border-bottom: 2px solid #000; margin: 5px 0; padding: 2px 0; }
        .race-num { font-size: 20px; font-weight: bold; width: 100px; border-right: 1px solid #000; }
        .shikibetsu-box { flex: 1; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: bold; letter-spacing: 5px; }

        .bet-details { font-family: "MS Gothic", monospace; font-size: 18px; margin-top: 5px; }
        .rank-line { display: flex; align-items: center; margin-bottom: 2px; }
        .rank-title { width: 60px; font-weight: normal; }
        .rank-numbers { 
            font-size: 28px; 
            font-weight: 950; 
            letter-spacing: 5px; 
            text-shadow: 0.5px 0.5px 0px #000;
        }

        .summary-row { display: flex; justify-content: flex-end; gap: 15px; font-size: 14px; font-weight: bold; margin-top: 5px; font-family: "MS Gothic"; }
        .ticket-footer { margin-top: 10px; border-top: 1px dashed #999; padding-top: 5px; }
        .barcode { height: 25px; background: repeating-linear-gradient(90deg, #000, #000 2px, #fff 2px, #fff 5px); width: 100%; }
        
        /* --- マークシート --- */
        .marksheet { background-color: var(--sheet-bg); width: 100%; max-width: 650px; padding: 20px; border: 2px solid var(--br-orange); border-left: 20px solid var(--br-orange); display: flex; flex-direction: column; box-shadow: 5px 5px 0px #888; box-sizing: border-box;}
        .place-row { display: flex; margin-left: 155px; margin-bottom: 15px; border: 1px solid var(--br-orange); background: #fff; overflow-x: auto; }
        .place-btn { display: flex; flex-direction: column; align-items: center; min-width: 20px; border-right: 1px solid var(--br-orange); cursor: pointer; padding: 5px 2px; }
        .place-name-vertical { writing-mode: vertical-rl; font-size: 11px; font-weight: bold; color: var(--br-blue); }
        .place-btn.selected { background-color: var(--br-orange); }
        .place-btn.selected .place-name-vertical { color: #fff; }
        .main-layout { display: flex; gap: 20px; }
        .race-column { width: 140px; border: 2px solid var(--br-orange); background: #fff; padding: 5px; }
        .race-container { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; }
        .race-btn { height: 30px; display: flex; align-items: center; justify-content: center; font-size: 14px; border: 1px solid var(--br-orange); cursor: pointer; color: var(--br-orange); font-weight: bold;}
        .race-btn.selected { background-color: var(--br-orange); color: #fff; }
        .rank-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
        .rank-label { background: var(--br-blue); color: #fff; font-size: 11px; padding: 3px 5px; width: 35px; text-align: center; }
        .mark { width: 18px; height: 32px; border: 1.5px solid #555; border-radius: 50% / 30%; display: flex; justify-content: center; align-items: center; font-size: 13px; font-weight: bold; cursor: pointer; background: #fff; user-select: none;}
        .mark.selected { background-color: #222; color: #fff; }
        .btn-save { margin-top: 30px; padding: 15px 50px; background: #e60012; color: #fff; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div id="capture-target">
        <div class="ticket-container">
            <div class="ticket-header">
                <div class="ticket-logo">BOAT<br>RACE</div>
                <div class="ticket-place" id="display-place">平和島</div>
                <div style="font-size: 10px; font-weight: bold;">フォーメーション</div>
            </div>
            <div class="ticket-info-row">
                <div class="race-num"><span id="display-race">01</span> レース</div>
                <div class="shikibetsu-box">３連単</div>
            </div>
            <div class="bet-details">
                <div class="rank-line"><div class="rank-title">1着 －</div><div class="rank-numbers" id="numbers-0"></div></div>
                <div class="rank-line"><div class="rank-title">2着 －</div><div class="rank-numbers" id="numbers-1"></div></div>
                <div class="rank-line"><div class="rank-title">3着 －</div><div class="rank-numbers" id="numbers-2"></div></div>
            </div>
            <div class="summary-row">
                <div>組合せ数　<span id="display-count">0</span></div>
                <div>各組　100円</div>
            </div>
            <div class="summary-row" style="margin-top:0;">
                <div>合計　<span id="display-total">0</span>円</div>
            </div>
            <div class="ticket-footer"><div class="barcode"></div></div>
        </div>
    </div>

    <div class="marksheet">
        <div class="place-row" id="place-grid"></div>
        <div class="main-layout">
            <div class="race-column"><div class="race-container" id="race-grid"></div></div>
            <div class="ranks-section">
                <div class="rank-row"><div class="rank-label">1着</div><div class="mark-group" id="rank-0"></div></div>
                <div class="rank-row"><div class="rank-label">2着</div><div class="mark-group" id="rank-1"></div></div>
                <div class="rank-row"><div class="rank-label">3着</div><div class="mark-group" id="rank-2"></div></div>
            </div>
        </div>
    </div>

    <button class="btn-save" onclick="saveImage()">画像を生成</button>

    <script>
        const places = ["桐生","戸田","江戸川","平和島","多摩川","浜名湖","蒲郡","常滑","津","三国","びわこ","住之江","尼崎","鳴門","丸亀","児島","宮島","徳山","下関","若松","芦屋","福岡","唐津","大村"];
        // 選択状態を保持する配列
        let selected = [[], [], []];

        // 開催場
        const pGrid = document.getElementById('place-grid');
        places.forEach((name, i) => {
            const btn = document.createElement('div');
            btn.className = 'place-btn' + (name === "平和島" ? " selected" : "");
            btn.innerHTML = `<span style="font-size:7px;">${i+1}</span><span class="place-name-vertical">${name}</span>`;
            btn.onclick = () => {
                document.querySelectorAll('.place-btn').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                document.getElementById('display-place').innerText = name;
            };
            pGrid.appendChild(btn);
        });

        // レース番号
        const rGrid = document.getElementById('race-grid');
        for (let i = 1; i <= 12; i++) {
            const btn = document.createElement('div');
            btn.className = 'race-btn' + (i === 1 ? " selected" : "");
            btn.innerText = i;
            btn.onclick = () => {
                rGrid.querySelectorAll('.race-btn').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                document.getElementById('display-race').innerText = i.toString().padStart(2, '0');
            };
            rGrid.appendChild(btn);
        }

        // マーク（着順ごとの数字選択）
        for (let r = 0; r < 3; r++) {
            const container = document.getElementById(`rank-${r}`);
            for (let n = 1; n <= 6; n++) {
                const div = document.createElement('div');
                div.className = 'mark';
                div.innerText = n;
                div.onclick = function() {
                    if (this.classList.contains('selected')) {
                        this.classList.remove('selected');
                        selected[r] = selected[r].filter(num => num !== n);
                    } else {
                        this.classList.add('selected');
                        selected[r].push(n);
                    }
                    update(); // ここで点数と舟券表示を更新
                };
                container.appendChild(div);
            }
        }

        function update() {
            let count = 0;
            // 3連単フォーメーション計算（重複を排除）
            for (let a of selected[0]) {
                for (let b of selected[1]) {
                    if (a === b) continue;
                    for (let c of selected[2]) {
                        if (c === a || c === b) continue;
                        count++;
                    }
                }
            }
            
            // 舟券の買い目表示を更新
            selected.forEach((arr, i) => {
                const target = document.getElementById(`numbers-${i}`);
                // 昇順に並べ替えて表示
                target.innerText = arr.slice().sort((x, y) => x - y).join(" ");
            });

            // 点数と金額の更新
            document.getElementById('display-count').innerText = count;
            document.getElementById('display-total').innerText = (count * 100).toLocal
