<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ボートレース予想メーカー 究極版</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --br-blue: #0054a6; --br-orange: #f39800; --sheet-bg: #fffbf0; }
        body { font-family: "MS Gothic", "Osaka-mono", monospace; background-color: #ccc; display: flex; flex-direction: column; align-items: center; margin: 0; padding: 10px; }

        /* --- 舟券共通設定 --- */
        #capture-target { padding: 5px; background: #ccc; }
        .ticket {
            width: 370px; height: 230px; background: #fff; border: 1px solid #333;
            padding: 10px; box-sizing: border-box; display: flex; position: relative;
            overflow: hidden;
        }

        /* --- モードA：標準（平和島風） --- */
        .mode-std { flex-direction: column; background-image: radial-gradient(rgba(255, 192, 203, 0.15) 20%, transparent 20%); background-size: 40px 40px; }
        .mode-std .std-only { display: block; }
        .mode-std .bwk-only { display: none; }
        
        .std-header { display: flex; justify-content: space-between; align-items: center; }
        .std-row { display: flex; border-top: 2px solid #000; border-bottom: 2px solid #000; margin: 5px 0; height: 32px; align-items: center; }
        .std-race { font-size: 18px; font-weight: bold; width: 100px; border-right: 2px solid #000; }
        .std-shiki { flex: 1; text-align: center; font-size: 18px; font-weight: bold; letter-spacing: 10px; }

        /* --- モードB：びわこ風 --- */
        .mode-bwk { flex-direction: row; background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="40"><text x="10" y="30" font-family="sans-serif" font-size="16" fill="rgba(255,192,203,0.1)" transform="rotate(-15, 50, 20)">P-STAR</text></svg>'); }
        .mode-bwk .std-only { display: none; }
        .mode-bwk .bwk-only { display: flex; }

        .bwk-left { width: 120px; border-right: 1px solid #000; display: flex; flex-direction: column; }
        .bwk-mid { width: 40px; border-right: 1px solid #000; display: flex; align-items: center; justify-content: center; }
        .bwk-right { flex: 1; padding-left: 8px; display: flex; flex-direction: column; }
        .bwk-shiki-v { writing-mode: vertical-rl; text-orientation: upright; font-size: 18px; font-weight: bold; border: 1.5px solid #000; padding: 10px 2px; letter-spacing: 4px; }
        .bwk-place-box { border: 2px solid #000; padding: 2px; text-align: center; margin: 5px 0; font-size: 20px; font-weight: bold; }

        /* --- マークシート --- */
        .ms { background: var(--sheet-bg); width: 100%; max-width: 380px; padding: 10px; border: 2px solid var(--br-orange); border-left: 12px solid var(--br-orange); box-sizing: border-box; margin-top: 10px; }
        .ms-top { display: flex; gap: 5px; height: 80px; margin-bottom: 8px; }
        .mode-switch { width: 100%; background: #444; color: #fff; border: none; padding: 10px; font-weight: bold; margin-bottom: 10px; border-radius: 5px; cursor: pointer; }
        
        .ms-btn, .p-btn, .amt-btn { border: 1px solid var(--br-orange); background: #fff; color: var(--br-orange); font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 10px; }
        .active { background: var(--br-orange) !important; color: #fff !important; }
        .row { display: flex; align-items: center; gap: 5px; margin-bottom: 5px; }
        .label { background: var(--br-blue); color: #fff; font-size: 10px; width: 35px; text-align: center; padding: 5px 0; font-weight: bold; }
        .mark { width: 22px; height: 32px; border: 1.5px solid #444; border-radius: 50% / 30%; background: #fff; font-weight: bold; display: flex; align-items: center; justify-content: center; }
        .selected { background: #222 !important; color: #fff !important; }

        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        .save-btn { padding: 12px 25px; background: #e60012; color: #fff; border: none; border-radius: 25px; font-weight: bold; cursor: pointer; }
        .x-btn { padding: 12px 25px; background: #000; color: #fff; border: none; border-radius: 25px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div id="capture-target">
        <div id="ticket-main" class="ticket mode-std">
            
            <div class="std-only std-header">
                <div style="font-size:10px; font-weight:bold;">BOAT RACE</div>
                <div style="font-size:24px; font-weight:bold;" class="res-place-txt">平和島</div>
                <div style="font-size:10px; font-weight:bold;">フォーメーション</div>
            </div>
            <div class="std-only std-row">
                <div class="std-race"><span class="res-race-txt">01</span> レース</div>
                <div class="std-shiki">３連単</div>
            </div>

            <div class="bwk-only bwk-left">
                <div style="font-size:10px; font-weight:bold;">BOAT<br>RACE</div>
                <div class="bwk-place-box"><span class="res-place-txt">びわこ</span></div>
                <div style="margin-bottom:auto;">
                    <span style="font-size:28px; font-weight:bold;" class="res-race-txt">07</span>
                    <span style="font-size:16px; font-weight:bold;">レース</span>
                </div>
                <div style="font-size:10px; font-weight:bold; line-height:1.2;">
                    <span id="date-y">2021</span>年<span id="date-m">07</span>月<span id="date-d">13</span>日<br>
                    滋賀県
                </div>
            </div>
            <div class="bwk-only bwk-mid">
                <div class="bwk-shiki-v">３連単</div>
            </div>

            <div id="bet-area" style="flex:1; display:flex; flex-direction:column; padding-left:10px;">
                <div class="bwk-only" style="border:1.5px solid #000; padding:1px 5px; align-self:flex-start; margin-bottom:5px; font-size:12px; font-weight:bold;">フォーメーション</div>
                <div style="flex:1; display:flex; flex-direction:column; justify-content:center; gap:5px;">
                    <div style="display:flex; align-items:center; font-weight:bold;">1着 － <span id="ans0" style="font-size:20px; margin-left:10px;"></span></div>
                    <div style="display:flex; align-items:center; font-weight:bold;">2着 － <span id="ans1" style="font-size:20px; margin-left:10px;"></span></div>
                    <div style="display:flex; align-items:center; font-weight:bold;">3着 － <span id="ans2" style="font-size:20px; margin-left:10px;"></span></div>
                </div>
                <div style="text-align:right; font-size:12px; font-weight:bold; line-height:1.2;">
                    組合せ数 <span class="bwk-only">◆◆</span><span id="res-cnt">0</span><br>
                    各組 <span class="bwk-only">◆◆◆◆</span><span id="res-unit">100</span>円<br>
                    合計 <span class="bwk-only">◆◆◆◆◆◆</span><span id="res-total">0</span>円
                </div>
                <div class="barcode"></div>
            </div>
        </div>
    </div>

    <div class="ms">
        <button class="mode-switch" onclick="toggleMode()">デザイン切替 (標準 ⇔ びわこ風)</button>
        <div class="ms-top">
            <div class="ms-race" id="race-list"></div>
            <div class="ms-place" id="place-list"></div>
        </div>
        <div id="mark-groups"></div>
        <div class="amt-row" id="amt-list" style="display:flex; justify-content:flex-end; gap:5px; margin-top:10px;"></div>
    </div>

    <div class="btn-group">
        <button class="save-btn" onclick="save(false)">画像を保存</button>
        <button class="x-btn" onclick="save(true)">𝕏 に投稿</button>
    </div>

    <script>
        let isBwk = false;
        const places = ["桐生","戸田","江戸川","平和島","多摩川","浜名湖","蒲郡","常滑","津","三国","びわこ","住之江","尼崎","鳴門","丸亀","児島","宮島","徳山","下関","若松","芦屋","福岡","唐津","大村"];
        const amts = [100, 200, 300, 500, 1000];
        let sel = [[], [], []];
        let unit = 100;

        function toggleMode() {
            isBwk = !isBwk;
            const ticket = document.getElementById('ticket-main');
            ticket.className = isBwk ? 'ticket mode-bwk' : 'ticket mode-std';
            const betArea = document.getElementById('bet-area');
            betArea.style.paddingLeft = isBwk ? "10px" : "0px";
        }

        // 日付
        const now = new Date();
        document.getElementById('date-y').innerText = now.getFullYear();
        document.getElementById('date-m').innerText = String(now.getMonth()+1).padStart(2,'0');
        document.getElementById('date-d').innerText = String(now.getDate()).padStart(2,'0');

        // 各リスト生成
        const rl = document.getElementById('race-list');
        for(let i=1; i<=12; i++){
            const b = document.createElement('div');
            b.className = 'ms-btn' + (i===1?' active':'');
            b.innerText = i+'R';
            b.onclick = () => {
                document.querySelectorAll('.ms-btn').forEach(x=>x.classList.remove('active'));
                b.classList.add('active');
                document.querySelectorAll('.res-race-txt').forEach(t=>t.innerText = String(i).padStart(2,'0'));
            };
            rl.appendChild(b);
        }

        const pl = document.getElementById('place-list');
        places.forEach(p => {
            const b = document.createElement('div');
            b.className = 'p-btn' + (p==='平和島'?' active':'');
            b.style.minWidth = '24px';
            b.innerHTML = `<span style="writing-mode:vertical-rl; padding:4px 0;">${p}</span>`;
            b.onclick = () => {
                document.querySelectorAll('.p-btn').forEach(x=>x.classList.remove('active'));
                b.classList.add('active');
                document.querySelectorAll('.res-place-txt').forEach(t=>t.innerText
