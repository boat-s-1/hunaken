<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ボートレース予想メーカー 修正版</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --br-blue: #0054a6; --br-orange: #f39800; --sheet-bg: #fffbf0; }
        body { font-family: sans-serif; background-color: #ccc; display: flex; flex-direction: column; align-items: center; margin: 0; padding: 10px; -webkit-user-select: none; }

        /* --- 舟券デザイン --- */
        #capture-target { padding: 5px; background: #ccc; }
        .ticket {
            width: 350px; height: 220px; background: #fff; border: 1px solid #333;
            padding: 8px; box-sizing: border-box; display: flex; flex-direction: column; position: relative;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="40"><text x="10" y="30" font-family="sans-serif" font-size="14" fill="rgba(255,192,203,0.1)" transform="rotate(-15, 50, 20)">P-STAR</text></svg>');
        }
        .t-top-row { display: flex; flex: 1; overflow: hidden; }
        .t-left { width: 110px; border-right: 1px solid #000; display: flex; flex-direction: column; padding-right: 5px; }
        .t-mid { width: 45px; display: flex; align-items: center; justify-content: center; }
        .t-right { flex: 1; padding-left: 8px; display: flex; flex-direction: column; }
        .t-place-box { border: 1.5px solid #000; padding: 2px; text-align: center; margin: 5px 0; font-size: 18px; font-weight: bold; }
        .t-shiki-v { writing-mode: vertical-rl; text-orientation: upright; font-size: 16px; font-weight: bold; border: 1.5px solid #000; padding: 8px 2px; letter-spacing: 4px; }
        .t-bet-line { display: flex; align-items: center; font-weight: bold; height: 24px; font-size: 13px; }
        .t-nums { font-size: 18px; margin-left: 8px; letter-spacing: 1px; }
        .t-summary { text-align: right; font-size: 11px; font-weight: bold; line-height: 1.2; margin-top: auto; }
        .t-barcode-area { width: 100%; display: flex; justify-content: center; padding: 5px 0; }
        .t-barcode { width: 85%; height: 18px; background: repeating-linear-gradient(90deg, #000, #000 2px, #fff 2px, #fff 4px); }

        /* --- マークシート修正 --- */
        .ms { background: var(--sheet-bg); width: 100%; max-width: 380px; padding: 12px; border: 2px solid var(--br-orange); border-left: 10px solid var(--br-orange); box-sizing: border-box; margin-top: 10px; border-radius: 4px; }
        
        .ms-top-flex { display: flex; gap: 8px; margin-bottom: 12px; height: 110px; }
        
        /* レース選択 */
        .race-container { width: 140px; border: 1px solid var(--br-orange); padding: 5px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; background: #fff; }
        .r-btn { border: 1px solid #ddd; font-size: 11px; color: var(--br-orange); text-align: center; display: flex; align-items: center; justify-content: center; cursor: pointer; font-weight: bold; height: 100%; }
        .r-btn.active { background: var(--br-orange); color: #fff; border-color: var(--br-orange); }

        /* 会場選択（重なり防止修正） */
        .place-container { flex: 1; border: 1px solid var(--br-orange); background: #fff; display: flex; overflow-x: auto; padding: 0; }
        .p-btn { 
            min-width: 30px; 
            writing-mode: vertical-rl; 
            text-orientation: upright; 
            font-size: 11px; 
            color: #444; 
            text-align: center; 
            cursor: pointer; 
            border-right: 1px solid #eee; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            height: 100%;
            flex-shrink: 0;
            z-index: 1;
        }
        .p-btn.active { background: var(--br-orange); color: #fff; font-weight: bold; }
        .p-btn span { font-size: 8px; margin-bottom: 4px; pointer-events: none; }

        /* 着順選択 */
        .row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
        .label { background: var(--br-blue); color: #fff; font-size: 11px; width: 35px; text-align: center; padding: 8px 0; font-weight: bold; border-radius: 2px; }
        .mark-wrap { display: flex; gap: 6px; }
        .mark { width: 34px; height: 34px; border: 1.5px solid #444; border-radius: 50%; background: #fff; font-weight: bold; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 16px; }
        .mark.selected { background: #222 !important; color: #fff !important; }

        /* 金額 */
        .amt-wrap { display: flex; justify-content: flex-end; gap: 5px; border-top: 1px dashed #ccc; padding-top: 10px; }
        .amt-btn { border: 1px solid var(--br-orange); background: #fff; color: var(--br-orange); font-weight: bold; padding: 8px 15px; font-size: 12px; cursor: pointer; border-radius: 3px; }
        .amt-btn.active { background: var(--br-orange); color: #fff; }

        .save-btn { margin-top: 15px; padding: 14px; background: #e60012; color: #fff; border: none; border-radius: 30px; font-weight: bold; cursor: pointer; width: 100%; max-width: 380px; font-size: 16px; }
    </style>
</head>
<body>

    <div id="capture-target">
        <div class="ticket">
            <div class="t-top-row">
                <div class="t-left">
                    <div style="font-size:9px; font-weight:bold;">BOAT RACE</div>
                    <div class="t-place-box" id="res-place">びわこ</div>
                    <div style="margin-bottom:auto;">
                        <span style="font-size:24px; font-weight:bold;" id="res-race">07</span><span style="font-size:14px; font-weight:bold;">レース</span>
                    </div>
                    <div style="font-size:9px; font-weight:bold; line-height:1.2;">
                        2024年 05月 20日<br><span id="res-pref">滋賀県</span>
                    </div>
                </div>
                <div class="t-mid"><div class="t-shiki-v">３連単</div></div>
                <div class="t-right">
                    <div style="border:1.5px solid #000; padding:1px 5px; align-self:flex-start; margin-bottom:5px; font-size:11px; font-weight:bold;">フォーメーション</div>
                    <div style="flex:1; display:flex; flex-direction:column; justify-content:center;">
                        <div class="t-bet-line">1着 － <span id="ans0" class="t-nums"></span></div>
                        <div class="t-bet-line">2着 － <span id="ans1" class="t-nums"></span></div>
                        <div class="t-bet-line">3着 － <span id="ans2" class="t-nums"></span></div>
                    </div>
                    <div class="t-summary">
                        組合せ数 <span id="res-cnt">0</span><br>
                        各組 <span id="res-unit">100</span>円<br>
                        合計 <span id="res-total">0</span>円
                    </div>
                </div>
            </div>
            <div class="t-barcode-area"><div class="t-barcode"></div></div>
        </div>
    </div>

    <div class="ms">
        <div class="ms-top-flex">
            <div class="race-container" id="race-btns">
                <script>
                    for(let i=1; i<=12; i++) {
                        document.write(`<div class="r-btn ${i==7?'active':''}" onclick="setRace(this, '${String(i).padStart(2,'0')}')">${i}R</div>`);
                    }
                </script>
            </div>
            <div class="place-container" id="place-btns">
                <script>
                    const places = [
                        {n:'桐生',p:'群馬県'},{n:'戸田',p:'埼玉県'},{n:'江戸川',p:'東京都'},{n:'平和島',p:'東京都'},{n:'多摩川',p:'東京都'},
                        {n:'浜名湖',p:'静岡県'},{n:'蒲郡',p:'愛知県'},{n:'常滑',p:'愛知県'},{n:'津',p:'三重県'},{n:'三国',p:'福井県'},
                        {n:'びわこ',p:'滋賀県'},{n:'住之江',p:'大阪府'},{n:'尼崎',p:'兵庫県'},{n:'鳴門',p:'徳島県'},{n:'丸亀',p:'香川県'},
                        {n:'児島',p:'岡山県'},{n:'宮島',p:'広島県'},{id:18,n:'徳山',p:'山口県'},{n:'下関',p:'山口県'},{n:'若松',p:'福岡県'},
                        {n:'芦屋',p:'福岡県'},{n:'福岡',p:'福岡県'},{n:'唐津',p:'佐賀県'},{n:'大村',p:'長崎県'}
                    ];
                    places.forEach((p, idx) => {
                        document.write(`<div class="p-btn ${p.n=='びわこ'?'active':''}" onclick="setPlace(this, '${p.n}', '${p.p}')"><span>${idx+1}</span>${p.n}</div>`);
                    });
                </script>
            </div>
        </div>

        <div id="mark-area">
            <script>
                for(let r=0; r<3; r++) {
                    document.write(`<div class="row"><div class="label">${r+1}着</div><div class="mark-wrap">`);
                    for(let n=1; n<=6; n++) {
                        document.write(`<div class="mark" onclick="tapMark(this, ${r}, ${n})">${n}</div>`);
                    }
                    document.write(`</div></div>`);
                }
            </script>
        </div>

        <div class="amt-wrap" id="amt-btns">
            <div class="amt-btn active" onclick="setAmt(this, 100)">100円</div>
            <div class="amt-btn" onclick="setAmt(this, 500)">500円</div>
            <div class="amt-btn" onclick="setAmt(this, 1000)">1000円</div>
        </div>
    </div>

    <button class="save-btn" onclick="save()">画像を保存する</button>

            el.classList.add('active');

        }
