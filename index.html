<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ボートレース予想メーカー（本格フォーメーション版）</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --br-blue: #0054a6; --br-orange: #f39800; --sheet-bg: #fffbf0; }
        body { font-family: "Hiragino Sans", "Meiryo", sans-serif; background-color: #ccc; display: flex; flex-direction: column; align-items: center; padding: 20px; }

        /* --- 舟券デザイン（超リアル版） --- */
        .ticket-container {
            width: 400px; min-height: 240px; background: #fff; border: 1px solid #999;
            position: relative; padding: 10px 15px; box-sizing: border-box;
            color: #000; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            /* 背景の透かしロゴ風デザイン */
            background-image: radial-gradient(rgba(255, 192, 203, 0.2) 20%, transparent 20%);
            background-size: 60px 60px;
        }
        
        .ticket-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 5px; }
        .ticket-logo { font-size: 10px; font-weight: bold; line-height: 1; border-bottom: 1px solid #000; }
        .ticket-place { font-size: 24px; font-weight: 900; font-family: "MS Gothic", sans-serif; }
        
        .ticket-info-row { display: flex; border-top: 2px solid #000; border-bottom: 2px solid #000; margin: 5px 0; padding: 2px 0; }
        .race-num { font-size: 20px; font-weight: bold; width: 100px; border-right: 1px solid #000; }
        .shikibetsu-box { flex: 1; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: bold; letter-spacing: 5px; }

        /* 着順ごとの横並びエリア */
        .bet-details { font-family: "MS Gothic", monospace; font-size: 18px; font-weight: bold; margin-top: 10px; }
        .rank-line { display: flex; align-items: center; margin-bottom: 5px; }
        .rank-title { width: 50px; }
        .rank-numbers { font-size: 22px; letter-spacing: 3px; }

        /* 下部のバーコードと日付 */
        .ticket-footer { margin-top: 15px; border-top: 1px dashed #999; padding-top: 5px; }
        .barcode { height: 30px; background: repeating-linear-gradient(90deg, #000, #000 2px, #fff 2px, #fff 4px); width: 100%; }
        .ticket-date { font-size: 9px; text-align: left; color: #333; }

        /* --- マークシートは以前のものを維持 --- */
        .marksheet {
            background-color: var(--sheet-bg); width: 100%; max-width: 650px; padding: 20px;
            border: 2px solid var(--br-orange); border-left: 20px solid var(--br-orange);
            display: flex; flex-direction: column; box-shadow: 5px 5px 0px #888;
        }
        .place-row { display: flex; margin-left: 155px; margin-bottom: 15px; border: 1px solid var(--br-orange); background: #fff; overflow-x: auto; }
        .place-btn { display: flex; flex-direction: column; align-items: center; min-width: 20px; border-right: 1px solid var(--br-orange); cursor: pointer; padding: 5px 2px; }
        .place-name-vertical { writing-mode: vertical-rl; font-size: 11px; font-weight: bold; color: var(--br-blue); }
        .place-btn.selected { background-color: var(--br-orange); }
        .place-btn.selected .place-name-vertical { color: #fff; }
        .main-layout { display: flex; gap: 20px; }
        .race-column { width: 140px; border: 2px solid var(--br-orange); background: #fff; padding: 5px; }
        .race-container { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; }
        .race-btn { height: 30px; display: flex; align-items: center; justify-content: center; font-size: 14px; border: 1px solid var(--br-orange); cursor: pointer; color: var(--br-orange); font-weight: bold;}
        .race-btn.selected { background-color: var(--br-orange); color: #fff; }
        .rank-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
        .rank-label { background: var(--br-blue); color: #fff; font-size: 11px; padding: 3px 5px; width: 35px; text-align: center; }
        .mark { width: 18px; height: 32px; border: 1.5px solid #555; border-radius: 50% / 30%; display: flex; justify-content: center; align-items: center; font-size: 13px; font-weight: bold; cursor: pointer; background: #fff; }
        .mark.selected { background-color: #222; color: #fff; }
        .btn-save { margin-top: 30px; padding: 15px 50px; background: #e60012; color: #fff; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div id="capture-target">
        <div class="ticket-container">
            <div class="ticket-header">
                <div class="ticket-logo">BOAT<br>RACE</div>
                <div class="ticket-place" id="display-place">平和島</div>
                <div style="font-size: 10px; font-weight: bold;">予想用</div>
            </div>
            
            <div class="ticket-info-row">
                <div class="race-num"><span id="display-race">01</span> レース</div>
                <div class="shikibetsu-box" id="display-shiki">３連単</div>
            </div>

            <div class="bet-details">
                <div class="rank-line">
                    <div class="rank-title">1着</div>
                    <div class="rank-numbers" id="numbers-0">－</div>
                </div>
                <div class="rank-line">
                    <div class="rank-title">2着</div>
                    <div class="rank-numbers" id="numbers-1">－</div>
                </div>
                <div class="rank-line">
                    <div class="rank-title">3着</div>
                    <div class="rank-numbers" id="numbers-2">－</div>
                </div>
            </div>

            <div class="ticket-footer">
                <div class="ticket-date">2026年 02月 27日発行</div>
                <div class="barcode"></div>
            </div>
        </div>
    </div>

    <div class="marksheet">
        <div class="place-row" id="place-grid"></div>
        <div class="main-layout">
            <div class="race-column">
                <div style="color:var(--br-orange); font-size:10px; text-align:center; margin-bottom:5px;">レース</div>
                <div class="race-container" id="race-grid"></div>
            </div>
            <div class="ranks-section">
                <div class="rank-row"><div class="rank-label">1着</div><div style="display:flex;gap:10px;" id="rank-0"></div></div>
                <div class="rank-row"><div class="rank-label">2着</div><div style="display:flex;gap:10px;" id="rank-1"></div></div>
                <div class="rank-row"><div class="rank-label">3着</div><div style="display:flex;gap:10px;" id="rank-2"></div></div>
            </div>
        </div>
    </div>

    <button class="btn-save" onclick="saveImage()">舟券画像を保存</button>

    <script>
        const places = ["桐生","戸田","江戸川","平和島","多摩川","浜名湖","蒲郡","常滑","津","三国","びわこ","住之江","尼崎","鳴門","丸亀","児島","宮島","徳山","下関","若松","芦屋","福岡","唐津","大村"];
        let selectedNumbers = [[], [], []];

        // 開催場
        const pGrid = document.getElementById('place-grid');
        places.forEach((name, i) => {
            const btn = document.createElement('div');
            btn.className = 'place-btn' + (name === "平和島" ? " selected" : "");
            btn.innerHTML = `<span style="font-size:7px;">${i+1}</span><span class="place-name-vertical">${name}</span>`;
            btn.onclick = () => {
                document.querySelectorAll('.place-btn').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                document.getElementById('display-place').innerText = name;
            };
            pGrid.appendChild(btn);
        });

        // レース番号 (4x3)
        const rGrid = document.getElementById('race-grid');
        for (let i = 1; i <= 12; i++) {
            const btn = document.createElement('div');
            btn.className = 'race-btn' + (i === 1 ? " selected" : "");
            btn.innerText = i;
            btn.onclick = () => {
                rGrid.querySelectorAll('.race-btn').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                document.getElementById('display-race').innerText = i.toString().padStart(2, '0');
            };
            rGrid.appendChild(btn);
        }

        // マーク
        for (let r = 0; r < 3; r++) {
            const container = document.getElementById(`rank-${r}`);
            for (let n = 1; n <= 6; n++) {
                const div = document.createElement('div');
                div.className = 'mark';
                div.innerText = n;
                div.onclick = function() {
                    if (this.classList.contains('selected')) {
                        this.classList.remove('selected');
                        selectedNumbers[r] = selectedNumbers[r].filter(num => num !== n);
                    } else {
                        this.classList.add('selected');
                        selectedNumbers[r].push(n);
                        selectedNumbers[r].sort();
                    }
                    updateDisplay();
                };
                container.appendChild(div);
            }
        }

        function updateDisplay() {
            selectedNumbers.forEach((arr, i) => {
                document.getElementById(`numbers-${i}`).innerText = arr.length > 0 ? arr.join(" ") : "－";
            });
        }

        function saveImage() {
            html2canvas(document.getElementById('capture-target'), { scale: 2 }).then(canvas => {
                const link = document.createElement('a');
                link.download = `boatrace_ticket.png`;
                link.href = canvas.toDataURL("image/png");
                link.click();
            });
        }
    </script>
</body>
</html>
