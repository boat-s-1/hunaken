<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ボートレース予想メーカー</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --br-blue: #0054a6; --br-orange: #f39800; --sheet-bg: #fffbf0; }
        body { font-family: "MS Gothic", sans-serif; background-color: #ccc; display: flex; flex-direction: column; align-items: center; padding: 10px; margin: 0; }

        /* 舟券表示 */
        #capture-target { padding: 10px; background: #ccc; }
        .ticket-container {
            width: 380px; min-height: 240px; background: #fff; border: 1px solid #333;
            padding: 15px; box-sizing: border-box; color: #000;
            background-image: radial-gradient(rgba(255, 192, 203, 0.2) 20%, transparent 20%);
            background-size: 50px 50px;
        }
        .ticket-header { display: flex; justify-content: space-between; align-items: flex-end; }
        .ticket-place { font-size: 28px; font-weight: 950; }
        .ticket-info-row { display: flex; border-top: 3px solid #000; border-bottom: 3px solid #000; margin: 5px 0; padding: 2px 0; }
        .race-num { font-size: 22px; font-weight: 900; width: 100px; border-right: 2px solid #000; }
        .shikibetsu-box { flex: 1; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 900; letter-spacing: 8px; }

        /* 買い目数字を「びわこ風」に極太に */
        .rank-numbers { 
            font-size: 34px; font-weight: 950; letter-spacing: 6px; 
            font-family: serif; text-shadow: 1px 1px 0px #000;
        }

        .summary-row { display: flex; justify-content: flex-end; gap: 15px; font-size: 15px; font-weight: 900; }

        /* マークシート */
        .marksheet {
            background-color: var(--sheet-bg); width: 100%; max-width: 400px;
            padding: 15px; border: 2px solid var(--br-orange);
            border-left: 15px solid var(--br-orange); box-sizing: border-box;
        }
        .mark-row { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; }
        .rank-label-ms { background: var(--br-blue); color: #fff; font-size: 12px; width: 45px; text-align: center; font-weight: bold; padding: 4px 0;}
        .mark-group { display: flex; gap: 10px; }
        .mark {
            width: 22px; height: 38px; border: 2.5px solid #444; border-radius: 50% / 35%;
            display: flex; justify-content: center; align-items: center;
            font-size: 16px; font-weight: bold; background: #fff; cursor: pointer;
        }
        .mark.selected { background: #222 !important; color: #fff !important; }

        .btn-save { margin-top: 20px; padding: 15px 50px; background: #e60012; color: #fff; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; font-size: 16px; }
    </style>
</head>
<body>

    <div id="capture-target">
        <div class="ticket-container">
            <div class="ticket-header">
                <div style="font-size:11px; font-weight:bold;">BOAT<br>RACE</div>
                <div class="ticket-place">びわこ</div>
                <div style="font-size:12px; font-weight:bold;">フォーメーション</div>
            </div>
            <div class="ticket-info-row">
                <div class="race-num">07 レース</div>
                <div class="shikibetsu-box">３連単</div>
            </div>
            <div style="margin-top:10px;">
                <div style="display:flex; align-items:center;"><span style="width:60px;">1着 －</span><span class="rank-numbers" id="ans-0"></span></div>
                <div style="display:flex; align-items:center;"><span style="width:60px;">2着 －</span><span class="rank-numbers" id="ans-1"></span></div>
                <div style="display:flex; align-items:center;"><span style="width:60px;">3着 －</span><span class="rank-numbers" id="ans-2"></span></div>
            </div>
            <div class="summary-row">組合せ数 <span id="cnt">0</span>　各組 100円</div>
            <div class="summary-row">合計 <span id="total">0</span>円</div>
            <div style="height:25px; background:repeating-linear-gradient(90deg, #000, #000 2px, #fff 2px, #fff 5px); margin-top:10px;"></div>
        </div>
    </div>

    <div class="marksheet">
        <div class="mark-row">
            <div class="rank-label-ms">1着</div>
            <div class="mark-group">
                <div class="mark" onclick="tap(0,1,this)">1</div><div class="mark" onclick="tap(0,2,this)">2</div><div class="mark" onclick="tap(0,3,this)">3</div><div class="mark" onclick="tap(0,4,this)">4</div><div class="mark" onclick="tap(0,5,this)">5</div><div class="mark" onclick="tap(0,6,this)">6</div>
            </div>
        </div>
        <div class="mark-row">
            <div class="rank-label-ms">2着</div>
            <div class="mark-group">
                <div class="mark" onclick="tap(1,1,this)">1</div><div class="mark" onclick="tap(1,2,this)">2</div><div class="mark" onclick="tap(1,3,this)">3</div><div class="mark" onclick="tap(1,4,this)">4</div><div class="mark" onclick="tap(1,5,this)">5</div><div class="mark" onclick="tap(1,6,this)">6</div>
            </div>
        </div>
        <div class="mark-row">
            <div class="rank-label-ms">3着</div>
            <div class="mark-group">
                <div class="mark" onclick="tap(2,1,this)">1</div><div class="mark" onclick="tap(2,2,this)">2</div><div class="mark" onclick="tap(2,3,this)">3</div><div class="mark" onclick="tap(2,4,this)">4</div><div class="mark" onclick="tap(2,5,this)">5</div><div class="mark" onclick="tap(2,6,this)">6</div>
            </div>
        </div>
    </div>

    <button class="btn-save" onclick="saveImage()">画像を保存</button>

    <script>
        let sel = [[], [], []];

        function tap(r, n, el) {
            if (el.classList.contains('selected')) {
                el.classList.remove('selected');
                sel[r] = sel[r].filter(v => v !== n);
            } else {
                el.classList.add('selected');
                sel[r].push(n);
            }
            let c = 0;
            for (let a of sel[0]) for (let b of sel[1]) for (let d of sel[2]) {
                if (a !== b && b !== d && a !== d) c++;
            }
            sel.forEach((a, i) => document.getElementById('ans-' + i).innerText = a.sort().join(' '));
            document.getElementById('cnt').innerText = c;
            document.getElementById('total').innerText = (c * 100).toLocaleString();
        }

        function saveImage() {
            html2canvas(document.getElementById('capture-target'), {scale: 2}).then(canvas => {
                const a = document.createElement('a');
                a.href = canvas.toDataURL();
                a.download = 'ticket.png';
                a.click();
            });
        }
    </script>
</body>
</html>
