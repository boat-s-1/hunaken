<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ボートレース予想メーカー 2連単</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --br-blue: #0054a6; --br-orange: #f39800; --sheet-bg: #fffbf0; }
        body { font-family: sans-serif; background-color: #ccc; display: flex; flex-direction: column; align-items: center; margin: 0; padding: 10px; -webkit-user-select: none; }

        /* --- 舟券デザイン --- */
        #capture-target { padding: 5px; background: #ccc; }
        .ticket {
            width: 350px; height: 220px; background: #fff; border: 1px solid #333;
            padding: 8px; box-sizing: border-box; display: flex; flex-direction: column; position: relative;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="40"><text x="10" y="30" font-family="sans-serif" font-size="14" fill="rgba(255,192,203,0.1)" transform="rotate(-15, 50, 20)">P-STAR</text></svg>');
        }
        .t-top-row { display: flex; flex: 1; }
        .t-left { width: 110px; border-right: 1px solid #000; display: flex; flex-direction: column; padding-right: 5px; }
        .t-mid { width: 45px; display: flex; align-items: center; justify-content: center; }
        .t-right { flex: 1; padding-left: 8px; display: flex; flex-direction: column; }
        .t-place-box { border: 1.5px solid #000; padding: 2px; text-align: center; margin: 5px 0; font-size: 18px; font-weight: bold; }
        .t-shiki-v { writing-mode: vertical-rl; text-orientation: upright; font-size: 16px; font-weight: bold; border: 1.5px solid #000; padding: 8px 2px; letter-spacing: 4px; }
        .t-bet-line { display: flex; align-items: center; font-weight: bold; height: 30px; font-size: 14px; }
        .t-nums { font-size: 20px; margin-left: 8px; letter-spacing: 1px; }
        .t-summary { text-align: right; font-size: 11px; font-weight: bold; line-height: 1.2; margin-top: auto; }
        .t-barcode-area { width: 100%; display: flex; justify-content: center; padding: 5px 0; }
        .t-barcode { width: 85%; height: 18px; background: repeating-linear-gradient(90deg, #000, #000 2px, #fff 2px, #fff 4px); }

        /* --- マークシート --- */
        .ms { background: var(--sheet-bg); width: 100%; max-width: 380px; padding: 10px; border: 2px solid var(--br-orange); border-left: 12px solid var(--br-orange); box-sizing: border-box; margin-top: 10px; }
        .ms-top { display: flex; gap: 5px; height: 120px; margin-bottom: 8px; }
        .ms-race { display: grid; grid-template-columns: repeat(4, 1fr); gap: 3px; width: 140px; border: 1px solid var(--br-orange); background: #fff; padding: 3px; box-sizing: border-box; }
        .ms-btn { border: 1px solid var(--br-orange); background: #fff; color: var(--br-orange); font-weight: bold; display: flex; align-items: center; justify-content: center; font-size: 10px; cursor: pointer; height: 100%; }
        .ms-place { flex: 1; border: 1px solid var(--br-orange); background: #fff; display: flex; overflow-x: auto; padding: 3px; gap: 4px; box-sizing: border-box; }
        .p-btn { min-width: 28px; border: 1px solid var(--br-orange); background: #fff; color: var(--br-orange); font-weight: bold; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; font-size: 10px; cursor: pointer; padding-top: 2px; flex-shrink: 0; }
        .p-btn span.p-num { font-size: 8px; color: #999; margin-bottom: 2px; pointer-events: none; }
        .p-btn span.p-name { writing-mode: vertical-rl; letter-spacing: 1px; pointer-events: none; }
        .active { background: var(--br-orange) !important; color: #fff !important; }

        .row { display: flex; align-items: center; gap: 5px; margin: 12px 0; }
        .label { background: var(--br-blue); color: #fff; font-size: 11px; width: 40px; text-align: center; padding: 8px 0; font-weight: bold; border-radius: 2px; }
        .mark-wrap { display: flex; gap: 4px; }
        .mark { width: 34px; height: 40px; border: 1.5px solid #444; border-radius: 50% / 30%; background: #fff; font-weight: bold; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 18px; }
        .mark.selected { background: #222 !important; color: #fff !important; }

        .amt-row { display: flex; justify-content: flex-end; gap: 5px; margin-top: 10px; padding-top: 8px; border-top: 1px dashed var(--br-orange); }
        .amt-btn { border: 1px solid var(--br-orange); padding: 6px 14px; font-size: 11px; font-weight: bold; color: var(--br-orange); background: #fff; cursor: pointer; border-radius: 3px; }
        .save-btn { margin-top: 20px; padding: 14px 40px; background: #e60012; color: #fff; border: none; border-radius: 25px; font-weight: bold; font-size: 16px; cursor: pointer; width: 100%; max-width: 380px; }
        .back-btn { margin-top: 15px; display: inline-block; color: #0054a6; text-decoration: none; font-size: 14px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="capture-target">
        <div class="ticket">
            <div class="t-top-row">
                <div class="t-left">
                    <div style="font-size:9px; font-weight:bold;">BOAT RACE</div>
                    <div class="t-place-box" id="res-place">平和島</div>
                    <div style="margin-bottom:auto;">
                        <span style="font-size:24px; font-weight:bold;" id="res-race">01</span><span style="font-size:14px; font-weight:bold;">レース</span>
                    </div>
                    <div style="font-size:9px; font-weight:bold; line-height:1.2;">
                        <span id="res-date"></span><br><span id="res-pref">東京都</span>
                    </div>
                </div>
                <div class="t-mid"><div class="t-shiki-v">２連単</div></div>
                <div class="t-right">
                    <div style="border:1.5px solid #000; padding:1px 5px; align-self:flex-start; margin-bottom:5px; font-size:11px; font-weight:bold;">フォーメーション</div>
                    <div style="flex:1; display:flex; flex-direction:column; justify-content:center;">
                        <div class="t-bet-line">1着 － <span id="ans0" class="t-nums"></span></div>
                        <div class="t-bet-line">2着 － <span id="ans1" class="t-nums"></span></div>
                    </div>
                    <div class="t-summary">
                        組合せ数 ◆◆<span id="res-cnt">0</span><br>
                        各組 ◆◆◆◆<span id="res-unit">100</span>円<br>
                        合計 ◆◆◆◆◆◆<span id="res-total">0</span>円
                    </div>
                </div>
            </div>
            <div class="t-barcode-area"><div class="t-barcode"></div></div>
        </div>
    </div>

    <div class="ms">
        <div class="ms-top">
            <div class="ms-race">
                <div class="ms-btn active" onclick="setRace(this,'01')">1R</div><div class="ms-btn" onclick="setRace(this,'02')">2R</div><div class="ms-btn" onclick="setRace(this,'03')">3R</div><div class="ms-btn" onclick="setRace(this,'04')">4R</div>
                <div class="ms-btn" onclick="setRace(this,'05')">5R</div><div class="ms-btn" onclick="setRace(this,'06')">6R</div><div class="ms-btn" onclick="setRace(this,'07')">7R</div><div class="ms-btn" onclick="setRace(this,'08')">8R</div>
                <div class="ms-btn" onclick="setRace(this,'09')">9R</div><div class="ms-btn" onclick="setRace(this,'10')">10R</div><div class="ms-btn" onclick="setRace(this,'11')">11R</div><div class="ms-btn" onclick="setRace(this,'12')">12R</div>
            </div>
            <div class="ms-place">
                <div class="p-btn" onclick="setPlace(this,'桐生','群馬県')"><span class="p-num">1</span><span class="p-name">桐生</span></div>
                <div class="p-btn" onclick="setPlace(this,'戸田','埼玉県')"><span class="p-num">2</span><span class="p-name">戸田</span></div>
                <div class="p-btn" onclick="setPlace(this,'江戸川','東京都')"><span class="p-num">3</span><span class="p-name">江戸川</span></div>
                <div class="p-btn active" onclick="setPlace(this,'平和島','東京都')"><span class="p-num">4</span><span class="p-name">平和島</span></div>
                <div class="p-btn" onclick="setPlace(this,'多摩川','東京都')"><span class="p-num">5</span><span class="p-name">多摩川</span></div>
                <div class="p-btn" onclick="setPlace(this,'浜名湖','静岡県')"><span class="p-num">6</span><span class="p-name">浜名湖</span></div>
                <div class="p-btn" onclick="setPlace(this,'蒲郡','愛知県')"><span class="p-num">7</span><span class="p-name">蒲郡</span></div>
                <div class="p-btn" onclick="setPlace(this,'常滑','愛知県')"><span class="p-num">8</span><span class="p-name">常滑</span></div>
                <div class="p-btn" onclick="setPlace(this,'津','三重県')"><span class="p-num">9</span><span class="p-name">津</span></div>
                <div class="p-btn" onclick="setPlace(this,'三国','福井県')"><span class="p-num">10</span><span class="p-name">三国</span></div>
                <div class="p-btn" onclick="setPlace(this,'びわこ','滋賀県')"><span class="p-num">11</span><span class="p-name">びわこ</span></div>
                <div class="p-btn" onclick="setPlace(this,'住之江','大阪府')"><span class="p-num">12</span><span class="p-name">住之江</span></div>
                <div class="p-btn" onclick="setPlace(this,'尼崎','兵庫県')"><span class="p-num">13</span><span class="p-name">尼崎</span></div>
                <div class="p-btn" onclick="setPlace(this,'鳴門','徳島県')"><span class="p-num">14</span><span class="p-name">鳴門</span></div>
                <div class="p-btn" onclick="setPlace(this,'丸亀','香川県')"><span class="p-num">15</span><span class="p-name">丸亀</span></div>
                <div class="p-btn" onclick="setPlace(this,'児島','岡山県')"><span class="p-num">16</span><span class="p-name">児島</span></
